<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - List Meja</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .meja-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 6px 14px 4px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(18px, 2.5%, 30px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 3px 6px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .logo-header img {
            width: clamp(22px, 3.5%, 40px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            color: white;
            font-size: clamp(11px, 1.6%, 20px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        /* ===== JUDUL ===== */
        .title-meja {
            position: absolute;
            left: 50%;
            top: 9%;
            transform: translateX(-50%);
            z-index: 5;
            color: white;
            font-size: clamp(22px, 5%, 55px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            letter-spacing: 1px;
        }

        /* ===== LIST MEJA ===== */
        .meja-wrapper {
            position: absolute;
            top: 16%;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            height: 80%;
            z-index: 5;
            overflow-y: auto;
            padding: 8px 10px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
        }

        .meja-wrapper::-webkit-scrollbar {
            width: 3px;
        }

        .meja-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .meja-wrapper::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .meja-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .meja-item:last-child {
            border-bottom: none;
        }

        .meja-item .meja-nama {
            color: white;
            font-size: clamp(14px, 3.5%, 36px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .meja-item .meja-status {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .meja-item .meja-status .status-badge {
            padding: 4px 14px;
            border-radius: 125px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: clamp(9px, 1.4%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            min-width: 60px;
        }

        .meja-item .meja-status .status-badge:hover {
            transform: scale(1.05);
        }

        .status-badge.tersedia {
            background: #98C81C;
            border-color: #98C81C;
        }

        .status-badge.tersedia:hover {
            background: #7aa814;
        }

        .status-badge.tidak-tersedia {
            background: #ED1B24;
            border-color: #ED1B24;
        }

        .status-badge.tidak-tersedia:hover {
            background: #c0392b;
        }

        .status-badge.direservasi {
            background: #f39c12;
            border-color: #f39c12;
        }

        .status-badge.direservasi:hover {
            background: #d68910;
        }

        .status-badge.sudah-diisi {
            background: #8e44ad;
            border-color: #8e44ad;
        }

        .status-badge.sudah-diisi:hover {
            background: #6c3483;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 30px 0;
            font-size: clamp(14px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
        }

        .empty-state .sub {
            font-size: clamp(10px, 1.4%, 16px);
            color: rgba(255, 255, 255, 0.3);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(10px, 1.4%, 16px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */

        /* HP Portrait */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .meja-container { width: 100vw; height: 100vh; border-radius: 0; }
            .meja-wrapper { padding: 5px 6px; border-radius: 18px; top: 15%; height: 82%; }
            .meja-item { padding: 4px 0; }
            .meja-item .meja-nama { font-size: 14px; }
            .meja-item .meja-status .status-badge { font-size: 8px; padding: 3px 10px; min-width: 45px; border-width: 1.5px; }
            .title-meja { font-size: 18px; top: 8%; }
            .btn-back { font-size: 14px; }
            .logo-header img { width: 18px; }
            .brand-text { font-size: 9px; }
            .header-top { padding: 4px 12px 3px 12px; }
        }

        /* HP Portrait Kecil */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .meja-wrapper { padding: 4px 4px; border-radius: 14px; top: 14%; height: 83%; }
            .meja-item { padding: 3px 0; }
            .meja-item .meja-nama { font-size: 11px; }
            .meja-item .meja-status .status-badge { font-size: 6px; padding: 2px 6px; min-width: 30px; border-width: 1.5px; }
            .title-meja { font-size: 14px; top: 7%; }
            .btn-back { font-size: 12px; }
            .logo-header img { width: 16px; }
            .brand-text { font-size: 8px; }
        }

        /* ===== LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            .meja-container { width: 100vw; height: 100vh; border-radius: 0; }
            .meja-wrapper { padding: 5px 12px; border-radius: 20px; top: 14%; height: 83%; }
            .meja-item { padding: 4px 0; }
            .meja-item .meja-nama { font-size: 13px; }
            .meja-item .meja-status .status-badge { font-size: 8px; padding: 3px 10px; min-width: 40px; border-width: 1.5px; }
            .title-meja { font-size: 16px; top: 7%; }
            .btn-back { font-size: 16px; }
            .logo-header img { width: 20px; }
            .brand-text { font-size: 10px; }
            .header-top { padding: 4px 12px 3px 12px; }
        }

        /* Landscape HP Kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .meja-wrapper { padding: 3px 8px; border-radius: 14px; top: 13%; height: 84%; }
            .meja-item { padding: 3px 0; }
            .meja-item .meja-nama { font-size: 11px; }
            .meja-item .meja-status .status-badge { font-size: 7px; padding: 2px 6px; min-width: 30px; border-width: 1.5px; }
            .title-meja { font-size: 13px; top: 6%; }
            .btn-back { font-size: 12px; }
            .logo-header img { width: 16px; }
            .brand-text { font-size: 8px; }
        }

        /* ===== TABLET PORTRAIT ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .meja-container { width: 100vw; height: 100vh; border-radius: 0; }
            .meja-wrapper { padding: 8px 15px; border-radius: 25px; top: 15%; height: 82%; }
            .meja-item { padding: 6px 0; }
            .meja-item .meja-nama { font-size: 20px; }
            .meja-item .meja-status .status-badge { font-size: 12px; padding: 5px 16px; min-width: 60px; border-width: 2px; }
            .title-meja { font-size: 24px; top: 8%; }
            .btn-back { font-size: 20px; }
            .logo-header img { width: 30px; }
            .brand-text { font-size: 16px; }
            .header-top { padding: 8px 18px 5px 18px; }
        }

        /* ===== TABLET LANDSCAPE ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .meja-container { width: 100vw; height: 100vh; border-radius: 0; }
            .meja-wrapper { padding: 6px 15px; border-radius: 22px; top: 14%; height: 83%; }
            .meja-item { padding: 5px 0; }
            .meja-item .meja-nama { font-size: 16px; }
            .meja-item .meja-status .status-badge { font-size: 10px; padding: 4px 12px; min-width: 50px; border-width: 2px; }
            .title-meja { font-size: 20px; top: 7%; }
            .btn-back { font-size: 18px; }
            .logo-header img { width: 25px; }
            .brand-text { font-size: 14px; }
            .header-top { padding: 6px 16px 4px 16px; }
        }

        /* ===== DESKTOP ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .meja-container { width: 100vw; height: 100vh; border-radius: 0; }
            .meja-wrapper { padding: 8px 20px; border-radius: 28px; top: 14%; height: 83%; max-width: 900px; left: 50%; transform: translateX(-50%); }
            .meja-item { padding: 6px 0; }
            .meja-item .meja-nama { font-size: 20px; }
            .meja-item .meja-status .status-badge { font-size: 12px; padding: 5px 16px; min-width: 60px; border-width: 2px; }
            .title-meja { font-size: 26px; top: 7%; }
            .btn-back { font-size: 22px; }
            .logo-header img { width: 32px; }
            .brand-text { font-size: 18px; }
            .header-top { padding: 8px 20px 5px 20px; }
        }

        /* Desktop Lebar */
        @media screen and (min-width: 1600px) and (orientation: landscape) {
            .meja-wrapper { max-width: 1000px; padding: 10px 25px; border-radius: 32px; }
            .meja-item .meja-nama { font-size: 24px; }
            .meja-item .meja-status .status-badge { font-size: 14px; padding: 6px 18px; min-width: 70px; }
            .title-meja { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="meja-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data meja...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/40x40/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
        </div>

        <!-- ===== JUDUL ===== -->
        <div class="title-meja">LIST MEJA</div>

        <!-- ===== LIST MEJA ===== -->
        <div class="meja-wrapper" id="mejaWrapper">
            <div class="empty-state">🔄 Memuat data...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mejaData = [];
        let isRealtimeConnected = false;

        function goBack() {
            window.history.back();
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function getStatusLabel(status) {
            const map = {
                'Tersedia': 'Tersedia',
                'Tidak Tersedia': 'Tidak Tersedia',
                'Direservasi': 'Direservasi',
                'Sudah Diisi': 'Sudah Diisi'
            };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = {
                'Tersedia': 'tersedia',
                'Tidak Tersedia': 'tidak-tersedia',
                'Direservasi': 'direservasi',
                'Sudah Diisi': 'sudah-diisi'
            };
            return map[status] || 'tersedia';
        }

        function getStatusOptions() {
            return ['Tersedia', 'Tidak Tersedia', 'Direservasi', 'Sudah Diisi'];
        }

        async function loadMeja() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { data, error } = await supabaseClient
                    .from('tables')
                    .select('*')
                    .order('id_table', { ascending: true });

                if (error) throw error;

                mejaData = data || [];
                console.log('Meja loaded:', mejaData.length);
                renderMeja();

                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('Error loading meja:', error);
                showToast('⚠️ Gagal memuat data meja: ' + error.message, true);
                document.getElementById('mejaWrapper').innerHTML = `
                    <div class="empty-state">
                        ⚠️ Gagal memuat data<br>
                        <span class="sub">${error.message}</span>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        function setupRealtime() {
            if (isRealtimeConnected) return;

            const channel = supabaseClient
                .channel('meja-db-changes')
                .on(
                    'postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'tables'
                    },
                    (payload) => {
                        console.log('Realtime update tables:', payload);
                        loadMejaSilent();
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            window.realtimeChannel = channel;
        }

        async function loadMejaSilent() {
            try {
                const { data, error } = await supabaseClient
                    .from('tables')
                    .select('*')
                    .order('id_table', { ascending: true });

                if (error) throw error;

                mejaData = data || [];
                console.log('Meja refreshed (silent):', mejaData.length);
                renderMeja();

            } catch (error) {
                console.error('Error silent loading meja:', error);
            }
        }

        function renderMeja() {
            const container = document.getElementById('mejaWrapper');

            if (!mejaData || mejaData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        🪑 Belum ada data meja<br>
                        <span class="sub">Silakan tambahkan meja terlebih dahulu</span>
                    </div>
                `;
                return;
            }

            let html = '';
            mejaData.forEach((meja) => {
                const status = meja.status || 'Tersedia';
                const statusLabel = getStatusLabel(status);
                const statusClass = getStatusClass(status);

                html += `
                    <div class="meja-item">
                        <div class="meja-nama">Meja ${meja.nomor_meja}</div>
                        <div class="meja-status">
                            <button class="status-badge ${statusClass}" onclick="ubahStatus(${meja.id_table}, '${status}')">
                                ${statusLabel}
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function ubahStatus(idTable, currentStatus) {
            const options = getStatusOptions();
            const currentIndex = options.indexOf(currentStatus);
            const nextIndex = (currentIndex + 1) % options.length;
            const newStatus = options[nextIndex];

            if (!confirm(`Ubah status Meja dari "${currentStatus}" menjadi "${newStatus}"?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('tables')
                    .update({ status: newStatus })
                    .eq('id_table', idTable);

                if (error) throw error;

                showToast(`✅ Status meja berhasil diubah menjadi ${newStatus}`);
                await loadMejaSilent();

            } catch (error) {
                console.error('Error updating meja status:', error);
                showToast('⚠️ Gagal mengubah status meja: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // Cek login
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadMeja();
        });
    </script>
</body>
</html>
