<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - List Meja</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .meja-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 10px 16px;
            padding-top: env(safe-area-inset-top, 10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            min-height: 56px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 4px 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .logo-header img {
            width: 36px;
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout {
            background: #e74c3c;
            border: 2px solid white;
            border-radius: 50px;
            padding: 6px 16px;
            color: white;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 36px;
            display: flex;
            align-items: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-logout:active {
            transform: scale(0.95);
        }

        /* ===== JUDUL ===== */
        .title-meja {
            position: relative;
            z-index: 5;
            color: white;
            font-size: clamp(22px, 5%, 55px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            padding: 8px 16px 6px 16px;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        /* ===== LIST MEJA ===== */
        .meja-wrapper {
            flex: 1;
            position: relative;
            z-index: 5;
            margin: 0 12px 12px 12px;
            margin-bottom: env(safe-area-inset-bottom, 12px);
            overflow-y: auto;
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.2);
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }

        .meja-wrapper::-webkit-scrollbar {
            width: 3px;
        }

        .meja-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .meja-wrapper::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .meja-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .meja-item:last-child {
            border-bottom: none;
        }

        .meja-item .meja-nama {
            color: white;
            font-size: clamp(16px, 3.5%, 36px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .meja-item .meja-status {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .meja-item .meja-status .status-badge {
            padding: 5px 16px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: clamp(10px, 1.4%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            min-width: 65px;
            -webkit-tap-highlight-color: transparent;
        }

        .meja-item .meja-status .status-badge:active {
            transform: scale(0.95);
        }

        .status-badge.tersedia {
            background: #98C81C;
            border-color: #98C81C;
        }

        .status-badge.tersedia:active {
            background: #7aa814;
        }

        .status-badge.tidak-tersedia {
            background: #ED1B24;
            border-color: #ED1B24;
        }

        .status-badge.tidak-tersedia:active {
            background: #c0392b;
        }

        .status-badge.direservasi {
            background: #f39c12;
            border-color: #f39c12;
        }

        .status-badge.direservasi:active {
            background: #d68910;
        }

        .status-badge.sudah-diisi {
            background: #8e44ad;
            border-color: #8e44ad;
        }

        .status-badge.sudah-diisi:active {
            background: #6c3483;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 30px 0;
            font-size: clamp(14px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
        }

        .empty-state .sub {
            font-size: clamp(10px, 1.4%, 16px);
            color: rgba(255, 255, 255, 0.3);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: 16px;
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */

        /* HP Portrait */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .header-top {
                padding: 6px 12px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 48px;
            }
            .btn-back {
                font-size: 22px;
                min-width: 36px;
                min-height: 36px;
            }
            .logo-header img { width: 28px; }
            .brand-text { font-size: 16px; }
            .btn-logout {
                font-size: 11px;
                padding: 4px 10px;
                min-height: 30px;
            }
            .meja-wrapper {
                margin: 0 8px 8px 8px;
                padding: 6px 10px;
                border-radius: 16px;
            }
            .meja-item { padding: 6px 0; }
            .meja-item .meja-nama { font-size: 15px; }
            .meja-item .meja-status .status-badge {
                font-size: 9px;
                padding: 4px 10px;
                min-width: 45px;
                border-width: 1.5px;
            }
            .title-meja { font-size: 20px; padding: 6px 12px 4px 12px; }
        }

        /* HP Portrait Kecil */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .header-top {
                padding: 4px 10px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 40px;
            }
            .btn-back {
                font-size: 18px;
                min-width: 30px;
                min-height: 30px;
            }
            .logo-header img { width: 22px; }
            .brand-text { font-size: 13px; }
            .btn-logout {
                font-size: 9px;
                padding: 3px 8px;
                min-height: 26px;
            }
            .meja-wrapper {
                margin: 0 6px 6px 6px;
                padding: 4px 6px;
                border-radius: 12px;
            }
            .meja-item { padding: 4px 0; }
            .meja-item .meja-nama { font-size: 12px; }
            .meja-item .meja-status .status-badge {
                font-size: 7px;
                padding: 3px 6px;
                min-width: 30px;
                border-width: 1.5px;
            }
            .title-meja { font-size: 16px; padding: 4px 10px 2px 10px; }
        }

        /* ===== LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            .header-top {
                padding: 6px 14px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .btn-back {
                font-size: 22px;
                min-width: 38px;
                min-height: 38px;
            }
            .logo-header img { width: 28px; }
            .brand-text { font-size: 16px; }
            .btn-logout {
                font-size: 12px;
                padding: 4px 12px;
                min-height: 32px;
            }
            .meja-wrapper {
                margin: 0 12px 8px 12px;
                padding: 6px 14px;
                border-radius: 18px;
            }
            .meja-item { padding: 5px 0; }
            .meja-item .meja-nama { font-size: 15px; }
            .meja-item .meja-status .status-badge {
                font-size: 10px;
                padding: 4px 12px;
                min-width: 50px;
                border-width: 1.5px;
            }
            .title-meja { font-size: 18px; padding: 6px 14px 4px 14px; }
        }

        /* Landscape HP Kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .header-top {
                padding: 4px 12px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 36px;
            }
            .btn-back {
                font-size: 18px;
                min-width: 32px;
                min-height: 32px;
            }
            .logo-header img { width: 22px; }
            .brand-text { font-size: 13px; }
            .btn-logout {
                font-size: 10px;
                padding: 3px 8px;
                min-height: 28px;
            }
            .meja-wrapper {
                margin: 0 8px 4px 8px;
                padding: 4px 10px;
                border-radius: 14px;
            }
            .meja-item { padding: 4px 0; }
            .meja-item .meja-nama { font-size: 12px; }
            .meja-item .meja-status .status-badge {
                font-size: 8px;
                padding: 3px 8px;
                min-width: 35px;
                border-width: 1.5px;
            }
            .title-meja { font-size: 14px; padding: 4px 12px 2px 12px; }
        }

        /* ===== TABLET PORTRAIT ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .header-top {
                padding: 10px 20px;
                padding-top: env(safe-area-inset-top, 10px);
                min-height: 60px;
            }
            .btn-back {
                font-size: 28px;
                min-width: 48px;
                min-height: 48px;
            }
            .logo-header img { width: 40px; }
            .brand-text { font-size: 22px; }
            .btn-logout {
                font-size: 14px;
                padding: 6px 18px;
                min-height: 40px;
            }
            .meja-wrapper {
                margin: 0 20px 15px 20px;
                padding: 10px 18px;
                border-radius: 24px;
            }
            .meja-item { padding: 8px 0; }
            .meja-item .meja-nama { font-size: 22px; }
            .meja-item .meja-status .status-badge {
                font-size: 13px;
                padding: 6px 18px;
                min-width: 65px;
                border-width: 2px;
            }
            .title-meja { font-size: 26px; padding: 10px 20px 8px 20px; }
        }

        /* ===== TABLET LANDSCAPE ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .header-top {
                padding: 8px 16px;
                padding-top: env(safe-area-inset-top, 8px);
                min-height: 50px;
            }
            .btn-back {
                font-size: 24px;
                min-width: 42px;
                min-height: 42px;
            }
            .logo-header img { width: 34px; }
            .brand-text { font-size: 18px; }
            .btn-logout {
                font-size: 13px;
                padding: 5px 14px;
                min-height: 36px;
            }
            .meja-wrapper {
                margin: 0 16px 10px 16px;
                padding: 8px 16px;
                border-radius: 20px;
            }
            .meja-item { padding: 6px 0; }
            .meja-item .meja-nama { font-size: 18px; }
            .meja-item .meja-status .status-badge {
                font-size: 11px;
                padding: 5px 14px;
                min-width: 55px;
                border-width: 2px;
            }
            .title-meja { font-size: 22px; padding: 8px 16px 6px 16px; }
        }

        /* ===== DESKTOP ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .header-top {
                padding: 10px 24px;
                padding-top: env(safe-area-inset-top, 10px);
                min-height: 60px;
            }
            .btn-back {
                font-size: 28px;
                min-width: 48px;
                min-height: 48px;
            }
            .logo-header img { width: 40px; }
            .brand-text { font-size: 22px; }
            .btn-logout {
                font-size: 14px;
                padding: 6px 18px;
                min-height: 40px;
            }
            .meja-wrapper {
                margin: 0 auto 15px auto;
                padding: 10px 20px;
                border-radius: 24px;
                max-width: 900px;
                width: 94%;
            }
            .meja-item { padding: 8px 0; }
            .meja-item .meja-nama { font-size: 22px; }
            .meja-item .meja-status .status-badge {
                font-size: 13px;
                padding: 6px 18px;
                min-width: 65px;
                border-width: 2px;
            }
            .title-meja { font-size: 28px; padding: 10px 20px 8px 20px; }
        }

        /* Desktop Lebar */
        @media screen and (min-width: 1600px) and (orientation: landscape) {
            .meja-wrapper { max-width: 1000px; padding: 12px 24px; }
            .meja-item .meja-nama { font-size: 26px; }
            .meja-item .meja-status .status-badge { font-size: 15px; padding: 8px 20px; min-width: 75px; }
            .title-meja { font-size: 32px; }
        }

        @supports not (padding: env(safe-area-inset-top)) {
            .header-top { padding-top: 10px; }
            .meja-wrapper { margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div class="meja-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data meja...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/50x50/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-logout" onclick="logoutKaryawan()">🚪 Keluar</button>
            </div>
        </div>

        <!-- ===== JUDUL ===== -->
        <div class="title-meja">LIST MEJA</div>

        <!-- ===== LIST MEJA ===== -->
        <div class="meja-wrapper" id="mejaWrapper">
            <div class="empty-state">🔄 Memuat data...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mejaData = [];
        let isRealtimeConnected = false;

        function goBack() {
            window.history.back();
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function logoutKaryawan() {
            if (confirm('Yakin ingin keluar?')) {
                localStorage.removeItem('karyawan_logged_in');
                localStorage.removeItem('login_time');
                localStorage.removeItem('karyawan_nama');
                window.location.href = 'karyawan_login.html';
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function getStatusLabel(status) {
            const map = {
                'Tersedia': 'Tersedia',
                'Tidak Tersedia': 'Tidak Tersedia',
                'Direservasi': 'Direservasi',
                'Sudah Diisi': 'Sudah Diisi'
            };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = {
                'Tersedia': 'tersedia',
                'Tidak Tersedia': 'tidak-tersedia',
                'Direservasi': 'direservasi',
                'Sudah Diisi': 'sudah-diisi'
            };
            return map[status] || 'tersedia';
        }

        function getStatusOptions() {
            return ['Tersedia', 'Tidak Tersedia', 'Direservasi', 'Sudah Diisi'];
        }

        async function loadMeja() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { data, error } = await supabaseClient
                    .from('tables')
                    .select('*')
                    .order('id_table', { ascending: true });

                if (error) throw error;

                mejaData = data || [];
                console.log('Meja loaded:', mejaData.length);
                renderMeja();

                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('Error loading meja:', error);
                showToast('⚠️ Gagal memuat data meja: ' + error.message, true);
                document.getElementById('mejaWrapper').innerHTML = `
                    <div class="empty-state">
                        ⚠️ Gagal memuat data<br>
                        <span class="sub">${error.message}</span>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        function setupRealtime() {
            if (isRealtimeConnected) return;

            const channel = supabaseClient
                .channel('meja-db-changes')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'tables'
                }, (payload) => {
                    console.log('Realtime update tables:', payload);
                    loadMejaSilent();
                })
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            window.realtimeChannel = channel;
        }

        async function loadMejaSilent() {
            try {
                const { data, error } = await supabaseClient
                    .from('tables')
                    .select('*')
                    .order('id_table', { ascending: true });

                if (error) throw error;

                mejaData = data || [];
                console.log('Meja refreshed (silent):', mejaData.length);
                renderMeja();

            } catch (error) {
                console.error('Error silent loading meja:', error);
            }
        }

        function renderMeja() {
            const container = document.getElementById('mejaWrapper');

            if (!mejaData || mejaData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        🪑 Belum ada data meja<br>
                        <span class="sub">Silakan tambahkan meja terlebih dahulu</span>
                    </div>
                `;
                return;
            }

            let html = '';
            mejaData.forEach((meja) => {
                const status = meja.status || 'Tersedia';
                const statusLabel = getStatusLabel(status);
                const statusClass = getStatusClass(status);

                html += `
                    <div class="meja-item">
                        <div class="meja-nama">Meja ${meja.nomor_meja}</div>
                        <div class="meja-status">
                            <button class="status-badge ${statusClass}" onclick="ubahStatus(${meja.id_table}, '${status}')">
                                ${statusLabel}
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function ubahStatus(idTable, currentStatus) {
            const options = getStatusOptions();
            const currentIndex = options.indexOf(currentStatus);
            const nextIndex = (currentIndex + 1) % options.length;
            const newStatus = options[nextIndex];

            if (!confirm(`Ubah status Meja dari "${currentStatus}" menjadi "${newStatus}"?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('tables')
                    .update({ status: newStatus })
                    .eq('id_table', idTable);

                if (error) throw error;

                showToast(`✅ Status meja berhasil diubah menjadi ${newStatus}`);
                await loadMejaSilent();

            } catch (error) {
                console.error('Error updating meja status:', error);
                showToast('⚠️ Gagal mengubah status meja: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // ============================================
        // AUTO LOGOUT 15 MENIT
        // ============================================
        (function() {
            const LOGOUT_TIMER = 15 * 60 * 1000;
            let logoutTimer;

            function doLogout() {
                localStorage.removeItem('karyawan_logged_in');
                localStorage.removeItem('login_time');
                localStorage.removeItem('karyawan_nama');
                window.location.href = 'karyawan_login.html';
            }

            function resetLogoutTimer() {
                if (logoutTimer) clearTimeout(logoutTimer);
                logoutTimer = setTimeout(doLogout, LOGOUT_TIMER);
            }

            const events = ['click', 'keypress', 'scroll', 'touchstart', 'mousemove', 'keydown'];
            events.forEach(event => {
                document.addEventListener(event, resetLogoutTimer);
            });

            resetLogoutTimer();
            console.log('⏱️ Auto logout setelah 15 menit tidak ada aktivitas');
        })();

        // Cek login
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadMeja();
        });
    </script>
</body>
</html>
