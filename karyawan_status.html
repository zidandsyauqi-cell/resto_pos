<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Status Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .status-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 6px 14px 4px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(18px, 2.5%, 30px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 3px 6px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .logo-header img {
            width: clamp(22px, 3.5%, 40px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            color: white;
            font-size: clamp(11px, 1.6%, 20px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: 3px 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: clamp(9px, 1.3%, 15px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
        }

        .btn-selesai:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .title-status {
            position: absolute;
            left: 50%;
            top: 9%;
            transform: translateX(-50%);
            z-index: 5;
            color: white;
            font-size: clamp(22px, 5%, 55px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            letter-spacing: 1px;
        }

        .table-wrapper {
            position: absolute;
            top: 16%;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            height: 80%;
            z-index: 5;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 8px 10px 6px 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .table-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 30px 1.3fr 1.5fr 1.1fr 1fr;
            gap: 3px;
            padding-bottom: 4px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 3px;
            flex-shrink: 0;
        }

        .table-header .col {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(9px, 1.5%, 18px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .table-row {
            display: grid;
            grid-template-columns: 30px 1.3fr 1.5fr 1.1fr 1fr;
            gap: 3px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            align-items: center;
            transition: background 0.15s;
            min-height: 32px;
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .table-row .col {
            color: white;
            font-size: clamp(10px, 1.5%, 18px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            word-break: break-word;
            line-height: 1.3;
        }

        .table-row .col .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-size: clamp(8px, 1.2%, 14px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            color: white;
            min-width: 55px;
            letter-spacing: 0.5px;
        }

        .status-badge.diproses {
            background: rgba(243, 156, 18, 0.25);
            border-color: #f39c12;
            color: #f39c12;
        }

        .status-badge.siap {
            background: rgba(152, 200, 28, 0.25);
            border-color: #98C81C;
            color: #98C81C;
        }

        .status-badge.selesai {
            background: rgba(46, 204, 113, 0.25);
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .table-row .col .action-btns {
            display: flex;
            gap: 4px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 3px 8px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: clamp(8px, 1.1%, 13px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.25s;
            min-width: 40px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            white-space: nowrap;
        }

        .btn-action:hover {
            transform: scale(1.04);
            border-color: white;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        .btn-action.siapkan {
            background: #98C81C;
            border-color: #98C81C;
        }

        .btn-action.siapkan:hover {
            background: #7aa814;
            border-color: #7aa814;
        }

        .btn-action.selesai-status {
            background: #029BEE;
            border-color: #029BEE;
        }

        .btn-action.selesai-status:hover {
            background: #0288d1;
            border-color: #0288d1;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 20px 0;
            font-size: clamp(14px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
        }

        .empty-state .sub {
            font-size: clamp(10px, 1.4%, 16px);
            color: rgba(255, 255, 255, 0.3);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(10px, 1.4%, 16px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */

        /* HP Portrait */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .status-container { width: 100vw; height: 100vh; border-radius: 0; }
            .table-wrapper { padding: 5px 6px; border-radius: 18px; top: 15%; height: 82%; }
            .table-header { grid-template-columns: 20px 1.1fr 1.2fr 1fr 0.9fr; gap: 2px; }
            .table-row { grid-template-columns: 20px 1.1fr 1.2fr 1fr 0.9fr; gap: 2px; padding: 3px 0; min-height: 28px; }
            .table-header .col { font-size: 8px; }
            .table-row .col { font-size: 8px; }
            .table-row .col .status-badge { font-size: 6px; padding: 1px 6px; min-width: 35px; border-width: 1.5px; }
            .btn-action { font-size: 6px; padding: 2px 5px; min-width: 22px; border-width: 1.5px; gap: 2px; }
            .title-status { font-size: 16px; top: 8%; }
            .btn-selesai { padding: 2px 8px; font-size: 8px; }
            .btn-back { font-size: 14px; }
            .logo-header img { width: 18px; }
            .brand-text { font-size: 9px; }
        }

        /* HP Portrait Kecil */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .table-wrapper { padding: 4px 4px; border-radius: 14px; top: 14%; height: 83%; }
            .table-header { grid-template-columns: 15px 1fr 1fr 0.7fr 0.6fr; gap: 1px; }
            .table-row { grid-template-columns: 15px 1fr 1fr 0.7fr 0.6fr; gap: 1px; padding: 2px 0; min-height: 24px; }
            .table-header .col { font-size: 6px; }
            .table-row .col { font-size: 6px; }
            .table-row .col .status-badge { font-size: 5px; padding: 1px 4px; min-width: 25px; border-width: 1px; }
            .btn-action { font-size: 5px; padding: 1px 4px; min-width: 16px; border-width: 1px; }
            .title-status { font-size: 14px; top: 7%; }
            .btn-selesai { padding: 2px 6px; font-size: 7px; }
            .btn-back { font-size: 12px; }
            .logo-header img { width: 16px; }
            .brand-text { font-size: 8px; }
        }

        /* ===== LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            .status-container { width: 100vw; height: 100vh; border-radius: 0; }
            .table-wrapper { padding: 5px 12px; border-radius: 20px; top: 14%; height: 83%; }
            .table-header { grid-template-columns: 25px 1.2fr 1.3fr 1fr 0.9fr; gap: 3px; }
            .table-row { grid-template-columns: 25px 1.2fr 1.3fr 1fr 0.9fr; gap: 3px; padding: 3px 0; min-height: 28px; }
            .table-header .col { font-size: 9px; }
            .table-row .col { font-size: 9px; }
            .table-row .col .status-badge { font-size: 7px; padding: 2px 8px; min-width: 40px; border-width: 1.5px; }
            .btn-action { font-size: 7px; padding: 2px 6px; min-width: 28px; border-width: 1.5px; }
            .title-status { font-size: 16px; top: 7%; }
            .btn-selesai { padding: 2px 8px; font-size: 8px; }
            .btn-back { font-size: 16px; }
            .logo-header img { width: 20px; }
            .brand-text { font-size: 10px; }
            .header-top { padding: 4px 12px 3px 12px; }
        }

        /* Landscape HP Kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .table-wrapper { padding: 3px 8px; border-radius: 14px; top: 13%; height: 84%; }
            .table-header { grid-template-columns: 18px 1.1fr 1.2fr 0.9fr 0.8fr; gap: 2px; }
            .table-row { grid-template-columns: 18px 1.1fr 1.2fr 0.9fr 0.8fr; gap: 2px; padding: 2px 0; min-height: 22px; }
            .table-header .col { font-size: 7px; }
            .table-row .col { font-size: 7px; }
            .table-row .col .status-badge { font-size: 6px; padding: 1px 5px; min-width: 30px; border-width: 1px; }
            .btn-action { font-size: 6px; padding: 1px 4px; min-width: 18px; border-width: 1px; }
            .title-status { font-size: 13px; top: 6%; }
            .btn-selesai { padding: 1px 6px; font-size: 7px; }
            .btn-back { font-size: 12px; }
            .logo-header img { width: 16px; }
            .brand-text { font-size: 8px; }
        }

        /* ===== TABLET PORTRAIT ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .status-container { width: 100vw; height: 100vh; border-radius: 0; }
            .table-wrapper { padding: 8px 15px; border-radius: 25px; top: 15%; height: 82%; }
            .table-header { grid-template-columns: 30px 1.3fr 1.5fr 1.1fr 1fr; gap: 4px; }
            .table-row { grid-template-columns: 30px 1.3fr 1.5fr 1.1fr 1fr; gap: 4px; padding: 5px 0; min-height: 38px; }
            .table-header .col { font-size: 12px; }
            .table-row .col { font-size: 12px; }
            .table-row .col .status-badge { font-size: 10px; padding: 3px 12px; min-width: 60px; border-width: 2px; }
            .btn-action { font-size: 10px; padding: 3px 10px; min-width: 40px; border-width: 2px; }
            .title-status { font-size: 24px; top: 8%; }
            .btn-selesai { padding: 4px 14px; font-size: 12px; }
            .btn-back { font-size: 20px; }
            .logo-header img { width: 30px; }
            .brand-text { font-size: 16px; }
            .header-top { padding: 8px 18px 5px 18px; }
        }

        /* ===== TABLET LANDSCAPE ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .status-container { width: 100vw; height: 100vh; border-radius: 0; }
            .table-wrapper { padding: 6px 15px; border-radius: 22px; top: 14%; height: 83%; }
            .table-header { grid-template-columns: 28px 1.2fr 1.4fr 1fr 0.9fr; gap: 4px; }
            .table-row { grid-template-columns: 28px 1.2fr 1.4fr 1fr 0.9fr; gap: 4px; padding: 4px 0; min-height: 32px; }
            .table-header .col { font-size: 11px; }
            .table-row .col { font-size: 11px; }
            .table-row .col .status-badge { font-size: 9px; padding: 2px 10px; min-width: 50px; border-width: 2px; }
            .btn-action { font-size: 9px; padding: 2px 8px; min-width: 34px; border-width: 2px; }
            .title-status { font-size: 20px; top: 7%; }
            .btn-selesai { padding: 3px 12px; font-size: 11px; }
            .btn-back { font-size: 18px; }
            .logo-header img { width: 25px; }
            .brand-text { font-size: 14px; }
            .header-top { padding: 6px 16px 4px 16px; }
        }

        /* ===== DESKTOP ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .status-container { width: 100vw; height: 100vh; border-radius: 0; }
            .table-wrapper { padding: 8px 20px; border-radius: 28px; top: 14%; height: 83%; max-width: 900px; left: 50%; transform: translateX(-50%); }
            .table-header { grid-template-columns: 30px 1.3fr 1.5fr 1.1fr 1fr; gap: 4px; }
            .table-row { grid-template-columns: 30px 1.3fr 1.5fr 1.1fr 1fr; gap: 4px; padding: 5px 0; min-height: 38px; }
            .table-header .col { font-size: 13px; }
            .table-row .col { font-size: 13px; }
            .table-row .col .status-badge { font-size: 11px; padding: 3px 14px; min-width: 65px; border-width: 2px; }
            .btn-action { font-size: 11px; padding: 3px 12px; min-width: 44px; border-width: 2px; }
            .title-status { font-size: 26px; top: 7%; }
            .btn-selesai { padding: 4px 16px; font-size: 13px; }
            .btn-back { font-size: 22px; }
            .logo-header img { width: 32px; }
            .brand-text { font-size: 18px; }
            .header-top { padding: 8px 20px 5px 20px; }
        }

        /* Desktop Lebar */
        @media screen and (min-width: 1600px) and (orientation: landscape) {
            .table-wrapper { max-width: 1000px; padding: 10px 25px; border-radius: 32px; }
            .table-header .col { font-size: 15px; }
            .table-row .col { font-size: 15px; }
            .table-row .col .status-badge { font-size: 13px; padding: 4px 16px; min-width: 75px; }
            .btn-action { font-size: 13px; padding: 4px 14px; min-width: 50px; }
            .title-status { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data...</div>
        </div>

        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/40x40/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
            <button class="btn-selesai" onclick="selesaiSemua()">Selesai</button>
        </div>

        <div class="title-status">STATUS PESANAN</div>

        <div class="table-wrapper">
            <div class="table-header">
                <div class="col">No</div>
                <div class="col">Nomor Struk</div>
                <div class="col">Nama Customer</div>
                <div class="col">Status</div>
                <div class="col">Aksi</div>
            </div>
            <div class="table-scroll" id="tableBody">
                <div class="empty-state">
                    🔄 Memuat data...
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ordersData = [];
        let isRealtimeConnected = false;

        function goBack() {
            window.history.back();
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function getStatusLabel(status) {
            const map = {
                'Diproses': 'Diproses',
                'Siap': 'Siap',
                'Selesai': 'Selesai'
            };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = {
                'Diproses': 'diproses',
                'Siap': 'siap',
                'Selesai': 'selesai'
            };
            return map[status] || 'diproses';
        }

        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('nama')
                        .eq('no_struk', order.no_struk)
                        .limit(1);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    ordersWithDetails.push({
                        ...order,
                        customer_name: details && details.length > 0 ? details[0].nama : '-'
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders loaded:', ordersData.length);
                renderTable();

                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('Error loading orders:', error);
                showToast('⚠️ Gagal memuat data: ' + error.message, true);
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        ⚠️ Gagal memuat data<br>
                        <span class="sub">${error.message}</span>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        function setupRealtime() {
            if (isRealtimeConnected) return;

            const channel = supabaseClient
                .channel('status-db-changes')
                .on(
                    'postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'orders'
                    },
                    (payload) => {
                        console.log('Realtime update orders:', payload);
                        loadOrdersSilent();
                    }
                )
                .on(
                    'postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'orderdetails'
                    },
                    (payload) => {
                        console.log('Realtime update details:', payload);
                        loadOrdersSilent();
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            window.realtimeChannel = channel;
        }

        async function loadOrdersSilent() {
            try {
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('nama')
                        .eq('no_struk', order.no_struk)
                        .limit(1);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    ordersWithDetails.push({
                        ...order,
                        customer_name: details && details.length > 0 ? details[0].nama : '-'
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders refreshed (silent):', ordersData.length);
                renderTable();

            } catch (error) {
                console.error('Error silent loading orders:', error);
            }
        }

        function renderTable() {
            const container = document.getElementById('tableBody');

            if (!ordersData || ordersData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        🍽️ Belum ada pesanan aktif<br>
                        <span class="sub">Tunggu pesanan masuk</span>
                    </div>
                `;
                return;
            }

            let html = '';
            ordersData.forEach((order, index) => {
                const status = order.status_order || 'Diproses';

                html += `
                    <div class="table-row">
                        <div class="col">${index + 1}</div>
                        <div class="col">${order.no_struk || '-'}</div>
                        <div class="col">${order.customer_name}</div>
                        <div class="col">
                            <span class="status-badge ${getStatusClass(status)}">
                                ${getStatusLabel(status)}
                            </span>
                        </div>
                        <div class="col">
                            <div class="action-btns">
                                ${status === 'Diproses' ? `
                                    <button class="btn-action siapkan" onclick="updateStatus('${order.no_struk}', 'Siap')">
                                        🕐 Siapkan
                                    </button>
                                ` : ''}
                                ${status === 'Siap' || status === 'Diproses' ? `
                                    <button class="btn-action selesai-status" onclick="updateStatus('${order.no_struk}', 'Selesai')">
                                        ✅ Selesai
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function updateStatus(noStruk, newStatus) {
            if (!confirm(`Yakin ingin mengubah status ${noStruk} menjadi ${newStatus}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('orders')
                    .update({ status_order: newStatus })
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`✅ Status ${noStruk} berhasil diubah menjadi ${newStatus}`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error updating status:', error);
                showToast('⚠️ Gagal mengubah status: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        async function selesaiSemua() {
            const pendingOrders = ordersData.filter(o => o.status_order !== 'Selesai');
            if (pendingOrders.length === 0) {
                showToast('✅ Semua pesanan sudah selesai!');
                return;
            }

            if (!confirm(`Yakin ingin menyelesaikan semua ${pendingOrders.length} pesanan?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                let success = 0;
                for (const order of pendingOrders) {
                    const { error } = await supabaseClient
                        .from('orders')
                        .update({ status_order: 'Selesai' })
                        .eq('no_struk', order.no_struk);

                    if (!error) success++;
                }

                showToast(`✅ ${success} pesanan berhasil diselesaikan`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error finishing all orders:', error);
                showToast('⚠️ Gagal menyelesaikan pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
