<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - Status Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .status-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 10px 16px;
            padding-top: env(safe-area-inset-top, 10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            flex-shrink: 0;
            min-height: 56px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 4px 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .logo-header img {
            width: 36px;
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 18px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: 16px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            min-height: 40px;
            display: flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-selesai:active {
            transform: scale(0.95);
        }

        /* ===== TITLE ===== */
        .title-status {
            position: relative;
            z-index: 5;
            color: white;
            font-size: 32px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            padding: 10px 16px 8px 16px;
            flex-shrink: 0;
            letter-spacing: 2px;
        }

        /* ===== TABLE WRAPPER ===== */
        .table-wrapper {
            flex: 1;
            position: relative;
            z-index: 5;
            margin: 0 12px 12px 12px;
            margin-bottom: env(safe-area-inset-bottom, 12px);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            padding: 8px 10px 6px 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            min-height: 0;
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .table-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        /* ===== TABLE HEADER ===== */
        .table-header {
            display: grid;
            grid-template-columns: 35px 1.2fr 1.4fr 1.1fr 1fr;
            gap: 4px;
            padding-bottom: 6px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 4px;
            flex-shrink: 0;
        }

        .table-header .col {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        /* ===== TABLE ROW ===== */
        .table-row {
            display: grid;
            grid-template-columns: 35px 1.2fr 1.4fr 1.1fr 1fr;
            gap: 4px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            transition: background 0.15s;
            min-height: 44px;
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .table-row .col {
            color: white;
            font-size: 15px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            word-break: break-word;
            line-height: 1.4;
        }

        .table-row .col .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            font-family: 'Schoolbell', cursive;
            font-weight: 600;
            color: white;
            min-width: 65px;
            letter-spacing: 0.5px;
        }

        .status-badge.diproses {
            background: rgba(243, 156, 18, 0.3);
            border-color: #f39c12;
            color: #f39c12;
        }

        .status-badge.siap {
            background: rgba(152, 200, 28, 0.3);
            border-color: #98C81C;
            color: #98C81C;
        }

        .status-badge.selesai {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .table-row .col .action-btns {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 5px 12px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 12px;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.25s;
            min-width: 50px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        .btn-action.siapkan {
            background: #98C81C;
            border-color: #98C81C;
        }

        .btn-action.siapkan:active {
            background: #7aa814;
        }

        .btn-action.selesai-status {
            background: #029BEE;
            border-color: #029BEE;
        }

        .btn-action.selesai-status:active {
            background: #0288d1;
        }

        .order-time {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            display: block;
            margin-top: 2px;
        }

        .btn-toggle-detail {
            background: none;
            border: none;
            color: #98C81C;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Schoolbell', cursive;
            padding: 4px 8px;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
            margin-top: 3px;
        }

        .btn-toggle-detail:active {
            transform: scale(0.9);
        }

        /* ===== ITEM DETAIL ===== */
        .item-detail-row {
            display: none;
            grid-column: 1 / -1;
            padding: 6px 0 6px 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            margin: 2px 0;
        }

        .item-detail-row.show {
            display: grid;
            grid-template-columns: 1.6fr 0.5fr 1fr 1fr;
            gap: 4px;
        }

        .item-detail-row .item-col {
            color: white;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            text-align: left;
            padding: 3px 6px;
        }

        .item-detail-row .item-col .item-status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-family: 'Schoolbell', cursive;
            font-weight: 600;
        }

        .item-status-badge.diproses {
            background: rgba(243, 156, 18, 0.25);
            color: #f39c12;
            border: 1.5px solid #f39c12;
        }
        .item-status-badge.siap {
            background: rgba(152, 200, 28, 0.25);
            color: #98C81C;
            border: 1.5px solid #98C81C;
        }
        .item-status-badge.selesai {
            background: rgba(46, 204, 113, 0.25);
            color: #2ecc71;
            border: 1.5px solid #2ecc71;
        }

        .item-detail-row .item-col .btn-item-action {
            padding: 3px 10px;
            border-radius: 50px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 11px;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.25s;
            background: rgba(255, 255, 255, 0.05);
            -webkit-tap-highlight-color: transparent;
            margin-right: 4px;
        }

        .btn-item-action:active {
            transform: scale(0.95);
        }
        .btn-item-action.siapkan-item {
            background: #98C81C;
            border-color: #98C81C;
        }
        .btn-item-action.selesai-item {
            background: #029BEE;
            border-color: #029BEE;
        }

        .item-detail-row .item-col .item-qty-badge {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 30px 0;
            font-size: 22px;
            font-family: 'Schoolbell', cursive;
        }

        .empty-state .sub {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: 16px;
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .table-wrapper {
                margin: 0 6px 6px 6px;
                padding: 4px 4px;
                border-radius: 14px;
            }
            .table-header {
                grid-template-columns: 22px 1fr 1.1fr 0.9fr 0.8fr;
                gap: 2px;
            }
            .table-row {
                grid-template-columns: 22px 1fr 1.1fr 0.9fr 0.8fr;
                gap: 2px;
                padding: 4px 0;
                min-height: 38px;
            }
            .table-header .col { font-size: 10px; }
            .table-row .col { font-size: 11px; }
            .table-row .col .status-badge {
                font-size: 10px;
                padding: 2px 8px;
                min-width: 45px;
                border-width: 1.5px;
            }
            .btn-action {
                font-size: 9px;
                padding: 3px 6px;
                min-width: 30px;
                border-width: 1.5px;
            }
            .title-status {
                font-size: 20px;
                padding: 6px 10px 4px 10px;
            }
            .btn-selesai {
                padding: 3px 10px;
                font-size: 12px;
                min-height: 32px;
            }
            .btn-back {
                font-size: 20px;
                min-width: 36px;
                min-height: 36px;
            }
            .logo-header img { width: 24px; }
            .brand-text { font-size: 14px; }
            .header-top {
                padding: 6px 10px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .item-detail-row { padding: 4px 0 4px 10px; }
            .item-detail-row .item-col { font-size: 10px; }
            .item-detail-row .item-col .item-status-badge { font-size: 9px; padding: 1px 6px; }
            .item-detail-row .item-col .btn-item-action { font-size: 8px; padding: 2px 6px; }
            .btn-toggle-detail { font-size: 10px; }
            .order-time { font-size: 9px; }
        }

        @media screen and (max-width: 480px) and (orientation: portrait) {
            .table-wrapper {
                margin: 0 4px 4px 4px;
                padding: 3px 3px;
                border-radius: 10px;
            }
            .table-header {
                grid-template-columns: 16px 1fr 1fr 0.7fr 0.6fr;
                gap: 1px;
            }
            .table-row {
                grid-template-columns: 16px 1fr 1fr 0.7fr 0.6fr;
                gap: 1px;
                padding: 3px 0;
                min-height: 32px;
            }
            .table-header .col { font-size: 8px; }
            .table-row .col { font-size: 9px; }
            .table-row .col .status-badge {
                font-size: 8px;
                padding: 2px 6px;
                min-width: 35px;
                border-width: 1px;
            }
            .btn-action {
                font-size: 7px;
                padding: 2px 4px;
                min-width: 22px;
                border-width: 1px;
            }
            .title-status {
                font-size: 16px;
                padding: 4px 8px 2px 8px;
            }
            .btn-selesai {
                padding: 2px 8px;
                font-size: 10px;
                min-height: 28px;
            }
            .btn-back {
                font-size: 16px;
                min-width: 30px;
                min-height: 30px;
            }
            .logo-header img { width: 18px; }
            .brand-text { font-size: 11px; }
            .header-top {
                padding: 4px 8px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 38px;
            }
            .item-detail-row { padding: 3px 0 3px 6px; }
            .item-detail-row .item-col { font-size: 8px; }
            .item-detail-row .item-col .item-status-badge { font-size: 7px; padding: 1px 4px; }
            .item-detail-row .item-col .btn-item-action { font-size: 7px; padding: 1px 4px; }
            .btn-toggle-detail { font-size: 8px; }
            .order-time { font-size: 7px; }
        }

        @media screen and (orientation: landscape) {
            .table-wrapper {
                margin: 0 12px 8px 12px;
                padding: 6px 10px;
                border-radius: 16px;
            }
            .table-header {
                grid-template-columns: 28px 1.1fr 1.2fr 0.9fr 0.8fr;
                gap: 3px;
            }
            .table-row {
                grid-template-columns: 28px 1.1fr 1.2fr 0.9fr 0.8fr;
                gap: 3px;
                padding: 4px 0;
                min-height: 36px;
            }
            .table-header .col { font-size: 12px; }
            .table-row .col { font-size: 13px; }
            .table-row .col .status-badge {
                font-size: 11px;
                padding: 3px 10px;
                min-width: 50px;
                border-width: 1.5px;
            }
            .btn-action {
                font-size: 10px;
                padding: 3px 8px;
                min-width: 36px;
                border-width: 1.5px;
            }
            .title-status {
                font-size: 22px;
                padding: 6px 12px 4px 12px;
            }
            .btn-selesai {
                padding: 4px 14px;
                font-size: 13px;
                min-height: 34px;
            }
            .btn-back {
                font-size: 22px;
                min-width: 38px;
                min-height: 38px;
            }
            .logo-header img { width: 28px; }
            .brand-text { font-size: 16px; }
            .header-top {
                padding: 6px 12px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .item-detail-row .item-col { font-size: 12px; }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .table-wrapper {
                margin: 0 8px 4px 8px;
                padding: 4px 6px;
                border-radius: 12px;
            }
            .table-header {
                grid-template-columns: 20px 1fr 1.1fr 0.8fr 0.7fr;
                gap: 2px;
            }
            .table-row {
                grid-template-columns: 20px 1fr 1.1fr 0.8fr 0.7fr;
                gap: 2px;
                padding: 3px 0;
                min-height: 30px;
            }
            .table-header .col { font-size: 10px; }
            .table-row .col { font-size: 11px; }
            .table-row .col .status-badge {
                font-size: 9px;
                padding: 2px 8px;
                min-width: 40px;
                border-width: 1px;
            }
            .btn-action {
                font-size: 8px;
                padding: 2px 6px;
                min-width: 26px;
                border-width: 1px;
            }
            .title-status {
                font-size: 18px;
                padding: 4px 10px 2px 10px;
            }
            .btn-selesai {
                padding: 2px 10px;
                font-size: 11px;
                min-height: 28px;
            }
            .btn-back {
                font-size: 18px;
                min-width: 32px;
                min-height: 32px;
            }
            .logo-header img { width: 22px; }
            .brand-text { font-size: 13px; }
            .header-top {
                padding: 4px 10px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 36px;
            }
            .item-detail-row .item-col { font-size: 10px; }
        }

        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .table-wrapper {
                margin: 0 auto 12px auto;
                padding: 10px 20px;
                border-radius: 24px;
                max-width: 1000px;
                width: 94%;
            }
            .table-header .col { font-size: 16px; }
            .table-row .col { font-size: 17px; }
            .table-row .col .status-badge {
                font-size: 15px;
                padding: 4px 16px;
                min-width: 75px;
                border-width: 2px;
            }
            .btn-action {
                font-size: 14px;
                padding: 5px 14px;
                min-width: 50px;
                border-width: 2px;
            }
            .title-status {
                font-size: 32px;
                padding: 12px 20px 8px 20px;
            }
            .btn-selesai {
                padding: 6px 20px;
                font-size: 17px;
                min-height: 44px;
            }
            .btn-back {
                font-size: 28px;
                min-width: 48px;
                min-height: 48px;
            }
            .logo-header img { width: 40px; }
            .brand-text { font-size: 22px; }
            .header-top {
                padding: 10px 20px;
                padding-top: env(safe-area-inset-top, 10px);
                min-height: 60px;
            }
            .item-detail-row .item-col { font-size: 16px; }
            .item-detail-row .item-col .item-status-badge { font-size: 14px; }
            .item-detail-row .item-col .btn-item-action { font-size: 13px; padding: 4px 12px; }
            .btn-toggle-detail { font-size: 16px; }
            .order-time { font-size: 14px; }
        }

        @supports not (padding: env(safe-area-inset-top)) {
            .header-top { padding-top: 10px; }
            .table-wrapper { margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data...</div>
        </div>

        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/50x50/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
            <button class="btn-selesai" onclick="selesaiSemua()">Selesai</button>
        </div>

        <div class="title-status">📋 STATUS PESANAN</div>

        <div class="table-wrapper">
            <div class="table-header">
                <div class="col">No</div>
                <div class="col">Struk / Waktu</div>
                <div class="col">Customer</div>
                <div class="col">Status</div>
                <div class="col">Aksi</div>
            </div>
            <div class="table-scroll" id="tableBody">
                <div class="empty-state">
                    🔄 Memuat data...
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ordersData = [];
        let menuNames = {};
        let isRealtimeConnected = false;
        let expandedOrders = {};

        function goBack() {
            window.history.back();
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function getStatusLabel(status) {
            const map = { 'Diproses': 'Diproses', 'Siap': 'Siap', 'Selesai': 'Selesai' };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = { 'Diproses': 'diproses', 'Siap': 'siap', 'Selesai': 'selesai' };
            return map[status] || 'diproses';
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            const parts = timeStr.split(':');
            return parts[0] + ':' + parts[1];
        }

        async function loadMenuNames() {
            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu');

                if (error) throw error;
                if (data) {
                    data.forEach(item => {
                        menuNames[item.id_menu] = item.nama_menu;
                    });
                }
                console.log('✅ Menu names loaded:', Object.keys(menuNames).length);
                return true;
            } catch (error) {
                console.error('Error loading menu names:', error);
                return false;
            }
        }

        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                await loadMenuNames();

                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                console.log('📦 Orders from DB:', orders ? orders.length : 0);

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                        // Lanjutkan dengan details kosong
                        ordersWithDetails.push({
                            ...order,
                            details: [],
                            customer_name: '-'
                        });
                        continue;
                    }

                    const detailsWithName = (details || []).map(item => {
                        const menuName = menuNames[item.id_menu] || item.menu_name || 'Menu tidak ditemukan';
                        return { ...item, menu_name: menuName };
                    });

                    let customerName = '-';
                    if (detailsWithName.length > 0 && detailsWithName[0].nama) {
                        customerName = detailsWithName[0].nama;
                    } else if (order.customer_name) {
                        customerName = order.customer_name;
                    }

                    ordersWithDetails.push({
                        ...order,
                        details: detailsWithName || [],
                        customer_name: customerName
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('✅ Orders loaded with details:', ordersData.length);
                renderTable();

                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('❌ Error loading orders:', error);
                showToast('⚠️ Gagal memuat data: ' + error.message, true);
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        ⚠️ Gagal memuat data<br>
                        <span class="sub">${error.message}</span>
                        <br><br>
                        <button onclick="loadOrders()" style="padding:10px 20px;background:#98C81C;border:none;border-radius:50px;color:white;font-size:16px;cursor:pointer;">🔄 Coba Lagi</button>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        function setupRealtime() {
            if (isRealtimeConnected) return;

            const channel = supabaseClient
                .channel('status-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                    console.log('🔄 Realtime update orders:', payload);
                    loadOrdersSilent();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orderdetails' }, (payload) => {
                    console.log('🔄 Realtime update details:', payload);
                    loadOrdersSilent();
                })
                .subscribe((status) => {
                    console.log('📡 Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            window.realtimeChannel = channel;
        }

        async function loadOrdersSilent() {
            try {
                await loadMenuNames();

                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                        ordersWithDetails.push({
                            ...order,
                            details: [],
                            customer_name: '-'
                        });
                        continue;
                    }

                    const detailsWithName = (details || []).map(item => {
                        const menuName = menuNames[item.id_menu] || item.menu_name || 'Menu tidak ditemukan';
                        return { ...item, menu_name: menuName };
                    });

                    let customerName = '-';
                    if (detailsWithName.length > 0 && detailsWithName[0].nama) {
                        customerName = detailsWithName[0].nama;
                    } else if (order.customer_name) {
                        customerName = order.customer_name;
                    }

                    ordersWithDetails.push({
                        ...order,
                        details: detailsWithName || [],
                        customer_name: customerName
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('🔄 Orders refreshed (silent):', ordersData.length);
                renderTable();

            } catch (error) {
                console.error('Error silent loading orders:', error);
            }
        }

        function toggleDetail(noStruk) {
            expandedOrders[noStruk] = !expandedOrders[noStruk];
            renderTable();
        }

        async function updateItemStatus(noStruk, idOrderDetail, newStatus) {
            if (!confirm(`Yakin ingin mengubah item ini menjadi ${newStatus}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('orderdetails')
                    .update({ status: newStatus })
                    .eq('id_order_detail', idOrderDetail);  // <-- PAKAI id_order_detail

                if (error) throw error;

                showToast(`✅ Item berhasil diubah menjadi ${getStatusLabel(newStatus)}`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error updating item status:', error);
                showToast('⚠️ Gagal mengubah status: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        function renderTable() {
            const container = document.getElementById('tableBody');

            if (!ordersData || ordersData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        🍽️ Belum ada pesanan aktif<br>
                        <span class="sub">Tunggu pesanan masuk</span>
                    </div>
                `;
                return;
            }

            let html = '';
            ordersData.forEach((order, index) => {
                const isExpanded = expandedOrders[order.no_struk] || false;
                const timeStr = formatTime(order.waktu_order);

                let allSiap = true;
                let allSelesai = true;
                let hasItem = false;

                if (order.details && order.details.length > 0) {
                    hasItem = true;
                    order.details.forEach(item => {
                        const itemStatus = item.status || 'Diproses';
                        if (itemStatus !== 'Siap') allSiap = false;
                        if (itemStatus !== 'Selesai') allSelesai = false;
                    });
                }

                const orderStatus = allSelesai && hasItem ? 'Selesai' : 
                                   (allSiap && hasItem ? 'Siap' : 'Diproses');

                let statusClass = 'diproses';
                if (orderStatus === 'Siap') statusClass = 'siap';
                if (orderStatus === 'Selesai') statusClass = 'selesai';

                html += `
                    <div class="table-row">
                        <div class="col">${index + 1}</div>
                        <div class="col">
                            ${order.no_struk || '-'}
                            <span class="order-time">🕐 ${timeStr}</span>
                        </div>
                        <div class="col">${order.customer_name}</div>
                        <div class="col">
                            <span class="status-badge ${statusClass}">
                                ${getStatusLabel(orderStatus)}
                            </span>
                            <br>
                            <button class="btn-toggle-detail" onclick="toggleDetail('${order.no_struk}')">
                                ${isExpanded ? '▲' : '▼'} ${order.details ? order.details.length : 0} item
                            </button>
                        </div>
                        <div class="col">
                            <div class="action-btns">
                                ${orderStatus === 'Diproses' ? `
                                    <button class="btn-action siapkan" onclick="updateOrderStatus('${order.no_struk}', 'Siap')">
                                        🕐 Siapkan
                                    </button>
                                ` : ''}
                                ${orderStatus === 'Siap' || orderStatus === 'Diproses' ? `
                                    <button class="btn-action selesai-status" onclick="updateOrderStatus('${order.no_struk}', 'Selesai')">
                                        ✅ Selesai
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                        ${isExpanded ? `
                            <div class="item-detail-row show">
                                <div class="item-col" style="font-weight:600;color:#98C81C;">Menu</div>
                                <div class="item-col" style="font-weight:600;color:#98C81C;">Jumlah</div>
                                <div class="item-col" style="font-weight:600;color:#98C81C;">Status</div>
                                <div class="item-col" style="font-weight:600;color:#98C81C;">Aksi</div>
                            </div>
                            ${order.details && order.details.length > 0 ? order.details.map(item => {
                                const itemStatus = item.status || 'Diproses';
                                let itemStatusClass = 'diproses';
                                if (itemStatus === 'Siap') itemStatusClass = 'siap';
                                if (itemStatus === 'Selesai') itemStatusClass = 'selesai';
                                // Gunakan id_order_detail untuk update
                                const idDetail = item.id_order_detail || item.id;
                                return `
                                    <div class="item-detail-row show">
                                        <div class="item-col">${item.menu_name}</div>
                                        <div class="item-col"><span class="item-qty-badge">×${item.jumlah || 0}</span></div>
                                        <div class="item-col">
                                            <span class="item-status-badge ${itemStatusClass}">
                                                ${getStatusLabel(itemStatus)}
                                            </span>
                                        </div>
                                        <div class="item-col">
                                            ${itemStatus === 'Diproses' ? `
                                                <button class="btn-item-action siapkan-item" onclick="updateItemStatus('${order.no_struk}', ${idDetail}, 'Siap')">
                                                    🕐 Siapkan
                                                </button>
                                            ` : ''}
                                            ${itemStatus === 'Siap' || itemStatus === 'Diproses' ? `
                                                <button class="btn-item-action selesai-item" onclick="updateItemStatus('${order.no_struk}', ${idDetail}, 'Selesai')">
                                                    ✅ Selesai
                                                </button>
                                            ` : ''}
                                            ${itemStatus === 'Selesai' ? '✅ Selesai' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('') : `
                                <div class="item-detail-row show">
                                    <div class="item-col" style="color:rgba(255,255,255,0.3);">Tidak ada detail</div>
                                    <div class="item-col">-</div>
                                    <div class="item-col">-</div>
                                    <div class="item-col">-</div>
                                </div>
                            `}
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function updateOrderStatus(noStruk, newStatus) {
            if (!confirm(`Yakin ingin mengubah semua item di ${noStruk} menjadi ${newStatus}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const order = ordersData.find(o => o.no_struk === noStruk);
                if (order && order.details) {
                    for (const item of order.details) {
                        const idDetail = item.id_order_detail || item.id;
                        const { error } = await supabaseClient
                            .from('orderdetails')
                            .update({ status: newStatus })
                            .eq('id_order_detail', idDetail);
                        if (error) throw error;
                    }
                }

                const { error } = await supabaseClient
                    .from('orders')
                    .update({ status_order: newStatus })
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`✅ Status ${noStruk} berhasil diubah menjadi ${getStatusLabel(newStatus)}`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error updating status:', error);
                showToast('⚠️ Gagal mengubah status: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        async function selesaiSemua() {
            const pendingOrders = ordersData.filter(o => {
                const status = o.status_order || 'Diproses';
                return status !== 'Selesai';
            });

            if (pendingOrders.length === 0) {
                showToast('✅ Semua pesanan sudah selesai!');
                return;
            }

            if (!confirm(`Yakin ingin menyelesaikan semua ${pendingOrders.length} pesanan?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                let success = 0;
                for (const order of pendingOrders) {
                    if (order.details) {
                        for (const item of order.details) {
                            const idDetail = item.id_order_detail || item.id;
                            await supabaseClient
                                .from('orderdetails')
                                .update({ status: 'Selesai' })
                                .eq('id_order_detail', idDetail);
                        }
                    }

                    const { error } = await supabaseClient
                        .from('orders')
                        .update({ status_order: 'Selesai' })
                        .eq('no_struk', order.no_struk);

                    if (!error) success++;
                }

                showToast(`✅ ${success} pesanan berhasil diselesaikan`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error finishing all orders:', error);
                showToast('⚠️ Gagal menyelesaikan pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // Cek login
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
