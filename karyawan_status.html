<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Status Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .status-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 20px 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3.5%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-header img {
            width: clamp(40px, 7%, 70px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: clamp(14px, 2%, 26px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .btn-selesai:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        /* ===== JUDUL ===== */
        .title-status {
            position: absolute;
            left: 50%;
            top: 13%;
            transform: translateX(-50%);
            z-index: 5;
            color: white;
            font-size: clamp(28px, 7%, 85px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 80%;
        }

        /* ===== TABEL ===== */
        .table-wrapper {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            height: 72%;
            z-index: 5;
            border-radius: 45px;
            border: 3px solid white;
            padding: 15px 15px 10px 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .table-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .table-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 50px 1.3fr 1.5fr 1fr 1.2fr;
            gap: 5px;
            padding-bottom: 8px;
            border-bottom: 3px solid white;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .table-header .col {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(12px, 2.2%, 24px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .table-row {
            display: grid;
            grid-template-columns: 50px 1.3fr 1.5fr 1fr 1.2fr;
            gap: 5px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            transition: background 0.2s;
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .table-row .col {
            color: white;
            font-size: clamp(12px, 2%, 22px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            word-break: break-word;
        }

        .table-row .col .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: clamp(10px, 1.5%, 18px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            color: white;
            min-width: 70px;
            letter-spacing: 0.5px;
        }

        .status-badge.diproses {
            background: rgba(243, 156, 18, 0.3);
            border-color: #f39c12;
            color: #f39c12;
        }

        .status-badge.siap {
            background: rgba(152, 200, 28, 0.3);
            border-color: #98C81C;
            color: #98C81C;
        }

        .status-badge.selesai {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .table-row .col .action-btns {
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 4px 12px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: clamp(9px, 1.2%, 14px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 45px;
            text-align: center;
        }

        .btn-action:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .btn-action.siapkan {
            background: rgba(152, 200, 28, 0.25);
            border-color: #98C81C;
            color: #98C81C;
        }

        .btn-action.siapkan:hover {
            background: rgba(152, 200, 28, 0.4);
        }

        .btn-action.selesai-status {
            background: rgba(46, 204, 113, 0.25);
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .btn-action.selesai-status:hover {
            background: rgba(46, 204, 113, 0.4);
        }

        .btn-action.hapus {
            background: rgba(231, 76, 60, 0.25);
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .btn-action.hapus:hover {
            background: rgba(231, 76, 60, 0.4);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px 0;
            font-size: clamp(16px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
        }

        .empty-state .sub {
            font-size: clamp(12px, 1.6%, 20px);
            color: rgba(255, 255, 255, 0.3);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(12px, 1.6%, 20px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @media screen and (max-width: 767px) {
            .status-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .table-wrapper {
                padding: 10px;
                border-radius: 30px;
                border-width: 2px;
            }

            .table-header {
                grid-template-columns: 30px 1fr 1.2fr 0.8fr 1fr;
                gap: 3px;
            }

            .table-row {
                grid-template-columns: 30px 1fr 1.2fr 0.8fr 1fr;
                gap: 3px;
                padding: 4px 0;
            }

            .table-header .col {
                font-size: 10px;
            }

            .table-row .col {
                font-size: 9px;
            }

            .btn-action {
                padding: 2px 6px;
                font-size: 7px;
                min-width: 30px;
                border-width: 1.5px;
            }

            .title-status {
                font-size: 20px;
                top: 11%;
            }

            .btn-selesai {
                padding: 4px 12px;
                font-size: 11px;
            }

            .logo-header img {
                width: 30px;
            }

            .brand-text {
                font-size: 14px;
            }

            .btn-back {
                font-size: 18px;
            }
        }

        @media screen and (max-width: 480px) {
            .status-container {
                border-radius: 10px;
            }

            .table-wrapper {
                padding: 6px;
                border-radius: 20px;
                border-width: 2px;
            }

            .table-header {
                grid-template-columns: 20px 1fr 1fr 0.7fr 0.8fr;
                gap: 2px;
            }

            .table-row {
                grid-template-columns: 20px 1fr 1fr 0.7fr 0.8fr;
                gap: 2px;
                padding: 3px 0;
            }

            .table-header .col {
                font-size: 7px;
            }

            .table-row .col {
                font-size: 7px;
            }

            .table-row .col .status-badge {
                padding: 2px 8px;
                font-size: 7px;
                min-width: 40px;
                border-width: 1.5px;
            }

            .btn-action {
                padding: 1px 4px;
                font-size: 6px;
                min-width: 20px;
                border-width: 1.5px;
            }

            .title-status {
                font-size: 16px;
                top: 10%;
            }

            .btn-selesai {
                padding: 3px 8px;
                font-size: 9px;
            }

            .logo-header img {
                width: 22px;
            }

            .brand-text {
                font-size: 11px;
            }

            .btn-back {
                font-size: 14px;
            }
        }

        @media screen and (max-width: 360px) {
            .table-header {
                grid-template-columns: 18px 1fr 1fr 0.6fr 0.7fr;
                gap: 1px;
            }

            .table-row {
                grid-template-columns: 18px 1fr 1fr 0.6fr 0.7fr;
                gap: 1px;
            }

            .table-header .col {
                font-size: 6px;
            }

            .table-row .col {
                font-size: 6px;
            }

            .btn-action {
                padding: 1px 3px;
                font-size: 5px;
                min-width: 16px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .status-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .status-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .table-wrapper {
                padding: 6px 10px;
                border-radius: 20px;
                top: 18%;
                height: 78%;
                border-width: 2px;
            }

            .table-header {
                grid-template-columns: 30px 1fr 1.2fr 0.8fr 1fr;
            }

            .table-row {
                grid-template-columns: 30px 1fr 1.2fr 0.8fr 1fr;
                padding: 3px 0;
            }

            .table-header .col {
                font-size: 9px;
            }

            .table-row .col {
                font-size: 8px;
            }

            .btn-action {
                padding: 1px 5px;
                font-size: 6px;
                min-width: 25px;
            }

            .title-status {
                font-size: 18px;
                top: 9%;
            }

            .btn-selesai {
                padding: 3px 10px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="window.location.href='dashboard.html'">←</button>
                <div class="logo-header">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/55x55/98C81C/ffffff?text=🍽️'" />
                </div>
                <div class="brand-text">Jangkung<span>Order</span></div>
            </div>
            <button class="btn-selesai" onclick="selesaiSemua()">Selesai</button>
        </div>

        <!-- ===== JUDUL ===== -->
        <div class="title-status">STATUS PESANAN</div>

        <!-- ===== TABEL ===== -->
        <div class="table-wrapper">
            <div class="table-header">
                <div class="col">No</div>
                <div class="col">Nomor Struk</div>
                <div class="col">Nama Customer</div>
                <div class="col">Status</div>
                <div class="col">Aksi</div>
            </div>
            <div class="table-scroll" id="tableBody">
                <div class="empty-state">
                    🔄 Memuat data...
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ordersData = [];
        let isRealtimeConnected = false;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function getStatusLabel(status) {
            const map = {
                'Diproses': 'Diproses',
                'Siap': 'Siap',
                'Selesai': 'Selesai'
            };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = {
                'Diproses': 'diproses',
                'Siap': 'siap',
                'Selesai': 'selesai'
            };
            return map[status] || 'diproses';
        }

        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('nama')
                        .eq('no_struk', order.no_struk)
                        .limit(1);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    ordersWithDetails.push({
                        ...order,
                        customer_name: details && details.length > 0 ? details[0].nama : '-'
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders loaded:', ordersData.length);
                renderTable();

                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('Error loading orders:', error);
                showToast('⚠️ Gagal memuat data: ' + error.message, true);
                document.getElementById('tableBody').innerHTML = `
                    <div class="empty-state">
                        ⚠️ Gagal memuat data<br>
                        <span class="sub">${error.message}</span>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        function setupRealtime() {
            if (isRealtimeConnected) return;

            const channel = supabaseClient
                .channel('status-db-changes')
                .on(
                    'postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'orders'
                    },
                    (payload) => {
                        console.log('Realtime update orders:', payload);
                        loadOrdersSilent();
                    }
                )
                .on(
                    'postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'orderdetails'
                    },
                    (payload) => {
                        console.log('Realtime update details:', payload);
                        loadOrdersSilent();
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            window.realtimeChannel = channel;
        }

        async function loadOrdersSilent() {
            try {
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('nama')
                        .eq('no_struk', order.no_struk)
                        .limit(1);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    ordersWithDetails.push({
                        ...order,
                        customer_name: details && details.length > 0 ? details[0].nama : '-'
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders refreshed (silent):', ordersData.length);
                renderTable();

            } catch (error) {
                console.error('Error silent loading orders:', error);
            }
        }

        function renderTable() {
            const container = document.getElementById('tableBody');

            if (!ordersData || ordersData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        🍽️ Belum ada pesanan aktif<br>
                        <span class="sub">Tunggu pesanan masuk</span>
                    </div>
                `;
                return;
            }

            let html = '';
            ordersData.forEach((order, index) => {
                const status = order.status_order || 'Diproses';

                html += `
                    <div class="table-row">
                        <div class="col">${index + 1}</div>
                        <div class="col">${order.no_struk || '-'}</div>
                        <div class="col">${order.customer_name}</div>
                        <div class="col">
                            <span class="status-badge ${getStatusClass(status)}">
                                ${getStatusLabel(status)}
                            </span>
                        </div>
                        <div class="col">
                            <div class="action-btns">
                                ${status === 'Diproses' ? `
                                    <button class="btn-action siapkan" onclick="updateStatus('${order.no_struk}', 'Siap')">Siapkan</button>
                                ` : ''}
                                ${status === 'Siap' ? `
                                    <button class="btn-action selesai-status" onclick="updateStatus('${order.no_struk}', 'Selesai')">Selesai</button>
                                ` : ''}
                                ${status === 'Diproses' || status === 'Siap' ? `
                                    <button class="btn-action hapus" onclick="deleteOrder('${order.no_struk}')">Hapus</button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function updateStatus(noStruk, newStatus) {
            if (!confirm(`Yakin ingin mengubah status ${noStruk} menjadi ${newStatus}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('orders')
                    .update({ status_order: newStatus })
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`✅ Status ${noStruk} berhasil diubah menjadi ${newStatus}`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error updating status:', error);
                showToast('⚠️ Gagal mengubah status: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        async function deleteOrder(noStruk) {
            if (!confirm(`Yakin ingin menghapus pesanan ${noStruk}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error: detailError } = await supabaseClient
                    .from('orderdetails')
                    .delete()
                    .eq('no_struk', noStruk);

                if (detailError) throw detailError;

                const { error } = await supabaseClient
                    .from('orders')
                    .delete()
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`✅ Pesanan ${noStruk} berhasil dihapus`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error deleting order:', error);
                showToast('⚠️ Gagal menghapus pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        async function selesaiSemua() {
            const pendingOrders = ordersData.filter(o => o.status_order !== 'Selesai');
            if (pendingOrders.length === 0) {
                showToast('✅ Semua pesanan sudah selesai!');
                return;
            }

            if (!confirm(`Yakin ingin menyelesaikan semua ${pendingOrders.length} pesanan?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                let success = 0;
                for (const order of pendingOrders) {
                    const { error } = await supabaseClient
                        .from('orders')
                        .update({ status_order: 'Selesai' })
                        .eq('no_struk', order.no_struk);

                    if (!error) success++;
                }

                showToast(`✅ ${success} pesanan berhasil diselesaikan`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error finishing all orders:', error);
                showToast('⚠️ Gagal menyelesaikan pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // Cek login
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        // Load data
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
