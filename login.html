<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pilih</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .login-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            background-image: url('https://placehold.co/1080x1920/2d2d2d/ffffff?text=Restaurant+Background');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 84%;
            height: 44.5%;
            left: 39.5%;
            top: 41.6%;
            transform: rotate(-53deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 69%;
            height: 38.8%;
            left: 0.86%;
            top: 75.7%;
            transform: rotate(46deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(4) {
            width: 101.1%;
            height: 56.9%;
            left: 37.4%;
            top: 67%;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(5) {
            width: 101.1%;
            height: 56.9%;
            left: -63.7%;
            top: -23.3%;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(6) {
            width: 73.8%;
            height: 41.5%;
            left: -23.1%;
            top: 58.2%;
            transform: rotate(17deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(7) {
            width: 73.8%;
            height: 41.5%;
            left: 72.1%;
            top: 11.25%;
            transform: rotate(17deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }

        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-top {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        .title-main {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 5;
            line-height: 1.1;
            letter-spacing: 2px;
            width: 55.6%;
            margin-top: 80px;
        }

        .box-customer {
            position: absolute;
            width: 82.1%;
            height: 26.4%;
            left: 8.15%;
            top: 30%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
        }

        .box-customer:hover {
            transform: scale(1.03);
            opacity: 1;
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.5);
        }

        .box-customer:active {
            transform: scale(0.97);
        }

        .box-customer .label {
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
            padding: 10px;
        }

        .box-karyawan {
            position: absolute;
            width: 82.1%;
            height: 26.4%;
            left: 8.15%;
            top: 60%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
        }

        .box-karyawan:hover {
            transform: scale(1.03);
            opacity: 1;
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.5);
        }

        .box-karyawan:active {
            transform: scale(0.97);
        }

        .box-karyawan .label {
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
            padding: 10px;
        }

        @media screen and (max-width: 767px) {
            .login-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .box-customer,
            .box-karyawan {
                border-radius: 40px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 24px;
            }
        }

        @media screen and (max-width: 480px) {
            .login-container {
                border-radius: 10px;
            }

            .box-customer,
            .box-karyawan {
                border-radius: 30px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 20px;
            }
        }

        @media screen and (max-width: 360px) {
            .box-customer,
            .box-karyawan {
                border-radius: 25px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 16px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .login-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .login-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 18px;
            }

            .title-main {
                font-size: 18px;
            }

            .logo-top .brand-text {
                font-size: 14px;
            }

            .logo-top img {
                width: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/908x855/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/745x744/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/1092x1092/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/1092x1092/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/797x797/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/797x797/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <button class="btn-back" onclick="window.location.href='index.html'">←</button>

        <div class="logo-top">
            <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo Jangkung" loading="lazy" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>

        <div class="title-main">
            WILUJENG<br>SUMPING!
        </div>

        <!-- CUSTOMER - ke customer_login.html (input meja) -->
        <div class="box-customer" onclick="window.location.href='customer_login.html'">
            <div class="label">👤 CUSTOMER</div>
        </div>

        <!-- KARYAWAN - ke karyawan_login.html (input password) -->
        <div class="box-karyawan" onclick="window.location.href='karyawan_login.html'">
            <div class="label">👨‍💼 KARYAWAN</div>
        </div>
    </div>
</body>
</html>
