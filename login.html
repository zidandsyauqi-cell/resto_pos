<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pilih</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .login-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        /* ===== DEKORASI BACKGROUND ===== */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .decorations img {
            position: absolute;
            opacity: 0.6;
        }

        /* Tomat di kiri atas - posisi: left: -5%, top: -5% */
        .decorations .tomat-atas-kiri {
            width: clamp(150px, 25%, 350px);
            left: -5%;
            top: -5%;
            transform: rotate(-15deg);
        }

        /* Cabe 2 di kanan atas - posisi: right: -5%, top: -5% */
        .decorations .cabe2-atas-kanan {
            width: clamp(130px, 20%, 300px);
            right: -5%;
            top: -5%;
            transform: rotate(25deg);
        }

        /* Cabe 2.1 overlay di kanan atas - posisi: right: 8%, top: 5% */
        .decorations .cabe21-atas-kanan {
            width: clamp(100px, 15%, 220px);
            right: 8%;
            top: 5%;
            transform: rotate(40deg);
        }

        /* Cabe 1 di kiri bawah - posisi: left: -5%, bottom: -5% */
        .decorations .cabe1-bawah-kiri {
            width: clamp(130px, 20%, 300px);
            left: -5%;
            bottom: -5%;
            transform: rotate(-35deg);
        }

        /* Cabe 1.1 overlay di kiri bawah - posisi: left: 6%, bottom: 6% */
        .decorations .cabe11-bawah-kiri {
            width: clamp(100px, 15%, 220px);
            left: 6%;
            bottom: 6%;
            transform: rotate(-50deg);
        }

        /* Tomat 1 di kanan bawah - posisi: right: -5%, bottom: -5% */
        .decorations .tomat1-bawah-kanan {
            width: clamp(150px, 25%, 350px);
            right: -5%;
            bottom: -5%;
            transform: rotate(20deg);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        .btn-back {
            position: absolute;
            left: 4%;
            top: 4%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(28px, 3.5%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        /* Header: Logo kiri + Teks kanan */
        .header-top {
            position: absolute;
            left: 4%;
            top: 7%;
            right: 3%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-top .logo-left {
            width: clamp(80px, 20%, 300px);
            height: auto;
            flex-shrink: 0;
        }

        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-top .title-right {
            color: white;
            font-size: clamp(24px, 6%, 85px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* Box Customer */
        .box-customer {
            position: absolute;
            width: 82%;
            height: 26%;
            left: 9%;
            top: 26%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
            padding: 0 20px;
        }

        .box-customer:hover {
            transform: scale(1.03);
            opacity: 1;
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.5);
        }

        .box-customer:active {
            transform: scale(0.97);
        }

        .box-customer .label {
            color: white;
            font-size: clamp(30px, 6%, 75px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        /* Box Karyawan */
        .box-karyawan {
            position: absolute;
            width: 82%;
            height: 26%;
            left: 9%;
            top: 57%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
            padding: 0 20px;
        }

        .box-karyawan:hover {
            transform: scale(1.03);
            opacity: 1;
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.5);
        }

        .box-karyawan:active {
            transform: scale(0.97);
        }

        .box-karyawan .label {
            color: white;
            font-size: clamp(30px, 6%, 75px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        /* ===== RESPONSIVE ===== */

        /* Portrait */
        @media screen and (orientation: portrait) {
            .login-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .box-customer {
                border-radius: 65px;
                height: 26%;
                top: 26%;
            }

            .box-karyawan {
                border-radius: 65px;
                height: 26%;
                top: 57%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(30px, 7%, 80px);
            }

            .header-top .title-right {
                font-size: clamp(24px, 6%, 75px);
            }

            .header-top .logo-left {
                width: clamp(100px, 25%, 350px);
            }
        }

        /* Landscape */
        @media screen and (orientation: landscape) {
            .login-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .box-customer {
                width: 70%;
                height: 25%;
                left: 15%;
                top: 26%;
                border-radius: 40px;
            }

            .box-karyawan {
                width: 70%;
                height: 25%;
                left: 15%;
                top: 56%;
                border-radius: 40px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(20px, 4%, 55px);
            }

            .header-top .title-right {
                font-size: clamp(18px, 4.5%, 55px);
            }

            .header-top .logo-left {
                width: clamp(70px, 18%, 250px);
            }

            .header-top {
                top: 4%;
                left: 3%;
                right: 3%;
            }

            .btn-back {
                font-size: clamp(24px, 3%, 40px);
                left: 2%;
                top: 3%;
            }
        }

        /* Tablet portrait */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(40px, 8%, 85px);
            }

            .header-top .title-right {
                font-size: clamp(30px, 7%, 80px);
            }

            .header-top .logo-left {
                width: clamp(150px, 30%, 400px);
            }
        }

        /* Tablet landscape */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .box-customer {
                width: 60%;
                height: 22%;
                left: 20%;
                top: 28%;
            }

            .box-karyawan {
                width: 60%;
                height: 22%;
                left: 20%;
                top: 55%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(28px, 5%, 60px);
            }

            .header-top .title-right {
                font-size: clamp(24px, 5%, 60px);
            }

            .header-top .logo-left {
                width: clamp(100px, 22%, 280px);
            }
        }

        /* Desktop / Laptop landscape */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .box-customer {
                width: 55%;
                height: 20%;
                left: 22.5%;
                top: 30%;
            }

            .box-karyawan {
                width: 55%;
                height: 20%;
                left: 22.5%;
                top: 55%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(30px, 5%, 70px);
            }

            .header-top .title-right {
                font-size: clamp(28px, 5.5%, 75px);
            }

            .header-top .logo-left {
                width: clamp(120px, 22%, 350px);
            }
        }

        /* Landscape HP kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .box-customer {
                width: 60%;
                height: 20%;
                left: 20%;
                top: 30%;
                border-radius: 30px;
            }

            .box-karyawan {
                width: 60%;
                height: 20%;
                left: 20%;
                top: 55%;
                border-radius: 30px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(16px, 3%, 35px);
                letter-spacing: 1px;
            }

            .header-top .title-right {
                font-size: clamp(14px, 3.5%, 35px);
            }

            .header-top .logo-left {
                width: clamp(50px, 15%, 150px);
            }

            .btn-back {
                font-size: clamp(18px, 2.5%, 30px);
            }

            .box-customer,
            .box-karyawan {
                border: 2px solid white;
            }
        }

        /* Layar sangat lebar */
        @media screen and (min-aspect-ratio: 2/1) and (orientation: landscape) {
            .box-customer {
                width: 50%;
                height: 18%;
                left: 25%;
                top: 32%;
            }

            .box-karyawan {
                width: 50%;
                height: 18%;
                left: 25%;
                top: 54%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(25px, 4%, 55px);
            }

            .header-top .title-right {
                font-size: clamp(22px, 4.5%, 60px);
            }

            .header-top .logo-left {
                width: clamp(100px, 18%, 280px);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Background bg.png -->
        <div class="bg-utama"></div>

        <!-- Dekorasi -->
        <div class="decorations">
            <!-- Tomat di kiri atas -->
            <img class="tomat-atas-kiri" src="tomat2.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
            
            <!-- Cabe 2 di kanan atas -->
            <img class="cabe2-atas-kanan" src="cabe2.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            
            <!-- Cabe 2.1 overlay di kanan atas -->
            <img class="cabe21-atas-kanan" src="cabe2.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            
            <!-- Cabe 1 di kiri bawah -->
            <img class="cabe1-bawah-kiri" src="cabe1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            
            <!-- Cabe 1.1 overlay di kiri bawah -->
            <img class="cabe11-bawah-kiri" src="cabe1.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            
            <!-- Tomat 1 di kanan bawah -->
            <img class="tomat1-bawah-kanan" src="tomat1.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
        </div>

        <!-- Overlay gelap -->
        <div class="overlay"></div>

        <!-- Tombol Back -->
        <button class="btn-back" onclick="window.location.href='index.html'">←</button>

        <!-- Header: Logo kiri + Teks kanan -->
        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <!-- CUSTOMER -->
        <div class="box-customer" onclick="window.location.href='customer_login.html'">
            <div class="label">CUSTOMER</div>
        </div>

        <!-- KARYAWAN -->
        <div class="box-karyawan" onclick="window.location.href='karyawan_login.html'">
            <div class="label">KARYAWAN</div>
        </div>
    </div>
</body>
</html>
