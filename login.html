<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pilih</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .login-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.25);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== DEKORASI BACKGROUND (DARI FIGMA) ===== */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .decorations img {
            position: absolute;
        }

        /* Posisi dari Figma: left: -100.84px, top: 1919.85px, rotate -90deg */
        .decorations .bg-ornament-1 {
            width: 178%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
            opacity: 0.15;
        }

        /* Posisi dari Figma: left: 426px, top: 799.28px, rotate -53deg */
        .decorations .bg-ornament-2 {
            width: 84%;
            left: 39.4%;
            top: 41.6%;
            transform: rotate(-53deg);
            transform-origin: top left;
            opacity: 0.15;
        }

        /* Posisi dari Figma: left: 9.31px, top: 1454px, rotate 46deg */
        .decorations .bg-ornament-3 {
            width: 69%;
            left: 0.9%;
            top: 75.7%;
            transform: rotate(46deg);
            transform-origin: top left;
            opacity: 0.15;
        }

        /* Posisi dari Figma: left: 404px, top: 1287px */
        .decorations .bg-ornament-4 {
            width: 101%;
            left: 37.4%;
            top: 67%;
            opacity: 0.15;
        }

        /* Posisi dari Figma: left: -688px, top: -448px */
        .decorations .bg-ornament-5 {
            width: 101%;
            left: -63.7%;
            top: -23.3%;
            opacity: 0.15;
        }

        /* Posisi dari Figma: left: -249.42px, top: 1117px, rotate 17deg */
        .decorations .bg-ornament-6 {
            width: 73.8%;
            left: -23.1%;
            top: 58.2%;
            transform: rotate(17deg);
            transform-origin: top left;
            opacity: 0.15;
        }

        /* Posisi dari Figma: left: 778.58px, top: 216px, rotate 17deg */
        .decorations .bg-ornament-7 {
            width: 73.8%;
            left: 72.1%;
            top: 11.3%;
            transform: rotate(17deg);
            transform-origin: top left;
            opacity: 0.15;
        }

        /* ===== GAMBAR CABE DAN TOMAT (DARI FIGMA) ===== */
        
        /* Tomat di kiri atas */
        .decorations .tomat-atas-kiri {
            width: 18%;
            left: -2%;
            top: -2%;
            opacity: 1;
        }

        /* Cabe 2 di kanan atas */
        .decorations .cabe2-atas-kanan {
            width: 14%;
            right: -1%;
            top: -1%;
            opacity: 1;
        }

        /* Cabe 2.1 overlay di kanan atas */
        .decorations .cabe21-atas-kanan {
            width: 11%;
            right: 12%;
            top: 8%;
            opacity: 1;
        }

        /* Cabe 1 di kiri bawah */
        .decorations .cabe1-bawah-kiri {
            width: 14%;
            left: -1%;
            bottom: -1%;
            opacity: 1;
        }

        /* Cabe 1.1 overlay di kiri bawah */
        .decorations .cabe11-bawah-kiri {
            width: 11%;
            left: 10%;
            bottom: 10%;
            opacity: 1;
        }

        /* Tomat 1 di kanan bawah */
        .decorations .tomat1-bawah-kanan {
            width: 18%;
            right: -2%;
            bottom: -2%;
            opacity: 1;
        }

        .btn-back {
            position: absolute;
            left: 4%;
            top: 4%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(20px, 3.5%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:active {
            transform: scale(0.95);
        }

        /* Header: Logo kiri + Teks kanan */
        .header-top {
            position: absolute;
            left: 4%;
            top: 7%;
            right: 3%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-top .logo-left {
            width: clamp(60px, 14%, 180px);
            height: auto;
            flex-shrink: 0;
        }

        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-top .title-right {
            color: white;
            font-size: clamp(18px, 5%, 75px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* Box Customer - dari Figma: width 887px, left 88px, top 502px */
        .box-customer {
            position: absolute;
            width: 82%;
            height: 26%;
            left: 8.15%;
            top: 26.15%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
            padding: 0 20px;
        }

        .box-customer:active {
            transform: scale(0.97);
        }

        .box-customer .label {
            color: white;
            font-size: clamp(20px, 5%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        /* Box Karyawan - dari Figma: width 887px, left 88px, top 1092px */
        .box-karyawan {
            position: absolute;
            width: 82%;
            height: 26%;
            left: 8.15%;
            top: 56.88%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
            padding: 0 20px;
        }

        .box-karyawan:active {
            transform: scale(0.97);
        }

        .box-karyawan .label {
            color: white;
            font-size: clamp(20px, 5%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        /* ===== RESPONSIVE ===== */

        @media screen and (orientation: portrait) {
            .login-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(24px, 6%, 70px);
            }

            .header-top .title-right {
                font-size: clamp(20px, 6%, 75px);
            }

            .header-top .logo-left {
                width: clamp(70px, 16%, 200px);
            }
        }

        @media screen and (max-width: 480px) and (orientation: portrait) {
            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(16px, 5%, 45px);
                letter-spacing: 1px;
            }

            .header-top .title-right {
                font-size: clamp(14px, 5%, 45px);
            }

            .header-top .logo-left {
                width: clamp(50px, 12%, 120px);
            }

            .box-customer,
            .box-karyawan {
                border-radius: 35px;
                border-width: 2px;
            }
        }

        @media screen and (orientation: landscape) {
            .login-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .box-customer {
                width: 65%;
                height: 22%;
                left: 17.5%;
                top: 28%;
                border-radius: 40px;
            }

            .box-karyawan {
                width: 65%;
                height: 22%;
                left: 17.5%;
                top: 55%;
                border-radius: 40px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(16px, 3.5%, 45px);
            }

            .header-top .title-right {
                font-size: clamp(16px, 4.5%, 55px);
            }

            .header-top .logo-left {
                width: clamp(60px, 14%, 180px);
            }

            .header-top {
                top: 4%;
                left: 3%;
                right: 3%;
            }

            .btn-back {
                font-size: clamp(18px, 3%, 40px);
                left: 2%;
                top: 2.5%;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .box-customer {
                width: 60%;
                height: 18%;
                left: 20%;
                top: 30%;
                border-radius: 25px;
            }

            .box-karyawan {
                width: 60%;
                height: 18%;
                left: 20%;
                top: 55%;
                border-radius: 25px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(12px, 2.5%, 28px);
                letter-spacing: 1px;
            }

            .header-top .title-right {
                font-size: clamp(12px, 3.5%, 30px);
            }

            .header-top .logo-left {
                width: clamp(40px, 12%, 120px);
            }

            .btn-back {
                font-size: clamp(14px, 2.5%, 25px);
            }

            .box-customer,
            .box-karyawan {
                border: 2px solid white;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(30px, 6%, 75px);
            }

            .header-top .title-right {
                font-size: clamp(26px, 6.5%, 80px);
            }

            .header-top .logo-left {
                width: clamp(100px, 18%, 250px);
            }
        }

        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .box-customer {
                width: 50%;
                height: 18%;
                left: 25%;
                top: 32%;
            }

            .box-karyawan {
                width: 50%;
                height: 18%;
                left: 25%;
                top: 55%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: clamp(24px, 4.5%, 60px);
            }

            .header-top .title-right {
                font-size: clamp(24px, 5.5%, 70px);
            }

            .header-top .logo-left {
                width: clamp(100px, 18%, 280px);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="bg-utama"></div>

        <div class="overlay"></div>

        <!-- Dekorasi dari Figma -->
        <div class="decorations">
            <!-- Background ornamen dari Figma -->
            <img class="bg-ornament-1" src="https://placehold.co/1922x1281" alt="">
            <img class="bg-ornament-2" src="https://placehold.co/908x855" alt="">
            <img class="bg-ornament-3" src="https://placehold.co/745x744" alt="">
            <img class="bg-ornament-4" src="https://placehold.co/1092x1092" alt="">
            <img class="bg-ornament-5" src="https://placehold.co/1092x1092" alt="">
            <img class="bg-ornament-6" src="https://placehold.co/797x797" alt="">
            <img class="bg-ornament-7" src="https://placehold.co/797x797" alt="">

            <!-- Gambar Cabe & Tomat -->
            <img class="tomat-atas-kiri" src="tomat2.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe2-atas-kanan" src="cabe2.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe21-atas-kanan" src="cabe2.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe1-bawah-kiri" src="cabe1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe11-bawah-kiri" src="cabe1.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="tomat1-bawah-kanan" src="tomat1.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
        </div>

        <button class="btn-back" onclick="window.location.href='index.html'">←</button>

        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <div class="box-customer" onclick="window.location.href='customer_login.html'">
            <div class="label">CUSTOMER</div>
        </div>

        <div class="box-karyawan" onclick="window.location.href='karyawan_login.html'">
            <div class="label">KARYAWAN</div>
        </div>
    </div>
</body>
</html>
