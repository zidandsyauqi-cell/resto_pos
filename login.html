<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pilih</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .login-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 1;
        }

        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 5%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        /* Header: Logo kiri + Teks kanan */
        .header-top {
            position: absolute;
            left: 4.3%;
            top: 6%;
            right: 4.3%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-top .logo-left {
            width: clamp(120px, 35%, 413px);
            height: auto;
            flex-shrink: 0;
        }

        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-top .title-right {
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* Box Customer */
        .box-customer {
            position: absolute;
            width: 82.1%;
            height: 26.4%;
            left: 8.15%;
            top: 26%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
            padding-left: 5%;
        }

        .box-customer:hover {
            transform: scale(1.03);
            opacity: 1;
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.5);
        }

        .box-customer:active {
            transform: scale(0.97);
        }

        .box-customer .label {
            color: white;
            font-size: clamp(35px, 8%, 85px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-align: left;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        /* Box Karyawan */
        .box-karyawan {
            position: absolute;
            width: 82.1%;
            height: 26.4%;
            left: 8.15%;
            top: 56.9%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            border: 3px solid white;
            padding-left: 5%;
        }

        .box-karyawan:hover {
            transform: scale(1.03);
            opacity: 1;
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.5);
        }

        .box-karyawan:active {
            transform: scale(0.97);
        }

        .box-karyawan .label {
            color: white;
            font-size: clamp(35px, 8%, 85px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-align: left;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 3px;
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .login-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .box-customer,
            .box-karyawan {
                border-radius: 40px;
                padding-left: 5%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 30px;
            }

            .header-top .logo-left {
                width: 100px;
            }

            .header-top .title-right {
                font-size: 22px;
            }
        }

        @media screen and (max-width: 480px) {
            .login-container {
                border-radius: 10px;
            }

            .box-customer,
            .box-karyawan {
                border-radius: 30px;
                padding-left: 5%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 24px;
            }

            .header-top .logo-left {
                width: 70px;
            }

            .header-top .title-right {
                font-size: 18px;
            }

            .header-top {
                gap: 5px;
            }
        }

        @media screen and (max-width: 360px) {
            .box-customer,
            .box-karyawan {
                border-radius: 25px;
                padding-left: 4%;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 18px;
                letter-spacing: 1px;
            }

            .header-top .logo-left {
                width: 55px;
            }

            .header-top .title-right {
                font-size: 14px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .login-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .login-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .box-customer .label,
            .box-karyawan .label {
                font-size: 22px;
            }

            .header-top .logo-left {
                width: 70px;
            }

            .header-top .title-right {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Background bg.png -->
        <div class="bg-utama"></div>

        <!-- Overlay gelap -->
        <div class="overlay"></div>

        <!-- Tombol Back -->
        <button class="btn-back" onclick="window.location.href='index.html'">←</button>

        <!-- Header: Logo kiri + Teks kanan -->
        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <!-- CUSTOMER -->
        <div class="box-customer" onclick="window.location.href='customer_login.html'">
            <div class="label">CUSTOMER</div>
        </div>

        <!-- KARYAWAN -->
        <div class="box-karyawan" onclick="window.location.href='karyawan_login.html'">
            <div class="label">KARYAWAN</div>
        </div>
    </div>
</body>
</html>
