<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .customer-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .logo-top {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        .title-main {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 5;
            line-height: 1.1;
            letter-spacing: 2px;
            width: 55.6%;
            margin-top: 80px;
        }

        .meja-info {
            position: absolute;
            right: 4.3%;
            top: 7%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(14px, 2%, 22px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .meja-info span {
            color: #98C81C;
        }

        .customer-name-display {
            position: absolute;
            right: 4.3%;
            top: 14%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 6px 18px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }

        .customer-name-display span {
            color: #98C81C;
        }

        .box-menu {
            position: absolute;
            width: 82.2%;
            height: 21.7%;
            left: 8.9%;
            top: 24%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-menu:hover {
            transform: scale(1.02);
        }

        .box-menu:active {

        }

        .box-menu .bg-hijau {

        .box-menu .label-menu {

            font-weight: 600;

        .box-pesan .gambar4 {

        .box-pesan .gambar4 img {

            position: absolute;

        }

        .box-pesan .gambar5 img {

        .box-pesan .gambar6 img {

        }

        .box-tambah {
            position: absolute;
            width: 82.2%;
            height: 20.9%;
            left: 8.9%;
            top: 72%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-tambah:hover {
            transform: scale(1.02);
        }

        .box-tambah:active {
            transform: scale(0.98);
        }

        .box-tambah .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }

        .box-tambah .label-tambah {
            position: absolute;

            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;

        .box-status {
            position: absolute;
            width: 82.2%;
            height: 5.1%;
            left: 8.9%;
            top: 95.8%;
            background: #98C81C;
            border-radius: 50px;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-status:hover {
            transform: scale(1.02);
        }

        .box-status:active {
            transform: scale(0.98);
        }

        .box-status .label-status {
            color: white;
            font-size: clamp(18px, 4%, 45px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }

        /* ====== HALAMAN MENU ====== */
        .menu-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 50;
            display: none;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 15px 15px 15px;
        }

        .menu-page.active {
            display: block;
        }

        .menu-page::-webkit-scrollbar {
            width: 5px;
        }

        .menu-page::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .menu-page::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .menu-page .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0 10px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10;
            border-radius: 15px 15px 0 0;
        }

        .menu-page .menu-header .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
        }

        .menu-page .menu-header .back-btn:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .menu-page .menu-header h2 {
            color: white;
            font-size: clamp(16px, 3%, 32px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .menu-page .menu-header .cart-count {
            background: #98C81C;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: clamp(12px, 1.5%, 18px);
            font-weight: 600;
        }

        .menu-search-wrapper {
            padding: 8px 0 10px 0;
            position: sticky;
            top: 65px;
            background: rgba(0,0,0,0.95);
            z-index: 9;
        }

        .menu-search-box {
            width: 100%;
            padding: 10px 18px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .menu-search-box:focus-within {
            border-color: #98C81C;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(152, 200, 28, 0.15);
        }

        .menu-search-box .search-icon {
            color: rgba(255,255,255,0.6);
            font-size: clamp(18px, 2%, 24px);
            flex-shrink: 0;
        }

        .menu-search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: clamp(14px, 2%, 22px);
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
        }

        .menu-search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .menu-search-box .clear-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: clamp(16px, 1.8%, 22px);
            cursor: pointer;
            display: none;
            padding: 0 5px;
            transition: all 0.3s;
        }

        .menu-search-box .clear-btn:hover {
            color: white;
            transform: scale(1.2);
        }

        .menu-search-box .clear-btn.show {
            display: block;
        }

        .menu-selesai-btn {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: clamp(6px, 1.2%, 12px) clamp(15px, 2.5%, 30px);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(237, 27, 36, 0.3);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .menu-selesai-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(237, 27, 36, 0.5);
        }

        .menu-selesai-btn:active {
            transform: scale(0.95);
        }

        .menu-selesai-btn span {
            color: white;
            font-size: clamp(14px, 3%, 32px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0 12px 0;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tabs .tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.5%, 18px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .category-tabs .tab:hover {
            background: rgba(152, 200, 28, 0.2);
            border-color: #98C81C;
        }

        .category-tabs .tab.active {
            background: #98C81C;
            border-color: #98C81C;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 5px 0 20px 0;
        }

        .menu-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            gap: 10px;
            flex-wrap: wrap;
            cursor: pointer;
        }

        .menu-item-row:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(152, 200, 28, 0.3);
        }

        .menu-item-row .item-info {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item-row .item-info .item-image {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            background: #2d2d2d;
        }

        .menu-item-row .item-info .item-details {
            flex: 1;
        }

        .menu-item-row .item-info .item-details .item-name {
            color: white;
            font-size: clamp(14px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .menu-item-row .item-info .item-details .item-price {
            color: #98C81C;
            font-size: clamp(12px, 1.5%, 20px);
            font-weight: 600;
        }

        .menu-item-row .item-info .item-details .item-status {
            font-size: clamp(10px, 1.2%, 14px);
            padding: 2px 10px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 2px;
        }

        .menu-item-row .item-info .item-details .item-status.available {
            background: rgba(152, 200, 28, 0.3);
            color: #98C81C;
        }

        .menu-item-row .item-info .item-details .item-status.unavailable {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .menu-item-row .item-info .item-details .variant-badge {
            font-size: clamp(9px, 1%, 12px);
            color: #98C81C;
            background: rgba(152, 200, 28, 0.15);
            padding: 1px 8px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 2px;
        }

        .menu-item-row .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .menu-item-row .item-controls .btn-minus {
            width: 36px;
            height: 36px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .menu-item-row .item-controls .btn-minus:hover {
            transform: scale(1.1);
            background: #c0392b;
        }

        .menu-item-row .item-controls .btn-minus:active {
            transform: scale(0.9);
        }

        .menu-item-row .item-controls .qty-input {
            width: clamp(50px, 6%, 70px);
            padding: 6px 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: clamp(16px, 1.8%, 22px);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .menu-item-row .item-controls .qty-input:focus {
            border-color: #98C81C;
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        .menu-item-row .item-controls .qty-input::-webkit-inner-spin-button,
        .menu-item-row .item-controls .qty-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .menu-item-row .item-controls .qty-input[type=number] {
            -moz-appearance: textfield;
        }

        .menu-item-row .item-controls .btn-plus {
            width: 36px;
            height: 36px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .menu-item-row .item-controls .btn-plus:hover {
            transform: scale(1.1);

    <script>
        // ============ SUPABASE CONFIG ============
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============ GLOBAL VARIABLES ============
        let menuItems = [];
        let orders = JSON.parse(localStorage.getItem('customer_orders')) || [];
        let currentCategory = 'all';
        let searchQuery = '';

        // Detail page variables
        let currentDetailItem = null;
        let selectedVariant = null;
        let detailQty = 1;

        // ============ FUNGSI AMBIL DATA ============
        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) {
                return meja;
            }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) {
                return savedMeja;
            }
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) {
                return nama;
            }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) {
                return savedNama;
            }
            return 'Customer';
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) {
                return imagePath;
            }
            try {
                const { data } = supabaseClient.storage
                    .from(STORAGE_BUCKET)
                    .getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) {
                return null;
            }
        }

        // ============ LOAD MENU FROM SUPABASE ============
        async function loadMenuFromSupabase() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, status_ketersediaan, kategori, gambar, detail, varian')
                    .order('kategori', { ascending: true });

                if (error) throw error;

                if (data && data.length > 0) {
                    menuItems = data.map(item => {
                        let variants = [];
                        if (item.varian) {
                            try {
                                variants = typeof item.varian === 'string' ? JSON.parse(item.varian) : item.varian;
                            } catch (e) {
                                variants = [];
                            }
                        }
                        if (!variants || variants.length === 0) {
                            variants = [{ name: 'Standar', price: 0 }];
                        }

                        return {
                            id: item.id_menu,
                            name: item.nama_menu,
                            price: item.harga,
                            category: item.kategori,
                            status: item.status_ketersediaan,
                            image_url: item.gambar || null,
                            description: item.detail || '',
                            variants: variants
                        };
                    });
                } else {
                    menuItems = getDefaultMenu();
                }

                renderMenu(currentCategory);
                updateCartCount();
                updateOrderList();
            } catch (error) {
                console.error('Error loading menu:', error);
                menuItems = getDefaultMenu();
                renderMenu(currentCategory);
                updateCartCount();
                updateOrderList();
                showToast('⚠️ Gagal memuat menu dari server, menggunakan data lokal');
            } finally {
                loading.classList.remove('active');
            }
        }

        // ============ DEFAULT MENU ============
        function getDefaultMenu() {
            return [{
                id: 1,
                name: 'Iga Bakar',
                price: 45000,
                category: 'Makanan',
                status: 'Tersedia',
                image_url: null,
                description: 'Iga bakar dengan bumbu spesial',
                variants: [
                    { name: 'Sapi', price: 0 },
                    { name: 'Kambing', price: 5000 },
                    { name: 'Sapi Spesial', price: 40000 }
                ]
            }, {
                id: 2,
                name: 'Nasi Goreng',
                price: 25000,
                category: 'Makanan',
                status: 'Tersedia',
                image_url: null,
                description: 'Nasi goreng spesial',
                variants: []
            }, {
                id: 3,
                name: 'Air Mineral',
                price: 7000,
                category: 'Tambahan',
                status: 'Tersedia',
                image_url: null,
                description: 'Air mineral 600ml',
                variants: []
            }];
        }

        // ============ SEARCH FUNCTION ============
        function searchMenu() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.toLowerCase().trim();
            const clearBtn = document.getElementById('clearBtn');

            if (searchQuery.length > 0) {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }

            renderMenu(currentCategory);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.remove('show');
            searchQuery = '';
            renderMenu(currentCategory);
        }

        // ============ RENDER MENU ============
        function renderMenu(category = 'all') {
            const container = document.getElementById('menuItems');
            container.innerHTML = '';

            let filtered = category === 'all' ?
                menuItems :
                menuItems.filter(item => item.category === category);

            if (searchQuery) {
                filtered = filtered.filter(item =>
                    item.name.toLowerCase().includes(searchQuery)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                            <div style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 18px;">
                                ${searchQuery ? '🔍 Tidak ada menu yang cocok dengan "' + searchQuery + '"' : 'Tidak ada menu di kategori ini'}
                            </div>
                        `;
                return;
            }

            filtered.forEach(item => {
                const existing = orders.find(o => o.id === item.id);
                const qty = existing ? existing.qty : 0;
                const isAvailable = item.status === 'Tersedia';
                const hasVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item
                    .variants[0].name === 'Standar');

                let imageUrl = 'https://placehold.co/50x50/2d2d2d/ffffff?text=Menu';
                if (item.image_url) {
                    const url = getImageUrl(item.image_url);
                    if (url) imageUrl = url;
                }

                const row = document.createElement('div');
                row.className = `menu-item-row ${!isAvailable ? 'disabled' : ''}`;
                row.onclick = function() {
                    if (isAvailable) {
                        openDetail(item.id);
                    }
                };

                let controlsHtml = '';
                if (hasVariants) {
                    controlsHtml = `
                                <button class="btn-detail-add" onclick="event.stopPropagation(); openDetail(${item.id})">
                                    ${qty > 0 ? '🛒 ' + qty : 'Pilih'}
                                </button>
                            `;
                } else {
                    controlsHtml = `
                                <button class="btn-minus" onclick="event.stopPropagation(); updateQty(${item.id}, -1, '${item.name}', ${item.price})">−</button>
                                <input type="number" class="qty-input" id="qty_${item.id}" 
                                       value="${qty}" min="0" 
                                       onchange="onQtyChange(${item.id}, '${item.name}', ${item.price}, this.value)"
                                       onfocus="this.select()"
                                       ${!isAvailable ? 'disabled' : ''}>
                                <button class="btn-plus" onclick="event.stopPropagation(); updateQty(${item.id}, 1, '${item.name}', ${item.price})">+</button>
                            `;
                }

                row.innerHTML = `
                            <div class="item-info">
                                <img class="item-image" src="${imageUrl}" alt="${item.name}" loading="lazy" 
                                     onerror="this.src='https://placehold.co/50x50/2d2d2d/ffffff?text=Menu'">
                                <div class="item-details">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">Rp ${item.price.toLocaleString()}</div>
                                    <div class="item-status ${isAvailable ? 'available' : 'unavailable'}">
                                        ${isAvailable ? '✅ Tersedia' : '❌ Tidak Tersedia'}
                                    </div>
                                    ${hasVariants ? '<div class="variant-badge">📌 Ada Varian</div>' : ''}
                                </div>
                            </div>
                            <div class="item-controls" onclick="event.stopPropagation();">
                                ${controlsHtml}
                            </div>
                        `;
                container.appendChild(row);
            });
        }

        // ============ FUNGSI QTY ============
        function updateQty(id, change, name, price) {
            const input = document.getElementById(`qty_${id}`);
            if (!input) return;

            let currentQty = parseInt(input.value) || 0;
            let newQty = currentQty + change;

            if (newQty < 0) newQty = 0;

            input.value = newQty;

            const existing = orders.find(item => item.id === id && !item.variant);
            if (newQty <= 0) {
                if (existing) {
                    const index = orders.indexOf(existing);
                    orders.splice(index, 1);
                }
            } else {
                if (existing) {
                    existing.qty = newQty;
                } else {
                    orders.push({ id, name, price, qty: newQty, variant: null });
                }
            }

            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();
            updateOrderList();

            if (change > 0 && newQty > 0) {
                showToast(`✅ ${name} x${newQty}`);
            }
        }

        function onQtyChange(id, name, price, value) {
            const qty = parseInt(value) || 0;

            const existing = orders.find(item => item.id === id && !item.variant);
            if (qty <= 0) {
                if (existing) {
                    const index = orders.indexOf(existing);
                    orders.splice(index, 1);
                }
            } else {
                if (existing) {
                    existing.qty = qty;
                } else {
                    orders.push({ id, name, price, qty, variant: null });
                }
            }

            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();
            updateOrderList();
        }

        // ============ DETAIL PAGE ============
        function openDetail(id) {
            const item = menuItems.find(m => m.id === id);
            if (!item) return;

            currentDetailItem = item;
            detailQty = 1;

            if (item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item.variants[0].name ===
                    'Standar')) {
                selectedVariant = item.variants[0];
            } else {
                selectedVariant = null;
            }

            const page = document.getElementById('detailPage');
            document.getElementById('detailTitle').textContent = item.name;
            document.getElementById('detailName').textContent = item.name;

            let basePrice = item.price;
            let extraPrice = selectedVariant ? selectedVariant.price : 0;
            document.getElementById('detailPrice').textContent = `Rp ${(basePrice + extraPrice).toLocaleString()}`;

            let imageUrl = 'https://placehold.co/400x400/2d2d2d/ffffff?text=' + item.name;
            if (item.image_url) {
                const url = getImageUrl(item.image_url);
                if (url) imageUrl = url;
            }
            document.getElementById('detailImg').src = imageUrl;

            const variantsContainer = document.getElementById('detailVariants');
            variantsContainer.innerHTML = '';

            const hasRealVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item
                .variants[0].name === 'Standar');

            if (hasRealVariants) {
                item.variants.forEach((variant, index) => {
                    const div = document.createElement('div');
                    div.className = `variant-item ${index === 0 ? 'selected' : ''}`;
                    div.onclick = function() {
                        selectVariant(index);
                    };
                    div.innerHTML = `
                                <div class="variant-info">
                                    <div class="variant-name">${variant.name}</div>
                                    <div class="variant-price">${variant.price > 0 ? '(+) Rp ' + variant.price.toLocaleString() : 'Harga Normal'}</div>
                                </div>
                                <div class="variant-radio"></div>
                            `;
                    variantsContainer.appendChild(div);
                });
            } else {
                variantsContainer.innerHTML =
                    `<div style="color: rgba(255,255,255,0.6); padding: 10px 0; font-size: 16px;">Tidak ada varian</div>`;
            }

            document.getElementById('detailQty').textContent = detailQty;
            document.getElementById('detailCartCount').textContent = orders.reduce((sum, o) => sum + o.qty, 0);

            page.classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailPage').classList.remove('active');
        }

        function selectVariant(index) {
            const item = currentDetailItem;
            if (!item || !item.variants) return;

            selectedVariant = item.variants[index];

            document.querySelectorAll('.variant-item').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });

            let basePrice = item.price;
            let extraPrice = selectedVariant ? selectedVariant.price : 0;
            document.getElementById('detailPrice').textContent = `Rp ${(basePrice + extraPrice).toLocaleString()}`;
        }

        function changeDetailQty(change) {
            detailQty = Math.max(1, detailQty + change);
            document.getElementById('detailQty').textContent = detailQty;
        }

        function addDetailToOrder() {
            if (!currentDetailItem) return;

            const item = currentDetailItem;
            let finalPrice = item.price;
            let variantName = '';

            const hasRealVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item
                .variants[0].name === 'Standar');

            if (hasRealVariants && selectedVariant) {
                finalPrice += selectedVariant.price;
                variantName = ' (' + selectedVariant.name + ')';
            }

            const existing = orders.find(o => o.id === item.id && o.variant === variantName);
            if (existing) {
                existing.qty += detailQty;
            } else {
                orders.push({
                    id: item.id,
                    name: item.name + variantName,
                    price: finalPrice,
                    qty: detailQty,
                    variant: variantName || null
                });
            }

            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();
            updateOrderList();
            document.getElementById('detailCartCount').textContent = orders.reduce((sum, o) => sum + o.qty, 0);

            showToast(`✅ ${item.name}${variantName} x${detailQty} ditambahkan!`);
            closeDetail();

            if (document.getElementById('menuPage').classList.contains('active')) {
                renderMenu(currentCategory);
            }
        }

        // ============ FILTER KATEGORI ============
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderMenu(category);
        }

        // ============ UPDATE CART COUNT ============
        function updateCartCount() {
            const total = orders.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = total;
            document.getElementById('pesanCount').textContent = total;
            document.getElementById('detailCartCount').textContent = total;
        }

        // ============ UPDATE ORDER LIST ============
        function updateOrderList() {
            const container = document.getElementById('orderList');
            if (orders.length === 0) {
                container.innerHTML = `
                            <div class="empty-order">
                                🛒 Belum ada pesanan
                            </div>
                        `;
                return;
            }

            let html = '<div class="order-items">';
            let total = 0;
            orders.forEach((item, index) => {
                total += item.price * item.qty;
                const menuItem = menuItems.find(m => m.id === item.id);
                let imageUrl = 'https://placehold.co/40x40/2d2d2d/ffffff?text=Menu';
                if (menuItem?.image_url) {
                    const url = getImageUrl(menuItem.image_url);
                    if (url) imageUrl = url;
                }

                html += `
                            <div class="order-item-row">
                                <div class="item-info">
                                    <img class="item-image" src="${imageUrl}" alt="${item.name}" 
                                         onerror="this.src='https://placehold.co/40x40/2d2d2d/ffffff?text=Menu'">
                                    <div class="item-details">
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-price">Rp ${(item.price * item.qty).toLocaleString()}</div>
                                    </div>
                                </div>
                                <div class="item-controls">
                                    <button class="btn-minus" onclick="updateQtyPesan(${index}, -1)">−</button>
                                    <span class="qty-display">${item.qty}</span>
                                    <button class="btn-plus" onclick="updateQtyPesan(${index}, 1)">+</button>
                                </div>
                            </div>
                        `;
            });

            html += `
                        <div class="order-total">
                            <span class="total-label">💰 Total</span>
                            <span class="total-amount">Rp ${total.toLocaleString()}</span>
                        </div>
                    `;
            html += '</div>';
            container.innerHTML = html;
        }

        function updateQtyPesan(index, change) {
            if (orders[index].qty + change <= 0) {
                orders.splice(index, 1);
            } else {
                orders[index].qty += change;
            }
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateOrderList();
            updateCartCount();

            if (document.getElementById('menuPage').classList.contains('active')) {
                renderMenu(currentCategory);
            }
        }

        function showTotal() {
            if (orders.length === 0) {
                showToast('⚠️ Belum ada pesanan!');
                return;
            }
            const total = orders.reduce((sum, item) => sum + (item.price * item.qty), 0);
            showToast(`💰 Total: Rp ${total.toLocaleString()}`);
        }

        // ============ OPEN / CLOSE ============
        function openMenu() {
            document.getElementById('menuPage').classList.add('active');
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.remove('show');
            searchQuery = '';
            renderMenu(currentCategory);
            updateCartCount();
        }

        function closeMenu() {
            document.getElementById('menuPage').classList.remove('active');
        }

        function openPesan() {
            document.getElementById('pesanPage').classList.add('active');
            updateOrderList();
            updateCartCount();
            document.getElementById('detailPage').classList.remove('active');
        }

        function closePesan() {
            document.getElementById('pesanPage').classList.remove('active');
        }

        // ============ CHECKOUT ============
        function checkout() {
            if (orders.length === 0) {
                showToast('⚠️ Belum ada pesanan!');
                return;
            }

            if (confirm('Yakin ingin menyelesaikan pesanan?')) {
                const total = orders.reduce((sum, item) => sum + (item.price * item.qty), 0);
                const meja = getMeja();
                const nama = getNama();

                let message = '📋 Pesanan Anda:\n\n';
                orders.forEach((item, index) => {
                    message +=
                        `${index + 1}. ${item.name} x${item.qty} - Rp ${(item.price * item.qty).toLocaleString()}\n`;
                });
                message += `\n🪑 Meja: ${meja}`;
                message += `\n👤 Nama: ${nama}`;
                message += `\n💰 Total: Rp ${total.toLocaleString()}`;
                message += `\n\n✅ Pesanan berhasil dikirim!`;

                alert(message);

                // Simpan ke Supabase (akan diimplementasikan nanti)
                // ...

                orders = [];
                localStorage.setItem('customer_orders', JSON.stringify(orders));
                updateOrderList();
                updateCartCount();
                closePesan();
                if (document.getElementById('menuPage').classList.contains('active')) {
                    renderMenu(currentCategory);
                }
                showToast('✅ Pesanan selesai! Terima kasih 🙏');
            }
        }

        // ============ TOAST ============
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // ============ INIT ============
        const mejaNumber = getMeja();
        const namaCustomer = getNama();

        document.getElementById('mejaNumber').textContent = mejaNumber;
        document.getElementById('namaCustomer').textContent = namaCustomer;

        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);

        window.addEventListener('DOMContentLoaded', function() {
            loadMenuFromSupabase();
        });
    </script>
</body>
</html>
