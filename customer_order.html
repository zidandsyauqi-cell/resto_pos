<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RestoPOS - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .customer-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* Header dengan logo, judul, dan tombol selesai */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 30px 35px 10px 35px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-left img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-left .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-left .brand-text span {
            color: #98C81C;
        }

        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: clamp(8px, 1.5%, 15px) clamp(20px, 3%, 40px);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(237, 27, 36, 0.3);
            min-width: 80px;
        }

        .btn-selesai:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(237, 27, 36, 0.5);
        }

        .btn-selesai:active {
            transform: scale(0.95);
        }

        .btn-selesai span {
            color: white;
            font-size: clamp(18px, 4.2%, 45px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        /* Search Box */
        .search-wrapper {
            position: absolute;
            left: 4.1%;
            top: 13%;
            width: 91.9%;
            z-index: 10;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: #98C81C;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(152, 200, 28, 0.2);
        }

        .search-box .search-icon {
            color: rgba(255,255,255,0.7);
            font-size: clamp(20px, 2.5%, 30px);
            flex-shrink: 0;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: clamp(16px, 2.5%, 28px);
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-box .clear-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: clamp(18px, 2%, 24px);
            cursor: pointer;
            display: none;
            padding: 0 5px;
            transition: all 0.3s;
        }

        .search-box .clear-btn:hover {
            color: white;
            transform: scale(1.2);
        }

        .search-box .clear-btn.show {
            display: block;
        }

        /* Title - WILUJENG SUMPING! */
        .title-main {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 5;
            line-height: 1.1;
            letter-spacing: 2px;
            width: 55.6%;
        }

        .title-main small {
            font-size: clamp(14px, 3.7%, 40px);
            display: block;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 5px;
        }

        .box-menu {
            position: absolute;
            width: 82.2%;
            height: 28.6%;
            left: 8.9%;
            top: 24%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-menu:hover {
            transform: scale(1.02);
        }

        .box-menu:active {
            transform: scale(0.98);
        }

        .box-menu .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
        }

        .box-menu .label-menu {
            position: absolute;
            left: 3.5%;
            top: 14.2%;
            text-align: center;
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .box-menu .gambar1 {
            position: absolute;
            width: 59.7%;
            height: 81.1%;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 1;
        }

        .box-menu .gambar1 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-menu .gambar2 {
            position: absolute;
            width: 57.2%;
            height: 92.2%;
            left: -10.8%;
            top: 35.3%;
            overflow: hidden;
            z-index: 0;
        }

        .box-menu .gambar2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-menu .gambar3 {
            position: absolute;
            width: 45%;
            height: 74.9%;
            left: 27.6%;
            top: 44.1%;
            overflow: hidden;
            z-index: 1;
        }

        .box-menu .gambar3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan {
            position: absolute;
            width: 82.2%;
            height: 28.6%;
            left: 8.9%;
            top: 55.7%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-pesan:hover {
            transform: scale(1.02);
        }

        .box-pesan:active {
            transform: scale(0.98);
        }

        .box-pesan .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
        }

        .box-pesan .label-pesan {
            position: absolute;
            left: 3.5%;
            top: 14.2%;
            text-align: center;
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .box-pesan .gambar4 {
            position: absolute;
            width: 56.4%;
            height: 94.2%;
            left: 18.4%;
            top: 23.1%;
            overflow: hidden;
            z-index: 1;
        }

        .box-pesan .gambar4 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan .gambar5 {
            position: absolute;
            width: 49.2%;
            height: 79.1%;
            left: 46.6%;
            top: 60.4%;
            transform: rotate(107deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 0;
        }

        .box-pesan .gambar5 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan .gambar6 {
            position: absolute;
            width: 61.4%;
            height: 91.1%;
            left: 45.4%;
            top: 50.7%;
            transform: rotate(-10deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 1;
        }

        .box-pesan .gambar6 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .menu-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 50;
            display: none;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
        }

        .menu-page.active {
            display: block;
        }

        .menu-page::-webkit-scrollbar {
            width: 5px;
        }

        .menu-page::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .menu-page::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .menu-page .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 15px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10;
            border-radius: 15px 15px 0 0;
        }

        .menu-page .menu-header .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
        }

        .menu-page .menu-header .back-btn:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .menu-page .menu-header h2 {
            color: white;
            font-size: clamp(16px, 3%, 32px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .menu-page .menu-header .cart-count {
            background: #98C81C;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: clamp(12px, 1.5%, 18px);
            font-weight: 600;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 0;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tabs .tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.5%, 18px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .category-tabs .tab:hover {
            background: rgba(152, 200, 28, 0.2);
            border-color: #98C81C;
        }

        .category-tabs .tab.active {
            background: #98C81C;
            border-color: #98C81C;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0 20px 0;
        }

        .menu-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            gap: 10px;
            flex-wrap: wrap;
        }

        .menu-item-row:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(152, 200, 28, 0.3);
        }

        .menu-item-row .item-info {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-item-row .item-info .item-image {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            background: #2d2d2d;
        }

        .menu-item-row .item-info .item-details {
            flex: 1;
        }

        .menu-item-row .item-info .item-details .item-name {
            color: white;
            font-size: clamp(14px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .menu-item-row .item-info .item-details .item-price {
            color: #98C81C;
            font-size: clamp(12px, 1.5%, 20px);
            font-weight: 600;
        }

        .menu-item-row .item-info .item-details .item-status {
            font-size: clamp(10px, 1.2%, 14px);
            padding: 2px 10px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 2px;
        }

        .menu-item-row .item-info .item-details .item-status.available {
            background: rgba(152, 200, 28, 0.3);
            color: #98C81C;
        }

        .menu-item-row .item-info .item-details .item-status.unavailable {
            background: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .menu-item-row .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .menu-item-row .item-controls .btn-minus {
            width: 36px;
            height: 36px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .menu-item-row .item-controls .btn-minus:hover {
            transform: scale(1.1);
            background: #c0392b;
        }

        .menu-item-row .item-controls .btn-minus:active {
            transform: scale(0.9);
        }

        .menu-item-row .item-controls .qty-input {
            width: clamp(50px, 6%, 70px);
            padding: 6px 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: clamp(16px, 1.8%, 22px);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .menu-item-row .item-controls .qty-input:focus {
            border-color: #98C81C;
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        .menu-item-row .item-controls .qty-input::-webkit-inner-spin-button,
        .menu-item-row .item-controls .qty-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .menu-item-row .item-controls .qty-input[type=number] {
            -moz-appearance: textfield;
        }

        .menu-item-row .item-controls .btn-plus {
            width: 36px;
            height: 36px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .menu-item-row .item-controls .btn-plus:hover {
            transform: scale(1.1);
            background: #7aa814;
        }

        .menu-item-row .item-controls .btn-plus:active {
            transform: scale(0.9);
        }

        .menu-item-row.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(14px, 2%, 24px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .customer-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .header-top {
                padding: 20px 20px 5px 20px;
            }

            .search-wrapper {
                top: 12%;
            }

            .search-box {
                padding: 10px 15px;
            }

            .menu-item-row {
                padding: 10px 12px;
            }

            .menu-item-row .item-info .item-image {
                width: 40px;
                height: 40px;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 45px;
                padding: 4px 6px;
                font-size: 14px;
            }
        }

        @media screen and (max-width: 480px) {
            .customer-container {
                border-radius: 10px;
            }

            .header-top {
                padding: 15px 15px 5px 15px;
            }

            .btn-selesai {
                min-width: 60px;
                padding: 6px 15px;
            }

            .btn-selesai span {
                font-size: 14px;
            }

            .search-wrapper {
                top: 11%;
            }

            .search-box {
                padding: 8px 12px;
                border-width: 2px;
            }

            .search-box input {
                font-size: 14px;
            }

            .menu-item-row {
                padding: 8px 10px;
                flex-wrap: wrap;
            }

            .menu-item-row .item-info {
                min-width: 100px;
            }

            .menu-item-row .item-info .item-image {
                width: 35px;
                height: 35px;
            }

            .menu-item-row .item-controls {
                flex: 1;
                justify-content: flex-end;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 40px;
                padding: 3px 4px;
                font-size: 13px;
            }
        }

        @media screen and (max-width: 360px) {
            .header-top {
                padding: 10px 10px 5px 10px;
            }

            .logo-left .brand-text {
                font-size: 12px;
            }

            .logo-left img {
                width: 30px;
            }

            .btn-selesai {
                min-width: 50px;
                padding: 4px 10px;
            }

            .btn-selesai span {
                font-size: 11px;
            }

            .search-wrapper {
                top: 10%;
            }

            .search-box input {
                font-size: 12px;
            }

            .search-box .search-icon {
                font-size: 16px;
            }

            .menu-item-row .item-info .item-image {
                width: 30px;
                height: 30px;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 35px;
                padding: 2px 3px;
                font-size: 12px;
            }

            .menu-item-row .item-info .item-details .item-name {
                font-size: 12px;
            }

            .menu-item-row .item-info .item-details .item-price {
                font-size: 10px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .header-top {
                padding: 10px 15px 5px 15px;
            }

            .logo-left .brand-text {
                font-size: 14px;
            }

            .logo-left img {
                width: 30px;
            }

            .btn-selesai {
                padding: 4px 12px;
                min-width: 50px;
            }

            .btn-selesai span {
                font-size: 12px;
            }

            .search-wrapper {
                top: 10%;
            }

            .search-box {
                padding: 6px 12px;
            }

            .search-box input {
                font-size: 12px;
            }

            .menu-item-row {
                padding: 6px 10px;
            }

            .menu-item-row .item-info .item-image {
                width: 30px;
                height: 30px;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 35px;
                padding: 2px 4px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat menu...</div>
        </div>

        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <!-- Header dengan Logo dan Tombol Selesai -->
        <div class="header-top">
            <div class="logo-left">
                <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo RestoPOS" loading="lazy" />
                <div class="brand-text">Resto<span>POS</span></div>
            </div>
            <button class="btn-selesai" onclick="openPesan()">
                <span>selesai</span>
            </button>
        </div>

        <!-- Search Box -->
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="mau pesan apa hari ini?" oninput="searchMenu()">
                <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
            </div>
        </div>

        <!-- Title - WILUJENG SUMPING! -->
        <div class="title-main">
            WILUJENG<br>SUMPING!
            <small>Selamat Datang</small>
        </div>

        <div class="box-menu" onclick="openMenu()">
            <div class="bg-hijau"></div>
            <div class="label-menu">📋 MENU</div>
            <div class="gambar1">
                <img src="https://placehold.co/530x445/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar2">
                <img src="https://placehold.co/477x493/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar3">
                <img src="https://placehold.co/400x411/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
        </div>

        <div class="box-pesan" onclick="openPesan()">
            <div class="bg-hijau"></div>
            <div class="label-pesan">🛒 PESAN</div>
            <div class="gambar4">
                <img src="https://placehold.co/501x517/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar5">
                <img src="https://placehold.co/545x547/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar6">
                <img src="https://placehold.co/626x590/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
        </div>

        <div class="menu-page" id="menuPage">
            <div class="menu-header">
                <button class="back-btn" onclick="closeMenu()">←</button>
                <h2>📋 Menu</h2>
                <span class="cart-count" id="cartCount">0</span>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="tab active" data-category="all" onclick="filterCategory('all')">Semua</button>
                <button class="tab" data-category="Makanan" onclick="filterCategory('Makanan')">🍚 Makanan</button>
                <button class="tab" data-category="Minuman" onclick="filterCategory('Minuman')">🥤 Minuman</button>
                <button class="tab" data-category="Tambahan" onclick="filterCategory('Tambahan')">🍲 Tambahan</button>
            </div>

            <div class="menu-items" id="menuItems">
                <!-- Menu akan di-generate oleh JavaScript dari Supabase -->
            </div>
        </div>

        <div class="menu-page" id="pesanPage">
            <div class="menu-header">
                <button class="back-btn" onclick="closePesan()">←</button>
                <h2>🛒 Pesanan Saya</h2>
                <span class="cart-count" id="pesanCount">0</span>
            </div>

            <div id="orderList" style="margin-top: 15px; color: white;">
                <p style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 18px;">Belum ada pesanan</p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px; padding-bottom: 20px;">
                <button onclick="checkout()" style="flex:1; background:#98C81C; border:none; padding:15px; border-radius:50px; color:white; font-size:clamp(14px,1.8%,20px); font-family:'Schoolbell',cursive; cursor:pointer;">💰 Checkout</button>
                <button onclick="clearOrder()" style="flex:1; background:#e74c3c; border:none; padding:15px; border-radius:50px; color:white; font-size:clamp(14px,1.8%,20px); font-family:'Schoolbell',cursive; cursor:pointer;">🗑️ Kosongkan</button>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <script>
        // ============ SUPABASE CONFIG ============
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';

        // Inisialisasi Supabase
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============ GLOBAL VARIABLES ============
        let menuItems = [];
        let orders = JSON.parse(localStorage.getItem('customer_orders')) || [];
        let currentCategory = 'all';
        let searchQuery = '';

        // ============ LOAD MENU FROM SUPABASE ============
        async function loadMenuFromSupabase() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, status_ketersediaan, kategori, gambar, created_at')
                    .order('kategori', { ascending: true });

                if (error) throw error;

                if (data && data.length > 0) {
                    menuItems = data.map(item => ({
                        id: item.id_menu,
                        name: item.nama_menu,
                        price: item.harga,
                        category: item.kategori,
                        status: item.status_ketersediaan,
                        image_url: item.gambar || null,
                        created_at: item.created_at
                    }));
                } else {
                    menuItems = getDefaultMenu();
                }

                renderMenu(currentCategory);
                updateCartCount();
            } catch (error) {
                console.error('Error loading menu:', error);
                menuItems = getDefaultMenu();
                renderMenu(currentCategory);
                updateCartCount();
                showToast('⚠️ Gagal memuat menu dari server, menggunakan data lokal');
            } finally {
                loading.classList.remove('active');
            }
        }

        // ============ GET IMAGE URL ============
        function getImageUrl(imagePath) {
            if (!imagePath) return null;

            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) {
                return imagePath;
            }

            try {
                const { data } = supabaseClient.storage
                    .from(STORAGE_BUCKET)
                    .getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) {
                console.error('Error getting image URL:', error);
                return null;
            }
        }

        // ============ DEFAULT MENU (Fallback) ============
        function getDefaultMenu() {
            return [
                { id: 1, name: 'Nasi Goreng', price: 25000, category: 'Makanan', status: 'Tersedia', image_url: null },
                { id: 2, name: 'Mie Goreng', price: 22000, category: 'Makanan', status: 'Tersedia', image_url: null },
                { id: 3, name: 'Ayam Geprek', price: 28000, category: 'Makanan', status: 'Tersedia', image_url: null },
                { id: 4, name: 'Sate Ayam', price: 35000, category: 'Makanan', status: 'Tersedia', image_url: null },
                { id: 5, name: 'Bakso', price: 20000, category: 'Makanan', status: 'Tidak Tersedia', image_url: null },
                { id: 6, name: 'Es Teh', price: 5000, category: 'Minuman', status: 'Tersedia', image_url: null },
                { id: 7, name: 'Jus Jeruk', price: 12000, category: 'Minuman', status: 'Tersedia', image_url: null },
                { id: 8, name: 'Kopi Hitam', price: 8000, category: 'Minuman', status: 'Tersedia', image_url: null },
                { id: 9, name: 'Es Campur', price: 15000, category: 'Minuman', status: 'Tersedia', image_url: null },
                { id: 10, name: 'Teh Tarik', price: 10000, category: 'Minuman', status: 'Tidak Tersedia',
                image_url: null }
            ];
        }

        // ============ SEARCH FUNCTION ============
        function searchMenu() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.toLowerCase().trim();
            const clearBtn = document.getElementById('clearBtn');

            // Show/hide clear button
            if (searchQuery.length > 0) {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }

            renderMenu(currentCategory);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.remove('show');
            searchQuery = '';
            renderMenu(currentCategory);
        }

        // ============ RENDER MENU ============
        function renderMenu(category = 'all') {
            const container = document.getElementById('menuItems');
            container.innerHTML = '';

            let filtered = category === 'all' ?
                menuItems :
                menuItems.filter(item => item.category === category);

            // Apply search filter
            if (searchQuery) {
                filtered = filtered.filter(item =>
                    item.name.toLowerCase().includes(searchQuery)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                            <div style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 18px;">
                                ${searchQuery ? '🔍 Tidak ada menu yang cocok dengan "' + searchQuery + '"' : 'Tidak ada menu di kategori ini'}
                            </div>
                        `;
                return;
            }

            filtered.forEach(item => {
                const existing = orders.find(o => o.id === item.id);
                const qty = existing ? existing.qty : 0;
                const isAvailable = item.status === 'Tersedia';

                let imageUrl = 'https://placehold.co/50x50/2d2d2d/ffffff?text=Menu';
                if (item.image_url) {
                    const url = getImageUrl(item.image_url);
                    if (url) imageUrl = url;
                }

                const row = document.createElement('div');
                row.className = `menu-item-row ${!isAvailable ? 'disabled' : ''}`;
                row.innerHTML = `
                            <div class="item-info">
                                <img class="item-image" src="${imageUrl}" alt="${item.name}" loading="lazy" 
                                     onerror="this.src='https://placehold.co/50x50/2d2d2d/ffffff?text=Menu'">
                                <div class="item-details">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">Rp ${item.price.toLocaleString()}</div>
                                    <div class="item-status ${isAvailable ? 'available' : 'unavailable'}">
                                        ${isAvailable ? '✅ Tersedia' : '❌ Tidak Tersedia'}
                                    </div>
                                </div>
                            </div>
                            <div class="item-controls">
                                <button class="btn-minus" onclick="updateQty(${item.id}, -1, '${item.name}', ${item.price})">−</button>
                                <input type="number" class="qty-input" id="qty_${item.id}" 
                                       value="${qty}" min="0" 
                                       onchange="onQtyChange(${item.id}, '${item.name}', ${item.price}, this.value)"
                                       onfocus="this.select()"
                                       ${!isAvailable ? 'disabled' : ''}>
                                <button class="btn-plus" onclick="updateQty(${item.id}, 1, '${item.name}', ${item.price})">+</button>
                            </div>
                        `;
                container.appendChild(row);
            });
        }

        // ============ FUNGSI QTY ============
        function updateQty(id, change, name, price) {
            const input = document.getElementById(`qty_${id}`);
            if (!input) return;

            let currentQty = parseInt(input.value) || 0;
            let newQty = currentQty + change;

            if (newQty < 0) newQty = 0;

            input.value = newQty;

            const existing = orders.find(item => item.id === id);
            if (newQty <= 0) {
                if (existing) {
                    const index = orders.indexOf(existing);
                    orders.splice(index, 1);
                }
            } else {
                if (existing) {
                    existing.qty = newQty;
                } else {
                    orders.push({ id, name, price, qty: newQty });
                }
            }

            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();

            if (change > 0 && newQty > 0) {
                showToast(`✅ ${name} x${newQty}`);
            }
        }

        function onQtyChange(id, name, price, value) {
            const qty = parseInt(value) || 0;

            const existing = orders.find(item => item.id === id);
            if (qty <= 0) {
                if (existing) {
                    const index = orders.indexOf(existing);
                    orders.splice(index, 1);
                }
            } else {
                if (existing) {
                    existing.qty = qty;
                } else {
                    orders.push({ id, name, price, qty });
                }
            }

            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();
        }

        // ============ FILTER KATEGORI ============
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderMenu(category);
        }

        // ============ UPDATE CART COUNT ============
        function updateCartCount() {
            const total = orders.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = total;
            document.getElementById('pesanCount').textContent = total;
        }

        // ============ UPDATE ORDER LIST ============
        function updateOrderList() {
            const container = document.getElementById('orderList');
            if (orders.length === 0) {
                container.innerHTML =
                    '<p style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 18px;">Belum ada pesanan</p>';
                return;
            }

            let html = '<div style="max-height: 500px; overflow-y: auto;">';
            let total = 0;
            orders.forEach((item, index) => {
                total += item.price * item.qty;
                const menuItem = menuItems.find(m => m.id === item.id);
                let imageUrl = 'https://placehold.co/40x40/2d2d2d/ffffff?text=Menu';
                if (menuItem?.image_url) {
                    const url = getImageUrl(menuItem.image_url);
                    if (url) imageUrl = url;
                }

                html += `
                            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1);">
                                <div style="display: flex; align-items: center; gap: 12px; flex:1; min-width:0;">
                                    <img src="${imageUrl}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;" 
                                         onerror="this.src='https://placehold.co/40x40/2d2d2d/ffffff?text=Menu'">
                                    <div style="flex:1; min-width:0;">
                                        <div style="color: white; font-size: clamp(14px,1.8%,18px); font-weight: 600;">${item.name}</div>
                                        <div style="color: #98C81C; font-size: clamp(12px,1.5%,16px);">Rp ${(item.price * item.qty).toLocaleString()}</div>
                                        <div style="color: rgba(255,255,255,0.6); font-size: clamp(10px,1.2%,14px);">x${item.qty}</div>
                                    </div>
                                </div>
                                <div style="display: flex; gap: 8px; align-items: center; flex-shrink: 0;">
                                    <button onclick="updateQtyPesan(${index}, -1)" style="background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; display:flex; align-items:center; justify-content:center;">−</button>
                                    <span style="color: white; font-weight: 600; min-width: 30px; text-align: center;">${item.qty}</span>
                                    <button onclick="updateQtyPesan(${index}, 1)" style="background: #98C81C; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; display:flex; align-items:center; justify-content:center;">+</button>
                                </div>
                            </div>
                        `;
            });
            html += `
                        <div style="padding: 15px; background: rgba(152, 200, 28, 0.2); border-radius: 12px; margin-top: 10px; border: 1px solid #98C81C;">
                            <div style="display: flex; justify-content: space-between; color: white; font-size: clamp(16px,2%,20px); font-weight: 700;">
                                <span>Total</span>
                                <span style="color: #98C81C;">Rp ${total.toLocaleString()}</span>
                            </div>
                        </div>
                    `;
            html += '</div>';
            container.innerHTML = html;
        }

        function updateQtyPesan(index, change) {
            if (orders[index].qty + change <= 0) {
                orders.splice(index, 1);
            } else {
                orders[index].qty += change;
            }
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateOrderList();
            updateCartCount();

            if (document.getElementById('menuPage').classList.contains('active')) {
                renderMenu(currentCategory);
            }
        }

        // ============ OPEN / CLOSE MENU ============
        function openMenu() {
            document.getElementById('menuPage').classList.add('active');
            renderMenu(currentCategory);
            updateCartCount();
        }

        function closeMenu() {
            document.getElementById('menuPage').classList.remove('active');
        }

        function openPesan() {
            document.getElementById('pesanPage').classList.add('active');
            updateOrderList();
            updateCartCount();
        }

        function closePesan() {
            document.getElementById('pesanPage').classList.remove('active');
        }

        // ============ CLEAR ORDER ============
        function clearOrder() {
            if (orders.length === 0) return;
            if (confirm('Yakin ingin mengosongkan semua pesanan?')) {
                orders = [];
                localStorage.setItem('customer_orders', JSON.stringify(orders));
                updateOrderList();
                updateCartCount();
                if (document.getElementById('menuPage').classList.contains('active')) {
                    renderMenu(currentCategory);
                }
            }
        }

        // ============ CHECKOUT ============
        function checkout() {
            if (orders.length === 0) {
                alert('⚠️ Belum ada pesanan!');
                return;
            }

            let total = orders.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let message = '📋 Pesanan Anda:\n\n';
            orders.forEach((item, index) => {
                message += `${index + 1}. ${item.name} x${item.qty} - Rp ${(item.price * item.qty).toLocaleString()}\n`;
            });
            message += `\n💰 Total: Rp ${total.toLocaleString()}`;
            message += `\n\n✅ Pesanan berhasil dikirim!`;

            alert(message);

            orders = [];
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateOrderList();
            updateCartCount();
            closePesan();
            if (document.getElementById('menuPage').classList.contains('active')) {
                renderMenu(currentCategory);
            }
        }

        // ============ TOAST ============
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => {
                toast.className = 'toast';
            }, 2000);
        }

        // ============ INIT ============
        window.addEventListener('DOMContentLoaded', function() {
            loadMenuFromSupabase();
        });
    </script>
</body>
