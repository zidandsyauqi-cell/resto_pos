<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        body {
            font-family: 'Poppins', sans-serif;
        }

        .customer-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER: Logo Kiri + Teks Kanan ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 10px 12px;
            padding-top: env(safe-area-inset-top, 10px);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            min-height: 60px;
        }
        .header-top .logo-left {
            width: clamp(80px, 25%, 250px);
            height: auto;
            flex-shrink: 0;
        }
        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }
        .header-top .title-right {
            color: white;
            font-size: clamp(20px, 6%, 70px);
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* ===== MEJA & NAMA ===== */
        .meja-info {
            position: absolute;
            right: 12px;
            top: calc(env(safe-area-inset-top, 10px) + 8px);
            z-index: 11;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 4px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: clamp(11px, 1.4%, 18px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }
        .meja-info span {
            color: #98C81C;
        }
        .customer-name-display {
            position: absolute;
            right: 12px;
            top: calc(env(safe-area-inset-top, 10px) + 46px);
            z-index: 11;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 3px 12px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: clamp(9px, 1.1%, 14px);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }
        .customer-name-display span {
            color: #98C81C;
        }

        /* ===== WRAPPER KONTEN TENGAH ===== */
        .content-wrapper {
            flex: 1;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 5% 20px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* ===== BOX MENU ===== */
        .box-menu {
            width: 82%;
            max-width: 600px;
            height: 22%;
            margin-bottom: 2.5%;
            overflow: hidden;
            border-radius: 65px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }
        .box-menu:hover {
            transform: scale(1.02);
        }
        .box-menu:active {
            transform: scale(0.98);
        }
        .box-menu .bg-hijau {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }
        .box-menu .label-menu {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 5.5%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        /* ===== BOX PESAN ===== */
        .box-pesan {
            width: 82%;
            max-width: 600px;
            height: 22%;
            margin-bottom: 2.5%;
            overflow: hidden;
            border-radius: 65px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }
        .box-pesan:hover {
            transform: scale(1.02);
        }
        .box-pesan:active {
            transform: scale(0.98);
        }
        .box-pesan .bg-hijau {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }
        .box-pesan .label-pesan {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 5.5%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        /* ===== BOX STATUS ===== */
        .box-status {
            width: 82%;
            max-width: 600px;
            height: 22%;
            background: #98C81C;
            border-radius: 65px;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }
        .box-status:hover {
            transform: scale(1.02);
        }
        .box-status:active {
            transform: scale(0.98);
        }
        .box-status .label-status {
            color: white;
            font-size: clamp(24px, 5.5%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        /* ===== RESPONSIVE ===== */

        /* Portrait */
        @media screen and (orientation: portrait) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan,
            .box-status {
                border-radius: 65px;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 65px;
            }
            .box-menu {
                height: 22%;
            }
            .box-pesan {
                height: 22%;
            }
            .box-status {
                height: 22%;
            }
            .content-wrapper {
                padding: 10px 5% 20px;
                gap: 0;
            }
        }

        /* ===== LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }

            .header-top {
                padding: 6px 12px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .header-top .logo-left {
                width: clamp(40px, 10%, 140px);
            }
            .header-top .title-right {
                font-size: clamp(14px, 3%, 35px);
            }

            .meja-info {
                padding: 2px 10px;
                font-size: clamp(9px, 1%, 13px);
                top: calc(env(safe-area-inset-top, 6px) + 4px);
                right: 10px;
            }
            .customer-name-display {
                padding: 2px 8px;
                font-size: clamp(7px, 0.8%, 11px);
                top: calc(env(safe-area-inset-top, 6px) + 32px);
                right: 10px;
            }

            .content-wrapper {
                padding: 6px 10% 12px;
                padding-bottom: env(safe-area-inset-bottom, 12px);
                justify-content: center;
            }

            .box-menu,
            .box-pesan,
            .box-status {
                width: 65%;
                max-width: 450px;
                height: 16%;
                border-radius: 35px;
                margin-bottom: 1.8%;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 35px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(14px, 2.8%, 32px);
            }
        }

        /* ===== HP PORTRAIT ===== */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan,
            .box-status {
                border-radius: 40px;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 40px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(20px, 5%, 45px);
            }
            .meja-info {
                padding: 4px 12px;
                font-size: 12px;
                top: calc(env(safe-area-inset-top, 8px) + 6px);
            }
            .customer-name-display {
                padding: 3px 10px;
                font-size: 10px;
                top: calc(env(safe-area-inset-top, 8px) + 44px);
            }
            .header-top .logo-left {
                width: 100px;
            }
            .header-top .title-right {
                font-size: 24px;
            }
            .box-menu {
                height: 22%;
            }
            .box-pesan {
                height: 22%;
            }
            .box-status {
                height: 22%;
            }
        }

        /* ===== HP KECIL PORTRAIT ===== */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .customer-container {
                border-radius: 0;
            }
            .box-menu,
            .box-pesan,
            .box-status {
                border-radius: 30px;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 30px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(16px, 4%, 35px);
            }
            .meja-info {
                padding: 3px 10px;
                font-size: 11px;
                top: calc(env(safe-area-inset-top, 6px) + 4px);
            }
            .customer-name-display {
                padding: 2px 8px;
                font-size: 9px;
                top: calc(env(safe-area-inset-top, 6px) + 38px);
            }
            .header-top .logo-left {
                width: 70px;
            }
            .header-top .title-right {
                font-size: 20px;
            }
            .box-menu {
                height: 20%;
            }
            .box-pesan {
                height: 20%;
            }
            .box-status {
                height: 20%;
            }
        }

        /* ===== TABLET PORTRAIT ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan,
            .box-status {
                width: 70%;
                max-width: 500px;
                height: 20%;
                border-radius: 50px;
                margin-bottom: 2%;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 50px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(28px, 5%, 55px);
            }
            .header-top .logo-left {
                width: clamp(120px, 30%, 280px);
            }
            .header-top .title-right {
                font-size: clamp(28px, 6%, 65px);
            }
            .meja-info {
                padding: 6px 18px;
                font-size: 16px;
                top: calc(env(safe-area-inset-top, 10px) + 8px);
            }
            .customer-name-display {
                padding: 5px 16px;
                font-size: 14px;
                top: calc(env(safe-area-inset-top, 10px) + 48px);
            }
        }

        /* ===== TABLET LANDSCAPE ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan,
            .box-status {
                width: 55%;
                max-width: 400px;
                height: 17%;
                border-radius: 35px;
                margin-bottom: 1.8%;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 35px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(16px, 3.2%, 38px);
            }
            .header-top .logo-left {
                width: clamp(60px, 18%, 160px);
            }
            .header-top .title-right {
                font-size: clamp(16px, 4.5%, 45px);
            }
            .header-top {
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .meja-info {
                padding: 3px 12px;
                font-size: 11px;
                top: calc(env(safe-area-inset-top, 6px) + 4px);
            }
            .customer-name-display {
                padding: 2px 10px;
                font-size: 9px;
                top: calc(env(safe-area-inset-top, 6px) + 32px);
            }
        }

        /* ===== DESKTOP LANDSCAPE ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan,
            .box-status {
                width: 50%;
                max-width: 500px;
                height: 16%;
                border-radius: 45px;
                margin-bottom: 1.8%;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 45px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(20px, 3.5%, 48px);
            }
            .header-top .logo-left {
                width: clamp(80px, 20%, 220px);
            }
            .header-top .title-right {
                font-size: clamp(20px, 5%, 55px);
            }
            .meja-info {
                padding: 4px 14px;
                font-size: 13px;
                top: calc(env(safe-area-inset-top, 8px) + 4px);
            }
            .customer-name-display {
                padding: 3px 12px;
                font-size: 11px;
                top: calc(env(safe-area-inset-top, 8px) + 36px);
            }
        }

        /* ===== LANDSCAPE HP KECIL ===== */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }

            .box-menu,
            .box-pesan,
            .box-status {
                width: 55%;
                max-width: 320px;
                height: 14%;
                border-radius: 25px;
                margin-bottom: 1.5%;
            }
            .box-menu .bg-hijau,
            .box-pesan .bg-hijau,
            .box-status .bg-hijau {
                border-radius: 25px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(11px, 2%, 24px);
            }

            .header-top .logo-left {
                width: 40px;
            }
            .header-top .title-right {
                font-size: 12px;
            }
            .header-top {
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 32px;
                gap: 4px;
            }

            .meja-info {
                font-size: 8px;
                padding: 2px 6px;
                top: calc(env(safe-area-inset-top, 4px) + 2px);
                right: 6px;
            }
            .customer-name-display {
                font-size: 6px;
                padding: 1px 6px;
                top: calc(env(safe-area-inset-top, 4px) + 22px);
                right: 6px;
            }

            .content-wrapper {
                padding: 4px 5% 8px;
                padding-bottom: env(safe-area-inset-bottom, 8px);
            }
        }

        /* Fallback untuk browser yang tidak support safe-area */
        @supports not (padding: env(safe-area-inset-top)) {
            .header-top {
                padding-top: 10px;
            }
            .meja-info {
                top: 18px;
            }
            .customer-name-display {
                top: 56px;
            }
            .content-wrapper {
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <!-- Background utama dengan bg.png -->
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <!-- Meja & Nama -->
        <div class="meja-info" id="mejaInfo">Meja <span id="mejaNumber">1</span></div>
        <div class="customer-name-display" id="customerNameDisplay"><span id="namaCustomer">Customer</span></div>

        <!-- HEADER: Logo Kiri + Teks Kanan -->
        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <!-- CONTENT WRAPPER - SEMUA KONTEN DI TENGAH -->
        <div class="content-wrapper">
            <!-- MENU -->
            <div class="box-menu" onclick="window.location.href='customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
                <div class="bg-hijau"></div>
                <div class="label-menu">MENU</div>
            </div>

            <!-- PESAN -->
            <div class="box-pesan" onclick="window.location.href='customer_order_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
                <div class="bg-hijau"></div>
                <div class="label-pesan">PESAN</div>
            </div>

            <!-- STATUS PESANAN -->
            <div class="box-status" onclick="window.location.href='customer_order_status.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
                <div class="label-status">STATUS PESANAN</div>
            </div>
        </div>
    </div>

    <script>
        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }

        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        document.getElementById('mejaNumber').textContent = mejaNumber;
        document.getElementById('namaCustomer').textContent = namaCustomer;
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);
    </script>
</body>
</html>
