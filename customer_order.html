<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RestoPOS - Menu Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .customer-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* Dekorasi background */
        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.1;
        }

        .deco-bg img:nth-child(1) {
            width: 182%;
            height: 68.2%;
            left: -10.6%;
            top: 101.2%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        /* Overlay */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }

        /* Logo kiri atas */
        .logo-left {
            position: absolute;
            left: 4.9%;
            top: 3%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-left img {
            width: clamp(50px, 9.4%, 101px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-left .brand-text {
            color: white;
            font-size: clamp(14px, 3%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-left .brand-text span {
            color: #98C81C;
        }

        /* Tombol Selesai */
        .btn-selesai {
            position: absolute;
            right: 6.5%;
            top: 3.6%;
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: clamp(8px, 1.5%, 15px) clamp(20px, 3%, 40px);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-selesai:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(237, 27, 36, 0.5);
        }

        .btn-selesai:active {
            transform: scale(0.95);
        }

        .btn-selesai span {
            color: white;
            font-size: clamp(18px, 4.2%, 45px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        /* Search box */
        .search-box {
            position: absolute;
            left: 4.1%;
            top: 10.8%;
            width: 91.9%;
            height: 4.6%;
            border-radius: 50px;
            border: 3px solid white;
            z-index: 5;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
        }

        .search-box img {
            width: clamp(25px, 6.2%, 67px);
            height: auto;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: clamp(16px, 4.6%, 50px);
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(16px, 4.6%, 50px);
            font-family: 'Schoolbell', cursive;
        }

        /* Judul MAKANAN */
        .title-makanan {
            position: absolute;
            left: 4.1%;
            top: 17.2%;
            color: white;
            font-size: clamp(30px, 6.9%, 75px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 5;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Menu Item 1 - Iga Bakar */
        .menu-item1 {

            left: 4.8%;
            top: 23.1%;
            width: 37%;
            height: 20.8%;
            overflow: hidden;
            z-index: 5;

        .menu-item1:hover {

        .menu-item1 img {

        /* Garis pemisah 1 */

        /* Gambar overlay untuk menu items */
        .menu-item1 .gambar1,
        .menu-item2 .gambar2,

            width: 100%;

            object-fit: cover;
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .customer-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .search-box input::placeholder {
                font-size: 14px;
            }

            .btn-tambah1,
            .btn-tambah2,
            .btn-tambah3 {
                height: 3.5%;
            }
        }

        @media screen and (max-width: 480px) {
            .customer-container {
                border-radius: 10px;
            }

            .search-box {
                padding: 0 10px;
                height: 4%;
            }

            .search-box input {
                font-size: 12px;
            }

            .search-box input::placeholder {
                font-size: 12px;
            }

            .btn-selesai {
                padding: 5px 12px;
            }

            .btn-selesai span {
                font-size: 14px;
            }

            .menu-item2,
            .menu-item3 {
                height: 18%;
            }

            .btn-tambah2,
            .btn-tambah3 {
                height: 3%;

            }

            .btn-tambah1 span,
            .btn-tambah2 span,
            .btn-tambah3 span {

            }

            .title-makanan {

            }

            }

            .menu-price1,

            .menu-price3 {

            }

            .btn-tambah1 span,
            .btn-tambah2 span,
            .btn-tambah3 span {

            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .title-makanan {
                font-size: 20px;
                top: 15%;
            }

            .menu-name1,
            .menu-name2,
            .menu-name3 {

            }

            .btn-tambah2 span,
            .btn-tambah3 span {

            .logo-left .brand-text {

            }

            .logo-left img {

            }

        /* Toast notification */
        .toast {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: 20px;
            z-index: 100;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }

<body>
    <div class="customer-container">
        <!-- Dekorasi background -->
        <div class="deco-bg">
            <img src="https://placehold.co/1965x1310/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Logo -->
        <div class="logo-left">
            <img src="https://placehold.co/101x101/98C81C/ffffff?text=🍽️" alt="Logo" loading="lazy" />
            <div class="brand-text">Resto<span>POS</span></div>
        </div>

        <!-- Tombol Selesai -->
        <div class="btn-selesai" onclick="selesai()">
            <span>selesai</span>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <img src="https://placehold.co/67x67/ffffff/ffffff?text=🔍" alt="Search" loading="lazy" />
            <input type="text" placeholder="mau pesan apa hari ini?" id="searchInput" onkeyup="filterMenu()">
        </div>

        <!-- Judul MAKANAN -->
        <div class="title-makanan">MAKANAN</div>

        <!-- Menu Item 1 - Iga Bakar -->
        <div class="menu-item1" id="menu1" onclick="tambahPesanan('Iga Bakar', 45000)">
            <img src="https://placehold.co/400x400/2d2d2d/ffffff?text=Iga+Bakar" alt="Iga Bakar" class="gambar1" />
            <div class="gambar-overlay"></div>
        </div>
        <div class="menu-name1">Iga Bakar</div>
        <div class="menu-price1">Rp 45.000</div>
        <div class="btn-tambah1" onclick="event.stopPropagation(); tambahPesanan('Iga Bakar', 45000)">
            <span>tambah</span>
        </div>

        <!-- Garis 1 -->
        <div class="line1"></div>

        <!-- Menu Item 2 - Iga Bakar Jumbo -->
        <div class="menu-item2" id="menu2" onclick="tambahPesanan('Iga Bakar Jumbo', 250000)">
            <img src="https://placehold.co/400x400/2d2d2d/ffffff?text=Iga+Bakar+Jumbo" alt="Iga Bakar Jumbo" class="gambar2" />
            <div class="gambar-overlay"></div>
        </div>
        <div class="menu-name2">Iga Bakar Jumbo</div>
        <div class="menu-price2">Rp 250.000</div>
        <div class="btn-tambah2" onclick="event.stopPropagation(); tambahPesanan('Iga Bakar Jumbo', 250000)">
            <span>tambah</span>
        </div>

        <!-- Garis 2 -->
        <div class="line2"></div>

        <!-- Menu Item 3 - Sate Potong -->
        <div class="menu-item3" id="menu3" onclick="tambahPesanan('Sate Potong', 45000)">
            <img src="https://placehold.co/400x400/2d2d2d/ffffff?text=Sate+Potong" alt="Sate Potong" class="gambar3" />
            <div class="gambar-overlay"></div>
        </div>
        <div class="menu-name3">Sate Potong</div>
        <div class="menu-price3">Rp 45.000</div>
        <div class="btn-tambah3" onclick="event.stopPropagation(); tambahPesanan('Sate Potong', 45000)">
            <span>tambah</span>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('customer_orders')) || [];

        function tambahPesanan(nama, harga) {
            orders.push({ nama, harga, qty: 1 });
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            
            // Show toast
            const toast = document.getElementById('toast');
            toast.textContent = `✅ ${nama} ditambahkan!`;
            toast.className = 'toast show';
            
            setTimeout(() => {
                toast.className = 'toast';
            }, 2000);
        }

        function selesai() {
            if (orders.length === 0) {
                alert('⚠️ Belum ada pesanan!');
                return;
            }

            let total = orders.reduce((sum, item) => sum + (item.harga * item.qty), 0);
            let message = '📋 Pesanan Anda:\n\n';
            orders.forEach((item, index) => {
                message += `${index + 1}. ${item.nama} x${item.qty} - Rp ${(item.harga * item.qty).toLocaleString()}\n`;
            });
            message += `\n💰 Total: Rp ${total.toLocaleString()}`;
            message += `\n\n✅ Pesanan berhasil dikirim!`;
            
            alert(message);
            
            // Clear orders after checkout
            orders = [];
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            
            // Redirect ke halaman utama customer
            window.location.href = 'customer_dashboard.html';
        }

        function filterMenu() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const menus = [
                { id: 'menu1', name: 'Iga Bakar' },
                { id: 'menu2', name: 'Iga Bakar Jumbo' },
                { id: 'menu3', name: 'Sate Potong' }
            ];

            menus.forEach(menu => {
                const element = document.getElementById(menu.id);
                if (menu.name.toLowerCase().includes(search)) {
                    element.style.display = 'block';
                    // Show related text
                    document.querySelector(`.menu-name${menu.id.slice(-1)}`).style.display = 'block';
                    document.querySelector(`.menu-price${menu.id.slice(-1)}`).style.display = 'block';
                    document.querySelector(`.btn-tambah${menu.id.slice(-1)}`).style.display = 'flex';
                } else {
                    element.style.display = 'none';
                    document.querySelector(`.menu-name${menu.id.slice(-1)}`).style.display = 'none';
                    document.querySelector(`.menu-price${menu.id.slice(-1)}`).style.display = 'none';
                    document.querySelector(`.btn-tambah${menu.id.slice(-1)}`).style.display = 'none';
                }
            });
        }

        // Enter key support for search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                filterMenu();
            }
        });

        // Load orders from localStorage
        window.addEventListener('load', function() {
            const savedOrders = localStorage.getItem('customer_orders');
            if (savedOrders) {
                orders = JSON.parse(savedOrders);
            }
        });
    </script>
</body>
</html>
