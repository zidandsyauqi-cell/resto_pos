<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RestoPOS - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .customer-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .logo-top {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        .title-main {
            position: absolute;
            left: 39.5%;
            top: 7%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 5;
            line-height: 1.1;
            letter-spacing: 2px;
            width: 55.6%;
        }

        .box-menu {
            position: absolute;
            width: 82.2%;
            height: 28.6%;
            left: 8.9%;
            top: 24%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-menu:hover {
            transform: scale(1.02);
        }

        .box-menu:active {
            transform: scale(0.98);
        }

        .box-menu .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
        }

        .box-menu .label-menu {
            position: absolute;
            left: 3.5%;
            top: 14.2%;
            text-align: center;
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .box-menu .gambar1 {
            position: absolute;
            width: 59.7%;
            height: 81.1%;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 1;
        }

        .box-menu .gambar1 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-menu .gambar2 {
            position: absolute;
            width: 57.2%;
            height: 92.2%;
            left: -10.8%;
            top: 35.3%;
            overflow: hidden;
            z-index: 0;
        }

        .box-menu .gambar2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-menu .gambar3 {
            position: absolute;
            width: 45%;
            height: 74.9%;
            left: 27.6%;
            top: 44.1%;
            overflow: hidden;
            z-index: 1;
        }

        .box-menu .gambar3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan {
            position: absolute;
            width: 82.2%;
            height: 28.6%;
            left: 8.9%;
            top: 55.7%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-pesan:hover {
            transform: scale(1.02);
        }

        .box-pesan:active {
            transform: scale(0.98);
        }

        .box-pesan .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
        }

        .box-pesan .label-pesan {
            position: absolute;
            left: 3.5%;
            top: 14.2%;
            text-align: center;
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .box-pesan .gambar4 {
            position: absolute;
            width: 56.4%;
            height: 94.2%;
            left: 18.4%;
            top: 23.1%;
            overflow: hidden;
            z-index: 1;
        }

        .box-pesan .gambar4 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan .gambar5 {
            position: absolute;
            width: 49.2%;
            height: 79.1%;
            left: 46.6%;
            top: 60.4%;
            transform: rotate(107deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 0;
        }

        .box-pesan .gambar5 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan .gambar6 {
            position: absolute;
            width: 61.4%;
            height: 91.1%;
            left: 45.4%;
            top: 50.7%;
            transform: rotate(-10deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 1;
        }

        .box-pesan .gambar6 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .menu-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 50;
            display: none;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
        }

        .menu-page.active {
            display: block;
        }

        .menu-page::-webkit-scrollbar {
            width: 5px;
        }

        .menu-page::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .menu-page::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .menu-page .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 15px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10;
            border-radius: 15px 15px 0 0;
        }

        .menu-page .menu-header .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
        }

        .menu-page .menu-header .back-btn:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .menu-page .menu-header h2 {
            color: white;
            font-size: clamp(16px, 3%, 32px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .menu-page .menu-header .cart-count {
            background: #98C81C;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: clamp(12px, 1.5%, 18px);
            font-weight: 600;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 0;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tabs .tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.5%, 18px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .category-tabs .tab:hover {
            background: rgba(152, 200, 28, 0.2);
            border-color: #98C81C;
        }

        .category-tabs .tab.active {
            background: #98C81C;
            border-color: #98C81C;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0 20px 0;
        }

        .menu-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            gap: 10px;
            flex-wrap: wrap;
        }

        .menu-item-row:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(152, 200, 28, 0.3);
        }

        .menu-item-row .item-info {
            flex: 1;
            min-width: 120px;
        }

        .menu-item-row .item-info .item-name {
            color: white;
            font-size: clamp(14px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .menu-item-row .item-info .item-price {
            color: #98C81C;
            font-size: clamp(12px, 1.5%, 20px);
            font-weight: 600;
        }

        .menu-item-row .item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .menu-item-row .item-controls .btn-minus {
            width: 36px;
            height: 36px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .menu-item-row .item-controls .btn-minus:hover {
            transform: scale(1.1);
            background: #c0392b;
        }

        .menu-item-row .item-controls .btn-minus:active {
            transform: scale(0.9);
        }

        .menu-item-row .item-controls .qty-input {
            width: clamp(50px, 6%, 70px);
            padding: 6px 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: clamp(16px, 1.8%, 22px);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .menu-item-row .item-controls .qty-input:focus {
            border-color: #98C81C;
            outline: none;
            background: rgba(255,255,255,0.2);
        }

        .menu-item-row .item-controls .qty-input::-webkit-inner-spin-button,
        .menu-item-row .item-controls .qty-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .menu-item-row .item-controls .qty-input[type=number] {
            -moz-appearance: textfield;
        }

        .menu-item-row .item-controls .btn-plus {
            width: 36px;
            height: 36px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .menu-item-row .item-controls .btn-plus:hover {
            transform: scale(1.1);
            background: #7aa814;
        }

        .menu-item-row .item-controls .btn-plus:active {
            transform: scale(0.9);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(14px, 2%, 24px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .customer-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .menu-item-row {
                padding: 10px 12px;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 45px;
                padding: 4px 6px;
                font-size: 14px;
            }
        }

        @media screen and (max-width: 480px) {
            .customer-container {
                border-radius: 10px;
            }

            .menu-item-row {
                padding: 8px 10px;
                flex-wrap: wrap;
            }

            .menu-item-row .item-info {
                min-width: 100px;
            }

            .menu-item-row .item-controls {
                flex: 1;
                justify-content: flex-end;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 40px;
                padding: 3px 4px;
                font-size: 13px;
            }
        }

        @media screen and (max-width: 360px) {
            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 35px;
                padding: 2px 3px;
                font-size: 12px;
            }

            .menu-item-row .item-info .item-name {
                font-size: 12px;
            }

            .menu-item-row .item-info .item-price {
                font-size: 10px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .menu-item-row {
                padding: 6px 10px;
            }

            .menu-item-row .item-controls .btn-minus,
            .menu-item-row .item-controls .btn-plus {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .menu-item-row .item-controls .qty-input {
                width: 35px;
                padding: 2px 4px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <div class="logo-top">
            <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo RestoPOS" loading="lazy" />
            <div class="brand-text">Resto<span>POS</span></div>
        </div>

        <div class="title-main">
            WILUJENG<br>SUMPING!
        </div>

        <div class="box-menu" onclick="openMenu()">
            <div class="bg-hijau"></div>
            <div class="label-menu">📋 MENU</div>
            <div class="gambar1">
                <img src="https://placehold.co/530x445/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar2">
                <img src="https://placehold.co/477x493/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar3">
                <img src="https://placehold.co/400x411/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
        </div>

        <div class="box-pesan" onclick="openPesan()">
            <div class="bg-hijau"></div>
            <div class="label-pesan">🛒 PESAN</div>
            <div class="gambar4">
                <img src="https://placehold.co/501x517/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar5">
                <img src="https://placehold.co/545x547/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar6">
                <img src="https://placehold.co/626x590/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
        </div>

        <div class="menu-page" id="menuPage">
            <div class="menu-header">
                <button class="back-btn" onclick="closeMenu()">←</button>
                <h2>📋 Menu</h2>
                <span class="cart-count" id="cartCount">0</span>
            </div>

            <div class="category-tabs" id="categoryTabs">
                <button class="tab active" data-category="all" onclick="filterCategory('all')">Semua</button>
                <button class="tab" data-category="makanan" onclick="filterCategory('makanan')">🍚 Makanan</button>
                <button class="tab" data-category="tambahan" onclick="filterCategory('tambahan')">🍲 Tambahan</button>
                <button class="tab" data-category="minuman" onclick="filterCategory('minuman')">🥤 Minuman</button>
                <button class="tab" data-category="jangkung" onclick="filterCategory('jangkung')">☕ Jangkung Kopi</button>
                <button class="tab" data-category="kopi" onclick="filterCategory('kopi')">☕ Kopi</button>
            </div>

            <div class="menu-items" id="menuItems">
            </div>
        </div>

        <div class="menu-page" id="pesanPage">
            <div class="menu-header">
                <button class="back-btn" onclick="closePesan()">←</button>
                <h2>🛒 Pesanan Saya</h2>
                <span class="cart-count" id="pesanCount">0</span>
            </div>

            <div id="orderList" style="margin-top: 15px; color: white;">
                <p style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 18px;">Belum ada pesanan</p>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px; padding-bottom: 20px;">
                <button onclick="checkout()" style="flex:1; background:#98C81C; border:none; padding:15px; border-radius:50px; color:white; font-size:clamp(14px,1.8%,20px); font-family:'Schoolbell',cursive; cursor:pointer;">💰 Checkout</button>
                <button onclick="clearOrder()" style="flex:1; background:#e74c3c; border:none; padding:15px; border-radius:50px; color:white; font-size:clamp(14px,1.8%,20px); font-family:'Schoolbell',cursive; cursor:pointer;">🗑️ Kosongkan</button>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        const menuItems = [
            { id: 1, name: 'Iga Bakar', price: 45000, category: 'makanan' },
            { id: 2, name: 'Iga Bakar Jumbo', price: 250000, category: 'makanan' },
            { id: 3, name: 'Sate Potong', price: 45000, category: 'makanan' },

            { id: 7, name: 'Nasi Putih', price: 8000, category: 'tambahan' },
            { id: 8, name: 'Kerupuk/Emping', price: 7000, category: 'tambahan' },
            { id: 9, name: 'Air Mineral', price: 7000, category: 'tambahan' },
            { id: 10, name: 'Jeruk', price: 15000, category: 'tambahan' },
            { id: 11, name: 'Lemon Tea', price: 15000, category: 'minuman' },
            { id: 12, name: 'Teh Manis', price: 10000, category: 'minuman' },
            { id: 13, name: 'Teh Tawar', price: 3000, category: 'minuman' },
            { id: 14, name: 'Teh Botol', price: 7000, category: 'minuman' },
            { id: 15, name: 'Tebs', price: 7000, category: 'minuman' },
            { id: 16, name: 'Fruit Tea', price: 7000, category: 'minuman' },
            { id: 17, name: 'Benecol', price: 10000, category: 'minuman' },
            { id: 18, name: 'Americano/Long Black', price: 20000, category: 'jangkung' },
            { id: 19, name: 'Kopi Tubruk', price: 20000, category: 'jangkung' },
            { id: 20, name: 'Kopi Sanger', price: 25000, category: 'jangkung' },
            { id: 21, name: 'Kopi Gula Aren', price: 35000, category: 'kopi' },
            { id: 22, name: 'Latte', price: 30000, category: 'kopi' },
            { id: 23, name: 'Flavored Latte', price: 30000, category: 'kopi' },
            { id: 24, name: 'Espresso', price: 20000, category: 'kopi' },
            { id: 25, name: 'Cold Brew', price: 30000, category: 'kopi' },
            { id: 26, name: 'Kopi Botol', price: 35000, category: 'kopi' }
        ];

        let orders = JSON.parse(localStorage.getItem('customer_orders')) || [];
        let currentCategory = 'all';

        function renderMenu(category = 'all') {
            const container = document.getElementById('menuItems');
            container.innerHTML = '';
            
            const filtered = category === 'all' ? menuItems : menuItems.filter(item => item.category === category);
            
            filtered.forEach(item => {
                const existing = orders.find(o => o.id === item.id);
                const qty = existing ? existing.qty : 0;
                
                const row = document.createElement('div');
                row.className = 'menu-item-row';
                row.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">Rp ${item.price.toLocaleString()}</div>
                    </div>
                    <div class="item-controls">
                        <button class="btn-minus" onclick="updateQty(${item.id}, -1, '${item.name}', ${item.price})">−</button>
                        <input type="number" class="qty-input" id="qty_${item.id}" 
                               value="${qty}" min="0" 
                               onchange="onQtyChange(${item.id}, '${item.name}', ${item.price}, this.value)"
                               onfocus="this.select()">
                        <button class="btn-plus" onclick="updateQty(${item.id}, 1, '${item.name}', ${item.price})">+</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function updateQty(id, change, name, price) {
            const input = document.getElementById(`qty_${id}`);
            let currentQty = parseInt(input.value) || 0;
            let newQty = currentQty + change;
            
            if (newQty < 0) newQty = 0;
            
            input.value = newQty;
            
            // Update order
            const existing = orders.find(item => item.id === id);
            if (newQty <= 0) {
                if (existing) {
                    const index = orders.indexOf(existing);
                    orders.splice(index, 1);
                }
            } else {
                if (existing) {
                    existing.qty = newQty;
                } else {
                    orders.push({ id, name, price, qty: newQty });
                }
            }
            
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();
            
            // Show toast if adding
            if (change > 0 && newQty > 0) {
                showToast(`✅ ${name} x${newQty}`);
            }
        }

        function onQtyChange(id, name, price, value) {
            const qty = parseInt(value) || 0;
            
            const existing = orders.find(item => item.id === id);
            if (qty <= 0) {
                if (existing) {
                    const index = orders.indexOf(existing);
                    orders.splice(index, 1);
                }
            } else {
                if (existing) {
                    existing.qty = qty;
                } else {
                    orders.push({ id, name, price, qty });
                }
            }
            
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateCartCount();
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderMenu(category);
        }

        function updateCartCount() {
            const total = orders.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = total;
            document.getElementById('pesanCount').textContent = total;
        }

        function updateOrderList() {
            const container = document.getElementById('orderList');
            if (orders.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 18px;">Belum ada pesanan</p>';
                return;
            }

            let html = '<div style="max-height: 500px; overflow-y: auto;">';
            let total = 0;
            orders.forEach((item, index) => {
                total += item.price * item.qty;
                html += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1);">
                        <div style="flex:1; min-width:0;">
                            <div style="color: white; font-size: clamp(14px,1.8%,18px); font-weight: 600;">${item.name}</div>
                            <div style="color: #98C81C; font-size: clamp(12px,1.5%,16px);">Rp ${(item.price * item.qty).toLocaleString()}</div>
                            <div style="color: rgba(255,255,255,0.6); font-size: clamp(10px,1.2%,14px);">x${item.qty}</div>
                        </div>
                        <div style="display: flex; gap: 8px; align-items: center; flex-shrink: 0;">
                            <button onclick="updateQtyPesan(${index}, -1)" style="background: #e74c3c; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; display:flex; align-items:center; justify-content:center;">−</button>
                            <span style="color: white; font-weight: 600; min-width: 30px; text-align: center;">${item.qty}</span>
                            <button onclick="updateQtyPesan(${index}, 1)" style="background: #98C81C; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; display:flex; align-items:center; justify-content:center;">+</button>
                        </div>
                    </div>
                `;
            });
            html += `
                <div style="padding: 15px; background: rgba(152, 200, 28, 0.2); border-radius: 12px; margin-top: 10px; border: 1px solid #98C81C;">
                    <div style="display: flex; justify-content: space-between; color: white; font-size: clamp(16px,2%,20px); font-weight: 700;">
                        <span>Total</span>
                        <span style="color: #98C81C;">Rp ${total.toLocaleString()}</span>
                    </div>
                </div>
            `;
            html += '</div>';
            container.innerHTML = html;
        }

        function updateQtyPesan(index, change) {
            if (orders[index].qty + change <= 0) {
                orders.splice(index, 1);
            } else {
                orders[index].qty += change;
            }
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateOrderList();
            updateCartCount();
            
            if (document.getElementById('menuPage').classList.contains('active')) {
                renderMenu(currentCategory);
            }
        }

        function openMenu() {
            document.getElementById('menuPage').classList.add('active');
            renderMenu(currentCategory);
            updateCartCount();
        }

        function closeMenu() {
            document.getElementById('menuPage').classList.remove('active');
        }

        function openPesan() {
            document.getElementById('pesanPage').classList.add('active');
            updateOrderList();
            updateCartCount();
        }

        function closePesan() {
            document.getElementById('pesanPage').classList.remove('active');
        }

        function clearOrder() {
            if (orders.length === 0) return;
            if (confirm('Yakin ingin mengosongkan semua pesanan?')) {
                orders = [];
                localStorage.setItem('customer_orders', JSON.stringify(orders));
                updateOrderList();
                updateCartCount();
                if (document.getElementById('menuPage').classList.contains('active')) {
                    renderMenu(currentCategory);
                }
            }
        }

        function checkout() {
            if (orders.length === 0) {
                alert('⚠️ Belum ada pesanan!');
                return;
            }

            let total = orders.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let message = '📋 Pesanan Anda:\n\n';
            orders.forEach((item, index) => {
                message += `${index + 1}. ${item.name} x${item.qty} - Rp ${(item.price * item.qty).toLocaleString()}\n`;
            });
            message += `\n💰 Total: Rp ${total.toLocaleString()}`;
            message += `\n\n✅ Pesanan berhasil dikirim!`;
            
            alert(message);
            
            orders = [];
            localStorage.setItem('customer_orders', JSON.stringify(orders));
            updateOrderList();
            updateCartCount();
            closePesan();
            if (document.getElementById('menuPage').classList.contains('active')) {
                renderMenu(currentCategory);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => {
                toast.className = 'toast';
            }, 2000);
        }

        window.addEventListener('load', function() {
            updateCartCount();
        });
    </script>
</body>
</html>
