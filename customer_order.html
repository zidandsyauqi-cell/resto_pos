<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        body {
            font-family: 'Poppins', sans-serif;
        }

        .customer-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== DEKORASI CABE & TOMAT ===== */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .decorations img {
            position: absolute;
            opacity: 1;
        }

        .decorations .tomat-atas-kiri {
            width: clamp(60px, 15vw, 250px);
            left: 0%;
            top: 0%;
        }

        .decorations .tomat1-bawah-kanan {
            width: clamp(60px, 15vw, 250px);
            right: 0%;
            bottom: 0%;
        }

        .decorations .cabe2-atas-kanan {
            width: clamp(50px, 12vw, 200px);
            right: 0%;
            top: 0%;
        }

        .decorations .cabe21-atas-kanan {
            width: clamp(50px, 12vw, 200px);
            right: 0%;
            top: 0%;
        }

        .decorations .cabe1-bawah-kiri {
            width: clamp(50px, 12vw, 200px);
            left: 0%;
            bottom: 0%;
        }

        .decorations .cabe11-bawah-kiri {
            width: clamp(50px, 12vw, 200px);
            left: 0%;
            bottom: 0%;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 10px 12px;
            padding-top: env(safe-area-inset-top, 10px);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            min-height: 60px;
        }
        .header-top .logo-left {
            width: clamp(80px, 25%, 250px);
            height: auto;
            flex-shrink: 0;
        }
        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }
        .header-top .title-right {
            color: white;
            font-size: clamp(20px, 6%, 70px);
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* ===== MEJA & NAMA ===== */
        .meja-info {
            position: absolute;
            right: 12px;
            top: calc(env(safe-area-inset-top, 10px) + 8px);
            z-index: 11;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 4px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: clamp(11px, 1.4%, 18px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }
        .meja-info span {
            color: #98C81C;
        }
        .customer-name-display {
            position: absolute;
            right: 12px;
            top: calc(env(safe-area-inset-top, 10px) + 46px);
            z-index: 11;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 3px 12px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: clamp(9px, 1.1%, 14px);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }
        .customer-name-display span {
            color: #98C81C;
        }

        /* ===== CONTENT ===== */
        .content-wrapper {
            flex: 1;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 5% 20px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* ===== BOX MENU ===== */
        .box-menu {
            width: 82%;
            max-width: 600px;
            height: 32%;
            margin-bottom: 2.5%;
            border-radius: 65px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
            background: #98C81C;
        }
        .box-menu:active {
            transform: scale(0.98);
        }
        .box-menu .label-menu {
            position: absolute;
            left: 5%;
            top: 4%;
            text-align: left;
            color: white;
            font-size: clamp(20px, 4.5%, 50px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 5;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }
        .box-menu .menu-images {
            position: absolute;
            left: 0;
            right: 0;
            bottom: -15%;
            top: 25%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            opacity: 1;
            overflow: hidden;
            border-radius: 0 0 65px 65px;
            width: 100%;
            padding-top: 18px;
        }
        .box-menu .menu-images img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            border: none;
            flex: 1.1;
            min-width: 0;
        }
        .box-menu .menu-images img:nth-child(1) {
            flex: 1.15;
            height: 100%;
            z-index: 1;
            margin-right: -5%;
            margin-left: -3%;
        }
        .box-menu .menu-images img:nth-child(2) {
            flex: 1.2;
            height: 100%;
            z-index: 3;
            margin-left: -8%;
            margin-right: -8%;
        }
        .box-menu .menu-images img:nth-child(3) {
            flex: 1.15;
            height: 100%;
            z-index: 2;
            margin-left: -3%;
            margin-right: -5%;
        }

        /* ===== BOX PESAN ===== */
        .box-pesan {
            width: 82%;
            max-width: 600px;
            height: 32%;
            margin-bottom: 2.5%;
            border-radius: 65px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
            background: #98C81C;
        }
        .box-pesan:active {
            transform: scale(0.98);
        }
        .box-pesan .label-pesan {
            position: absolute;
            left: 5%;
            top: 4%;
            text-align: left;
            color: white;
            font-size: clamp(20px, 4.5%, 50px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 5;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }
        .box-pesan .pesan-images {
            position: absolute;
            left: 0;
            right: 0;
            bottom: -15%;
            top: 25%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 2;
            opacity: 1;
            overflow: hidden;
            border-radius: 0 0 65px 65px;
            width: 100%;
            padding-top: 18px;
        }
        .box-pesan .pesan-images img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            border: none;
            flex: 1.1;
            min-width: 0;
        }
        .box-pesan .pesan-images img:nth-child(1) {
            flex: 1.15;
            height: 100%;
            z-index: 1;
            margin-right: -5%;
            margin-left: -3%;
        }
        .box-pesan .pesan-images img:nth-child(2) {
            flex: 1.2;
            height: 100%;
            z-index: 3;
            margin-left: -8%;
            margin-right: -8%;
        }
        .box-pesan .pesan-images img:nth-child(3) {
            flex: 1.15;
            height: 100%;
            z-index: 2;
            margin-left: -3%;
            margin-right: -5%;
        }

        /* ===== BOX STATUS ===== */
        .box-status {
            width: 82%;
            max-width: 600px;
            height: 10%;
            background: #98C81C;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }
        .box-status:active {
            transform: scale(0.98);
        }
        .box-status .label-status {
            color: white;
            font-size: clamp(18px, 4%, 45px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        /* ===== RESPONSIVE ===== */

        /* Portrait HP */
        @media screen and (orientation: portrait) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan {
                height: 30%;
                border-radius: 65px;
            }
            .box-status {
                height: 10%;
                border-radius: 50px;
            }
            .content-wrapper {
                padding: 10px 5% 20px;
                gap: 0;
            }
            .box-menu .menu-images,
            .box-pesan .pesan-images {
                border-radius: 0 0 65px 65px;
                top: 22%;
                bottom: -18%;
                padding-top: 15px;
            }
            .box-menu .menu-images img,
            .box-pesan .pesan-images img {
                flex: 1.15;
            }
            .box-menu .menu-images img:nth-child(1),
            .box-pesan .pesan-images img:nth-child(1) {
                flex: 1.2;
                margin-right: -8%;
                margin-left: -5%;
            }
            .box-menu .menu-images img:nth-child(2),
            .box-pesan .pesan-images img:nth-child(2) {
                flex: 1.25;
                margin-left: -12%;
                margin-right: -12%;
            }
            .box-menu .menu-images img:nth-child(3),
            .box-pesan .pesan-images img:nth-child(3) {
                flex: 1.2;
                margin-left: -5%;
                margin-right: -8%;
            }
            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(60px, 18vw, 250px);
            }
            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(50px, 14vw, 200px);
            }
        }

        @media screen and (max-width: 480px) and (orientation: portrait) {
            .customer-container {
                border-radius: 0;
            }
            .box-menu,
            .box-pesan {
                height: 27%;
                border-radius: 35px;
            }
            .box-status {
                height: 9%;
                border-radius: 30px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(15px, 3.5%, 30px);
                top: 3%;
            }
            .box-menu .menu-images,
            .box-pesan .pesan-images {
                border-radius: 0 0 35px 35px;
                top: 22%;
                bottom: -18%;
                padding-top: 12px;
            }
            .box-menu .menu-images img,
            .box-pesan .pesan-images img {
                flex: 1.2;
            }
            .box-menu .menu-images img:nth-child(1),
            .box-pesan .pesan-images img:nth-child(1) {
                flex: 1.25;
                margin-right: -10%;
                margin-left: -6%;
            }
            .box-menu .menu-images img:nth-child(2),
            .box-pesan .pesan-images img:nth-child(2) {
                flex: 1.3;
                margin-left: -15%;
                margin-right: -15%;
            }
            .box-menu .menu-images img:nth-child(3),
            .box-pesan .pesan-images img:nth-child(3) {
                flex: 1.25;
                margin-left: -6%;
                margin-right: -10%;
            }
            .meja-info {
                padding: 3px 10px;
                font-size: 11px;
                top: calc(env(safe-area-inset-top, 6px) + 4px);
            }
            .customer-name-display {
                padding: 2px 8px;
                font-size: 9px;
                top: calc(env(safe-area-inset-top, 6px) + 38px);
            }
            .header-top .logo-left {
                width: 70px;
            }
            .header-top .title-right {
                font-size: 20px;
            }
            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(40px, 15vw, 100px);
            }
            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(35px, 12vw, 80px);
            }
        }

        /* ===== LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .header-top {
                padding: 6px 12px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .header-top .logo-left {
                width: clamp(40px, 10%, 140px);
            }
            .header-top .title-right {
                font-size: clamp(14px, 3%, 35px);
            }
            .meja-info {
                padding: 2px 10px;
                font-size: clamp(9px, 1%, 13px);
                top: calc(env(safe-area-inset-top, 6px) + 4px);
                right: 10px;
            }
            .customer-name-display {
                padding: 2px 8px;
                font-size: clamp(7px, 0.8%, 11px);
                top: calc(env(safe-area-inset-top, 6px) + 32px);
                right: 10px;
            }
            .content-wrapper {
                padding: 6px 10% 12px;
                padding-bottom: env(safe-area-inset-bottom, 12px);
                justify-content: center;
            }
            .box-menu,
            .box-pesan {
                width: 65%;
                max-width: 450px;
                height: 20%;
                border-radius: 35px;
                margin-bottom: 1.8%;
            }
            .box-status {
                width: 65%;
                max-width: 450px;
                height: 8%;
                border-radius: 30px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(12px, 2.5%, 28px);
                top: 3%;
            }
            .box-menu .menu-images,
            .box-pesan .pesan-images {
                border-radius: 0 0 35px 35px;
                top: 22%;
                bottom: -18%;
                padding-top: 15px;
            }
            .box-menu .menu-images img,
            .box-pesan .pesan-images img {
                flex: 1.15;
            }
            .box-menu .menu-images img:nth-child(1),
            .box-pesan .pesan-images img:nth-child(1) {
                flex: 1.2;
                margin-right: -8%;
                margin-left: -5%;
            }
            .box-menu .menu-images img:nth-child(2),
            .box-pesan .pesan-images img:nth-child(2) {
                flex: 1.25;
                margin-left: -12%;
                margin-right: -12%;
            }
            .box-menu .menu-images img:nth-child(3),
            .box-pesan .pesan-images img:nth-child(3) {
                flex: 1.2;
                margin-left: -5%;
                margin-right: -8%;
            }
            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(40px, 10vw, 150px);
            }
            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(35px, 8vw, 120px);
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan {
                width: 55%;
                max-width: 320px;
                height: 18%;
                border-radius: 25px;
                margin-bottom: 1.5%;
            }
            .box-status {
                width: 55%;
                max-width: 320px;
                height: 7%;
                border-radius: 20px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(10px, 2%, 20px);
                top: 2%;
            }
            .box-menu .menu-images,
            .box-pesan .pesan-images {
                border-radius: 0 0 25px 25px;
                top: 22%;
                bottom: -15%;
                padding-top: 10px;
            }
            .box-menu .menu-images img,
            .box-pesan .pesan-images img {
                flex: 1.1;
            }
            .box-menu .menu-images img:nth-child(1),
            .box-pesan .pesan-images img:nth-child(1) {
                flex: 1.15;
                margin-right: -6%;
                margin-left: -4%;
            }
            .box-menu .menu-images img:nth-child(2),
            .box-pesan .pesan-images img:nth-child(2) {
                flex: 1.2;
                margin-left: -10%;
                margin-right: -10%;
            }
            .box-menu .menu-images img:nth-child(3),
            .box-pesan .pesan-images img:nth-child(3) {
                flex: 1.15;
                margin-left: -4%;
                margin-right: -6%;
            }
            .header-top .logo-left {
                width: 40px;
            }
            .header-top .title-right {
                font-size: 12px;
            }
            .header-top {
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 32px;
                gap: 4px;
            }
            .meja-info {
                font-size: 8px;
                padding: 2px 6px;
                top: calc(env(safe-area-inset-top, 4px) + 2px);
                right: 6px;
            }
            .customer-name-display {
                font-size: 6px;
                padding: 1px 6px;
                top: calc(env(safe-area-inset-top, 4px) + 22px);
                right: 6px;
            }
            .content-wrapper {
                padding: 4px 5% 8px;
                padding-bottom: env(safe-area-inset-bottom, 8px);
            }
            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(30px, 8vw, 80px);
            }
            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(25px, 6vw, 60px);
            }
        }

        /* ===== DESKTOP LANDSCAPE ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .customer-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .box-menu,
            .box-pesan {
                width: 50%;
                max-width: 500px;
                height: 22%;
                border-radius: 45px;
                margin-bottom: 1.8%;
            }
            .box-status {
                width: 50%;
                max-width: 500px;
                height: 8%;
                border-radius: 35px;
            }
            .box-menu .label-menu,
            .box-pesan .label-pesan,
            .box-status .label-status {
                font-size: clamp(18px, 3.5%, 42px);
                top: 3%;
            }
            .box-menu .menu-images,
            .box-pesan .pesan-images {
                border-radius: 0 0 45px 45px;
                top: 25%;
                bottom: -18%;
                padding-top: 18px;
            }
            .box-menu .menu-images img,
            .box-pesan .pesan-images img {
                flex: 1.1;
            }
            .box-menu .menu-images img:nth-child(1),
            .box-pesan .pesan-images img:nth-child(1) {
                flex: 1.15;
                margin-right: -5%;
                margin-left: -3%;
            }
            .box-menu .menu-images img:nth-child(2),
            .box-pesan .pesan-images img:nth-child(2) {
                flex: 1.2;
                margin-left: -8%;
                margin-right: -8%;
            }
            .box-menu .menu-images img:nth-child(3),
            .box-pesan .pesan-images img:nth-child(3) {
                flex: 1.15;
                margin-left: -3%;
                margin-right: -5%;
            }
            .header-top .logo-left {
                width: clamp(80px, 20%, 220px);
            }
            .header-top .title-right {
                font-size: clamp(20px, 5%, 55px);
            }
            .meja-info {
                padding: 4px 14px;
                font-size: 13px;
                top: calc(env(safe-area-inset-top, 8px) + 4px);
            }
            .customer-name-display {
                padding: 3px 12px;
                font-size: 11px;
                top: calc(env(safe-area-inset-top, 8px) + 36px);
            }
        }

        @supports not (padding: env(safe-area-inset-top)) {
            .header-top {
                padding-top: 10px;
            }
            .meja-info {
                top: 18px;
            }
            .customer-name-display {
                top: 56px;
            }
            .content-wrapper {
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <!-- ===== DEKORASI ===== -->
        <div class="decorations">
            <img class="tomat-atas-kiri" src="tomat2.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe2-atas-kanan" src="cabe2.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe21-atas-kanan" src="cabe2.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe1-bawah-kiri" src="cabe1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe11-bawah-kiri" src="cabe1.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="tomat1-bawah-kanan" src="tomat1.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
        </div>

        <!-- Meja & Nama -->
        <div class="meja-info" id="mejaInfo">Meja <span id="mejaNumber">1</span></div>
        <div class="customer-name-display" id="customerNameDisplay"><span id="namaCustomer">Customer</span></div>

        <!-- HEADER -->
        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <!-- CONTENT -->
        <div class="content-wrapper">
            <!-- MENU -->
            <div class="box-menu" onclick="window.location.href='customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
                <div class="label-menu">MENU</div>
                <div class="menu-images">
                    <img src="https://vxgagtasyfpzvlfqcibk.supabase.co/storage/v1/object/public/menu-images/igabakar.png" alt="Iga Bakar" loading="lazy" onerror="this.style.display='none'">
                    <img src="https://vxgagtasyfpzvlfqcibk.supabase.co/storage/v1/object/public/menu-images/satepotong.png" alt="Sate Potong" loading="lazy" onerror="this.style.display='none'">
                    <img src="https://vxgagtasyfpzvlfqcibk.supabase.co/storage/v1/object/public/menu-images/tengkleng.png" alt="Tengkleng" loading="lazy" onerror="this.style.display='none'">
                </div>
            </div>

            <!-- PESAN -->
            <div class="box-pesan" onclick="window.location.href='customer_order_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
                <div class="label-pesan">PESAN</div>
                <div class="pesan-images">
                    <img src="https://vxgagtasyfpzvlfqcibk.supabase.co/storage/v1/object/public/menu-images/sopbakar.png" alt="Sop Bakar" loading="lazy" onerror="this.style.display='none'">
                    <img src="https://vxgagtasyfpzvlfqcibk.supabase.co/storage/v1/object/public/menu-images/krengsengan.png" alt="Krengsengan" loading="lazy" onerror="this.style.display='none'">
                    <img src="https://vxgagtasyfpzvlfqcibk.supabase.co/storage/v1/object/public/menu-images/nasigoreng.png" alt="Nasi Goreng" loading="lazy" onerror="this.style.display='none'">
                </div>
            </div>

            <!-- STATUS PESANAN -->
            <div class="box-status" onclick="window.location.href='customer_order_status.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
                <div class="label-status">STATUS PESANAN</div>
            </div>
        </div>
    </div>

    <script>
        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }

        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        document.getElementById('mejaNumber').textContent = mejaNumber;
        document.getElementById('namaCustomer').textContent = namaCustomer;
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);
    </script>
</body>
</html>
