<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Poppins', sans-serif;
        }
        .customer-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER: Logo Kiri + Teks Kanan ===== */
        .header-top {
            position: absolute;
            left: 4%;
            top: 6%;
            right: 4%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-top .logo-left {
            width: clamp(80px, 30%, 350px);
            height: auto;
            flex-shrink: 0;
        }
        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .header-top .title-right {
            color: white;
            font-size: clamp(24px, 7%, 85px);
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* ===== BOX MENU ===== */
        .box-menu {
            position: absolute;
            width: 82%;
            height: 24%;
            left: 9%;
            top: 28%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box-menu:hover { transform: scale(1.02); }
        .box-menu:active { transform: scale(0.98); }
        .box-menu .bg-hijau {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }
        .box-menu .label-menu {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 5.5%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* ===== BOX PESAN ===== */
        .box-pesan {
            position: absolute;
            width: 82%;
            height: 24%;
            left: 9%;
            top: 54%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box-pesan:hover { transform: scale(1.02); }
        .box-pesan:active { transform: scale(0.98); }
        .box-pesan .bg-hijau {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }
        .box-pesan .label-pesan {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 5.5%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* ===== BOX STATUS ===== */
        .box-status {
            position: absolute;
            width: 82%;
            height: 24%;
            left: 9%;
            top: 72.5%;
            background: #98C81C;
            border-radius: 65px;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box-status:hover { transform: scale(1.02); }
        .box-status:active { transform: scale(0.98); }
        .box-status .label-status {
            color: white;
            font-size: clamp(24px, 5.5%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* ===== MEJA & NAMA ===== */
        .meja-info {
            position: absolute;
            right: 4%;
            top: 6%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 6px 16px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(12px, 1.6%, 20px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }
        .meja-info span { color: #98C81C; }
        .customer-name-display {
            position: absolute;
            right: 4%;
            top: 12%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 4px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(10px, 1.3%, 16px);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }
        .customer-name-display span { color: #98C81C; }

        /* ===== RESPONSIVE ===== */
        
        /* Portrait */
        @media screen and (orientation: portrait) {
            .customer-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }
            .box-menu, .box-pesan, .box-status { border-radius: 65px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau, .box-status .bg-hijau { border-radius: 65px; }
        }

        /* Landscape */
        @media screen and (orientation: landscape) {
            .customer-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }
            .box-menu, .box-pesan, .box-status { border-radius: 45px; height: 22%; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau, .box-status .bg-hijau { border-radius: 45px; }
            .box-menu { top: 28%; }
            .box-pesan { top: 52%; }
            .box-status { top: 76%; }
            .box-menu .label-menu, .box-pesan .label-pesan, .box-status .label-status { 
                font-size: clamp(20px, 5%, 50px); 
            }
            .header-top .title-right { font-size: clamp(20px, 6%, 70px); }
            .header-top .logo-left { width: clamp(70px, 25%, 280px); }
            .meja-info { padding: 4px 12px; font-size: 12px; top: 5%; }
            .customer-name-display { padding: 3px 10px; font-size: 10px; top: 11%; }
        }

        @media screen and (max-width: 767px) and (orientation: portrait) {
            .customer-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .box-menu, .box-pesan, .box-status { border-radius: 40px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau, .box-status .bg-hijau { border-radius: 40px; }
            .box-menu { top: 28%; height: 24%; }
            .box-pesan { top: 54%; height: 24%; }
            .box-status { top: 72.5%; height: 24%; }
            .box-menu .label-menu, .box-pesan .label-pesan, .box-status .label-status { font-size: clamp(20px, 5%, 45px); }
            .meja-info { padding: 4px 12px; font-size: 12px; top: 6%; }
            .customer-name-display { padding: 4px 12px; font-size: 10px; top: 13%; }
            .header-top .logo-left { width: 100px; }
            .header-top .title-right { font-size: 24px; }
        }

        @media screen and (max-width: 480px) and (orientation: portrait) {
            .customer-container { border-radius: 10px; }
            .box-menu, .box-pesan, .box-status { border-radius: 30px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau, .box-status .bg-hijau { border-radius: 30px; }
            .box-menu { top: 28%; height: 22%; }
            .box-pesan { top: 52%; height: 22%; }
            .box-status { top: 73%; height: 22%; }
            .box-menu .label-menu, .box-pesan .label-pesan, .box-status .label-status { font-size: clamp(16px, 4%, 35px); }
            .meja-info { padding: 3px 10px; font-size: 11px; }
            .customer-name-display { padding: 3px 10px; font-size: 9px; top: 13%; }
            .header-top .logo-left { width: 70px; }
            .header-top .title-right { font-size: 20px; }
        }

        @media screen and (max-width: 360px) and (orientation: portrait) {
            .box-menu, .box-pesan, .box-status { border-radius: 25px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau, .box-status .bg-hijau { border-radius: 25px; }
            .box-menu { top: 28%; height: 21%; }
            .box-pesan { top: 51%; height: 21%; }
            .box-status { top: 73%; height: 21%; }
            .box-menu .label-menu, .box-pesan .label-pesan, .box-status .label-status { font-size: 14px; }
            .meja-info { font-size: 10px; padding: 2px 8px; }
            .customer-name-display { font-size: 8px; padding: 2px 8px; top: 13%; }
            .header-top .logo-left { width: 55px; }
            .header-top .title-right { font-size: 16px; }
        }

        /* Landscape HP kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container { max-width: 100%; border-radius: 0; }
            .box-menu, .box-pesan, .box-status { border-radius: 30px; height: 20%; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau, .box-status .bg-hijau { border-radius: 30px; }
            .box-menu { top: 30%; }
            .box-pesan { top: 52%; }
            .box-status { top: 74%; }
            .box-menu .label-menu, .box-pesan .label-pesan, .box-status .label-status { font-size: 16px; }
            .header-top .title-right { font-size: 16px; }
            .header-top .logo-left { width: 60px; }
            .meja-info { font-size: 10px; padding: 2px 8px; top: 4%; }
            .customer-name-display { font-size: 8px; padding: 2px 8px; top: 10%; }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 15px; }
            .box-menu, .box-pesan, .box-status { border-radius: 50px; height: 22%; }
            .box-menu { top: 28%; }
            .box-pesan { top: 52%; }
            .box-status { top: 76%; }
        }

        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .box-menu, .box-pesan, .box-status { border-radius: 55px; height: 21%; }
            .box-menu { top: 28%; }
            .box-pesan { top: 51%; }
            .box-status { top: 74%; }
            .box-menu .label-menu, .box-pesan .label-pesan, .box-status .label-status { 
                font-size: clamp(24px, 5%, 55px); 
            }
            .header-top .title-right { font-size: clamp(24px, 6.5%, 75px); }
            .header-top .logo-left { width: clamp(100px, 28%, 320px); }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <!-- Background utama dengan bg.png -->
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <!-- Meja & Nama -->
        <div class="meja-info" id="mejaInfo">Meja <span id="mejaNumber">1</span></div>
        <div class="customer-name-display" id="customerNameDisplay"><span id="namaCustomer">Customer</span></div>

        <!-- HEADER: Logo Kiri + Teks Kanan -->
        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <!-- MENU -->
        <div class="box-menu" onclick="window.location.href='customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            <div class="bg-hijau"></div>
            <div class="label-menu">MENU</div>
        </div>

        <!-- PESAN -->
        <div class="box-pesan" onclick="window.location.href='customer_order_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            <div class="bg-hijau"></div>
            <div class="label-pesan">PESAN</div>
        </div>

        <!-- STATUS PESANAN -->
        <div class="box-status" onclick="window.location.href='customer_order_status.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            <div class="label-status">STATUS PESANAN</div>
        </div>
    </div>

    <script>
        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }
        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }
        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        document.getElementById('mejaNumber').textContent = mejaNumber;
        document.getElementById('namaCustomer').textContent = namaCustomer;
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);
    </script>
</body>
</html>
