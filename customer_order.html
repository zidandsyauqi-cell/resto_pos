<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .customer-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        /* Background utama dengan gambar bg.png */
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        .deco-bg img {
            position: absolute;
            opacity: 0.12;
        }
        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }
        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER: Logo Kiri + Teks Kanan ===== */
        .header-top {
            position: absolute;
            left: 4.3%;
            top: 7%;
            right: 4.3%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-top .logo-left {
            width: clamp(100px, 38%, 413px);
            height: auto;
            flex-shrink: 0;
        }
        .header-top .logo-left img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .header-top .title-right {
            color: white;
            font-size: clamp(28px, 9%, 100px);
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex: 1;
        }

        /* ===== BOX MENU ===== */
        .box-menu {
            position: absolute;
            width: 82.2%;
            height: 26.6%;
            left: 8.9%;
            top: 28.4%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box-menu:hover { transform: scale(1.02); }
        .box-menu:active { transform: scale(0.98); }
        .box-menu .bg-hijau {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }
        .box-menu .label-menu {
            position: absolute;
            left: 5%;
            top: 15%;
            text-align: center;
            color: white;
            font-size: clamp(28px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }
        .box-menu .gambar1 {
            position: absolute;
            width: 52%;
            height: 87%;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 1;
        }
        .box-menu .gambar1 img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .box-menu .gambar2 {
            position: absolute;
            width: 47%;
            height: 99%;
            left: -14.5%;
            top: 34.4%;
            overflow: hidden;
            z-index: 0;
        }
        .box-menu .gambar2 img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .box-menu .gambar3 {
            position: absolute;
            width: 46%;
            height: 100%;
            left: 18%;
            top: 37%;
            overflow: hidden;
            z-index: 1;
        }
        .box-menu .gambar3 img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }

        /* ===== BOX PESAN ===== */
        .box-pesan {
            position: absolute;
            width: 82.2%;
            height: 26.6%;
            left: 8.9%;
            top: 55%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box-pesan:hover { transform: scale(1.02); }
        .box-pesan:active { transform: scale(0.98); }
        .box-pesan .bg-hijau {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
            border: 3px solid white;
        }
        .box-pesan .label-pesan {
            position: absolute;
            left: 5%;
            top: 15%;
            text-align: center;
            color: white;
            font-size: clamp(28px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }
        .box-pesan .gambar4 {
            position: absolute;
            width: 56.4%;
            height: 100%;
            left: 18.4%;
            top: 23.1%;
            overflow: hidden;
            z-index: 1;
        }
        .box-pesan .gambar4 img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .box-pesan .gambar5 {
            position: absolute;
            width: 53.3%;
            height: 93.6%;
            left: 46.9%;
            top: 69%;
            transform: rotate(107deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 0;
        }
        .box-pesan .gambar5 img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .box-pesan .gambar6 {
            position: absolute;
            width: 51.4%;
            height: 81.8%;
            left: 42.1%;
            top: 52.9%;
            transform: rotate(-10deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 1;
        }
        .box-pesan .gambar6 img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }

        /* ===== BOX STATUS ===== */
        .box-status {
            position: absolute;
            width: 82.2%;
            height: 8.5%;
            left: 8.9%;
            top: 87.7%;
            background: #98C81C;
            border-radius: 50px;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .box-status:hover { transform: scale(1.02); }
        .box-status:active { transform: scale(0.98); }
        .box-status .label-status {
            color: white;
            font-size: clamp(20px, 4.6%, 50px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* ===== MEJA & NAMA ===== */
        .meja-info {
            position: absolute;
            right: 4.3%;
            top: 7%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(14px, 2%, 22px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }
        .meja-info span { color: #98C81C; }
        .customer-name-display {
            position: absolute;
            right: 4.3%;
            top: 14%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 6px 18px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }
        .customer-name-display span { color: #98C81C; }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width: 767px) {
            .customer-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .box-menu, .box-pesan { border-radius: 40px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau { border-radius: 40px; }
            .box-status { border-radius: 40px; height: 7%; top: 88.5%; }
            .box-status .label-status { font-size: 20px; }
            .meja-info { padding: 4px 12px; font-size: 12px; top: 6%; }
            .customer-name-display { padding: 4px 12px; font-size: 10px; top: 13%; }
            .header-top .logo-left { width: 100px; }
            .header-top .title-right { font-size: 24px; }
        }
        @media screen and (max-width: 480px) {
            .customer-container { border-radius: 10px; }
            .box-menu, .box-pesan { border-radius: 30px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau { border-radius: 30px; }
            .box-status { border-radius: 30px; height: 6.5%; top: 89%; }
            .box-status .label-status { font-size: 16px; }
            .meja-info { padding: 3px 10px; font-size: 11px; }
            .customer-name-display { padding: 3px 10px; font-size: 9px; top: 13%; }
            .header-top .logo-left { width: 70px; }
            .header-top .title-right { font-size: 20px; }
        }
        @media screen and (max-width: 360px) {
            .box-menu, .box-pesan { border-radius: 25px; }
            .box-menu .bg-hijau, .box-pesan .bg-hijau { border-radius: 25px; }
            .box-status { border-radius: 25px; height: 6%; top: 89.5%; }
            .box-status .label-status { font-size: 14px; }
            .meja-info { font-size: 10px; padding: 2px 8px; }
            .customer-name-display { font-size: 8px; padding: 2px 8px; top: 13%; }
            .header-top .logo-left { width: 55px; }
            .header-top .title-right { font-size: 16px; }
        }
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 15px; }
        }
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 10px; }
            .box-menu .label-menu, .box-pesan .label-pesan { font-size: 18px; }
            .header-top .title-right { font-size: 18px; }
            .header-top .logo-left { width: 70px; }
            .box-status { height: 8%; top: 88%; }
            .box-status .label-status { font-size: 16px; }
            .meja-info { font-size: 10px; padding: 2px 8px; }
            .customer-name-display { font-size: 8px; padding: 2px 8px; top: 13%; }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <!-- Background utama dengan bg.png -->
        <div class="bg-utama"></div>

        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>
        <div class="overlay"></div>

        <!-- Meja & Nama -->
        <div class="meja-info" id="mejaInfo">Meja <span id="mejaNumber">1</span></div>
        <div class="customer-name-display" id="customerNameDisplay"><span id="namaCustomer">Customer</span></div>

        <!-- HEADER: Logo Kiri + Teks Kanan -->
        <div class="header-top">
            <div class="logo-left">
                <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/413x295/2d2d2d/ffffff?text=Logo'" />
            </div>
            <div class="title-right">WILUJENG<br>SUMPING!</div>
        </div>

        <!-- MENU → customer_menu_list.html -->
        <div class="box-menu" onclick="window.location.href='customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            <div class="bg-hijau"></div>
            <div class="label-menu">MENU</div>
            <div class="gambar1"><img src="https://placehold.co/530x445/2d2d2d/ffffff?text=Food" alt="" loading="lazy" /></div>
            <div class="gambar2"><img src="https://placehold.co/477x493/2d2d2d/ffffff?text=Food" alt="" loading="lazy" /></div>
            <div class="gambar3"><img src="https://placehold.co/400x411/2d2d2d/ffffff?text=Food" alt="" loading="lazy" /></div>
        </div>

        <!-- PESAN → customer_order_list.html -->
        <div class="box-pesan" onclick="window.location.href='customer_order_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            <div class="bg-hijau"></div>
            <div class="label-pesan">PESAN</div>
            <div class="gambar4"><img src="https://placehold.co/501x517/2d2d2d/ffffff?text=Food" alt="" loading="lazy" /></div>
            <div class="gambar5"><img src="https://placehold.co/545x547/2d2d2d/ffffff?text=Food" alt="" loading="lazy" /></div>
            <div class="gambar6"><img src="https://placehold.co/626x590/2d2d2d/ffffff?text=Food" alt="" loading="lazy" /></div>
        </div>

        <!-- STATUS PESANAN → customer_order_status.html -->
        <div class="box-status" onclick="window.location.href='customer_order_status.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            <div class="label-status">STATUS PESANAN</div>
        </div>
    </div>

    <script>
        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }
        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }
        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        document.getElementById('mejaNumber').textContent = mejaNumber;
        document.getElementById('namaCustomer').textContent = namaCustomer;
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);
    </script>
</body>
</html>
