<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .status-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }
        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }
        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }
        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }
        .logo-top {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .logo-top .brand-text span { color: #98C81C; }
        .header-title {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            width: 55.6%;
            margin-top: 80px;
        }
        .meja-info {
            position: absolute;
            right: 4.3%;
            top: 7%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(14px, 2%, 22px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }
        .meja-info span { color: #98C81C; }
        .customer-name-display {
            position: absolute;
            right: 4.3%;
            top: 14%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 6px 18px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
        }
        .customer-name-display span { color: #98C81C; }
        .status-content {
            position: absolute;
            top: 22%;
            left: 0;
            right: 0;
            bottom: 5%;
            padding: 15px;
            overflow-y: auto;
            z-index: 5;
        }
        .status-content::-webkit-scrollbar { width: 5px; }
        .status-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .status-content::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }
        .empty-status {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 60px 0;
            font-size: 22px;
            font-family: 'Schoolbell', cursive;
        }
        .receipt {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            margin-bottom: 15px;
        }
        .receipt .receipt-header {
            text-align: center;
            border-bottom: 2px dashed rgba(255,255,255,0.2);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .receipt .receipt-header .resto-name {
            color: #98C81C;
            font-size: clamp(24px, 3.5%, 40px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }
        .receipt .receipt-header .receipt-info {
            color: rgba(255,255,255,0.6);
            font-size: clamp(12px, 1.4%, 16px);
            font-family: 'Poppins', sans-serif;
        }
        .receipt .receipt-header .receipt-info span { color: white; }
        .receipt .receipt-body .receipt-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: white;
            font-size: clamp(14px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
        }
        .receipt .receipt-body .receipt-item .item-name { flex: 1; }
        .receipt .receipt-body .receipt-item .item-qty { margin: 0 10px; color: rgba(255,255,255,0.5); }
        .receipt .receipt-body .receipt-item .item-price { color: #98C81C; font-weight: 600; }
        .receipt .receipt-footer {
            border-top: 2px dashed rgba(255,255,255,0.2);
            padding-top: 12px;
            margin-top: 12px;
        }
        .receipt .receipt-footer .receipt-total {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(18px, 2.5%, 28px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }
        .receipt .receipt-footer .receipt-total .total-amount { color: #98C81C; }
        .receipt .receipt-footer .receipt-status {
            text-align: center;
            margin-top: 10px;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: clamp(14px, 1.6%, 20px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            display: inline-block;
        }
        .receipt .receipt-footer .receipt-status.pending { background: rgba(255, 165, 0, 0.3); color: #ffa500; }
        .receipt .receipt-footer .receipt-status.proses { background: rgba(0, 150, 255, 0.3); color: #0096ff; }
        .receipt .receipt-footer .receipt-status.siap { background: rgba(152, 200, 28, 0.3); color: #98C81C; }
        .receipt .receipt-footer .receipt-status.selesai { background: rgba(0, 200, 0, 0.3); color: #00c800; }
        .btn-refresh {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.2); }
        @media screen and (max-width: 767px) {
            .status-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .status-content { top: 20%; padding: 10px 12px; }
            .receipt { padding: 15px; }
            .btn-back { padding: 4px 12px; font-size: 16px; top: 6%; }
            .meja-info { padding: 4px 12px; font-size: 12px; top: 6%; }
            .customer-name-display { padding: 4px 12px; font-size: 10px; top: 13%; }
        }
        @media screen and (max-width: 480px) {
            .status-container { border-radius: 10px; }
            .status-content { top: 19%; padding: 8px 10px; }
            .receipt { padding: 12px; }
            .btn-back { padding: 3px 10px; font-size: 14px; }
            .meja-info { padding: 3px 10px; font-size: 11px; }
            .customer-name-display { padding: 3px 10px; font-size: 9px; top: 13%; }
        }
        @media screen and (max-width: 360px) {
            .btn-back { font-size: 12px; padding: 2px 8px; }
            .meja-info { font-size: 10px; padding: 2px 8px; }
            .customer-name-display { font-size: 8px; padding: 2px 8px; top: 13%; }
        }
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .status-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 15px; }
        }
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .status-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 10px; }
            .status-content { top: 18%; padding: 5px 10px; }
            .receipt { padding: 10px; }
            .btn-back { font-size: 12px; padding: 2px 8px; }
            .meja-info { font-size: 10px; padding: 2px 8px; }
            .customer-name-display { font-size: 8px; padding: 2px 8px; top: 13%; }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat status pesanan...</div>
        </div>
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>
        <div class="overlay"></div>
        <button class="btn-back" onclick="window.location.href='customer_order.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>
        <div class="logo-top">
            <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo Jangkung" loading="lazy" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>
        <div class="meja-info" id="mejaInfo">🪑 Meja <span id="mejaNumber">1</span></div>
        <div class="customer-name-display" id="customerNameDisplay">👤 <span id="namaCustomer">Customer</span></div>
        <div class="header-title">📊 STATUS PESANAN</div>
        <div class="status-content" id="statusContent">
            <div id="orderList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }
        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }
        function getStatusLabel(status) {
            const map = { 'pending': '⏳ Menunggu', 'proses': '🔄 Diproses', 'siap': '✅ Siap Diambil', 'selesai': '✔️ Selesai' };
            return map[status] || status;
        }

        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                const meja = parseInt(getMeja());
                const { data: orders, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('meja', meja)
                    .neq('status', 'selesai')
                    .order('order_date', { ascending: false });
                if (error) throw error;
                const container = document.getElementById('orderList');
                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-status">
                            🍽️ Belum ada pesanan aktif<br>
                            <span style="font-size:16px;color:rgba(255,255,255,0.3);">Silakan pesan dari menu</span>
                        </div>
                    `;
                    loading.classList.remove('active');
                    return;
                }
                let html = '';
                for (const order of orders) {
                    const { data: details, error: detailError } = await supabaseClient
                        .from('order_details')
                        .select('*')
                        .eq('no_struk', order.no_struk);
                    if (detailError) throw detailError;
                    const total = details.reduce((s, item) => s + item.subtotal, 0);
                    html += `
                        <div class="receipt">
                            <div class="receipt-header">
                                <div class="resto-name">🍽️ Jangkung Order</div>
                                <div class="receipt-info">
                                    No. Struk: <span>${order.no_struk}</span> &bull; 
                                    Meja: <span>${order.meja}</span> &bull;
                                    ${new Date(order.order_date).toLocaleString('id-ID')}
                                </div>
                            </div>
                            <div class="receipt-body">
                                ${details.map(item => `
                                    <div class="receipt-item">
                                        <span class="item-name">${item.menu_name}</span>
                                        <span class="item-qty">x${item.quantity}</span>
                                        <span class="item-price">Rp ${item.subtotal.toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="receipt-footer">
                                <div class="receipt-total">
                                    <span>Total</span>
                                    <span class="total-amount">Rp ${total.toLocaleString()}</span>
                                </div>
                                <div style="text-align:center;margin-top:8px;">
                                    <span class="receipt-status ${order.status}">${getStatusLabel(order.status)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('orderList').innerHTML = `
                    <div class="empty-status">
                        ⚠️ Gagal memuat status pesanan<br>
                        <span style="font-size:16px;color:rgba(255,255,255,0.3);">Silakan refresh halaman</span>
                        <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh</button>
                    </div>
                `;
            } finally { loading.classList.remove('active'); }
        }

        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        document.getElementById('mejaNumber').textContent = mejaNumber;
        document.getElementById('namaCustomer').textContent = namaCustomer;
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);

        window.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            setInterval(loadOrders, 30000);
        });
    </script>
</body>
</html>
