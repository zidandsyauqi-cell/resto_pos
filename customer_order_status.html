<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .status-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 20px 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3.5%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }
        .logo-header img {
            width: clamp(30px, 5%, 55px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .brand-text {
            color: white;
            font-size: clamp(14px, 2.2%, 26px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .brand-text span { color: #98C81C; }

        .info-wrapper {
            position: absolute;
            top: 75px;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .info-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .info-item .label {
            color: white;
            font-size: clamp(18px, 3%, 35px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .info-item .value-box {
            padding: 10px 18px;
            border-radius: 50px;
            border: 3px solid white;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .info-item .value-box span { color: #98C81C; }

        .struk-wrapper {
            position: absolute;
            top: 170px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px 30px 20px 30px;
            overflow-y: auto;
            z-index: 5;
        }
        .struk-wrapper::-webkit-scrollbar { width: 4px; }
        .struk-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .struk-wrapper::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }

        .struk-box {
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            border: 3px solid white;
            padding: 25px 30px 20px 30px;
            min-height: 400px;
            margin-bottom: 15px;
        }
        .struk-title {
            color: white;
            font-size: clamp(24px, 4%, 45px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            margin-bottom: 10px;
        }
        .struk-no {
            color: rgba(255,255,255,0.7);
            font-size: clamp(18px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            margin-bottom: 15px;
            border-bottom: 2px dashed rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .struk-no span { color: white; }

        .struk-header-row {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.5);
            font-size: clamp(14px, 1.8%, 22px);
            font-family: 'Schoolbell', cursive;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .struk-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            color: white;
            font-size: clamp(16px, 2.2%, 28px);
            font-family: 'Schoolbell', cursive;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .struk-item .item-name { flex: 1; }
        .struk-item .item-qty { margin: 0 10px; color: rgba(255,255,255,0.5); }
        .struk-item .item-price { color: #98C81C; }

        .struk-divider {
            border: none;
            border-top: 2px dashed rgba(255,255,255,0.2);
            margin: 10px 0;
        }

        .struk-total-row {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(18px, 2.5%, 32px);
            font-family: 'Schoolbell', cursive;
            padding: 4px 0;
        }
        .struk-total-row .total-amount { color: #98C81C; }

        .struk-ppn {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.7);
            font-size: clamp(16px, 2%, 26px);
            font-family: 'Schoolbell', cursive;
            padding: 2px 0;
        }
        .struk-ppn .ppn-amount { color: rgba(255,255,255,0.7); }

        .struk-grand-total {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(24px, 3.5%, 42px);
            font-family: 'Schoolbell', cursive;
            font-weight: 700;
            padding-top: 8px;
            border-top: 2px solid rgba(255,255,255,0.2);
            margin-top: 8px;
        }
        .struk-grand-total .grand-total-amount { color: #98C81C; }

        .btn-ok {
            display: block;
            width: clamp(120px, 30%, 350px);
            padding: 10px 20px;
            margin: 15px auto 0 auto;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(24px, 3.5%, 42px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 3px solid white;
        }
        .btn-ok:hover { background: #7aa814; transform: scale(1.05); }

        .empty-status {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 60px 20px;
            font-size: clamp(20px, 3%, 35px);
            font-family: 'Schoolbell', cursive;
        }
        .empty-status .sub {
            font-size: clamp(14px, 1.8%, 22px);
            color: rgba(255,255,255,0.3);
        }

        .btn-refresh {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.2); }

        @media screen and (max-width: 767px) {
            .status-container { max-width: 100%; border-radius: 12px; }
            .header-top { padding: 10px 14px 6px 14px; }
            .info-wrapper { top: 65px; padding: 0 14px; gap: 10px; }
            .info-item .label { font-size: 14px; }
            .info-item .value-box { font-size: 12px; padding: 6px 12px; border-width: 2px; }
            .struk-wrapper { top: 140px; padding: 8px 14px 15px 14px; }
            .struk-box { padding: 15px 16px 12px 16px; border-radius: 30px; }
            .struk-title { font-size: 18px; }
            .struk-no { font-size: 14px; }
            .struk-header-row { font-size: 11px; }
            .struk-item { font-size: 13px; }
            .struk-total-row { font-size: 14px; }
            .struk-ppn { font-size: 12px; }
            .struk-grand-total { font-size: 18px; }
            .btn-ok { font-size: 18px; padding: 8px 16px; width: 120px; }
        }

        @media screen and (max-width: 480px) {
            .status-container { border-radius: 10px; }
            .header-top { padding: 6px 10px 4px 10px; }
            .btn-back { font-size: 18px; }
            .logo-header img { width: 25px; }
            .brand-text { font-size: 12px; }
            .info-wrapper { top: 55px; padding: 0 10px; gap: 6px; flex-direction: column; }
            .info-item .label { font-size: 12px; }
            .info-item .value-box { font-size: 11px; padding: 4px 10px; }
            .struk-wrapper { top: 155px; padding: 6px 10px 10px 10px; }
            .struk-box { padding: 12px 12px 10px 12px; border-radius: 20px; border-width: 2px; }
            .struk-title { font-size: 14px; }
            .struk-no { font-size: 11px; }
            .struk-header-row { font-size: 9px; }
            .struk-item { font-size: 10px; padding: 2px 0; }
            .struk-total-row { font-size: 11px; }
            .struk-ppn { font-size: 10px; }
            .struk-grand-total { font-size: 14px; }
            .btn-ok { font-size: 14px; padding: 6px 12px; width: 80px; }
            .empty-status { font-size: 16px; padding: 30px 10px; }
        }

        @media screen and (max-width: 360px) {
            .info-item .value-box { font-size: 9px; }
            .struk-item { font-size: 9px; }
            .struk-grand-total { font-size: 12px; }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .status-container { max-width: 90vh; border-radius: 15px; }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .status-container { max-width: 90vh; border-radius: 10px; }
            .header-top { padding: 5px 10px 3px 10px; }
            .btn-back { font-size: 16px; }
            .logo-header img { width: 22px; }
            .brand-text { font-size: 11px; }
            .info-wrapper { top: 45px; padding: 0 10px; gap: 6px; flex-direction: row; }
            .info-item .label { font-size: 10px; }
            .info-item .value-box { font-size: 10px; padding: 3px 8px; border-width: 2px; }
            .struk-wrapper { top: 110px; padding: 4px 10px 8px 10px; }
            .struk-box { padding: 10px 12px 8px 12px; border-radius: 20px; min-height: 200px; }
            .struk-title { font-size: 12px; }
            .struk-no { font-size: 10px; }
            .struk-header-row { font-size: 8px; }
            .struk-item { font-size: 9px; padding: 1px 0; }
            .struk-total-row { font-size: 10px; }
            .struk-ppn { font-size: 9px; }
            .struk-grand-total { font-size: 12px; }
            .btn-ok { font-size: 12px; padding: 4px 10px; width: 60px; margin-top: 8px; }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat status pesanan...</div>
        </div>

        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="window.location.href='customer_order.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>
                <div class="logo-header">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/55x55/98C81C/ffffff?text=🍽️'" />
                </div>
                <div class="brand-text">Jangkung<span>Order</span></div>
            </div>
        </div>

        <div class="info-wrapper">
            <div class="info-item">
                <div class="label">Nama:</div>
                <div class="value-box" id="namaDisplay">-</div>
            </div>
            <div class="info-item">
                <div class="label">Nomor Meja:</div>
                <div class="value-box" id="mejaDisplay">-</div>
            </div>
        </div>

        <div class="struk-wrapper" id="strukWrapper">
            <div id="orderList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Data meja yang aktif (hanya yang statusnya Tersedia atau Sudah Diisi)
        let activeTables = [];

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function getStatusLabel(status) {
            const map = { 
                'Diproses': '⏳ Diproses', 
                'Siap': '✅ Siap Diambil', 
                'Selesai': '✔️ Selesai' 
            };
            return map[status] || status;
        }

        function formatRupiah(price) {
            return 'Rp ' + Number(price).toLocaleString('id-ID');
        }

        async function loadActiveTables() {
            try {
                // Ambil semua meja yang statusnya Tersedia atau Sudah Diisi
                const { data, error } = await supabaseClient
                    .from('tables')
                    .select('id_table, nomor_meja, status')
                    .in('status', ['Tersedia', 'Sudah Diisi'])
                    .order('id_table', { ascending: false }); // Ambil yang terbaru dulu

                if (error) throw error;

                if (data && data.length > 0) {
                    // Hanya ambil satu per nomor_meja (prioritas id_table terbesar = terbaru)
                    const uniqueMap = {};
                    data.forEach(row => {
                        const nomor = row.nomor_meja;
                        // Jika belum ada atau id_table lebih besar (lebih baru), timpa
                        if (!uniqueMap[nomor] || row.id_table > uniqueMap[nomor].id_table) {
                            uniqueMap[nomor] = row;
                        }
                    });
                    activeTables = Object.values(uniqueMap);
                }

                console.log('✅ Active tables (unique):', activeTables);
                return activeTables;
            } catch (error) {
                console.error('❌ Error loading tables:', error);
                return [];
            }
        }

        function findIdTable(nomorMeja) {
            // Cari di activeTables
            const found = activeTables.find(t => t.nomor_meja === nomorMeja);
            if (found) return found.id_table;

            // Jika tidak ditemukan, coba dengan format string
            const foundStr = activeTables.find(t => t.nomor_meja === nomorMeja.toString());
            if (foundStr) return foundStr.id_table;

            // Coba dengan padStart 2 digit
            const padded = nomorMeja.toString().padStart(2, '0');
            const foundPadded = activeTables.find(t => t.nomor_meja === padded);
            if (foundPadded) return foundPadded.id_table;

            return null;
        }

        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const meja = parseInt(getMeja());
                const nama = getNama();

                document.getElementById('namaDisplay').textContent = nama;
                document.getElementById('mejaDisplay').textContent = 'Meja ' + meja;

                // Load active tables
                await loadActiveTables();

                // Cari id_table dari nomor meja
                const mejaStr = meja.toString().padStart(2, '0');
                const idTable = findIdTable(mejaStr);

                console.log('🔍 Meja:', meja, '→ ID Table:', idTable);

                if (!idTable) {
                    document.getElementById('orderList').innerHTML = `
                        <div class="struk-box">
                            <div class="empty-status">
                                ⚠️ Meja ${meja} tidak ditemukan<br>
                                <span class="sub">Meja yang tersedia: ${activeTables.map(t => t.nomor_meja).join(', ')}</span>
                                <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh</button>
                            </div>
                        </div>
                    `;
                    loading.classList.remove('active');
                    return;
                }

                // Ambil orders berdasarkan id_table
                const { data: orders, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('id_table', idTable)
                    .neq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (error) {
                    console.error('❌ Error fetching orders:', error);
                    throw error;
                }

                console.log('📦 Orders found:', orders ? orders.length : 0);

                const container = document.getElementById('orderList');

                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="struk-box">
                            <div class="empty-status">
                                🍽️ Belum ada pesanan aktif untuk meja ${meja}<br>
                                <span class="sub">Silakan pesan dari menu</span>
                                <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh</button>
                            </div>
                        </div>
                    `;
                    loading.classList.remove('active');
                    return;
                }

                let html = '';
                for (const order of orders) {
                    // Ambil detail pesanan
                    const { data: details, error: detailError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailError) {
                        console.error('❌ Error fetching details:', detailError);
                        continue;
                    }

                    console.log('📋 Details for', order.no_struk, ':', details ? details.length : 0);

                    const subtotal = details.reduce((s, item) => s + (item.subtotal || 0), 0);
                    const ppn = Math.round(subtotal * 0.1);
                    const total = subtotal + ppn;

                    const orderDate = new Date(order.tanggal_order + ' ' + order.waktu_order);
                    const dateStr = orderDate.toLocaleString('id-ID', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    html += `
                        <div class="struk-box">
                            <div class="struk-title">📋 Detail Struk:</div>
                            <div class="struk-no">Nomor Struk: <span>${order.no_struk}</span> &bull; ${dateStr}</div>

                            <div class="struk-header-row">
                                <span>Pesanan</span>
                                <span>Jumlah</span>
                                <span>Harga</span>
                            </div>

                            ${details && details.length > 0 ? details.map(item => `
                                <div class="struk-item">
                                    <span class="item-name">${item.nama || 'Menu'}</span>
                                    <span class="item-qty">${item.jumlah || 0}</span>
                                    <span class="item-price">${formatRupiah(item.subtotal || 0)}</span>
                                </div>
                            `).join('') : `
                                <div class="struk-item">
                                    <span class="item-name" style="color:rgba(255,255,255,0.3);">Tidak ada detail</span>
                                    <span class="item-qty">-</span>
                                    <span class="item-price">-</span>
                                </div>
                            `}

                            <hr class="struk-divider">

                            <div class="struk-total-row">
                                <span>Total</span>
                                <span class="total-amount">${formatRupiah(subtotal)}</span>
                            </div>
                            <div class="struk-ppn">
                                <span>PPN 10%</span>
                                <span class="ppn-amount">${formatRupiah(ppn)}</span>
                            </div>

                            <div class="struk-grand-total">
                                <span>Total</span>
                                <span class="grand-total-amount">${formatRupiah(total)}</span>
                            </div>

                            <div style="text-align:center;margin-top:12px;">
                                <span style="color:rgba(255,255,255,0.5);font-family:'Schoolbell',cursive;font-size:clamp(14px,1.8%,22px);">
                                    Status: ${getStatusLabel(order.status_order)}
                                </span>
                            </div>

                            <button class="btn-ok" onclick="window.location.href='customer_order.html?meja=${getMeja()}&nama=${encodeURIComponent(getNama())}'">OK</button>
                        </div>
                    `;
                }

                container.innerHTML = html;

            } catch (error) {
                console.error('❌ Error loading orders:', error);
                document.getElementById('orderList').innerHTML = `
                    <div class="struk-box">
                        <div class="empty-status">
                            ⚠️ Gagal memuat status pesanan<br>
                            <span class="sub">${error.message}</span>
                            <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh</button>
                        </div>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            setInterval(loadOrders, 30000);
        });
    </script>
</body>
</html>
