<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pesan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .order-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 20px 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3.5%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }
        .logo-header img {
            width: clamp(30px, 5%, 55px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .brand-text {
            color: white;
            font-size: clamp(14px, 2.2%, 26px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .brand-text span { color: #98C81C; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .total-display {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 4px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: #98C81C;
            font-size: clamp(11px, 1.5%, 18px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }
        .total-display:hover { background: rgba(255,255,255,0.25); }
        .btn-cart {
            background: #98C81C;
            border-radius: 50px;
            border: 2px solid white;
            padding: 5px 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-cart:hover { transform: scale(1.05); background: #7aa814; }
        .btn-cart span {
            color: white;
            font-size: clamp(10px, 1.3%, 15px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }
        .btn-cart .badge {
            background: white;
            color: #98C81C;
            border-radius: 50%;
            padding: 0 6px;
            font-size: clamp(9px, 1.1%, 13px);
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }
        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: 5px 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-selesai:hover { transform: scale(1.05); }
        .btn-selesai span {
            color: white;
            font-size: clamp(10px, 1.4%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .search-wrapper {
            position: absolute;
            top: 65px;
            left: 0;
            right: 0;
            z-index: 9;
            padding: 0 30px;
        }
        .search-box {
            width: 100%;
            padding: 10px 18px;
            border-radius: 50px;
            border: 3px solid white;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within { border-color: #98C81C; background: rgba(255,255,255,0.15); }
        .search-box .search-icon {
            color: rgba(255,255,255,0.6);
            font-size: clamp(16px, 2%, 22px);
            flex-shrink: 0;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: clamp(14px, 2.2%, 26px);
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }

        .category-tabs {
            position: absolute;
            top: 118px;
            left: 0;
            right: 0;
            z-index: 8;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 6px 20px 10px 20px;
            background: rgba(0,0,0,0.7);
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tabs .tab {
            padding: 6px 18px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            color: rgba(255,255,255,0.7);
            font-size: clamp(10px, 1.2%, 14px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .category-tabs .tab:hover { background: rgba(152, 200, 28, 0.2); border-color: #98C81C; color: white; }
        .category-tabs .tab.active { background: #98C81C; border-color: #98C81C; color: white; }

        .content-area {
            position: absolute;
            top: 165px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px 30px 20px 30px;
            overflow-y: auto;
            z-index: 5;
        }
        .content-area::-webkit-scrollbar { width: 4px; }
        .content-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .content-area::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }

        /* ===== CART SECTION ===== */
        .cart-section {
            margin-top: 12px;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding-top: 10px;
            scroll-margin-top: 10px;
        }
        .cart-section .cart-title {
            color: white;
            font-size: clamp(14px, 1.8%, 22px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 4px;
            gap: 8px;
        }
        .cart-item .item-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .cart-item .item-info .item-name {
            color: white;
            font-size: clamp(10px, 1.2%, 15px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-item .item-info .item-price {
            color: #98C81C;
            font-size: clamp(10px, 1.1%, 14px);
            font-weight: 600;
            white-space: nowrap;
            margin-left: 6px;
        }
        .cart-item .item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .cart-item .item-actions .btn-minus {
            width: 20px;
            height: 20px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-item .item-actions .btn-minus:hover { transform: scale(1.1); background: #c0392b; }
        .cart-item .item-actions .qty-display {
            color: white;
            font-size: clamp(11px, 1.2%, 15px);
            font-weight: 600;
            min-width: 18px;
            text-align: center;
        }
        .cart-item .item-actions .btn-plus {
            width: 20px;
            height: 20px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-item .item-actions .btn-plus:hover { transform: scale(1.1); background: #7aa814; }

        .cart-total {
            padding: 6px 14px;
            background: rgba(152, 200, 28, 0.15);
            border-radius: 10px;
            border: 2px solid #98C81C;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .cart-total .total-label {
            color: white;
            font-size: clamp(12px, 1.4%, 18px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .cart-total .total-amount {
            color: #98C81C;
            font-size: clamp(14px, 1.8%, 24px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        .empty-cart {
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 8px 0;
            font-size: 12px;
            font-family: 'Schoolbell', cursive;
        }

        .menu-section-title {
            color: white;
            font-size: clamp(28px, 6.5%, 70px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin: 10px 0 5px 0;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            gap: 10px;
            min-height: 50px;
        }
        .menu-item:last-child { border-bottom: none; }

        .menu-item .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .menu-item .item-left .item-img {
            width: clamp(45px, 9%, 100px);
            height: clamp(45px, 9%, 100px);
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }
        .menu-item .item-left .item-info {
            min-width: 0;
        }
        .menu-item .item-left .item-name {
            color: white;
            font-size: clamp(14px, 3.2%, 36px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .menu-item .item-left .item-price {
            color: white;
            font-size: clamp(12px, 2.8%, 32px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .menu-item .item-left .variant-badge {
            font-size: clamp(8px, 0.8%, 10px);
            color: #98C81C;
            background: rgba(152, 200, 28, 0.15);
            padding: 1px 8px;
            border-radius: 50px;
            display: inline-block;
            margin-left: 6px;
            white-space: nowrap;
        }

        .menu-item .item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .menu-item .item-actions .btn-minus {
            width: clamp(22px, 3%, 32px);
            height: clamp(22px, 3%, 32px);
            background: #e74c3c;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: clamp(12px, 1.4%, 16px);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .menu-item .item-actions .btn-minus:hover { transform: scale(1.1); background: #c0392b; }
        .menu-item .item-actions .qty-input {
            width: clamp(28px, 3.5%, 38px);
            padding: 2px 2px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: clamp(12px, 1.4%, 16px);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .menu-item .item-actions .qty-input:focus { border-color: #98C81C; outline: none; background: rgba(255,255,255,0.2); }
        .menu-item .item-actions .qty-input::-webkit-inner-spin-button,
        .menu-item .item-actions .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .menu-item .item-actions .qty-input[type=number] { -moz-appearance: textfield; }
        .menu-item .item-actions .btn-plus {
            width: clamp(22px, 3%, 32px);
            height: clamp(22px, 3%, 32px);
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: clamp(12px, 1.4%, 16px);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .menu-item .item-actions .btn-plus:hover { transform: scale(1.1); background: #7aa814; }
        .menu-item .item-actions .btn-detail {
            padding: 3px 12px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-size: clamp(9px, 1%, 12px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .menu-item .item-actions .btn-detail:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }

        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.4);
            padding: 30px 0;
            font-size: clamp(14px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(12px, 1.6%, 20px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(50px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        /* ===== CONFIRM MODAL ===== */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        .confirm-modal-content {
            background: rgba(20,20,20,0.95);
            padding: 35px 40px;
            border-radius: 100px;
            max-width: 500px;
            width: 90%;
            border: 3px solid #98C81C;
            text-align: center;
        }
        .confirm-modal-content .icon-big {
            font-size: 70px;
            margin-bottom: 10px;
        }
        .confirm-modal-content .title {
            color: white;
            font-size: clamp(32px, 5%, 55px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            margin-bottom: 8px;
        }
        .confirm-modal-content .sub {
            color: rgba(255,255,255,0.8);
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            margin-bottom: 15px;
        }
        .confirm-modal-content .order-summary {
            color: white;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(16px, 2%, 24px);
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .confirm-modal-content .order-summary .total {
            color: #98C81C;
            font-weight: 700;
            font-size: clamp(20px, 2.5%, 30px);
        }
        .confirm-modal-content .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .confirm-modal-content .btn-group .btn-batal {
            padding: 10px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
        }
        .confirm-modal-content .btn-group .btn-batal:hover { background: rgba(255,255,255,0.2); }
        .confirm-modal-content .btn-group .btn-yakin {
            padding: 10px 30px;
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
        }
        .confirm-modal-content .btn-group .btn-yakin:hover { background: #7aa814; transform: scale(1.05); }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width: 767px) {
            .order-container { max-width: 100%; border-radius: 12px; }
            .header-top { padding: 8px 14px 6px 14px; }
            .search-wrapper { top: 58px; padding: 0 16px; }
            .search-box { padding: 8px 14px; }
            .search-box input { font-size: 14px; }
            .category-tabs { top: 108px; padding: 4px 14px 8px 14px; gap: 4px; }
            .category-tabs .tab { padding: 4px 12px; font-size: 10px; }
            .content-area { top: 148px; padding: 8px 16px 15px 16px; }
            .menu-item { padding: 8px 0; min-height: 40px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 24px; height: 24px; font-size: 13px; }
            .menu-item .item-actions .qty-input { width: 30px; font-size: 13px; }
            .confirm-modal-content { border-radius: 60px; padding: 25px 20px; }
        }
        @media screen and (max-width: 480px) {
            .order-container { border-radius: 10px; }
            .header-top { padding: 6px 10px 4px 10px; }
            .search-wrapper { top: 50px; padding: 0 10px; }
            .search-box { padding: 6px 10px; border-width: 2px; }
            .search-box input { font-size: 12px; }
            .search-box .search-icon { font-size: 14px; }
            .category-tabs { top: 96px; padding: 4px 10px 6px 10px; }
            .category-tabs .tab { padding: 3px 8px; font-size: 8px; }
            .content-area { top: 132px; padding: 6px 10px 10px 10px; }
            .menu-item { padding: 6px 0; min-height: 32px; gap: 6px; }
            .menu-item .item-left .item-img { width: 35px; height: 35px; border-radius: 8px; }
            .menu-item .item-left .item-name { font-size: 12px; }
            .menu-item .item-left .item-price { font-size: 11px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 18px; height: 18px; font-size: 10px; border-width: 1.5px; }
            .menu-item .item-actions .qty-input { width: 22px; font-size: 10px; padding: 1px; }
            .menu-item .item-actions .btn-detail { padding: 2px 8px; font-size: 8px; }
            .brand-text { font-size: 12px; }
            .logo-header img { width: 25px; }
            .btn-back { font-size: 18px; }
            .btn-selesai { padding: 3px 10px; }
            .btn-selesai span { font-size: 9px; }
            .total-display { font-size: 9px; padding: 2px 8px; }
            .btn-cart { padding: 3px 10px; }
            .btn-cart span { font-size: 9px; }
            .btn-cart .badge { font-size: 8px; min-width: 14px; padding: 0 4px; }
            .confirm-modal-content { border-radius: 40px; padding: 20px 15px; }
            .confirm-modal-content .icon-big { font-size: 50px; }
            .confirm-modal-content .title { font-size: 24px; }
            .confirm-modal-content .sub { font-size: 14px; }
            .confirm-modal-content .order-summary { font-size: 14px; }
            .confirm-modal-content .order-summary .total { font-size: 18px; }
            .confirm-modal-content .btn-group .btn-batal,
            .confirm-modal-content .btn-group .btn-yakin { padding: 6px 16px; font-size: 13px; }
        }
        @media screen and (max-width: 360px) {
            .category-tabs { top: 90px; }
            .category-tabs .tab { font-size: 7px; padding: 2px 6px; }
            .content-area { top: 125px; }
            .menu-item .item-left .item-name { font-size: 10px; }
            .menu-item .item-left .item-price { font-size: 9px; }
            .menu-item .item-left .item-img { width: 28px; height: 28px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 16px; height: 16px; font-size: 9px; }
            .menu-item .item-actions .qty-input { width: 18px; font-size: 9px; }
            .menu-item .item-actions .btn-detail { font-size: 7px; padding: 1px 6px; }
            .brand-text { font-size: 10px; }
            .logo-header img { width: 20px; }
            .btn-back { font-size: 16px; }
        }
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .order-container { max-width: 90vh; border-radius: 15px; }
        }
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .order-container { max-width: 90vh; border-radius: 10px; }
            .header-top { padding: 4px 10px 2px 10px; }
            .search-wrapper { top: 42px; padding: 0 10px; }
            .search-box { padding: 4px 10px; }
            .search-box input { font-size: 11px; }
            .category-tabs { top: 84px; padding: 3px 10px 5px 10px; }
            .category-tabs .tab { padding: 2px 8px; font-size: 8px; }
            .content-area { top: 118px; padding: 4px 10px 8px 10px; }
            .menu-item { padding: 4px 0; min-height: 28px; }
            .menu-item .item-left .item-img { width: 28px; height: 28px; }
            .menu-item .item-left .item-name { font-size: 11px; }
            .menu-item .item-left .item-price { font-size: 10px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 16px; height: 16px; font-size: 9px; }
            .menu-item .item-actions .qty-input { width: 20px; font-size: 9px; }
            .menu-item .item-actions .btn-detail { font-size: 7px; padding: 1px 6px; }
            .btn-selesai { padding: 2px 8px; }
            .btn-selesai span { font-size: 8px; }
            .total-display { font-size: 8px; padding: 2px 6px; }
            .btn-cart { padding: 2px 8px; }
            .btn-cart span { font-size: 8px; }
            .btn-cart .badge { font-size: 7px; min-width: 12px; padding: 0 3px; }
            .confirm-modal-content { padding: 15px 20px; border-radius: 40px; }
            .confirm-modal-content .icon-big { font-size: 40px; }
            .confirm-modal-content .title { font-size: 20px; }
            .confirm-modal-content .sub { font-size: 12px; }
            .confirm-modal-content .order-summary { font-size: 12px; }
            .confirm-modal-content .order-summary .total { font-size: 16px; }
            .confirm-modal-content .btn-group .btn-batal,
            .confirm-modal-content .btn-group .btn-yakin { padding: 4px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="order-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat menu...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="window.location.href='customer_order.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>
                <div class="logo-header">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/55x55/98C81C/ffffff?text=🍽️'" />
                </div>
                <div class="brand-text">Jangkung<span>Order</span></div>
            </div>
            <div class="header-right">
                <span class="total-display" id="headerTotal" onclick="showTotalToast()">Rp 0</span>
                <button class="btn-cart" onclick="scrollToCart()">
                    <span>🛒</span>
                    <span class="badge" id="headerCartCount">0</span>
                </button>
                <button class="btn-selesai" onclick="checkout()"><span>Selesai</span></button>
            </div>
        </div>

        <!-- ===== SEARCH ===== -->
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="mau pesan apa hari ini?" oninput="searchMenu()">
            </div>
        </div>

        <!-- ===== CATEGORY TABS ===== -->
        <div class="category-tabs" id="categoryTabs">
            <button class="tab active" data-category="all" onclick="filterCategory('all')">Semua</button>
            <button class="tab" data-category="Makanan" onclick="filterCategory('Makanan')">Makanan</button>
            <button class="tab" data-category="Tambahan" onclick="filterCategory('Tambahan')">Tambahan</button>
            <button class="tab" data-category="Minuman" onclick="filterCategory('Minuman')">Minuman</button>
            <button class="tab" data-category="Jangkung Kopi" onclick="filterCategory('Jangkung Kopi')">Jangkung Kopi</button>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="content-area" id="contentArea">
            <div id="menuList"></div>
            <div id="cartSection"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let menuItems = [];
        let cart = JSON.parse(localStorage.getItem('customer_cart')) || [];
        let searchQuery = '';
        let currentCategory = 'all';

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        function showTotalToast() {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            if (cart.length === 0) {
                showToast('🛒 Keranjang kosong! Yuk pesan dulu!');
            } else {
                const count = cart.reduce((s, i) => s + i.qty, 0);
                showToast(`💰 Total: Rp ${total.toLocaleString()} (${count} item)`);
            }
        }

        function scrollToCart() {
            const cartSection = document.getElementById('cartSection');
            if (cartSection) {
                cartSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            if (cart.length === 0) {
                showToast('🛒 Keranjang kosong! Yuk pesan dulu!');
            }
        }

        function updateHeader() {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('headerTotal').textContent = 'Rp ' + total.toLocaleString();
            document.getElementById('headerCartCount').textContent = count;
        }

        async function loadMenu() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, status_ketersediaan, kategori, gambar, detail, varian')
                    .eq('status_ketersediaan', 'Tersedia')
                    .order('kategori')
                    .order('nama_menu');

                if (error) throw error;

                if (data && data.length > 0) {
                    menuItems = data.map(item => {
                        let variants = [];
                        if (item.varian) {
                            try { variants = typeof item.varian === 'string' ? JSON.parse(item.varian) : item.varian; } catch (e) { variants = []; }
                        }
                        if (!variants || variants.length === 0) { variants = [{ name: 'Standar', price: 0 }]; }
                        return {
                            id: item.id_menu,
                            name: item.nama_menu,
                            price: item.harga,
                            category: item.kategori || 'Lainnya',
                            status: item.status_ketersediaan,
                            image_url: item.gambar || null,
                            description: item.detail || '',
                            variants: variants
                        };
                    });
                } else {
                    menuItems = [];
                }
                renderAll();
            } catch (error) {
                console.error('Error loading menu:', error);
                showToast('⚠️ Gagal memuat menu');
            } finally {
                loading.classList.remove('active');
            }
        }

        function searchMenu() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.toLowerCase().trim();
            renderMenuList();
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderMenuList();
        }

        function renderAll() {
            renderMenuList();
            renderCart();
            updateHeader();
        }

        function renderMenuList() {
            const container = document.getElementById('menuList');
            container.innerHTML = '';

            let filtered = menuItems;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(item => item.category === currentCategory);
            }

            if (searchQuery) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(searchQuery) ||
                    (item.description && item.description.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">${searchQuery ? '🔍 Tidak ada menu yang cocok' : 'Belum ada menu tersedia'}</div>`;
                return;
            }

            const grouped = {};
            const categoryOrder = ['Makanan', 'Tambahan', 'Minuman', 'Jangkung Kopi'];
            filtered.forEach(item => {
                const cat = item.category || 'Lainnya';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });

            for (const cat of categoryOrder) {
                if (grouped[cat] && grouped[cat].length > 0) {
                    container.innerHTML += `<div class="menu-section-title">${cat}</div>`;
                    grouped[cat].forEach(item => {
                        let imageUrl = 'https://placehold.co/100x100/2d2d2d/ffffff?text=' + encodeURIComponent(item.name);
                        if (item.image_url) {
                            const url = getImageUrl(item.image_url);
                            if (url) imageUrl = url;
                        }

                        const hasVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item.variants[0].name === 'Standar');
                        const cartItem = cart.find(c => c.id === item.id && c.variant === 'Standar');
                        const qty = cartItem ? cartItem.qty : 0;

                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerHTML = `
                            <div class="item-left">
                                <img class="item-img" src="${imageUrl}" alt="${item.name}" loading="lazy" onerror="this.src='https://placehold.co/100x100/2d2d2d/ffffff?text=Menu'" />
                                <div class="item-info">
                                    <div class="item-name">${item.name} ${hasVariants ? '<span class="variant-badge">📌 Varian</span>' : ''}</div>
                                    <div class="item-price">Rp ${item.price.toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="item-actions">
                                ${hasVariants ? `
                                    <button class="btn-detail" onclick="openVariantModal(${item.id})">Pilih</button>
                                ` : `
                                    <button class="btn-minus" onclick="updateCart(${item.id}, -1, '${item.name.replace(/'/g, "\\'")}', ${item.price}, 'Standar')">−</button>
                                    <input type="number" class="qty-input" id="qty_${item.id}" value="${qty}" min="0" onchange="onCartChange(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price}, 'Standar', this.value)" onfocus="this.select()">
                                    <button class="btn-plus" onclick="updateCart(${item.id}, 1, '${item.name.replace(/'/g, "\\'")}', ${item.price}, 'Standar')">+</button>
                                `}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            }
        }

        function updateCart(id, change, name, price, variant) {
            const input = document.getElementById(`qty_${id}`);
            if (input) {
                let currentQty = parseInt(input.value) || 0;
                let newQty = currentQty + change;
                if (newQty < 0) newQty = 0;
                input.value = newQty;

                const existing = cart.find(item => item.id === id && item.variant === variant);
                if (newQty <= 0) {
                    if (existing) { const index = cart.indexOf(existing); cart.splice(index, 1); }
                } else {
                    if (existing) { existing.qty = newQty; } else { cart.push({ id, name, price, qty: newQty, variant: variant }); }
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                renderAll();
                if (change > 0 && newQty > 0) { showToast(`✅ ${name} x${newQty}`); }
            }
        }

        function onCartChange(id, name, price, variant, value) {
            const qty = parseInt(value) || 0;
            const existing = cart.find(item => item.id === id && item.variant === variant);
            if (qty <= 0) {
                if (existing) { const index = cart.indexOf(existing); cart.splice(index, 1); }
            } else {
                if (existing) { existing.qty = qty; } else { cart.push({ id, name, price, qty, variant: variant }); }
            }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            renderAll();
        }

        function openVariantModal(id) {
            const item = menuItems.find(m => m.id === id);
            if (!item) return;

            const modal = document.createElement('div');
            modal.className = 'variant-modal';
            let selectedVariant = item.variants[0];
            let qty = 1;

            modal.innerHTML = `
                <div class="variant-modal-content">
                    <div class="modal-header">
                        <h2>${item.name}</h2>
                        <button class="close-modal" onclick="this.closest('.variant-modal').remove()">✕</button>
                    </div>
                    <div class="modal-subtitle">Pilih varian:</div>
                    <div class="variant-options" id="variantOptions">
                        ${item.variants.map((v, i) => `
                            <button class="variant-opt ${i === 0 ? 'active' : ''}" data-price="${v.price}" data-name="${v.name}">
                                ${v.name} ${v.price > 0 ? '(+Rp ' + v.price.toLocaleString() + ')' : ''}
                            </button>
                        `).join('')}
                    </div>
                    <div class="qty-section">
                        <span>Jumlah:</span>
                        <button class="qty-btn minus" id="modalMinus">−</button>
                        <span class="qty-number" id="modalQty">1</span>
                        <button class="qty-btn plus" id="modalPlus">+</button>
                    </div>
                    <button class="btn-add-modal" id="modalAdd">TAMBAH</button>
                </div>
            `;
            document.body.appendChild(modal);

            modal.querySelectorAll('.variant-opt').forEach(btn => {
                btn.addEventListener('click', function() {
                    modal.querySelectorAll('.variant-opt').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedVariant = { name: this.dataset.name, price: parseInt(this.dataset.price) };
                });
            });

            modal.querySelector('#modalMinus').addEventListener('click', () => {
                if (qty > 1) { qty--; modal.querySelector('#modalQty').textContent = qty; }
            });
            modal.querySelector('#modalPlus').addEventListener('click', () => {
                qty++; modal.querySelector('#modalQty').textContent = qty;
            });

            modal.querySelector('#modalAdd').addEventListener('click', function() {
                const finalPrice = item.price + selectedVariant.price;
                const variantName = selectedVariant.name;
                const displayName = item.name + (variantName !== 'Standar' ? ' (' + variantName + ')' : '');
                const existing = cart.find(c => c.id === item.id && c.variant === variantName);
                if (existing) { existing.qty += qty; } else {
                    cart.push({ id: item.id, name: displayName, price: finalPrice, qty: qty, variant: variantName });
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                modal.remove();
                renderAll();
                showToast(`✅ ${displayName} x${qty} ditambahkan!`);
            });

            modal.addEventListener('click', function(e) {
                if (e.target === this) { this.remove(); }
            });
        }

        function renderCart() {
            const container = document.getElementById('cartSection');
            if (cart.length === 0) {
                container.innerHTML = `<div class="cart-section" id="cartSection"><div class="cart-title">🛒 Keranjang</div><div class="empty-cart">Belum ada pesanan</div></div>`;
                return;
            }
            let html = `<div class="cart-section" id="cartSection"><div class="cart-title">🛒 Keranjang (${cart.reduce((s, i) => s + i.qty, 0)} item)</div>`;
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-price">Rp ${(item.price * item.qty).toLocaleString()}</span>
                        </div>
                        <div class="item-actions">
                            <button class="btn-minus" onclick="updateCartQty(${index}, -1)">−</button>
                            <span class="qty-display">${item.qty}</span>
                            <button class="btn-plus" onclick="updateCartQty(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            html += `
                <div class="cart-total"><span class="total-label">💰 Total</span><span class="total-amount">Rp ${total.toLocaleString()}</span></div>
            </div>`;
            container.innerHTML = html;
        }

        function updateCartQty(index, change) {
            if (cart[index].qty + change <= 0) { cart.splice(index, 1); } else { cart[index].qty += change; }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            renderAll();
        }

        // ============ CHECKOUT ============
        function checkout() {
            if (cart.length === 0) {
                showToast('⚠️ Belum ada pesanan!');
                return;
            }

            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);

            modal.innerHTML = `
                <div class="confirm-modal-content">
                    <div class="icon-big">🍽️</div>
                    <div class="title">Pesanan Siap Dikirim!</div>
                    <div class="sub">Dapur akan segera memproses pesanan Anda</div>
                    <div class="order-summary">
                        ${cart.map(item => `${item.name} <strong>x${item.qty}</strong>`).join('<br>')}
                        <br><br>
                        Total: <span class="total">Rp ${total.toLocaleString()}</span> (${count} item)
                    </div>
                    <div class="btn-group">
                        <button class="btn-batal" onclick="this.closest('.confirm-modal').remove()">Batal</button>
                        <button class="btn-yakin" onclick="proceedCheckout(this)">Kirim Pesanan</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            modal.addEventListener('click', function(e) {
                if (e.target === this) { this.remove(); }
            });
        }

        async function proceedCheckout(btn) {
            const modal = btn.closest('.confirm-modal');
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            modal.remove();

            try {
                const meja = parseInt(getMeja());
                const nama = getNama();
                const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

                // Insert order - tanpa customer_name (gunakan meja saja)
                const { data: orderData, error: orderError } = await supabaseClient
                    .from('orders')
                    .insert({ 
                        meja: meja, 
                        total_amount: total, 
                        status: 'pending' 
                    })
                    .select('no_struk')
                    .single();

                if (orderError) throw orderError;
                const noStruk = orderData.no_struk;

                // Insert order details dengan nama
                const details = cart.map(item => ({
                    no_struk: noStruk,
                    menu_id: item.id,
                    menu_name: item.name,
                    nama: nama,
                    quantity: item.qty,
                    price: item.price,
                    subtotal: item.price * item.qty,
                    varian: item.variant || null
                }));

                const { error: detailError } = await supabaseClient
                    .from('order_details')
                    .insert(details);

                if (detailError) throw detailError;

                cart = [];
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                renderAll();

                showToast(`✅ Pesanan berhasil dikirim! No. Struk: ${noStruk}`);

                setTimeout(() => {
                    window.location.href = 'customer_order_status.html?meja=' + meja + '&nama=' + encodeURIComponent(nama);
                }, 1500);

            } catch (error) {
                console.error('Error checkout:', error);
                showToast('⚠️ Gagal mengirim pesanan. Silakan coba lagi.');
            } finally {
                loading.classList.remove('active');
            }
        }

        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>
</html>
