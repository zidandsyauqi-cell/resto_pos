<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pesan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .order-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        .deco-bg img {
            position: absolute;
            opacity: 0.12;
        }
        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }
        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 15px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(28px, 4%, 45px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }
        .logo-header img {
            width: clamp(40px, 7%, 70px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .brand-text {
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .brand-text span { color: #98C81C; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-total {
            background: #029BEE;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-total:hover { transform: scale(1.05); }
        .btn-total span {
            color: white;
            font-size: clamp(12px, 1.8%, 20px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }
        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-selesai:hover { transform: scale(1.05); }
        .btn-selesai span {
            color: white;
            font-size: clamp(12px, 1.8%, 20px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        /* ===== SEARCH ===== */
        .search-wrapper {
            position: absolute;
            top: 75px;
            left: 0;
            right: 0;
            z-index: 9;
            padding: 0 30px;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 3px solid white;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within { border-color: #98C81C; background: rgba(255,255,255,0.15); }
        .search-box .search-icon {
            color: rgba(255,255,255,0.6);
            font-size: clamp(18px, 2%, 24px);
            flex-shrink: 0;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }

        /* ===== CONTENT ===== */
        .content-area {
            position: absolute;
            top: 155px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px 30px 20px 30px;
            overflow-y: auto;
            z-index: 5;
        }
        .content-area::-webkit-scrollbar { width: 4px; }
        .content-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .content-area::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }

        /* ===== MENU ITEM ===== */
        .menu-section-title {
            color: white;
            font-size: clamp(32px, 7%, 75px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin: 10px 0 5px 0;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            min-height: 55px;
        }
        .menu-item:last-child { border-bottom: none; }

        .menu-item .item-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }
        .menu-item .item-left .item-img {
            width: clamp(50px, 10%, 110px);
            height: clamp(50px, 10%, 110px);
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }
        .menu-item .item-left .item-info {
            min-width: 0;
        }
        .menu-item .item-left .item-name {
            color: white;
            font-size: clamp(16px, 3.5%, 40px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .menu-item .item-left .item-price {
            color: white;
            font-size: clamp(14px, 3%, 35px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .menu-item .item-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-tambah {
            padding: 6px 20px;
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            font-size: clamp(14px, 3%, 32px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-tambah:hover { background: #7aa814; transform: scale(1.05); }
        .btn-tambah:active { transform: scale(0.95); }

        .btn-detail {
            padding: 6px 16px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 2.5%, 28px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-detail:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }

        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.4);
            padding: 30px 0;
            font-size: clamp(16px, 3%, 35px);
            font-family: 'Schoolbell', cursive;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(14px, 1.8%, 22px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(50px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width: 767px) {
            .order-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .header-top { padding: 10px 14px 8px 14px; }
            .search-wrapper { top: 65px; padding: 0 16px; }
            .search-box { padding: 8px 14px; }
            .search-box input { font-size: 14px; }
            .content-area { top: 135px; padding: 8px 16px 15px 16px; }
            .menu-item { padding: 8px 0; min-height: 40px; }
            .btn-tambah { padding: 4px 14px; font-size: 13px; }
            .btn-detail { padding: 4px 10px; font-size: 11px; }
        }
        @media screen and (max-width: 480px) {
            .order-container { border-radius: 10px; }
            .header-top { padding: 8px 10px 6px 10px; }
            .search-wrapper { top: 58px; padding: 0 10px; }
            .search-box { padding: 6px 10px; border-width: 2px; }
            .search-box input { font-size: 12px; }
            .search-box .search-icon { font-size: 14px; }
            .content-area { top: 118px; padding: 6px 10px 10px 10px; }
            .menu-item { padding: 6px 0; min-height: 32px; gap: 8px; }
            .menu-item .item-left .item-img { width: 40px; height: 40px; border-radius: 8px; }
            .menu-item .item-left .item-name { font-size: 13px; }
            .menu-item .item-left .item-price { font-size: 12px; }
            .btn-tambah { padding: 3px 10px; font-size: 11px; }
            .btn-detail { padding: 3px 8px; font-size: 9px; }
            .btn-total span, .btn-selesai span { font-size: 10px; }
            .btn-total { padding: 4px 10px; }
            .btn-selesai { padding: 4px 10px; }
            .brand-text { font-size: 13px; }
            .logo-header img { width: 30px; }
            .btn-back { font-size: 20px; }
        }
        @media screen and (max-width: 360px) {
            .menu-item .item-left .item-name { font-size: 11px; }
            .menu-item .item-left .item-price { font-size: 10px; }
            .btn-tambah { font-size: 9px; padding: 2px 8px; }
            .btn-detail { font-size: 8px; padding: 2px 6px; }
            .search-box input { font-size: 10px; }
            .brand-text { font-size: 11px; }
            .logo-header img { width: 25px; }
        }
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .order-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 15px; }
        }
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .order-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 10px; }
            .header-top { padding: 5px 10px 3px 10px; }
            .search-wrapper { top: 45px; padding: 0 10px; }
            .search-box { padding: 4px 10px; }
            .search-box input { font-size: 11px; }
            .content-area { top: 95px; padding: 4px 10px 8px 10px; }
            .menu-item { padding: 4px 0; min-height: 28px; }
            .menu-item .item-left .item-img { width: 30px; height: 30px; }
            .menu-item .item-left .item-name { font-size: 11px; }
            .menu-item .item-left .item-price { font-size: 10px; }
            .btn-tambah { padding: 2px 8px; font-size: 10px; }
            .btn-detail { padding: 2px 6px; font-size: 8px; }
            .btn-total span, .btn-selesai span { font-size: 9px; }
            .btn-total { padding: 3px 8px; }
            .btn-selesai { padding: 3px 8px; }
        }
    </style>
</head>
<body>
    <div class="order-container">
        <div class="bg-utama"></div>
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat menu...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="window.location.href='customer_order.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>
                <div class="logo-header">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/70x70/98C81C/ffffff?text=🍽️'" />
                </div>
                <div class="brand-text">Jangkung<span>Order</span></div>
            </div>
            <div class="header-actions">
                <button class="btn-total" onclick="showTotal()"><span>Total</span></button>
                <button class="btn-selesai" onclick="checkout()"><span>Selesai</span></button>
            </div>
        </div>

        <!-- ===== SEARCH ===== -->
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="mau pesan apa hari ini?" oninput="searchMenu()">
            </div>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="content-area" id="contentArea">
            <div id="menuList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let menuItems = [];
        let cart = JSON.parse(localStorage.getItem('customer_cart')) || [];
        let searchQuery = '';
        let currentCategory = '';

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        async function loadMenu() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, status_ketersediaan, kategori, gambar, detail, varian')
                    .eq('status_ketersediaan', 'Tersedia')
                    .order('kategori')
                    .order('nama_menu');

                if (error) throw error;

                if (data && data.length > 0) {
                    menuItems = data.map(item => {
                        let variants = [];
                        if (item.varian) {
                            try { variants = typeof item.varian === 'string' ? JSON.parse(item.varian) : item.varian; } catch (e) { variants = []; }
                        }
                        if (!variants || variants.length === 0) { variants = [{ name: 'Standar', price: 0 }]; }
                        return {
                            id: item.id_menu,
                            name: item.nama_menu,
                            price: item.harga,
                            category: item.kategori || 'Lainnya',
                            status: item.status_ketersediaan,
                            image_url: item.gambar || null,
                            description: item.detail || '',
                            variants: variants
                        };
                    });
                } else {
                    menuItems = [];
                }
                renderMenuList();
            } catch (error) {
                console.error('Error loading menu:', error);
                showToast('⚠️ Gagal memuat menu');
            } finally {
                loading.classList.remove('active');
            }
        }

        function searchMenu() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.toLowerCase().trim();
            renderMenuList();
        }

        function renderMenuList() {
            const container = document.getElementById('menuList');
            container.innerHTML = '';

            let filtered = menuItems;

            if (searchQuery) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(searchQuery) ||
                    (item.description && item.description.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">${searchQuery ? '🔍 Tidak ada menu yang cocok' : 'Belum ada menu tersedia'}</div>`;
                return;
            }

            // Group by category
            const grouped = {};
            const categoryOrder = ['Makanan', 'Tambahan', 'Minuman', 'Jangkung Kopi', 'Kopi', 'Lainnya'];
            filtered.forEach(item => {
                const cat = item.category || 'Lainnya';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });

            for (const cat of categoryOrder) {
                if (grouped[cat] && grouped[cat].length > 0) {
                    container.innerHTML += `<div class="menu-section-title">${cat}</div>`;
                    grouped[cat].forEach(item => {
                        let imageUrl = 'https://placehold.co/110x110/2d2d2d/ffffff?text=' + encodeURIComponent(item.name);
                        if (item.image_url) {
                            const url = getImageUrl(item.image_url);
                            if (url) imageUrl = url;
                        }

                        const hasVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item.variants[0].name === 'Standar');

                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerHTML = `
                            <div class="item-left">
                                <img class="item-img" src="${imageUrl}" alt="${item.name}" loading="lazy" onerror="this.src='https://placehold.co/110x110/2d2d2d/ffffff?text=Menu'" />
                                <div class="item-info">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">Rp ${item.price.toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="item-right">
                                <button class="btn-detail" onclick="goToDetail(${item.id})">detail</button>
                                <button class="btn-tambah" onclick="addToCart(${item.id})">tambah</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            }
        }

        function goToDetail(id) {
            const meja = getMeja();
            const nama = encodeURIComponent(getNama());
            window.location.href = 'customer_menu_detail.html?meja=' + meja + '&nama=' + nama + '&id=' + id;
        }

        function addToCart(id) {
            const item = menuItems.find(m => m.id === id);
            if (!item) { showToast('⚠️ Menu tidak ditemukan'); return; }

            // Check if item has variants
            const hasVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item.variants[0].name === 'Standar');

            if (hasVariants) {
                // Open variant modal
                openVariantModal(item);
                return;
            }

            // No variants, add directly
            const existing = cart.find(c => c.id === item.id && c.variant === 'Standar');
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ id: item.id, name: item.name, price: item.price, qty: 1, variant: 'Standar' });
            }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            showToast(`✅ ${item.name} x1 ditambahkan!`);
        }

        function openVariantModal(item) {
            const modal = document.createElement('div');
            modal.className = 'variant-modal';
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(5px);';
            
            let selectedVariant = item.variants[0];
            let qty = 1;

            modal.innerHTML = `
                <div style="background:rgba(20,20,20,0.95);padding:25px;border-radius:20px;max-width:400px;width:90%;border:2px solid #98C81C;max-height:90vh;overflow-y:auto;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h2 style="color:white;font-family:'Poppins',sans-serif;font-size:22px;">${item.name}</h2>
                        <button onclick="this.closest('.variant-modal').remove()" style="background:none;border:none;color:white;font-size:28px;cursor:pointer;">✕</button>
                    </div>
                    <div style="color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:12px;">Pilih varian:</div>
                    <div id="variantOptions" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">
                        ${item.variants.map((v, i) => `
                            <button class="variant-opt" data-price="${v.price}" data-name="${v.name}" style="padding:10px 18px;border-radius:50px;border:2px solid rgba(255,255,255,0.3);background:${i === 0 ? 'rgba(152,200,28,0.3)' : 'rgba(255,255,255,0.1)'};color:white;font-size:16px;cursor:pointer;font-family:'Schoolbell',cursive;transition:all 0.3s;${i === 0 ? 'border-color:#98C81C;' : ''}">
                                ${v.name} ${v.price > 0 ? '(+Rp ' + v.price.toLocaleString() + ')' : ''}
                            </button>
                        `).join('')}
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                        <span style="color:white;font-family:'Schoolbell',cursive;font-size:16px;">Jumlah:</span>
                        <button id="modalMinus" style="width:32px;height:32px;border-radius:50%;border:none;font-size:18px;cursor:pointer;background:#e74c3c;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;">−</button>
                        <span id="modalQty" style="color:white;font-size:22px;font-weight:600;min-width:35px;text-align:center;">1</span>
                        <button id="modalPlus" style="width:32px;height:32px;border-radius:50%;border:none;font-size:18px;cursor:pointer;background:#98C81C;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;">+</button>
                    </div>
                    <button id="modalAdd" style="width:100%;padding:12px;background:#98C81C;border:2px solid white;border-radius:100px;color:white;font-size:20px;font-family:'Schoolbell',cursive;cursor:pointer;">TAMBAH</button>
                </div>
            `;
            document.body.appendChild(modal);

            // Variant selection
            modal.querySelectorAll('.variant-opt').forEach(btn => {
                btn.addEventListener('click', function() {
                    modal.querySelectorAll('.variant-opt').forEach(b => {
                        b.style.background = 'rgba(255,255,255,0.1)';
                        b.style.borderColor = 'rgba(255,255,255,0.3)';
                    });
                    this.style.background = 'rgba(152,200,28,0.3)';
                    this.style.borderColor = '#98C81C';
                    selectedVariant = { name: this.dataset.name, price: parseInt(this.dataset.price) };
                });
            });

            // Qty controls
            modal.querySelector('#modalMinus').addEventListener('click', () => {
                if (qty > 1) { qty--; modal.querySelector('#modalQty').textContent = qty; }
            });
            modal.querySelector('#modalPlus').addEventListener('click', () => {
                qty++; modal.querySelector('#modalQty').textContent = qty;
            });

            // Add to cart
            modal.querySelector('#modalAdd').addEventListener('click', function() {
                const finalPrice = item.price + selectedVariant.price;
                const variantName = selectedVariant.name;
                const displayName = item.name + (variantName !== 'Standar' ? ' (' + variantName + ')' : '');
                const existing = cart.find(c => c.id === item.id && c.variant === variantName);
                if (existing) { existing.qty += qty; } else {
                    cart.push({ id: item.id, name: displayName, price: finalPrice, qty: qty, variant: variantName });
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                modal.remove();
                showToast(`✅ ${displayName} x${qty} ditambahkan!`);
            });

            modal.addEventListener('click', function(e) {
                if (e.target === this) { this.remove(); }
            });
        }

        function showTotal() {
            if (cart.length === 0) { showToast('⚠️ Belum ada pesanan!'); return; }
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const items = cart.reduce((s, i) => s + i.qty, 0);
            showToast(`💰 Total: Rp ${total.toLocaleString()} (${items} item)`);
        }

        async function checkout() {
            if (cart.length === 0) { showToast('⚠️ Belum ada pesanan!'); return; }
            if (!confirm('Yakin ingin menyelesaikan pesanan dan mengirim ke kasir?')) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const meja = parseInt(getMeja());
                const nama = getNama();
                const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

                const { data: orderData, error: orderError } = await supabaseClient
                    .from('orders')
                    .insert({ meja: meja, customer_name: nama, total_amount: total, status: 'pending' })
                    .select('no_struk')
                    .single();

                if (orderError) throw orderError;
                const noStruk = orderData.no_struk;

                const details = cart.map(item => ({
                    no_struk: noStruk,
                    menu_id: item.id,
                    menu_name: item.name,
                    nama: nama,
                    quantity: item.qty,
                    price: item.price,
                    subtotal: item.price * item.qty,
                    varian: item.variant || null
                }));

                const { error: detailError } = await supabaseClient
                    .from('order_details')
                    .insert(details);

                if (detailError) throw detailError;

                cart = [];
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                showToast(`✅ Pesanan berhasil dikirim! No. Struk: ${noStruk}`);
                renderMenuList();

            } catch (error) {
                console.error('Error checkout:', error);
                showToast('⚠️ Gagal mengirim pesanan. Silakan coba lagi.');
            } finally {
                loading.classList.remove('active');
            }
        }

        // Save meja & nama
        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>
</html>
