<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pesan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        body {
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .order-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER - FIX UNTUK SAFARI ===== */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 16px 12px 10px 12px;
            /* tambahan padding atas */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            min-height: 64px;
            /* lebih tinggi */
            height: auto;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            /* lebih besar */
            cursor: pointer;
            transition: all 0.3s;
            padding: 6px 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
        }
        .logo-header img {
            width: 36px;
            /* lebih besar */
            height: auto;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }
        .brand-text {
            color: white;
            font-size: 18px;
            /* lebih besar */
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }
        .brand-text span {
            color: #98C81C;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .total-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #98C81C;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 36px;
            display: flex;
            align-items: center;
        }
        .total-display:active {
            transform: scale(0.95);
        }
        .btn-cart {
            background: #98C81C;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 36px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-cart:active {
            transform: scale(0.95);
        }
        .btn-cart span {
            color: white;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }
        .btn-cart .badge {
            background: white;
            color: #98C81C;
            border-radius: 50%;
            padding: 0 6px;
            font-size: 12px;
            font-weight: 700;
            min-width: 22px;
            text-align: center;
        }
        .btn-selesai {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 16px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 36px;
            display: flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-selesai:active {
            transform: scale(0.95);
        }
        .btn-selesai span {
            color: white;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        /* ===== SEARCH ===== */
        .search-wrapper {
            position: absolute;
            top: 76px;
            /* turun lebih jauh */
            left: 0;
            right: 0;
            z-index: 9;
            padding: 0 16px;
        }
        .search-box {
            width: 100%;
            padding: 10px 16px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: #98C81C;
            background: rgba(255, 255, 255, 0.15);
        }
        .search-box .search-icon {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            flex-shrink: 0;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
            -webkit-appearance: none;
            min-height: 36px;
        }
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* ===== CATEGORY TABS ===== */
        .category-tabs {
            position: absolute;
            top: 126px;
            /* turun lebih jauh */
            left: 0;
            right: 0;
            z-index: 8;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 12px 10px 12px;
            background: rgba(0, 0, 0, 0.7);
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-overflow-scrolling: touch;
        }
        .category-tabs::-webkit-scrollbar {
            display: none;
        }
        .category-tabs .tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            min-height: 36px;
            display: flex;
            align-items: center;
        }
        .category-tabs .tab:active {
            transform: scale(0.95);
        }
        .category-tabs .tab.active {
            background: #98C81C;
            border-color: #98C81C;
            color: white;
        }

        /* ===== CONTENT ===== */
        .content-area {
            position: absolute;
            top: 170px;
            /* turun lebih jauh */
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px 12px 12px 12px;
            overflow-y: auto;
            z-index: 5;
            -webkit-overflow-scrolling: touch;
        }
        .content-area::-webkit-scrollbar {
            width: 3px;
        }
        .content-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        /* ===== CART SECTION ===== */
        .cart-section {
            margin-top: 8px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding-top: 6px;
            scroll-margin-top: 10px;
        }
        .cart-section .cart-title {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 3px;
            gap: 6px;
            min-height: 32px;
        }
        .cart-item .item-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .cart-item .item-info .item-name {
            color: white;
            font-size: 12px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-item .item-info .item-price {
            color: #98C81C;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 4px;
        }
        .cart-item .item-actions {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .cart-item .item-actions .btn-minus {
            width: 18px;
            height: 18px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-item .item-actions .btn-minus:active {
            transform: scale(0.9);
        }
        .cart-item .item-actions .qty-display {
            color: white;
            font-size: 12px;
            font-weight: 600;
            min-width: 16px;
            text-align: center;
        }
        .cart-item .item-actions .btn-plus {
            width: 18px;
            height: 18px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-item .item-actions .btn-plus:active {
            transform: scale(0.9);
        }

        .cart-total {
            padding: 4px 10px;
            background: rgba(152, 200, 28, 0.15);
            border-radius: 8px;
            border: 2px solid #98C81C;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            min-height: 36px;
        }
        .cart-total .total-label {
            color: white;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .cart-total .total-amount {
            color: #98C81C;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        .empty-cart {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            padding: 6px 0;
            font-size: 11px;
            font-family: 'Schoolbell', cursive;
        }

        /* ===== MENU ===== */
        .menu-section-title {
            color: white;
            font-size: 20px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin: 6px 0 4px 0;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            gap: 6px;
            min-height: 36px;
        }
        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item .item-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .menu-item .item-left .item-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
        }
        .menu-item .item-left .item-info {
            min-width: 0;
        }
        .menu-item .item-left .item-name {
            color: white;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .menu-item .item-left .item-price {
            color: white;
            font-size: 12px;
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .menu-item .item-left .variant-badge {
            font-size: 8px;
            color: #98C81C;
            background: rgba(152, 200, 28, 0.15);
            padding: 1px 6px;
            border-radius: 50px;
            display: inline-block;
            margin-left: 4px;
            white-space: nowrap;
        }

        .menu-item .item-actions {
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        .menu-item .item-actions .btn-minus {
            width: 24px;
            height: 24px;
            background: #e74c3c;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .menu-item .item-actions .btn-minus:active {
            transform: scale(0.9);
        }
        .menu-item .item-actions .qty-input {
            width: 26px;
            padding: 1px 2px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 12px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            -webkit-appearance: none;
        }
        .menu-item .item-actions .qty-input:focus {
            border-color: #98C81C;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
        }
        .menu-item .item-actions .qty-input::-webkit-inner-spin-button,
        .menu-item .item-actions .qty-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .menu-item .item-actions .qty-input[type=number] {
            -moz-appearance: textfield;
        }
        .menu-item .item-actions .btn-plus {
            width: 24px;
            height: 24px;
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .menu-item .item-actions .btn-plus:active {
            transform: scale(0.9);
        }
        .menu-item .item-actions .btn-detail {
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 9px;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            min-height: 24px;
            display: flex;
            align-items: center;
        }
        .menu-item .item-actions .btn-detail:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 20px 0;
            font-size: 18px;
            font-family: 'Schoolbell', cursive;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: 14px;
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            display: block;
        }
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .loading-text {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        /* ===== VARIANT MODAL ===== */
        .variant-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        .variant-modal-content {
            background: rgba(30, 30, 30, 0.95);
            padding: 20px 24px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            border: 2px solid #98C81C;
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .variant-modal-content .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 6px;
        }
        .variant-modal-content .modal-header h2 {
            color: #98C81C;
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }
        .variant-modal-content .modal-header .close-modal {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0 5px;
            min-width: 36px;
            min-height: 36px;
        }
        .variant-modal-content .modal-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            margin-bottom: 8px;
            text-align: center;
        }
        .variant-modal-content .variant-options {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
            justify-content: center;
        }
        .variant-modal-content .variant-opt {
            padding: 6px 14px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            font-family: 'Schoolbell', cursive;
            transition: all 0.3s;
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        .variant-modal-content .variant-opt.active {
            border-color: #98C81C;
            background: rgba(152, 200, 28, 0.2);
            color: #98C81C;
        }
        .variant-modal-content .qty-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 6px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .variant-modal-content .qty-section span {
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Schoolbell', cursive;
            font-size: 15px;
        }
        .variant-modal-content .qty-section .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            transition: all 0.3s;
        }
        .variant-modal-content .qty-section .qty-btn.minus {
            background: #e74c3c;
            color: white;
        }
        .variant-modal-content .qty-section .qty-btn.plus {
            background: #98C81C;
            color: white;
        }
        .variant-modal-content .qty-section .qty-btn:active {
            transform: scale(0.9);
        }
        .variant-modal-content .qty-section .qty-number {
            color: white;
            font-size: 20px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }
        .variant-modal-content .btn-add-modal {
            width: 100%;
            padding: 8px;
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            font-size: 17px;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 40px;
        }
        .variant-modal-content .btn-add-modal:active {
            transform: scale(0.97);
        }

        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;

<body>
    <div class="order-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat menu...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/30x30/98C81C/ffffff?text=🍽️'" />
                    <span class="brand-text">Jangkung<span>Order</span></span>
                </div>
            </div>
            <div class="header-right">
                <span class="total-display" id="headerTotal" onclick="showTotalToast()">Rp 0</span>
                <button class="btn-cart" onclick="scrollToCart()">
                    <span>🛒</span>
                    <span class="badge" id="headerCartCount">0</span>
                </button>
                <button class="btn-selesai" onclick="checkout()"><span>Selesai</span></button>
            </div>
        </div>

        <!-- ===== SEARCH ===== -->
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="mau pesan apa hari ini?" oninput="searchMenu()">
            </div>
        </div>

        <!-- ===== CATEGORY TABS ===== -->
        <div class="category-tabs" id="categoryTabs">
            <button class="tab active" data-category="all" onclick="filterCategory('all')">Semua</button>
            <button class="tab" data-category="Makanan" onclick="filterCategory('Makanan')">Makanan</button>
            <button class="tab" data-category="Tambahan" onclick="filterCategory('Tambahan')">Tambahan</button>
            <button class="tab" data-category="Minuman" onclick="filterCategory('Minuman')">Minuman</button>
            <button class="tab" data-category="Jangkung Kopi" onclick="filterCategory('Jangkung Kopi')">Jangkung Kopi</button>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="content-area" id="contentArea">
            <div id="menuList"></div>
            <div id="cartSection"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let menuItems = [];
        let cart = JSON.parse(localStorage.getItem('customer_cart')) || [];
        let searchQuery = '';
        let currentCategory = 'all';
        let tableIdMap = {};

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function goToDashboard() {
            const meja = getMeja();
            const nama = encodeURIComponent(getNama());
            window.location.href = 'customer_order.html?meja=' + meja + '&nama=' + nama;
        }

        function goBack() {
            window.history.back();
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        function showTotalToast() {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            if (cart.length === 0) {
                showToast('🛒 Keranjang kosong! Yuk pesan dulu!');
            } else {
                const count = cart.reduce((s, i) => s + i.qty, 0);
                showToast(`💰 Total: Rp ${total.toLocaleString()} (${count} item)`);
            }
        }

        function scrollToCart() {
            const cartSection = document.getElementById('cartSection');
            if (cartSection) {
                cartSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            if (cart.length === 0) {
                showToast('🛒 Keranjang kosong! Yuk pesan dulu!');
            }
        }

        function updateHeader() {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('headerTotal').textContent = 'Rp ' + total.toLocaleString();
            document.getElementById('headerCartCount').textContent = count;
        }

        async function loadTableIdMap() {
            try {
                const { data, error } = await supabaseClient
                    .from('tables')
                    .select('id_table, nomor_meja');

                if (error) throw error;

                if (data && data.length > 0) {
                    data.forEach(row => {
                        tableIdMap[row.nomor_meja] = row.id_table;
                    });
                }
            } catch (error) {
                console.error('Error loading table map:', error);
            }
        }

        async function loadMenu() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                await loadTableIdMap();

                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, status_ketersediaan, kategori, gambar, detail, varian')
                    .eq('status_ketersediaan', 'Tersedia')
                    .order('kategori')
                    .order('nama_menu');

                if (error) throw error;

                if (data && data.length > 0) {
                    menuItems = data.map(item => {
                        let variants = [];
                        if (item.varian) {
                            try {
                                variants = typeof item.varian === 'string' ? JSON.parse(item.varian) : item.varian;
                            } catch (e) {
                                variants = [];
                            }
                        }
                        if (!variants || variants.length === 0) {
                            variants = [{ name: 'Standar', price: 0 }];
                        }
                        return {
                            id: item.id_menu,
                            name: item.nama_menu,
                            price: item.harga,
                            category: item.kategori || 'Lainnya',
                            status: item.status_ketersediaan,
                            image_url: item.gambar || null,
                            description: item.detail || '',
                            variants: variants
                        };
                    });
                } else {
                    menuItems = [];
                }
                renderAll();
            } catch (error) {
                console.error('Error loading menu:', error);
                showToast('⚠️ Gagal memuat menu');
            } finally {
                loading.classList.remove('active');
            }
        }

        function searchMenu() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.toLowerCase().trim();
            renderMenuList();
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderMenuList();
        }

        function renderAll() {
            renderMenuList();
            renderCart();
            updateHeader();
        }

        function renderMenuList() {
            const container = document.getElementById('menuList');
            container.innerHTML = '';

            let filtered = menuItems;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(item => item.category === currentCategory);
            }

            if (searchQuery) {
                filtered = filtered.filter(item =>
                    item.name.toLowerCase().includes(searchQuery) ||
                    (item.description && item.description.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML =
                    `<div class="empty-state">${searchQuery ? '🔍 Tidak ada menu yang cocok' : 'Belum ada menu tersedia'}</div>`;
                return;
            }

            const grouped = {};
            const categoryOrder = ['Makanan', 'Tambahan', 'Minuman', 'Jangkung Kopi'];
            filtered.forEach(item => {
                const cat = item.category || 'Lainnya';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });

            for (const cat of categoryOrder) {
                if (grouped[cat] && grouped[cat].length > 0) {
                    container.innerHTML += `<div class="menu-section-title">${cat}</div>`;
                    grouped[cat].forEach(item => {
                        let imageUrl = 'https://placehold.co/80x80/2d2d2d/ffffff?text=' + encodeURIComponent(item
                        .name);
                        if (item.image_url) {
                            const url = getImageUrl(item.image_url);
                            if (url) imageUrl = url;
                        }

                        const hasVariants = item.variants && item.variants.length > 0 && !(item.variants
                        .length === 1 && item.variants[0].name === 'Standar');
                        const cartItem = cart.find(c => c.id === item.id && c.variant === 'Standar');
                        const qty = cartItem ? cartItem.qty : 0;

                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerHTML = `
                            <div class="item-left">
                                <img class="item-img" src="${imageUrl}" alt="${item.name}" loading="lazy" onerror="this.src='https://placehold.co/80x80/2d2d2d/ffffff?text=Menu'" />
                                <div class="item-info">
                                    <div class="item-name">${item.name} ${hasVariants ? '<span class="variant-badge">📌 Varian</span>' : ''}</div>
                                    <div class="item-price">Rp ${item.price.toLocaleString()}</div>
                                </div>
                            </div>
                            <div class="item-actions">
                                ${hasVariants ? `
                                    <button class="btn-detail" onclick="openVariantModal(${item.id})">Pilih</button>
                                ` : `
                                    <button class="btn-minus" onclick="updateCart(${item.id}, -1, '${item.name.replace(/'/g, "\\'")}', ${item.price}, 'Standar')">−</button>
                                    <input type="number" class="qty-input" id="qty_${item.id}" value="${qty}" min="0" onchange="onCartChange(${item.id}, '${item.name.replace(/'/g, "\\'")}', ${item.price}, 'Standar', this.value)" onfocus="this.select()">
                                    <button class="btn-plus" onclick="updateCart(${item.id}, 1, '${item.name.replace(/'/g, "\\'")}', ${item.price}, 'Standar')">+</button>
                                `}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            }
        }

        function updateCart(id, change, name, price, variant) {
            const input = document.getElementById(`qty_${id}`);
            if (input) {
                let currentQty = parseInt(input.value) || 0;
                let newQty = currentQty + change;
                if (newQty < 0) newQty = 0;
                input.value = newQty;

                const existing = cart.find(item => item.id === id && item.variant === variant);
                if (newQty <= 0) {
                    if (existing) { const index = cart.indexOf(existing);
                        cart.splice(index, 1); }
                } else {
                    if (existing) { existing.qty = newQty; } else { cart.push({ id, name, price, qty: newQty,
                            variant: variant }); }
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                renderAll();
                if (change > 0 && newQty > 0) { showToast(`✅ ${name} x${newQty}`); }
            }
        }

        function onCartChange(id, name, price, variant, value) {
            const qty = parseInt(value) || 0;
            const existing = cart.find(item => item.id === id && item.variant === variant);
            if (qty <= 0) {
                if (existing) { const index = cart.indexOf(existing);
                    cart.splice(index, 1); }
            } else {
                if (existing) { existing.qty = qty; } else { cart.push({ id, name, price, qty, variant: variant }); }
            }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            renderAll();
        }

        function openVariantModal(id) {
            const item = menuItems.find(m => m.id === id);
            if (!item) return;

            const modal = document.createElement('div');
            modal.className = 'variant-modal';
            let selectedVariant = item.variants[0];
            let qty = 1;

            modal.innerHTML = `
                <div class="variant-modal-content">
                    <div class="modal-header">
                        <h2>${item.name}</h2>
                        <button class="close-modal" onclick="this.closest('.variant-modal').remove()">✕</button>
                    </div>
                    <div class="modal-subtitle">Pilih varian yang diinginkan</div>
                    <div class="variant-options">
                        ${item.variants.map((v, i) => `
                            <button class="variant-opt ${i === 0 ? 'active' : ''}" data-price="${v.price}" data-name="${v.name}">
                                ${v.name} ${v.price > 0 ? '(+Rp ' + v.price.toLocaleString() + ')' : ''}
                            </button>
                        `).join('')}
                    </div>
                    <div class="qty-section">
                        <span>Jumlah</span>
                        <button class="qty-btn minus" id="modalMinus">−</button>
                        <span class="qty-number" id="modalQty">1</span>
                        <button class="qty-btn plus" id="modalPlus">+</button>
                    </div>
                    <button class="btn-add-modal" id="modalAdd">➕ TAMBAH</button>
                </div>
            `;
            document.body.appendChild(modal);

            modal.querySelectorAll('.variant-opt').forEach(btn => {
                btn.addEventListener('click', function() {
                    modal.querySelectorAll('.variant-opt').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedVariant = { name: this.dataset.name, price: parseInt(this.dataset.price) };
                });
            });

            modal.querySelector('#modalMinus').addEventListener('click', () => {
                if (qty > 1) { qty--;
                    modal.querySelector('#modalQty').textContent = qty; }
            });
            modal.querySelector('#modalPlus').addEventListener('click', () => {
                qty++;
                modal.querySelector('#modalQty').textContent = qty;
            });

            modal.querySelector('#modalAdd').addEventListener('click', function() {
                const finalPrice = item.price + selectedVariant.price;
                const variantName = selectedVariant.name;
                const displayName = item.name + (variantName !== 'Standar' ? ' (' + variantName + ')' : '');
                const existing = cart.find(c => c.id === item.id && c.variant === variantName);
                if (existing) { existing.qty += qty; } else {
                    cart.push({ id: item.id, name: displayName, price: finalPrice, qty: qty,
                        variant: variantName });
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                modal.remove();
                renderAll();
                showToast(`✅ ${displayName} x${qty} ditambahkan!`);
            });

            modal.addEventListener('click', function(e) {
                if (e.target === this) { this.remove(); }
            });
        }

        function renderCart() {
            const container = document.getElementById('cartSection');
            if (cart.length === 0) {
                container.innerHTML =
                    `<div class="cart-section"><div class="cart-title">🛒 Keranjang</div><div class="empty-cart">Belum ada pesanan</div></div>`;
                return;
            }
            let html =
                `<div class="cart-section"><div class="cart-title">🛒 Keranjang (${cart.reduce((s, i) => s + i.qty, 0)} item)</div>`;
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-price">Rp ${(item.price * item.qty).toLocaleString()}</span>
                        </div>
                        <div class="item-actions">
                            <button class="btn-minus" onclick="updateCartQty(${index}, -1)">−</button>
                            <span class="qty-display">${item.qty}</span>
                            <button class="btn-plus" onclick="updateCartQty(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            html += `
                <div class="cart-total"><span class="total-label">💰 Total</span><span class="total-amount">Rp ${total.toLocaleString()}</span></div>
            </div>`;
            container.innerHTML = html;
        }

        function updateCartQty(index, change) {
            if (cart[index].qty + change <= 0) { cart.splice(index, 1); } else { cart[index].qty += change; }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            renderAll();
        }

        function checkout() {
            if (cart.length === 0) {
                showToast('⚠️ Belum ada pesanan!');
                return;
            }

            const modal = document.createElement('div');
            modal.className = 'confirm-modal';
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const count = cart.reduce((s, i) => s + i.qty, 0);

            modal.innerHTML = `
                <div class="confirm-modal-content">
                    <div class="icon-big">🍽️</div>
                    <div class="title">Pesanan Siap Dikirim!</div>
                    <div class="sub">Dapur akan segera memproses pesanan Anda</div>
                    <div class="order-summary">
                        ${cart.map(item => `${item.name} <strong>x${item.qty}</strong>`).join('<br>')}
                        <br><br>
                        Total: <span class="total">Rp ${total.toLocaleString()}</span> (${count} item)
                    </div>
                    <div class="btn-group">
                        <button class="btn-batal" onclick="this.closest('.confirm-modal').remove()">Batal</button>
                        <button class="btn-yakin" onclick="proceedCheckout(this)">Kirim Pesanan</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            modal.addEventListener('click', function(e) {
                if (e.target === this) { this.remove(); }
            });
        }

        async function proceedCheckout(btn) {
            const modal = btn.closest('.confirm-modal');
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            modal.remove();

            try {
                const meja = parseInt(getMeja());
                const nama = getNama();
                const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

                let idTable = null;
                const mejaStr = meja.toString();

                idTable = tableIdMap[mejaStr];
                if (!idTable) {
                    const mejaWithZero = mejaStr.padStart(2, '0');
                    idTable = tableIdMap[mejaWithZero];
                }
                if (!idTable) {
                    for (const [key, value] of Object.entries(tableIdMap)) {
                        if (parseInt(key) === meja) {
                            idTable = value;
                            break;
                        }
                    }
                }

                if (!idTable) {
                    throw new Error('Nomor meja ' + meja + ' tidak ditemukan. Silakan hubungi karyawan.');
                }

                const now = new Date();
                const tanggal = now.toISOString().slice(0, 10).replace(/-/g, '');
                const waktu = now.toTimeString().slice(0, 8).replace(/:/g, '');
                const noStruk = 'JKG' + tanggal + waktu + Math.floor(Math.random() * 100);

                const { data: orderData, error: orderError } = await supabaseClient
                    .from('orders')
                    .insert({
                        id_table: idTable,
                        id_user: 1,
                        tanggal_order: now.toISOString().slice(0, 10),
                        waktu_order: now.toTimeString().slice(0, 8),
                        status_order: 'Diproses',
                        no_struk: noStruk
                    })
                    .select('id_order')
                    .single();

                if (orderError) {
                    throw new Error('Gagal menyimpan pesanan: ' + orderError.message);
                }

                const idOrder = orderData.id_order;

                const details = cart.map(item => ({
                    id_order: idOrder,
                    id_menu: item.id,
                    nama: nama,
                    jumlah: item.qty,
                    harga_satuan: item.price,
                    subtotal: item.price * item.qty,
                    note: item.variant || null,
                    no_struk: noStruk
                }));

                const { error: detailError } = await supabaseClient
                    .from('orderdetails')
                    .insert(details);

                if (detailError) {
                    throw new Error('Gagal menyimpan detail pesanan: ' + detailError.message);
                }

                cart = [];
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                renderAll();

                showToast(`✅ Pesanan berhasil dikirim! No. Struk: ${noStruk}`);

                setTimeout(() => {
                    window.location.href = 'customer_order_status.html?meja=' + meja + '&nama=' + encodeURIComponent(
                        nama);
                }, 1500);

            } catch (error) {
                console.error('Error checkout:', error);
                showToast('⚠️ ' + error.message);
            } finally {
                loading.classList.remove('active');
            }
        }

        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>
</html>
