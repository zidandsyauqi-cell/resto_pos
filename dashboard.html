            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 15px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3.5%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-header img {
            width: clamp(40px, 7%, 70px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .brand-text {
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout {
            background: #98C81C;
            border-radius: 50px;
            border: 2px solid white;
            padding: 6px 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .btn-logout:hover {
            background: #7aa814;
            transform: scale(1.05);
        }

        /* ===== KONTEN ===== */
        .content-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            padding: 40px;
        }

        /* Header dengan logo + teks */
        .header-content {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
        }

        .header-content .logo-besar {
            width: clamp(120px, 35%, 413px);
            height: auto;
        }

        .header-content .logo-besar img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
        }

        .header-content .title {
            color: white;
            font-size: clamp(28px, 7%, 75px);
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
        }

        /* Grid Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .menu-card {
            background: #98C81C;
            border-radius: 65px;
            border: 3px solid white;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.2);
            text-align: center;
            padding: 20px;
            min-height: 180px;
        }

        .menu-card:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 50px rgba(152, 200, 28, 0.4);
        }

        .menu-card:active {
            transform: scale(0.97);
        }

        .menu-card .card-label {
            color: white;
            font-size: clamp(24px, 5.5%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* Card ukuran penuh (2 kolom) */
        .menu-card-full {
            grid-column: 1 / -1;
            aspect-ratio: auto;
            min-height: 120px;
            border-radius: 75px;
        }

        .menu-card-full .card-label {
            font-size: clamp(28px, 6%, 70px);
        }

        @media screen and (max-width: 767px) {
            .dashboard-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .content-area {
                padding: 20px;
            }

            .header-content {
                gap: 10px;
                margin-bottom: 20px;
            }

            .header-content .logo-besar {
                width: 80px;
            }

            .header-content .title {
                font-size: 22px;
            }

            .menu-grid {
                gap: 12px;
            }

            .menu-card {
                border-radius: 40px;
                min-height: 120px;
                padding: 15px;
            }

            .menu-card .card-label {
                font-size: 22px;
            }

            .menu-card-full {
                min-height: 80px;
                border-radius: 50px;
            }

            .menu-card-full .card-label {
                font-size: 24px;
            }

            .btn-logout {
                padding: 4px 14px;
                font-size: 11px;
            }

            .logo-header img {
                width: 30px;
            }

            .brand-text {
                font-size: 14px;
            }

            .btn-back {
                font-size: 18px;
            }
        }

        @media screen and (max-width: 480px) {
            .dashboard-container {
                border-radius: 10px;
            }

            .content-area {
                padding: 15px;
            }

            .header-content .logo-besar {
                width: 60px;
            }

            .header-content .title {
                font-size: 18px;
            }

            .menu-grid {
                gap: 8px;
            }

            .menu-card {
                border-radius: 30px;
                min-height: 90px;
                padding: 10px;
            }

            .menu-card .card-label {
                font-size: 16px;
            }

            .menu-card-full {
                min-height: 60px;
                border-radius: 35px;
            }

            .menu-card-full .card-label {
                font-size: 18px;
            }

            .btn-logout {
                padding: 3px 10px;
                font-size: 9px;
            }

            .logo-header img {
                width: 25px;
            }

            .brand-text {
                font-size: 12px;

            .btn-back {

            }

            .menu-card .card-label {
                font-size: 13px;
            }

            .menu-card-full .card-label {
                font-size: 15px;
            }

            .brand-text {
                font-size: 10px;
            }

            .logo-header img {
                width: 20px;
            }

            .btn-back {
                font-size: 14px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .dashboard-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .dashboard-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .content-area {
                padding: 10px 20px;
            }

            .header-content {
                margin-bottom: 10px;
            }

            .header-content .logo-besar {
                width: 60px;
            }

            .header-content .title {
                font-size: 18px;
            }

            .menu-card {
                min-height: 70px;
                border-radius: 25px;
                padding: 8px;
            }

            .menu-card .card-label {
                font-size: 16px;
            }

            .menu-card-full {
                min-height: 50px;
                border-radius: 30px;
            }

            .menu-card-full .card-label {
                font-size: 18px;
            }

            .btn-logout {
                padding: 2px 8px;
                font-size: 8px;
            }
        }
    </style>

            <!-- Grid Menu -->
            <div class="menu-grid">

                <div class="menu-card" onclick="window.location.href='karyawan_status.html'">

                <!-- LIST PESANAN -->
                <div class="menu-card" onclick="window.location.href='karyawan_list_order.html'">

                </div>

                <!-- MEJA -->
                <div class="menu-card" onclick="window.location.href='karyawan_meja.html'">

                </div>

                <!-- STRUK -->
                <div class="menu-card" onclick="window.location.href='karyawan_struk.html'">
                    <div class="card-label">STRUK</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ LOGOUT ============
        function logout() {
            if (confirm('Yakin ingin logout?')) {
                localStorage.removeItem('user_role');
                localStorage.removeItem('karyawan_logged_in');
                window.location.href = 'login.html';
            }
        }

        // ============ CEK LOGIN STATUS ============
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }
    </script>
