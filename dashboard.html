<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - Karyawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .dashboard-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 6px 12px;
            padding-top: env(safe-area-inset-top, 6px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            flex-shrink: 0;
            min-height: 44px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(18px, 2.8%, 32px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 4px 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .logo-header img {
            width: clamp(22px, 3.5%, 40px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .brand-text {
            color: white;
            font-size: clamp(12px, 2%, 22px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-logout {
            background: transparent;
            border-radius: 50px;
            border: 2px solid #98C81C;
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: clamp(10px, 1.4%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            min-height: 32px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-logout:active {
            background: rgba(152, 200, 28, 0.2);
            transform: scale(0.95);
        }

        /* ===== KONTEN ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            padding: 8px 12px 16px 12px;
            padding-bottom: env(safe-area-inset-bottom, 16px);
            min-height: 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 700px;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-content .logo-besar {
            width: clamp(50px, 14%, 140px);
            height: auto;
            flex-shrink: 0;
        }

        .header-content .logo-besar img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
        }

        .header-content .title {
            color: white;
            font-size: clamp(18px, 4.5%, 48px);
            font-weight: 600;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
            letter-spacing: 2px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 700px;
            flex-shrink: 0;
        }

        .menu-card {
            background: #98C81C;
            border-radius: 28px;
            border: 2px solid white;
            aspect-ratio: 1.4/1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(152, 200, 28, 0.2);
            text-align: center;
            padding: 8px 6px;
            min-height: 50px;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-card:active {
            transform: scale(0.97);
        }

        .menu-card .card-label {
            color: white;
            font-size: clamp(11px, 2.5%, 28px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
            word-wrap: break-word;
            line-height: 1.2;
        }

        /* ===== RESPONSIVE ===== */

        /* Portrait - HP */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .content-area { padding: 4px 8px 12px 8px; }
            .header-content { margin-bottom: 8px; gap: 8px; max-width: 400px; }
            .header-content .logo-besar { width: clamp(40px, 12%, 90px); }
            .header-content .title { font-size: clamp(16px, 4.5%, 32px); }
            .menu-grid { gap: 8px; max-width: 400px; }
            .menu-card { border-radius: 22px; min-height: 48px; padding: 6px; }
            .menu-card .card-label { font-size: clamp(10px, 3%, 24px); }
            .header-top { padding: 4px 10px; padding-top: env(safe-area-inset-top, 4px); min-height: 38px; }
            .btn-logout { padding: 3px 10px; font-size: 10px; min-height: 28px; }
            .btn-back { font-size: 20px; min-width: 34px; min-height: 34px; }
            .logo-header img { width: 20px; }
            .brand-text { font-size: 13px; }
        }

        /* HP portrait kecil */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .content-area { padding: 3px 5px 10px 5px; }
            .header-content { gap: 6px; margin-bottom: 6px; max-width: 320px; }
            .header-content .logo-besar { width: 35px; }
            .header-content .title { font-size: 14px; }
            .menu-grid { gap: 6px; max-width: 320px; }
            .menu-card { border-radius: 18px; min-height: 40px; padding: 4px; }
            .menu-card .card-label { font-size: 10px; }
            .header-top { padding: 3px 8px; padding-top: env(safe-area-inset-top, 3px); min-height: 34px; }
            .btn-logout { padding: 2px 6px; font-size: 8px; min-height: 24px; border-width: 1.5px; }
            .btn-back { font-size: 16px; min-width: 30px; min-height: 30px; }
            .logo-header img { width: 16px; }
            .brand-text { font-size: 11px; }
        }

        /* HP sangat kecil */
        @media screen and (max-width: 360px) and (orientation: portrait) {
            .header-content .logo-besar { width: 28px; }
            .header-content .title { font-size: 12px; }
            .menu-card { border-radius: 14px; min-height: 34px; padding: 3px; }
            .menu-card .card-label { font-size: 8px; }
            .brand-text { font-size: 9px; }
            .logo-header img { width: 14px; }
            .btn-back { font-size: 14px; min-width: 26px; min-height: 26px; }
            .btn-logout { padding: 2px 5px; font-size: 7px; min-height: 22px; }
        }

        /* ===== TABLET PORTRAIT ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .content-area { padding: 15px 25px 25px 25px; }
            .header-content { margin-bottom: 18px; gap: 15px; max-width: 550px; }
            .header-content .logo-besar { width: clamp(80px, 18%, 160px); }
            .header-content .title { font-size: clamp(28px, 5.5%, 50px); }
            .menu-grid { gap: 14px; max-width: 550px; }
            .menu-card { border-radius: 34px; min-height: 80px; padding: 10px; }
            .menu-card .card-label { font-size: clamp(16px, 3.5%, 34px); }
            .header-top { padding: 8px 18px; padding-top: env(safe-area-inset-top, 8px); min-height: 52px; }
            .btn-logout { padding: 5px 14px; font-size: 13px; min-height: 36px; }
            .btn-back { font-size: 24px; min-width: 44px; min-height: 44px; }
            .logo-header img { width: 32px; }
            .brand-text { font-size: 18px; }
        }

        /* ===== TABLET LANDSCAPE ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .content-area { padding: 8px 20px 15px 20px; }
            .header-content { margin-bottom: 10px; gap: 12px; max-width: 650px; }
            .header-content .logo-besar { width: clamp(55px, 14%, 130px); }
            .header-content .title { font-size: clamp(20px, 4.5%, 40px); }
            .menu-grid { gap: 10px; max-width: 650px; }
            .menu-card { border-radius: 26px; min-height: 55px; padding: 6px; }
            .menu-card .card-label { font-size: clamp(13px, 3%, 28px); }
            .header-top { padding: 5px 14px; padding-top: env(safe-area-inset-top, 5px); min-height: 40px; }
            .btn-logout { padding: 3px 10px; font-size: 11px; min-height: 30px; }
            .btn-back { font-size: 20px; min-width: 36px; min-height: 36px; }
            .logo-header img { width: 24px; }
            .brand-text { font-size: 14px; }
        }

        /* ===== LANDSCAPE HP ===== */
        @media screen and (max-width: 767px) and (orientation: landscape) {
            .content-area { padding: 4px 14px 10px 14px; }
            .header-content { margin-bottom: 6px; gap: 8px; max-width: 500px; }
            .header-content .logo-besar { width: clamp(35px, 10%, 80px); }
            .header-content .title { font-size: clamp(14px, 3.5%, 28px); }
            .menu-grid { gap: 6px; max-width: 500px; }
            .menu-card { border-radius: 20px; min-height: 40px; padding: 5px; }
            .menu-card .card-label { font-size: clamp(9px, 2.2%, 20px); }
            .header-top { padding: 3px 10px; padding-top: env(safe-area-inset-top, 3px); min-height: 34px; }
            .btn-logout { padding: 2px 8px; font-size: 9px; min-height: 26px; border-width: 1.5px; }
            .btn-back { font-size: 16px; min-width: 30px; min-height: 30px; }
            .logo-header img { width: 18px; }
            .brand-text { font-size: 11px; }
        }

        /* Landscape HP kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .content-area { padding: 3px 12px 8px 12px; }
            .header-content { margin-bottom: 4px; gap: 6px; max-width: 450px; }
            .header-content .logo-besar { width: 28px; }
            .header-content .title { font-size: 12px; }
            .menu-grid { gap: 5px; max-width: 450px; }
            .menu-card { border-radius: 16px; min-height: 32px; padding: 4px; border-width: 1.5px; }
            .menu-card .card-label { font-size: 8px; }
            .header-top { padding: 2px 8px; padding-top: env(safe-area-inset-top, 2px); min-height: 30px; }
            .btn-logout { padding: 2px 6px; font-size: 7px; min-height: 22px; border-width: 1.5px; }
            .btn-back { font-size: 14px; min-width: 26px; min-height: 26px; }
            .logo-header img { width: 16px; }
            .brand-text { font-size: 9px; }
        }

        /* ===== DESKTOP ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .content-area { padding: 12px 35px 20px 35px; }
            .header-content { margin-bottom: 16px; gap: 14px; max-width: 700px; }
            .header-content .logo-besar { width: clamp(70px, 16%, 170px); }
            .header-content .title { font-size: clamp(26px, 5%, 48px); }
            .menu-grid { gap: 12px; max-width: 700px; }
            .menu-card { border-radius: 32px; min-height: 70px; padding: 10px; }
            .menu-card .card-label { font-size: clamp(16px, 3.5%, 34px); }
            .header-top { padding: 8px 20px; padding-top: env(safe-area-inset-top, 8px); min-height: 52px; }
            .btn-logout { padding: 5px 16px; font-size: 14px; min-height: 38px; }
            .btn-back { font-size: 24px; min-width: 44px; min-height: 44px; }
            .logo-header img { width: 34px; }
            .brand-text { font-size: 18px; }
        }

        /* Desktop lebar */
        @media screen and (min-width: 1600px) and (orientation: landscape) {
            .content-area { padding: 16px 45px 25px 45px; }
            .header-content { margin-bottom: 20px; gap: 18px; max-width: 800px; }
            .header-content .logo-besar { width: clamp(85px, 18%, 200px); }
            .header-content .title { font-size: clamp(30px, 5.5%, 55px); }
            .menu-grid { gap: 14px; max-width: 800px; }
            .menu-card { border-radius: 38px; min-height: 85px; padding: 12px; }
            .menu-card .card-label { font-size: clamp(20px, 4%, 40px); }
            .header-top { padding: 10px 24px; padding-top: env(safe-area-inset-top, 10px); min-height: 60px; }
            .btn-logout { padding: 6px 20px; font-size: 16px; min-height: 44px; }
            .btn-back { font-size: 28px; min-width: 48px; min-height: 48px; }
            .logo-header img { width: 42px; }
            .brand-text { font-size: 22px; }
        }

        @supports not (padding: env(safe-area-inset-top)) {
            .header-top { padding-top: 6px; }
            .content-area { padding-bottom: 16px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <!-- Header -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/50x50/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-logout" onclick="logoutKaryawan()">
                    🔓 Logout
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="content-area">
            <div class="header-content">
                <div class="logo-besar">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.style.display='none'" />
                </div>
                <div class="title">WILUJENG<br>SUMPING!</div>
            </div>

            <div class="menu-grid">
                <div class="menu-card" onclick="window.location.href='karyawan_status.html'">
                    <div class="card-label">STATUS PESANAN</div>
                </div>
                <div class="menu-card" onclick="window.location.href='karyawan_list_order.html'">
                    <div class="card-label">LIST PESANAN</div>
                </div>
                <div class="menu-card" onclick="window.location.href='karyawan_meja.html'">
                    <div class="card-label">MEJA</div>
                </div>
                <div class="menu-card" onclick="window.location.href='karyawan_struk.html'">
                    <div class="card-label">STRUK</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ============================================
        // LOGOUT KARYAWAN
        // ============================================
        function logoutKaryawan() {
            if (confirm('Yakin ingin keluar?')) {
                localStorage.removeItem('karyawan_logged_in');
                localStorage.removeItem('login_time');
                localStorage.removeItem('karyawan_nama');
                window.location.href = 'karyawan_login.html';
            }
        }

        // ============================================
        // AUTO LOGOUT 15 MENIT
        // ============================================
        (function() {
            const LOGOUT_TIMER = 15 * 60 * 1000;
            let logoutTimer;

            function doLogout() {
                localStorage.removeItem('karyawan_logged_in');
                localStorage.removeItem('login_time');
                localStorage.removeItem('karyawan_nama');
                window.location.href = 'karyawan_login.html';
            }

            function resetLogoutTimer() {
                if (logoutTimer) clearTimeout(logoutTimer);
                logoutTimer = setTimeout(doLogout, LOGOUT_TIMER);
            }

            const events = ['click', 'keypress', 'scroll', 'touchstart', 'mousemove', 'keydown'];
            events.forEach(event => {
                document.addEventListener(event, resetLogoutTimer);
            });

            resetLogoutTimer();
            console.log('⏱️ Auto logout setelah 15 menit tidak ada aktivitas');
        })();

        // ============================================
        // CEK LOGIN STATUS
        // ============================================
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }
    </script>
</body>
</html>
