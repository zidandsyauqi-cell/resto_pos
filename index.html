<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resto POS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }

        /* Container utama dengan ukuran fixed seperti kode pertama */
        .login-wrapper {
            width: 1080px;
            height: 1920px;
            position: relative;
            background: white;
            overflow: hidden;
            background-image: url('https://placehold.co/1080x1920/2d2d2d/ffffff?text=Background+Resto');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-radius: 20px;
            transform: scale(0.8);
            transform-origin: center;
        }

        @media screen and (max-width: 1400px) {
            .login-wrapper {
                transform: scale(0.65);
            }
        }

        @media screen and (max-width: 1200px) {
            .login-wrapper {
                transform: scale(0.55);
            }
        }

        @media screen and (max-width: 992px) {
            .login-wrapper {
                transform: scale(0.45);
            }
        }

        @media screen and (max-width: 768px) {
            .login-wrapper {
                transform: scale(0.35);
            }
        }

        @media screen and (max-width: 576px) {
            .login-wrapper {
                transform: scale(0.28);
            }
        }

        @media screen and (max-width: 400px) {
            .login-wrapper {
                transform: scale(0.22);
            }
        }

        /* Dekorasi background persis seperti kode pertama */
        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .deco-bg img {
            position: absolute;
        }

        .deco-bg img:nth-child(1) {
            width: 1921.75px;
            height: 1280.85px;
            left: -100.84px;
            top: 1919.85px;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 907.79px;
            height: 854.71px;
            left: 427px;
            top: 799.28px;
            transform: rotate(-53deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 745.04px;
            height: 744.16px;
            left: 9.31px;
            top: 1454px;
            transform: rotate(46deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(4) {
            width: 1092px;
            height: 1092px;
            left: 404px;
            top: 1287px;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(5) {
            width: 1092px;
            height: 1092px;
            left: -688px;
            top: -448px;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(6) {
            width: 796.58px;
            height: 796.58px;
            left: -249.42px;
            top: 1117px;
            transform: rotate(17deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(7) {
            width: 796.58px;
            height: 796.58px;
            left: 778.58px;
            top: 216px;
            transform: rotate(17deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        /* Overlay gelap */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        /* Elemen hijau seperti kode pertama - CUSTOMER */
        .box-customer {
            width: 887px;
            height: 507px;
            left: 88px;
            top: 502px;
            position: absolute;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .box-customer:hover {
            transform: scale(1.02);
            opacity: 1;
            box-shadow: 0 10px 40px rgba(152, 200, 28, 0.4);
        }

        .box-customer .label {
            color: white;
            font-size: 65px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* Elemen hijau seperti kode pertama - KARYAWAN */
        .box-karyawan {
            width: 887px;
            height: 507px;
            left: 88px;
            top: 1092px;
            position: absolute;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .box-karyawan:hover {
            transform: scale(1.02);
            opacity: 1;
            box-shadow: 0 10px 40px rgba(152, 200, 28, 0.4);
        }

        .box-karyawan .label {
            color: white;
            font-size: 65px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        /* Judul WILUJENG SUMPING */
        .title-main {
            width: 601px;
            height: 284px;
            left: 427px;
            top: 135px;
            position: absolute;
            text-align: center;
            color: white;
            font-size: 80px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 5;
            line-height: 1.2;
            letter-spacing: 3px;
        }

        .title-main small {
            font-size: 40px;
            display: block;
            font-weight: 400;
            opacity: 0.9;
        }

        /* Logo di kiri atas */
        .logo-top {
            position: absolute;
            left: 46px;
            top: 135px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-top img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        /* Modal Login */
        .login-modal {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .login-modal.active {
            display: flex;
        }

        .login-box {
            background: white;
            padding: 50px;
            border-radius: 65px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-box .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
            padding: 0 10px;
        }

        .login-box .close-btn:hover {
            color: #333;
            transform: rotate(90deg);
        }

        .login-box .icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 5px;
        }

        .login-box h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-box .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #98C81C;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(152, 200, 28, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }

        .role-selector button {
            padding: 10px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
            color: #555;
        }

        .role-selector button:hover {
            border-color: #98C81C;
            background: #f0f8e8;
            transform: translateY(-2px);
        }

        .role-selector button.active {
            border-color: #98C81C;
            background: #98C81C;
            color: white;
            box-shadow: 0 4px 15px rgba(152, 200, 28, 0.3);
            transform: translateY(-2px);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #98C81C;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            margin-top: 5px;
        }

        .btn-login:hover {
            background: #7aa814;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(152, 200, 28, 0.3);
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
            font-weight: 600;
            border: 1px solid #f5c6cb;
            font-size: 14px;
        }

        .info-cred {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
        }

        .info-cred strong {
            color: #98C81C;
        }

        /* Responsive untuk ukuran layar kecil */
        @media screen and (max-width: 1080px) {
            .login-wrapper {
                transform: scale(0.7);
            }
        }

        @media screen and (max-width: 768px) {
            .login-wrapper {
                transform: scale(0.5);
            }
        }

        @media screen and (max-width: 576px) {
            .login-wrapper {
                transform: scale(0.35);
            }
        }

        @media screen and (max-width: 400px) {
            .login-wrapper {
                transform: scale(0.25);
            }
        }

        /* Untuk tablet landscape */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .login-wrapper {
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Dekorasi background -->
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" />
            <img src="https://placehold.co/908x855/2d2d2d/ffffff?text=" alt="" />
            <img src="https://placehold.co/745x744/2d2d2d/ffffff?text=" alt="" />
            <img src="https://placehold.co/1092x1092/2d2d2d/ffffff?text=" alt="" />
            <img src="https://placehold.co/1092x1092/2d2d2d/ffffff?text=" alt="" />
            <img src="https://placehold.co/797x797/2d2d2d/ffffff?text=" alt="" />
            <img src="https://placehold.co/797x797/2d2d2d/ffffff?text=" alt="" />
        </div>

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Logo -->
        <div class="logo-top">
            <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo" />
            <div class="brand-text">Resto<span>POS</span></div>
        </div>

        <!-- Judul Utama -->
        <div class="title-main">
            WILUJENG<br>SUMPING!
            <small>Selamat Datang</small>
        </div>

        <!-- Box Customer -->
        <div class="box-customer" onclick="openModal('Customer')">
            <div class="label">👤 CUSTOMER</div>
        </div>

        <!-- Box Karyawan -->
        <div class="box-karyawan" onclick="openModal('Karyawan')">
            <div class="label">👨‍💼 KARYAWAN</div>
        </div>

        <!-- Modal Login -->
        <div class="login-modal" id="loginModal">
            <div class="login-box">
                <button class="close-btn" onclick="closeModal()">✕</button>
                <div class="icon">🍽️</div>
                <h2 id="modalTitle">Login</h2>
                <p class="subtitle" id="modalSubtitle">Masuk sebagai Customer</p>
                
                <div id="errorMsg" class="error">⚠️ Username atau password salah!</div>
                
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label>Pilih Role</label>
                        <div class="role-selector" id="roleSelector">
                            <button type="button" data-role="Waiter" onclick="selectRole(this)">👨‍🍳 Waiter</button>
                            <button type="button" data-role="Cashier" onclick="selectRole(this)">💰 Cashier</button>
                            <button type="button" data-role="Front Kitchen" onclick="selectRole(this)">🍳 Kitchen</button>
                            <button type="button" data-role="Customer" onclick="selectRole(this)">👤 Customer</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>
                    <button type="submit" class="btn-login">Login</button>
                </form>
                
                <div class="info-cred">
                    <p>👤 Username: <strong>role</strong> | 🔑 Password: <strong>password</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = 'Waiter';
        let userType = 'Customer';
        let modal = document.getElementById('loginModal');

        function selectRole(el) {
            document.querySelectorAll('.role-selector button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedRole = el.dataset.role;
            document.getElementById('username').value = selectedRole;
        }

        function openModal(type) {
            userType = type;
            modal.classList.add('active');
            document.getElementById('modalTitle').textContent = type === 'Customer' ? 'Login Customer' : 'Login Karyawan';
            document.getElementById('modalSubtitle').textContent = type === 'Customer' ? 'Masuk sebagai Customer' : 'Masuk sebagai Karyawan';
            
            // Reset form
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('password').value = '';
            
            // Set default role
            if (type === 'Customer') {
                document.querySelectorAll('.role-selector button').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-role="Customer"]').classList.add('active');
                selectedRole = 'Customer';
                document.getElementById('username').value = 'Customer';
            } else {
                document.querySelectorAll('.role-selector button').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-role="Waiter"]').classList.add('active');
                selectedRole = 'Waiter';
                document.getElementById('username').value = 'Waiter';
            }
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Close modal when clicking outside
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (password === 'password') {
                localStorage.setItem('user_name', username);
                localStorage.setItem('user_role', selectedRole);
                localStorage.setItem('user_type', userType);
                
                closeModal();
                
                if (selectedRole === 'Customer') {
                    window.location.href = 'customer_order.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
            return false;
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
