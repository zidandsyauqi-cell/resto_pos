<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 10px;
            overflow: hidden;
        }

        .landing-container {
            width: 100%;
            max-width: 1080px;
            height: 100vh;
            max-height: 1920px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: #98C81C;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo di tengah */
        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 600px;
            padding: 0 10px;
        }

        .logo-center .logo-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Loading Spinner */
        .loading-spinner {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255,255,255,0.7);
            font-size: clamp(10px, 1.2%, 14px);
            font-weight: 400;
            letter-spacing: 4px;
            font-family: Arial, sans-serif;
        }

        /* ===== FULL LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            html, body {
                padding: 5px;
            }

            .landing-container {
                width: auto;
                height: 100vh;
                max-height: 100vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
                max-width: none;
            }

            .logo-center {
                width: 75%;
                max-width: 450px;
            }
        }

        /* ===== RESPONSIVE PORTRAIT ===== */

        /* Tablet & HP (portrait) */
        @media screen and (max-width: 1024px) and (orientation: portrait) {
            .landing-container {
                width: 100%;
                height: auto;
                aspect-ratio: 1080/1920;
                border-radius: 20px;
                max-height: 1920px;
            }

            .logo-center {
                width: 85%;
                max-width: 500px;
            }
        }

        /* HP kecil (portrait) */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .landing-container {
                border-radius: 12px;
            }

            .logo-center {
                width: 80%;
                max-width: 350px;
            }

            .spinner {
                width: 25px;
                height: 25px;
            }

            .loading-text {
                font-size: 8px;
            }
        }

        /* HP sangat kecil */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .landing-container {
                border-radius: 10px;
            }

            .logo-center {
                width: 75%;
                max-width: 280px;
            }
        }

        /* iPhone SE */
        @media screen and (max-width: 375px) and (orientation: portrait) {
            .logo-center {
                width: 70%;
                max-width: 200px;
            }

            .loading-spinner {
                bottom: 5%;
            }

            .spinner {
                width: 20px;
                height: 20px;
                border-width: 2px;
            }

            .loading-text {
                font-size: 7px;
            }
        }

        /* ===== LANDSCAPE DETAIL ===== */

        /* Landscape HP & Tablet */
        @media screen and (max-width: 1024px) and (orientation: landscape) {
            .landing-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 12px;
            }

            .logo-center {
                width: 65%;
                max-width: 350px;
            }

            .spinner {
                width: 25px;
                height: 25px;
            }

            .loading-text {
                font-size: 10px;
            }

            .loading-spinner {
                bottom: 6%;
            }
        }

        /* Landscape HP kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .landing-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 10px;
            }

            .logo-center {
                width: 55%;
                max-width: 280px;
            }

            .loading-text {
                font-size: 8px;
            }

            .spinner {
                width: 20px;
                height: 20px;
                border-width: 2px;
            }

            .loading-spinner {
                bottom: 5%;
            }
        }

        /* ===== DESKTOP / LAPTOP ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .landing-container {
                height: 90vh;
                max-height: 90vh;
                border-radius: 20px;
            }

            .logo-center {
                width: 80%;
                max-width: 550px;
            }
        }

        /* Desktop sangat lebar */
        @media screen and (min-width: 1600px) and (orientation: landscape) {
            .landing-container {
                height: 85vh;
                max-height: 85vh;
                border-radius: 25px;
            }

            .logo-center {
                width: 85%;
                max-width: 600px;
            }

            .spinner {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }

            .loading-text {
                font-size: 16px;
            }
        }

        /* ===== TABLET PORTRAIT (iPad) ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .landing-container {
                width: 100%;
                height: auto;
                aspect-ratio: 1080/1920;
                border-radius: 18px;
                max-height: 1920px;
            }

            .logo-center {
                width: 80%;
                max-width: 450px;
            }
        }

        /* ===== LAYAR SANGAT LEBAR (cinematic) ===== */
        @media screen and (min-aspect-ratio: 2/1) and (orientation: landscape) {
            .landing-container {
                height: 80vh;
                max-height: 80vh;
                border-radius: 20px;
            }

            .logo-center {
                width: 70%;
                max-width: 400px;
            }
        }

        /* ===== FIX UNTUK ASPECT RATIO YANG BERBEDA ===== */
        /* Untuk layar yang sangat lebar, batasi tinggi container */
        @media screen and (min-aspect-ratio: 16/9) and (orientation: landscape) {
            .landing-container {
                height: 85vh;
                max-height: 85vh;
            }
        }

        /* Untuk layar yang sangat tinggi (seperti HP) */
        @media screen and (max-aspect-ratio: 9/16) and (orientation: portrait) {
            .landing-container {
                width: 100%;
                height: auto;
                aspect-ratio: 1080/1920;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container" id="landingPage">
        <!-- Logo di tengah -->
        <div class="logo-center">
            <img src="logo.png" alt="Jangkung Order" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" />
            <div style="display:none; font-size: clamp(80px, 20%, 300px);">🍽️</div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">MEMUAT...</div>
        </div>
    </div>

    <script>
        // Redirect ke login setelah 2.5 detik
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500);

        // Redirect saat diklik
        document.getElementById('landingPage').addEventListener('click', function() {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
