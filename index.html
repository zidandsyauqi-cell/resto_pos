<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RestoPOS - Customer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .customer-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .logo-top {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        .title-main {
            position: absolute;
            left: 39.5%;
            top: 7%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            font-size: clamp(24px, 7.4%, 80px);
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 5;
            line-height: 1.1;
            letter-spacing: 2px;
            width: 55.6%;
        }

        .title-main small {
            font-size: clamp(14px, 3.7%, 40px);
            display: block;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Info Meja */
        .meja-info {
            position: absolute;
            right: 4.3%;
            top: 7%;
            z-index: 10;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: clamp(14px, 2%, 22px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .meja-info span {
            color: #98C81C;
        }

        .box-menu {
            position: absolute;
            width: 82.2%;
            height: 28.6%;
            left: 8.9%;
            top: 24%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-menu:hover {
            transform: scale(1.02);
        }

        .box-menu:active {
            transform: scale(0.98);
        }

        .box-menu .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
        }

        .box-menu .label-menu {
            position: absolute;
            left: 3.5%;
            top: 14.2%;
            text-align: center;
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .box-menu .gambar1 {
            position: absolute;
            width: 59.7%;
            height: 81.1%;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 1;
        }

        .box-menu .gambar1 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-menu .gambar2 {
            position: absolute;
            width: 57.2%;
            height: 92.2%;
            left: -10.8%;
            top: 35.3%;
            overflow: hidden;
            z-index: 0;
        }

        .box-menu .gambar2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-menu .gambar3 {
            position: absolute;
            width: 45%;
            height: 74.9%;
            left: 27.6%;
            top: 44.1%;
            overflow: hidden;
            z-index: 1;
        }

        .box-menu .gambar3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan {
            position: absolute;
            width: 82.2%;
            height: 28.6%;
            left: 8.9%;
            top: 55.7%;
            overflow: hidden;
            border-radius: 65px;
            z-index: 5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .box-pesan:hover {
            transform: scale(1.02);
        }

        .box-pesan:active {
            transform: scale(0.98);
        }

        .box-pesan .bg-hijau {
            position: absolute;
            width: 99.9%;
            height: 92.3%;
            left: 0.1%;
            top: 9.7%;
            background: #98C81C;
            border-radius: 65px;
            opacity: 0.92;
        }

        .box-pesan .label-pesan {
            position: absolute;
            left: 3.5%;
            top: 14.2%;
            text-align: center;
            color: white;
            font-size: clamp(24px, 6%, 65px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .box-pesan .gambar4 {
            position: absolute;
            width: 56.4%;
            height: 94.2%;
            left: 18.4%;
            top: 23.1%;
            overflow: hidden;
            z-index: 1;
        }

        .box-pesan .gambar4 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan .gambar5 {
            position: absolute;
            width: 49.2%;
            height: 79.1%;
            left: 46.6%;
            top: 60.4%;
            transform: rotate(107deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 0;
        }

        .box-pesan .gambar5 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .box-pesan .gambar6 {
            position: absolute;
            width: 61.4%;
            height: 91.1%;
            left: 45.4%;
            top: 50.7%;
            transform: rotate(-10deg);
            transform-origin: top left;
            overflow: hidden;
            z-index: 1;
        }

        .box-pesan .gambar6 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .customer-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }
        }

        @media screen and (max-width: 480px) {
            .customer-container {
                border-radius: 10px;
            }

            .box-menu,
            .box-pesan {
                border-radius: 40px;
            }

            .box-menu .bg-hijau,
            .box-pesan .bg-hijau {
                border-radius: 40px;
            }

            .meja-info {
                padding: 4px 12px;
                font-size: 11px;
                right: 2%;
                top: 6%;
            }
        }

        @media screen and (max-width: 360px) {
            .box-menu,
            .box-pesan {
                border-radius: 30px;
            }

            .box-menu .bg-hijau,
            .box-pesan .bg-hijau {
                border-radius: 30px;
            }

            .meja-info {
                padding: 3px 10px;
                font-size: 10px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .customer-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .box-menu .label-menu,
            .box-pesan .label-pesan {
                font-size: 18px;
            }

            .title-main {
                font-size: 18px;
            }

            .logo-top .brand-text {
                font-size: 14px;
            }

            .logo-top img {
                width: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="customer-container">
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <div class="logo-top">
            <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo RestoPOS" loading="lazy" />
            <div class="brand-text">Resto<span>POS</span></div>
        </div>

        <!-- Info Meja -->
        <div class="meja-info" id="mejaInfo">
            🪑 Meja <span id="mejaNumber">1</span>
        </div>

        <div class="title-main">
            WILUJENG<br>SUMPING!
            <small>Selamat Datang</small>
        </div>

        <div class="box-menu" onclick="window.location.href='customer_menu.html'">
            <div class="bg-hijau"></div>
            <div class="label-menu">📋 MENU</div>
            <div class="gambar1">
                <img src="https://placehold.co/530x445/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar2">
                <img src="https://placehold.co/477x493/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar3">
                <img src="https://placehold.co/400x411/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
        </div>

        <div class="box-pesan" onclick="window.location.href='customer_order.html'">
            <div class="bg-hijau"></div>
            <div class="label-pesan">🛒 PESAN</div>
            <div class="gambar4">
                <img src="https://placehold.co/501x517/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar5">
                <img src="https://placehold.co/545x547/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
            <div class="gambar6">
                <img src="https://placehold.co/626x590/2d2d2d/ffffff?text=Food" alt="" loading="lazy" />
            </div>
        </div>
    </div>

    <script>
        // ============ AMBIL NOMOR MEJA DARI URL ============
        function getMejaFromURL() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) {
                return meja;
            }
            return '1'; // Default meja 1
        }

        // ============ SET MEJA ============
        const mejaNumber = getMejaFromURL();
        document.getElementById('mejaNumber').textContent = mejaNumber;

        // Simpan ke localStorage untuk digunakan di halaman lain
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', 'Customer Meja ' + mejaNumber);

        // ============ CEK APAKAH ADA PARAMETER REDIRECT ============
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        if (redirect === 'menu') {
            window.location.href = 'customer_menu.html?meja=' + mejaNumber;
        } else if (redirect === 'order') {
            window.location.href = 'customer_order.html?meja=' + mejaNumber;
        }
    </script>
</body>
</html>
