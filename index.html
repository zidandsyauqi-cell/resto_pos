<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .landing-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: #98C81C;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        /* Gambar dekoratif di bawah - PERSIS SEPERTI DESAIN */
        .deco-image {
            position: absolute;
            width: 1077px;
            height: 769px;
            left: 0px;
            top: 575px;
            pointer-events: none;
        }

        .deco-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Loading Spinner */
        .loading-spinner {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255,255,255,0.7);
            font-size: clamp(10px, 1.2%, 14px);
            font-weight: 400;
            letter-spacing: 4px;
            font-family: Arial, sans-serif;
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .landing-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .deco-image {
                width: 100%;
                height: auto;
                top: auto;
                bottom: 0;
                position: absolute;
            }

            .deco-image img {
                height: auto;
                aspect-ratio: 1077/769;
            }
        }

        @media screen and (max-width: 480px) {
            .landing-container {
                border-radius: 10px;
            }

            .spinner {
                width: 25px;
                height: 25px;
            }

            .loading-text {
                font-size: 8px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .landing-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .landing-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .deco-image {
                width: 100%;
                height: auto;
                top: auto;
                bottom: 0;
            }

            .deco-image img {
                height: auto;
                aspect-ratio: 1077/769;
            }

            .loading-text {
                font-size: 8px;
            }

            .spinner {
                width: 20px;
                height: 20px;
                border-width: 2px;
            }

            .loading-spinner {
                bottom: 5%;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container" id="landingPage">
        <!-- Gambar dekoratif di bawah - PERSIS SEPERTI DESAIN -->
        <div class="deco-image">
            <img src="https://placehold.co/1077x769/2d2d2d/ffffff?text=Restaurant" alt="" loading="lazy" />
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">MEMUAT...</div>
        </div>
    </div>

    <script>
        // Redirect ke login setelah 2.5 detik
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500);

        // Redirect saat diklik
        document.getElementById('landingPage').addEventListener('click', function() {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
