<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .landing-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: #98C81C;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .landing-container:active {
            transform: scale(0.98);
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            width: 100%;
            height: auto;
            bottom: 0;
            left: 0;
            opacity: 0.2;
        }

        .loading-spinner {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: rgba(255,255,255,0.8);
            font-size: clamp(12px, 1.5%, 18px);
            font-weight: 400;
            letter-spacing: 4px;
        }

        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 20px;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .logo-center .logo-icon {
            font-size: clamp(100px, 20%, 200px);
            display: block;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 10px 40px rgba(0,0,0,0.2));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .logo-center .brand-text {
            color: white;
            font-size: clamp(40px, 8%, 80px);
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
            letter-spacing: 4px;
        }

        .logo-center .brand-text span {
            color: #2d2d2d;
        }

        .logo-center .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: clamp(14px, 2.5%, 28px);
            margin-top: 10px;
            font-weight: 400;
            letter-spacing: 6px;
        }

        .shape-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        .shape-2 {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -50px;
            left: -50px;
            pointer-events: none;
        }

        .shape-3 {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: 40%;
            right: 10%;
            pointer-events: none;
        }

        @media screen and (max-width: 767px) {
            .landing-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .logo-center .logo-icon {
                font-size: 80px;
            }

            .logo-center .brand-text {
                font-size: 32px;
            }

            .logo-center .subtitle {
                font-size: 12px;
                letter-spacing: 4px;
            }

            .loading-text {
                font-size: 10px;
            }
        }

        @media screen and (max-width: 480px) {
            .landing-container {
                border-radius: 10px;
            }

            .logo-center .logo-icon {
                font-size: 60px;
            }

            .logo-center .brand-text {
                font-size: 24px;
            }

            .logo-center .subtitle {
                font-size: 10px;
                letter-spacing: 3px;
            }
        }

        @media screen and (max-width: 360px) {
            .logo-center .logo-icon {
                font-size: 50px;
            }

            .logo-center .brand-text {
                font-size: 20px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .landing-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .landing-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .logo-center .logo-icon {
                font-size: 50px;
                margin-bottom: 10px;
            }

            .logo-center .brand-text {
                font-size: 20px;
            }

            .logo-center .subtitle {
                font-size: 10px;
                margin-top: 5px;
            }

            .loading-text {
                font-size: 8px;
            }

            .spinner {
                width: 25px;
                height: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container" id="landingPage">
        <div class="deco-bg">
            <img src="https://placehold.co/1080x769/2d2d2d/ffffff?text=Restaurant" alt="" loading="lazy" />
        </div>

        <div class="shape-1"></div>
        <div class="shape-2"></div>
        <div class="shape-3"></div>

        <div class="logo-center">
            <span class="logo-icon">🍽️</span>
            <div class="brand-text">Jangkung<span>Order</span></div>
            <div class="subtitle">SISTEM PESANAN RESTORAN</div>
        </div>

        <div class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">MEMUAT...</div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500);

        document.getElementById('landingPage').addEventListener('click', function() {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
