<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Karyawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .karyawan-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* Background utama dengan bg.png */
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 84%;
            height: 44.5%;
            left: 39.5%;
            top: 41.6%;
            transform: rotate(-53deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 69%;
            height: 38.8%;
            left: 0.86%;
            top: 75.7%;
            transform: rotate(46deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(4) {
            width: 101.1%;
            height: 56.9%;
            left: 37.4%;
            top: 67%;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(5) {
            width: 101.1%;
            height: 56.9%;
            left: -63.7%;
            top: -23.3%;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(6) {
            width: 73.8%;
            height: 41.5%;
            left: -23.1%;
            top: 58.2%;
            transform: rotate(17deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(7) {
            width: 73.8%;
            height: 41.5%;
            left: 72.1%;
            top: 11.25%;
            transform: rotate(17deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 2;
        }

        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-top {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        /* ===== FORM LOGIN - PERSIS DESAIN ===== */
        .login-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            padding: 40px;
        }

        .login-form {
            width: 100%;
            max-width: 500px;
        }

        .login-form .label {
            color: white;
            font-size: clamp(28px, 4.5%, 50px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            text-align: center;
        }

        .login-form .password-input {
            width: 100%;
            padding: clamp(14px, 2.5%, 28px) clamp(20px, 4%, 40px);
            border-radius: 50px;
            border: 3px solid white;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: clamp(18px, 3.5%, 40px);
            font-family: 'Schoolbell', cursive;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .login-form .password-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .login-form .password-input:focus {
            border-color: #98C81C;
            background: rgba(255,255,255,0.2);
        }

        .login-form .error-msg {
            color: #ff6b6b;
            font-size: clamp(18px, 3.5%, 40px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .login-form .error-msg.show {
            display: block;
        }

        .login-form .error-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: clamp(30px, 5%, 50px);
            height: auto;
        }

        .login-form .input-wrapper {
            position: relative;
            width: 100%;
        }

        .login-form .input-wrapper .error-icon {
            left: 15px;
        }

        /* Image di atas form */
        .form-image {
            width: clamp(200px, 60%, 773px);
            height: auto;
            display: block;
            margin: 0 auto 20px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
        }

        @media screen and (max-width: 767px) {
            .karyawan-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .login-wrapper {
                padding: 30px;
            }

            .login-form .label {
                font-size: 24px;
            }

            .login-form .password-input {
                font-size: 16px;
                padding: 12px 20px;
            }

            .login-form .error-msg {
                font-size: 16px;
            }
        }

        @media screen and (max-width: 480px) {
            .karyawan-container {
                border-radius: 10px;
            }

            .login-wrapper {
                padding: 20px;
            }

            .login-form .label {
                font-size: 18px;
            }

            .login-form .password-input {
                font-size: 14px;
                padding: 10px 16px;
                border-width: 2px;
            }

            .login-form .error-msg {
                font-size: 14px;
            }

            .form-image {
                width: 150px;
            }
        }

        @media screen and (max-width: 360px) {
            .login-form .label {
                font-size: 16px;
            }

            .login-form .password-input {
                font-size: 12px;
                padding: 8px 12px;
            }

            .login-form .error-msg {
                font-size: 12px;
            }

            .form-image {
                width: 120px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .karyawan-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .karyawan-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .login-wrapper {
                padding: 15px 30px;
            }

            .login-form .label {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .login-form .password-input {
                font-size: 12px;
                padding: 6px 14px;
            }

            .login-form .error-msg {
                font-size: 12px;
                margin-top: 8px;
            }

            .form-image {
                width: 100px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="karyawan-container">
        <!-- Background -->
        <div class="bg-utama"></div>

        <!-- Dekorasi -->
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/908x855/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/745x744/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/1092x1092/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/1092x1092/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/797x797/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/797x797/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <!-- Tombol Back -->
        <button class="btn-back" onclick="window.location.href='login.html'">←</button>

        <!-- Logo -->
        <div class="logo-top">
            <img src="logo.png" alt="Logo Jangkung" loading="lazy" onerror="this.src='https://placehold.co/80x80/98C81C/ffffff?text=🍽️'" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>

        <!-- Login Form -->
        <div class="login-wrapper">
            <div class="login-form">
                <!-- Gambar di atas form -->
                <img src="logo.png" alt="Logo" class="form-image" loading="lazy" onerror="this.style.display='none'" />

                <!-- Label Password -->
                <div class="label">Password</div>

                <!-- Input Password -->
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="passwordInput" 
                        class="password-input" 
                        placeholder="Masukkan password" 
                        required 
                        autocomplete="current-password"
                    >
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="error-msg">
                    ⚠️ Error: password salah, coba lagi
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password yang benar (hardcode dulu, nanti bisa diambil dari database)
        const KARYAWAN_PASSWORD = 'admin';

        // ============ HANDLE LOGIN ============
        function handleLogin() {
            const password = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!password) {
                errorMsg.textContent = '⚠️ Password tidak boleh kosong!';
                errorMsg.classList.add('show');
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
                return false;
            }
            
            if (password === KARYAWAN_PASSWORD) {
                localStorage.setItem('user_role', 'Karyawan');
                localStorage.setItem('karyawan_logged_in', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = '⚠️ Error: password salah, coba lagi';
                errorMsg.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
            return false;
        }

        // ============ EVENT LISTENERS ============
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // ============ CEK LOGIN STATUS ============
        // Jika sudah login, redirect ke dashboard
        if (localStorage.getItem('karyawan_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
