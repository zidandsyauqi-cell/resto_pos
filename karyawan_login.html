<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Karyawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .karyawan-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        /* Background utama dengan bg.png */
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        .btn-back {
            position: absolute;
            left: 3%;
            top: 3%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(28px, 3.5%, 45px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-top {
            position: absolute;
            left: 50%;
            top: 5%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(35px, 5%, 70px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(14px, 2.2%, 30px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        /* ===== FORM LOGIN ===== */
        .login-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            padding: 20px;
        }

        .login-form {
            width: 100%;
            max-width: 450px;
        }

        .login-form .form-image {
            width: clamp(80px, 20%, 200px);
            height: auto;
            display: block;
            margin: 0 auto 15px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
        }

        .login-form .label {
            color: white;
            font-size: clamp(22px, 3.5%, 42px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 12px;
            text-align: center;
        }

        .login-form .input-wrapper {
            position: relative;
            width: 100%;
        }

        .login-form .password-input {
            width: 100%;
            padding: clamp(12px, 2%, 22px) clamp(16px, 3%, 32px);
            border-radius: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: clamp(16px, 2.8%, 32px);
            font-family: 'Schoolbell', cursive;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .login-form .password-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .login-form .password-input:focus {
            border-color: #98C81C;
            background: rgba(255,255,255,0.15);
        }

        .login-form .error-msg {
            color: #ff6b6b;
            font-size: clamp(14px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .login-form .error-msg.show {
            display: block;
        }

        /* ===== RESPONSIVE ===== */

        /* Portrait */
        @media screen and (orientation: portrait) {
            .karyawan-container { width: 100vw; height: 100vh; border-radius: 0; }
            .login-form { max-width: 420px; }
        }

        /* Landscape */
        @media screen and (orientation: landscape) {
            .karyawan-container { width: 100vw; height: 100vh; border-radius: 0; }
            .login-form { max-width: 380px; }
            .login-form .form-image { width: 70px; margin-bottom: 10px; }
            .login-form .label { font-size: 20px; margin-bottom: 8px; }
            .login-form .password-input { padding: 8px 16px; font-size: 14px; border-width: 2px; }
            .login-form .error-msg { font-size: 12px; margin-top: 8px; }
            .logo-top { top: 3%; }
            .logo-top img { width: 30px; }
            .logo-top .brand-text { font-size: 14px; }
            .btn-back { font-size: 24px; left: 2%; top: 2%; }
            .login-wrapper { padding: 10px; }
        }

        /* HP portrait */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .login-form { max-width: 340px; }
            .login-form .form-image { width: 100px; }
            .login-form .label { font-size: 18px; }
            .login-form .password-input { font-size: 14px; padding: 10px 16px; border-width: 2px; }
            .login-form .error-msg { font-size: 14px; }
            .logo-top img { width: 30px; }
            .logo-top .brand-text { font-size: 14px; }
            .btn-back { font-size: 22px; }
        }

        /* HP sangat kecil */
        @media screen and (max-width: 360px) and (orientation: portrait) {
            .login-form { max-width: 300px; }
            .login-form .form-image { width: 80px; }
            .login-form .label { font-size: 16px; }
            .login-form .password-input { font-size: 12px; padding: 8px 12px; }
            .login-form .error-msg { font-size: 12px; }
            .logo-top img { width: 25px; }
            .logo-top .brand-text { font-size: 12px; }
            .btn-back { font-size: 18px; }
        }

        /* Landscape HP kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .login-form { max-width: 320px; }
            .login-form .form-image { width: 55px; margin-bottom: 6px; }
            .login-form .label { font-size: 16px; margin-bottom: 6px; }
            .login-form .password-input { padding: 6px 12px; font-size: 12px; border-width: 2px; }
            .login-form .error-msg { font-size: 11px; margin-top: 6px; }
            .logo-top { top: 2%; }
            .logo-top img { width: 25px; }
            .logo-top .brand-text { font-size: 11px; }
            .btn-back { font-size: 18px; left: 1.5%; top: 1.5%; }
            .login-wrapper { padding: 6px; }
        }

        /* Tablet portrait */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .login-form { max-width: 500px; }
            .login-form .form-image { width: 160px; }
            .login-form .label { font-size: 32px; }
            .login-form .password-input { font-size: 24px; padding: 16px 24px; }
            .logo-top img { width: 55px; }
            .logo-top .brand-text { font-size: 26px; }
            .btn-back { font-size: 36px; }
        }

        /* Tablet landscape */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .login-form { max-width: 400px; }
            .login-form .form-image { width: 90px; }
            .login-form .label { font-size: 22px; }
            .login-form .password-input { font-size: 16px; padding: 10px 18px; }
            .logo-top img { width: 40px; }
            .logo-top .brand-text { font-size: 18px; }
            .btn-back { font-size: 28px; }
        }

        /* Desktop */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .karyawan-container { width: 100vw; height: 100vh; border-radius: 0; }
            .login-form { max-width: 450px; }
            .login-form .form-image { width: 150px; }
            .login-form .label { font-size: 32px; }
            .login-form .password-input { font-size: 22px; padding: 14px 24px; }
            .logo-top img { width: 55px; }
            .logo-top .brand-text { font-size: 24px; }
            .btn-back { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="karyawan-container">
        <!-- Background -->
        <div class="bg-utama"></div>

        <div class="overlay"></div>

        <!-- Tombol Back -->
        <button class="btn-back" onclick="goBack()">←</button>

        <!-- Logo -->
        <div class="logo-top">
            <img src="logo.png" alt="Logo Jangkung" loading="lazy" onerror="this.src='https://placehold.co/70x70/98C81C/ffffff?text=🍽️'" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>

        <!-- Login Form -->
        <div class="login-wrapper">
            <div class="login-form">
                <!-- Gambar di atas form -->
                <img src="logo.png" alt="Logo" class="form-image" loading="lazy" onerror="this.style.display='none'" />

                <!-- Label Password -->
                <div class="label">Password</div>

                <!-- Input Password -->
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="passwordInput" 
                        class="password-input" 
                        placeholder="Masukkan password" 
                        required 
                        autocomplete="current-password"
                    >
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="error-msg">
                    ⚠️ Error: password salah, coba lagi
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password yang benar
        const KARYAWAN_PASSWORD = 'admin';

        function goBack() {
            window.history.back();
        }

        // ============ HANDLE LOGIN ============
        function handleLogin() {
            const password = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!password) {
                errorMsg.textContent = '⚠️ Password tidak boleh kosong!';
                errorMsg.classList.add('show');
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
                return false;
            }
            
            if (password === KARYAWAN_PASSWORD) {
                localStorage.setItem('user_role', 'Karyawan');
                localStorage.setItem('karyawan_logged_in', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = '⚠️ Error: password salah, coba lagi';
                errorMsg.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
            return false;
        }

        // ============ EVENT LISTENERS ============
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // ============ CEK LOGIN STATUS ============
        if (localStorage.getItem('karyawan_logged_in') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
