<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Masuk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .login-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            z-index: 1;
        }

        /* ===== DEKORASI ===== */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .decorations img {
            position: absolute;
            opacity: 1;
        }

        .decorations .tomat-atas-kiri {
            width: clamp(60px, 15vw, 250px);
            left: 0%;
            top: 0%;
        }

        .decorations .tomat1-bawah-kanan {
            width: clamp(60px, 15vw, 250px);
            right: 0%;
            bottom: 0%;
        }

        .decorations .cabe2-atas-kanan {
            width: clamp(50px, 12vw, 200px);
            right: 0%;
            top: 0%;
        }

        .decorations .cabe21-atas-kanan {
            width: clamp(50px, 12vw, 200px);
            right: 0%;
            top: 0%;
        }

        .decorations .cabe1-bawah-kiri {
            width: clamp(50px, 12vw, 200px);
            left: 0%;
            bottom: 0%;
        }

        .decorations .cabe11-bawah-kiri {
            width: clamp(50px, 12vw, 200px);
            left: 0%;
            bottom: 0%;
        }

        .btn-back {
            position: absolute;
            left: 4%;
            top: 3%;
            z-index: 20;
            background: none;
            border: none;
            color: white;
            font-size: clamp(32px, 4%, 55px);
            cursor: pointer;
            padding: 10px 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-top {
            position: absolute;
            left: 50%;
            top: 3%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            padding: 8px 20px;
        }

        .logo-top:active {
            transform: translateX(-50%) scale(0.95);
        }

        .logo-top img {
            width: clamp(70px, 10%, 120px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(24px, 4.5%, 55px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        .qr-badge {
            position: absolute;
            left: 50%;
            top: 14%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(152, 200, 28, 0.2);
            padding: 6px 20px;
            border-radius: 50px;
            border: 2px solid rgba(152, 200, 28, 0.3);
            color: #98C81C;
            font-size: clamp(11px, 1.3%, 16px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .qr-badge span {
            color: white;
        }

        .login-content {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 30px;
        }

        .login-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 40px 45px;
            border-radius: 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .login-box h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .login-box .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-group input:focus {
            border-color: #98C81C;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(152, 200, 28, 0.1);
        }

        .form-group input:disabled {
            opacity: 0.7;
            background: #e9ecef;
            cursor: not-allowed;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #98C81C;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-login:active {
            background: #7aa814;
            transform: scale(0.98);
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            display: none;
            font-weight: 600;
            border: 1px solid #f5c6cb;
            font-size: 14px;
        }

        /* ===== RESPONSIVE ===== */

        @media screen and (orientation: portrait) {
            .login-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .login-box {
                padding: 40px 35px;
                max-width: 450px;
            }

            .login-box h2 {
                font-size: 28px;
            }

            .logo-top img {
                width: clamp(60px, 10%, 100px);
            }

            .logo-top .brand-text {
                font-size: clamp(20px, 4.5%, 45px);
            }
        }

        @media screen and (orientation: landscape) {
            .login-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .login-box {
                padding: 25px 35px;
                max-width: 420px;
                border-radius: 40px;
            }

            .login-box h2 {
                font-size: 22px;
            }

            .login-box .subtitle {
                font-size: 13px;
                margin-bottom: 15px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            .form-group input {
                padding: 9px 14px;
                font-size: 14px;
            }

            .btn-login {
                padding: 11px;
                font-size: 15px;
            }

            .logo-top {
                top: 2.5%;
                gap: 10px;
            }

            .logo-top img {
                width: clamp(50px, 8%, 80px);
            }

            .logo-top .brand-text {
                font-size: clamp(18px, 3.5%, 35px);
            }

            .qr-badge {
                top: 12%;
                font-size: 11px;
                padding: 4px 16px;
            }

            .btn-back {
                font-size: clamp(28px, 3.5%, 45px);
                left: 2%;
                top: 2.5%;
            }

            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(40px, 10vw, 150px);
            }

            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(35px, 8vw, 120px);
            }
        }

        @media screen and (max-width: 480px) and (orientation: portrait) {
            .login-container {
                border-radius: 0;
            }

            .login-box {
                padding: 25px 20px;
                border-radius: 30px;
                max-width: 340px;
            }

            .login-box h2 {
                font-size: 20px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 15px;
                border-radius: 8px;
            }

            .btn-login {
                padding: 12px;
                font-size: 15px;
                border-radius: 8px;
            }

            .qr-badge {
                top: 15%;
                font-size: 10px;
                padding: 4px 12px;
            }

            .logo-top img {
                width: clamp(45px, 10%, 70px);
            }

            .logo-top .brand-text {
                font-size: clamp(16px, 4%, 30px);
            }

            .btn-back {
                font-size: clamp(24px, 4%, 40px);
                left: 3%;
                top: 2.5%;
            }

            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(40px, 15vw, 100px);
            }

            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(35px, 12vw, 80px);
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .login-box {
                padding: 15px 25px;
                max-width: 360px;
                border-radius: 30px;
            }

            .login-box h2 {
                font-size: 18px;
            }

            .login-box .subtitle {
                font-size: 11px;
                margin-bottom: 10px;
            }

            .form-group {
                margin-bottom: 8px;
            }

            .form-group label {
                font-size: 11px;
                margin-bottom: 4px;
            }

            .form-group input {
                padding: 6px 12px;
                font-size: 12px;
                border-radius: 8px;
            }

            .btn-login {
                padding: 8px;
                font-size: 13px;
                border-radius: 8px;
                margin-top: 5px;
            }

            .logo-top {
                top: 2%;
                gap: 8px;
            }

            .logo-top img {
                width: clamp(35px, 6%, 55px);
            }

            .logo-top .brand-text {
                font-size: clamp(14px, 2.5%, 22px);
            }

            .qr-badge {
                top: 11%;
                font-size: 9px;
                padding: 3px 12px;
            }

            .btn-back {
                font-size: clamp(22px, 3%, 35px);
                left: 1.5%;
                top: 2%;
            }

            .decorations .tomat-atas-kiri,
            .decorations .tomat1-bawah-kanan {
                width: clamp(30px, 8vw, 80px);
            }

            .decorations .cabe2-atas-kanan,
            .decorations .cabe21-atas-kanan,
            .decorations .cabe1-bawah-kiri,
            .decorations .cabe11-bawah-kiri {
                width: clamp(25px, 6vw, 60px);
            }
        }

        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .login-box {
                padding: 35px 45px;
                max-width: 480px;
                border-radius: 50px;
            }

            .login-box h2 {
                font-size: 28px;
            }

            .login-box .subtitle {
                font-size: 15px;
            }

            .form-group input {
                padding: 12px 16px;
                font-size: 16px;
            }

            .btn-login {
                padding: 14px;
                font-size: 17px;
            }

            .logo-top img {
                width: clamp(80px, 10%, 120px);
            }

            .logo-top .brand-text {
                font-size: clamp(28px, 4.5%, 55px);
            }

            .btn-back {
                left: 3%;
                top: 3%;
                font-size: clamp(32px, 4%, 55px);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Background -->
        <div class="bg-utama"></div>

        <div class="overlay"></div>

        <!-- ===== DEKORASI ===== -->
        <div class="decorations">
            <img class="tomat-atas-kiri" src="tomat2.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe2-atas-kanan" src="cabe2.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe21-atas-kanan" src="cabe2.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe1-bawah-kiri" src="cabe1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="cabe11-bawah-kiri" src="cabe1.1.png" alt="Cabe" loading="lazy" onerror="this.style.display='none'">
            <img class="tomat1-bawah-kanan" src="tomat1.png" alt="Tomat" loading="lazy" onerror="this.style.display='none'">
        </div>

        <!-- Tombol Back -->
        <button class="btn-back" onclick="window.location.href='login.html'">←</button>

        <!-- Logo - DI TENGAH -->
        <div class="logo-top" onclick="window.location.href='login.html'">
            <img src="logo.png" alt="Logo Jangkung" loading="lazy" onerror="this.src='https://placehold.co/120x120/98C81C/ffffff?text=🍽️'" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>

        <!-- QR Badge -->
        <div class="qr-badge" id="qrBadge">
            Scan QR · Meja <span id="qrMeja">-</span>
        </div>

        <!-- Login Content -->
        <div class="login-content">
            <div class="login-box">
                <h2>Masuk Sebagai Customer</h2>
                <p class="subtitle">Silakan masukkan nama Anda</p>
                
                <div id="errorMsg" class="error">⚠️ Nama harus diisi!</div>
                
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label>Nama Anda</label>
                        <input type="text" id="namaInput" placeholder="Masukkan nama Anda" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Nomor Meja</label>
                        <input type="number" id="mejaInput" placeholder="Masukkan nomor meja" required min="1" disabled>
                    </div>
                    <button type="submit" class="btn-login">Masuk</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ============ AMBIL PARAMETER DARI URL ============
        function getMejaFromURL() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) {
                return meja;
            }
            return null;
        }

        function getNamaFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('nama') || '';
        }

        // ============ SET MEJA DARI URL ============
        const mejaDariQR = getMejaFromURL();
        const mejaInput = document.getElementById('mejaInput');
        const qrMeja = document.getElementById('qrMeja');

        if (mejaDariQR) {
            mejaInput.value = mejaDariQR;
            qrMeja.textContent = mejaDariQR;
            document.getElementById('qrBadge').style.display = 'block';
        } else {
            mejaInput.disabled = false;
            mejaInput.placeholder = 'Masukkan nomor meja';
            document.getElementById('qrBadge').style.display = 'none';
        }

        // ============ SET NAMA DARI URL ============
        const namaDariURL = getNamaFromURL();
        if (namaDariURL) {
            document.getElementById('namaInput').value = namaDariURL;
        }

        // ============ HANDLE LOGIN ============
        function handleLogin(e) {
            e.preventDefault();
            const nama = document.getElementById('namaInput').value.trim();
            const meja = document.getElementById('mejaInput').value;
            
            if (!nama) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = '⚠️ Nama harus diisi!';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
                return false;
            }
            
            if (!meja || meja < 1) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = '⚠️ Nomor meja tidak valid!';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
                return false;
            }
            
            localStorage.setItem('customer_name', nama);
            localStorage.setItem('meja_number', meja);
            
            window.location.href = 'customer_order.html?meja=' + meja + '&nama=' + encodeURIComponent(nama);
            return false;
        }

        // Enter key support
        document.getElementById('namaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
