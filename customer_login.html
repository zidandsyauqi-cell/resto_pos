<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Masuk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .login-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }

        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-top {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .logo-top .brand-text span {
            color: #98C81C;
        }

        .qr-badge {
            position: absolute;
            left: 50%;
            top: 18%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(152, 200, 28, 0.2);
            padding: 8px 24px;
            border-radius: 50px;
            border: 2px solid rgba(152, 200, 28, 0.3);
            color: #98C81C;
            font-size: clamp(12px, 1.5%, 18px);
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .qr-badge span {
            color: white;
        }

        .login-content {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 40px;
        }

        .login-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 65px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .login-box h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-box .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-group input:focus {
            border-color: #98C81C;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(152, 200, 28, 0.1);
        }

        .form-group input:disabled {
            opacity: 0.7;
            background: #e9ecef;
            cursor: not-allowed;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #98C81C;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #7aa814;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(152, 200, 28, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-weight: 600;
            border: 1px solid #f5c6cb;
        }

        @media screen and (max-width: 767px) {
            .login-container {
                max-width: 100%;
                aspect-ratio: 1080/1920;
                border-radius: 12px;
            }

            .login-box {
                padding: 30px 25px;
                border-radius: 40px;
                max-width: 380px;
            }

            .login-box h2 {
                font-size: 24px;
            }

            .qr-badge {
                top: 16%;
                font-size: 11px;
                padding: 6px 16px;
            }
        }

        @media screen and (max-width: 480px) {
            .login-container {
                border-radius: 10px;
            }

            .login-box {
                padding: 25px 20px;
                border-radius: 30px;
                max-width: 340px;
            }

            .login-box h2 {
                font-size: 20px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 15px;
                border-radius: 8px;
            }

            .btn-login {
                padding: 12px;
                font-size: 15px;
                border-radius: 8px;
            }

            .qr-badge {
                top: 15%;
                font-size: 10px;
                padding: 4px 12px;
            }
        }

        @media screen and (max-width: 360px) {
            .login-box {
                padding: 20px 15px;
                border-radius: 25px;
                max-width: 300px;
            }

            .login-box h2 {
                font-size: 18px;
            }

            .form-group input {
                padding: 8px 12px;
                font-size: 14px;
            }

            .btn-login {
                padding: 10px;
                font-size: 14px;
            }

            .qr-badge {
                top: 14%;
                font-size: 9px;
                padding: 3px 10px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .login-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .login-container {
                max-width: 90vh;
                aspect-ratio: 1080/1920;
                border-radius: 10px;
            }

            .login-box {
                padding: 20px 25px;
                max-width: 380px;
            }

            .login-box h2 {
                font-size: 22px;
            }

            .form-group {
                margin-bottom: 10px;
            }

            .form-group input {
                padding: 8px 14px;
                font-size: 14px;
            }

            .btn-login {
                padding: 10px;
                font-size: 14px;
            }

            .qr-badge {
                top: 14%;
                font-size: 10px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Background bg.png -->
        <div class="bg-utama" style="position:absolute;width:100%;height:100%;top:0;left:0;z-index:0;background:url('bg.png') center center/cover no-repeat;"></div>

        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <button class="btn-back" onclick="window.location.href='login.html'">←</button>

        <div class="logo-top">
            <img src="logo.png" alt="Logo Jangkung" loading="lazy" onerror="this.src='https://placehold.co/80x80/98C81C/ffffff?text=🍽️'" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>

        <!-- QR Badge -->
        <div class="qr-badge" id="qrBadge">
            Scan QR · Meja <span id="qrMeja">-</span>
        </div>

        <div class="login-content">
            <div class="login-box">
                <h2>Masuk Sebagai Customer</h2>
                <p class="subtitle">Silakan masukkan nama Anda</p>
                
                <div id="errorMsg" class="error">⚠️ Nama harus diisi!</div>
                
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label>Nama Anda</label>
                        <input type="text" id="namaInput" placeholder="Masukkan nama Anda" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Nomor Meja</label>
                        <input type="number" id="mejaInput" placeholder="Masukkan nomor meja" required min="1" disabled>
                    </div>
                    <button type="submit" class="btn-login">Masuk</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ============ AMBIL PARAMETER DARI URL ============
        function getMejaFromURL() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) {
                return meja;
            }
            return null;
        }

        function getNamaFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('nama') || '';
        }

        // ============ SET MEJA DARI URL ============
        const mejaDariQR = getMejaFromURL();
        const mejaInput = document.getElementById('mejaInput');
        const qrMeja = document.getElementById('qrMeja');

        if (mejaDariQR) {
            mejaInput.value = mejaDariQR;
            qrMeja.textContent = mejaDariQR;
            document.getElementById('qrBadge').style.display = 'block';
        } else {
            // Jika tidak ada parameter meja, enable input meja
            mejaInput.disabled = false;
            mejaInput.placeholder = 'Masukkan nomor meja';
            document.getElementById('qrBadge').style.display = 'none';
        }

        // ============ SET NAMA DARI URL ============
        const namaDariURL = getNamaFromURL();
        if (namaDariURL) {
            document.getElementById('namaInput').value = namaDariURL;
        }

        // ============ HANDLE LOGIN ============
        function handleLogin(e) {
            e.preventDefault();
            const nama = document.getElementById('namaInput').value.trim();
            const meja = document.getElementById('mejaInput').value;
            
            if (!nama) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = '⚠️ Nama harus diisi!';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
                return false;
            }
            
            if (!meja || meja < 1) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = '⚠️ Nomor meja tidak valid!';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
                return false;
            }
            
            localStorage.setItem('customer_name', nama);
            localStorage.setItem('meja_number', meja);
            
            window.location.href = 'customer_order.html?meja=' + meja + '&nama=' + encodeURIComponent(nama);
            return false;
        }

        // Enter key support
        document.getElementById('namaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
