<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        body {
            font-family: 'Poppins', sans-serif;
        }
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #1a1a1a;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }
        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .list-menu {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            overflow-y: auto;
            padding: 15px 30px 20px;
        }
        .list-menu::-webkit-scrollbar { width: 3px; }
        .list-menu::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .list-menu::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }

        /* Header - Logo + Back */
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: transparent;
            z-index: 10;
            padding-bottom: 12px;
        }
        .list-header .brand-left {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .list-header .brand-left img {
            width: clamp(35px, 5%, 60px);
            height: auto;
        }
        .list-header .brand-left .brand-text {
            color: white;
            font-size: clamp(16px, 3.5%, 40px);
            font-weight: 700;
            white-space: nowrap;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .list-header .brand-left .brand-text span { color: #98C81C; }

        .btn-back-dashboard {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3.5%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .btn-back-dashboard:hover { transform: scale(1.1); color: #98C81C; }

        /* Search Bar */
        .search-bar {
            width: 100%;
            padding: clamp(10px, 2%, 18px) clamp(16px, 3%, 30px);
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: clamp(14px, 2.5%, 28px);
            font-family: 'Schoolbell', cursive;
            outline: none;
            margin: 8px 0 15px;
            transition: all 0.3s;
        }
        .search-bar::placeholder { color: rgba(255,255,255,0.5); }
        .search-bar:focus { background: rgba(255,255,255,0.15); border-color: #98C81C; }

        /* Category Section */
        .category-section {
            margin-top: 12px;
        }
        .category-title {
            color: white;
            font-size: clamp(22px, 5%, 55px);
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Menu Item */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: rgba(255,255,255,0.04); border-radius: 10px; padding-left: 8px; padding-right: 8px; }

        .menu-item .menu-img {
            width: clamp(55px, 10%, 110px);
            height: clamp(55px, 10%, 110px);
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background: #2d2d2d;
        }

        .menu-item .menu-info {
            flex: 1;
            min-width: 0;
        }
        .menu-item .menu-info .menu-name {
            color: white;
            font-size: clamp(15px, 3.2%, 38px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .menu-item .menu-info .menu-price {
            color: #98C81C;
            font-size: clamp(13px, 2.8%, 34px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .menu-item .btn-detail {
            padding: clamp(6px, 1.5%, 14px) clamp(14px, 3.5%, 40px);
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .menu-item .btn-detail:hover {
            background: #7aa814;
            transform: scale(1.05);
        }
        .menu-item .btn-detail:active { transform: scale(0.95); }

        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 40px 20px;
            font-size: clamp(16px, 3.5%, 35px);
            font-family: 'Schoolbell', cursive;
        }

        /* Error */
        .error-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 30px 40px;
            border-radius: 20px;
            border: 2px solid #e74c3c;
            max-width: 85%;
        }
        .error-display .error-icon { font-size: 50px; display: block; margin-bottom: 10px; }
        .error-display .error-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .error-display .error-desc { font-size: 16px; color: rgba(255,255,255,0.7); }
        .error-display .btn-retry {
            margin-top: 15px;
            padding: 10px 30px;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        .error-display .btn-retry:hover { background: #7aa814; transform: scale(1.05); }

        /* ===== RESPONSIVE ===== */

        /* Portrait */
        @media screen and (orientation: portrait) {
            .container { width: 100vw; height: 100vh; border-radius: 0; }
            .list-menu { padding: 10px 20px 15px; }
        }

        /* Landscape */
        @media screen and (orientation: landscape) {
            .container { width: 100vw; height: 100vh; border-radius: 0; }
            .list-menu { padding: 8px 25px 12px; }
            .menu-item { padding: 8px 0; gap: 12px; }
            .menu-item .menu-img { width: 50px; height: 50px; }
            .menu-item .menu-info .menu-name { font-size: 16px; }
            .menu-item .menu-info .menu-price { font-size: 14px; }
            .menu-item .btn-detail { font-size: 12px; padding: 4px 12px; }
            .category-title { font-size: 20px; }
            .search-bar { padding: 6px 14px; font-size: 13px; margin: 5px 0 10px; }
        }

        /* HP kecil landscape */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .list-menu { padding: 5px 15px 8px; }
            .menu-item { padding: 4px 0; gap: 8px; }
            .menu-item .menu-img { width: 35px; height: 35px; border-radius: 8px; }
            .menu-item .menu-info .menu-name { font-size: 12px; }
            .menu-item .menu-info .menu-price { font-size: 10px; }
            .menu-item .btn-detail { font-size: 9px; padding: 3px 8px; border-width: 1.5px; }
            .category-title { font-size: 14px; padding-bottom: 4px; margin-bottom: 6px; }
            .search-bar { padding: 4px 10px; font-size: 10px; margin: 4px 0 6px; border-width: 1.5px; }
            .list-header { padding-top: 8px; padding-bottom: 6px; }
            .list-header .brand-left img { width: 25px; }
            .list-header .brand-left .brand-text { font-size: 12px; }
            .btn-back-dashboard { font-size: 16px; padding: 2px 6px; }
        }

        /* Tablet portrait */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .list-menu { padding: 15px 35px 20px; }
            .menu-item { padding: 16px 0; gap: 20px; }
            .menu-item .menu-img { width: 90px; height: 90px; border-radius: 16px; }
            .menu-item .menu-info .menu-name { font-size: 28px; }
            .menu-item .menu-info .menu-price { font-size: 24px; }
            .menu-item .btn-detail { font-size: 22px; padding: 10px 30px; }
            .category-title { font-size: 36px; }
            .search-bar { font-size: 20px; padding: 14px 24px; }
            .list-header .brand-left img { width: 50px; }
            .list-header .brand-left .brand-text { font-size: 30px; }
            .btn-back-dashboard { font-size: 32px; }
        }

        /* Tablet landscape */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .list-menu { padding: 10px 30px 15px; }
            .menu-item { padding: 10px 0; gap: 16px; }
            .menu-item .menu-img { width: 65px; height: 65px; border-radius: 12px; }
            .menu-item .menu-info .menu-name { font-size: 20px; }
            .menu-item .menu-info .menu-price { font-size: 17px; }
            .menu-item .btn-detail { font-size: 15px; padding: 6px 18px; }
            .category-title { font-size: 26px; }
            .search-bar { font-size: 16px; padding: 10px 20px; }
            .list-header .brand-left img { width: 40px; }
            .list-header .brand-left .brand-text { font-size: 22px; }
            .btn-back-dashboard { font-size: 26px; }
        }

        /* Desktop */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .container { width: 100vw; height: 100vh; border-radius: 0; }
            .list-menu { padding: 15px 40px 25px; max-width: 900px; margin: 0 auto; }
            .menu-item { padding: 14px 0; gap: 20px; }
            .menu-item .menu-img { width: 80px; height: 80px; border-radius: 14px; }
            .menu-item .menu-info .menu-name { font-size: 24px; }
            .menu-item .menu-info .menu-price { font-size: 20px; }
            .menu-item .btn-detail { font-size: 18px; padding: 8px 24px; }
            .category-title { font-size: 32px; }
            .search-bar { font-size: 18px; padding: 12px 24px; margin: 10px 0 18px; }
            .list-header .brand-left img { width: 50px; }
            .list-header .brand-left .brand-text { font-size: 28px; }
            .btn-back-dashboard { font-size: 30px; }
        }

        /* Desktop lebar */
        @media screen and (min-width: 1600px) and (orientation: landscape) {
            .list-menu { padding: 20px 50px 30px; max-width: 1000px; }
            .menu-item .menu-img { width: 100px; height: 100px; }
            .menu-item .menu-info .menu-name { font-size: 30px; }
            .menu-item .menu-info .menu-price { font-size: 26px; }
            .menu-item .btn-detail { font-size: 22px; padding: 10px 30px; }
            .category-title { font-size: 40px; }
            .search-bar { font-size: 22px; padding: 14px 28px; }
        }

        /* HP portrait */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .list-menu { padding: 8px 12px 12px; }
            .menu-item { padding: 8px 0; gap: 10px; }
            .menu-item .menu-img { width: 45px; height: 45px; border-radius: 8px; }
            .menu-item .menu-info .menu-name { font-size: 13px; }
            .menu-item .menu-info .menu-price { font-size: 11px; }
            .menu-item .btn-detail { font-size: 10px; padding: 4px 12px; border-width: 1.5px; }
            .category-title { font-size: 16px; padding-bottom: 4px; margin-bottom: 6px; }
            .search-bar { padding: 6px 12px; font-size: 11px; margin: 4px 0 8px; border-width: 1.5px; }
            .list-header { padding-top: 8px; padding-bottom: 8px; }
            .list-header .brand-left img { width: 25px; }
            .list-header .brand-left .brand-text { font-size: 13px; }
            .btn-back-dashboard { font-size: 16px; padding: 2px 8px; }
        }

        /* HP sangat kecil */
        @media screen and (max-width: 360px) and (orientation: portrait) {
            .menu-item .menu-img { width: 35px; height: 35px; }
            .menu-item .menu-info .menu-name { font-size: 11px; }
            .menu-item .menu-info .menu-price { font-size: 10px; }
            .menu-item .btn-detail { font-size: 8px; padding: 3px 8px; }
            .category-title { font-size: 13px; }
            .search-bar { font-size: 9px; padding: 4px 8px; }
            .list-header .brand-left .brand-text { font-size: 11px; }
            .list-header .brand-left img { width: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Background -->
        <div class="bg-utama"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat menu...</div>
        </div>

        <div class="list-menu" id="listMenu">
            <!-- Header - Logo + Back -->
            <div class="list-header">
                <div class="brand-left" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo Jangkung" loading="lazy" onerror="this.src='https://placehold.co/60x60/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
                <button class="btn-back-dashboard" onclick="goBack()">←</button>
            </div>

            <!-- Search -->
            <input class="search-bar" id="searchInput" placeholder="🔍 Cari menu..." type="text" />

            <!-- Menu Items Container -->
            <div id="menuContainer"></div>
        </div>

        <!-- Error Display -->
        <div class="error-display" id="errorDisplay" style="display:none;">
            <span class="error-icon">⚠️</span>
            <div class="error-title">Gagal Memuat Menu</div>
            <div class="error-desc" id="errorDesc">Terjadi kesalahan saat memuat menu. Silakan coba lagi.</div>
            <button class="btn-retry" onclick="loadMenus()">🔄 Coba Lagi</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allMenus = [];

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function goToDashboard() {
            const meja = getMeja();
            const nama = encodeURIComponent(getNama());
            window.location.href = 'customer_order.html?meja=' + meja + '&nama=' + nama;
        }

        function goBack() {
            window.history.back();
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function formatRupiah(price) {
            return 'Rp ' + Number(price).toLocaleString('id-ID');
        }

        function goToDetail(menuId) {
            const meja = getMeja();
            const nama = encodeURIComponent(getNama());
            window.location.href = 'customer_menu_detail.html?meja=' + meja + '&nama=' + nama + '&id=' + menuId;
        }

        function renderMenus(menus) {
            const container = document.getElementById('menuContainer');
            
            if (!menus || menus.length === 0) {
                container.innerHTML = '<div class="empty-state">😅 Tidak ada menu yang ditemukan</div>';
                return;
            }

            const grouped = {};
            menus.forEach(menu => {
                const kategori = menu.kategori || 'Lainnya';
                if (!grouped[kategori]) grouped[kategori] = [];
                grouped[kategori].push(menu);
            });

            let html = '';
            const kategoriOrder = ['Makanan', 'Tambahan', 'Minuman', 'Jangkung Kopi', 'Lainnya'];
            
            for (const kat of kategoriOrder) {
                if (grouped[kat] && grouped[kat].length > 0) {
                    html += `<div class="category-section"><div class="category-title">${kat.toUpperCase()}</div>`;
                    
                    grouped[kat].forEach(menu => {
                        let imageUrl = 'https://placehold.co/150x150/2d2d2d/ffffff?text=' + encodeURIComponent(menu.nama_menu || 'Menu');
                        if (menu.gambar) {
                            const url = getImageUrl(menu.gambar);
                            if (url) imageUrl = url;
                        }

                        const price = menu.harga || 0;

                        html += `
                            <div class="menu-item" data-id="${menu.id_menu}">
                                <img class="menu-img" src="${imageUrl}" alt="${menu.nama_menu || 'Menu'}" loading="lazy" onerror="this.src='https://placehold.co/150x150/2d2d2d/ffffff?text=Menu'" />
                                <div class="menu-info">
                                    <div class="menu-name">${menu.nama_menu || 'Menu'}</div>
                                    <div class="menu-price">${formatRupiah(price)}</div>
                                </div>
                                <button class="btn-detail" onclick="goToDetail(${menu.id_menu})">📋 detail</button>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                }
            }

            container.innerHTML = html;
        }

        async function loadMenus() {
            const loading = document.getElementById('loadingOverlay');
            const errorDisplay = document.getElementById('errorDisplay');
            loading.classList.add('active');
            errorDisplay.style.display = 'none';

            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, gambar, detail, kategori')
                    .eq('status_ketersediaan', 'Tersedia')
                    .order('kategori')
                    .order('nama_menu');

                if (error) throw error;

                allMenus = data || [];
                renderMenus(allMenus);

            } catch (error) {
                console.error('Error loading menus:', error);
                document.getElementById('errorDesc').textContent = 'Gagal memuat menu: ' + (error.message || 'Unknown error');
                errorDisplay.style.display = 'block';
                document.getElementById('menuContainer').innerHTML = '';
            } finally {
                loading.classList.remove('active');
            }
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderMenus(allMenus);
                return;
            }
            const filtered = allMenus.filter(menu => 
                (menu.nama_menu || '').toLowerCase().includes(query) ||
                (menu.detail || '').toLowerCase().includes(query)
            );
            renderMenus(filtered);
        });

        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', loadMenus);
    </script>
</body>
</html>
