<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Detail Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .detail-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }
        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* Tombol Back */
        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 4%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(28px, 4.5%, 55px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }

        /* Logo di atas */
        .logo-top {
            position: absolute;
            left: 50%;
            top: 4%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-top img {
            width: clamp(40px, 7%, 70px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 3.5%, 40px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .logo-top .brand-text span { color: #98C81C; }

        /* Gambar Menu - Full width di atas */
        .menu-image {
            position: absolute;
            width: 100%;
            height: 56.25%;
            top: 0;
            left: 0;
            overflow: hidden;
            background: #2d2d2d;
            z-index: 1;
        }
        .menu-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-image .image-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
        }

        /* Nama Menu */
        .menu-name {
            position: absolute;
            left: 4%;
            top: 54.7%;
            z-index: 5;
            color: white;
            font-size: clamp(28px, 8.5%, 85px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            line-height: 1.2;
            max-width: 92%;
        }

        /* Harga Menu */
        .menu-price {
            position: absolute;
            left: 4%;
            top: 62.5%;
            z-index: 5;
            color: #98C81C;
            font-size: clamp(20px, 5%, 50px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        /* Deskripsi */
        .menu-desc {
            position: absolute;
            left: 4.9%;
            top: 68%;
            width: 90.2%;
            z-index: 5;
            color: white;
            font-size: clamp(14px, 4.2%, 45px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: justify;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.5;
            max-height: 28%;
            overflow-y: auto;
            padding-right: 10px;
        }
        .menu-desc::-webkit-scrollbar { width: 3px; }
        .menu-desc::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .menu-desc::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }

        /* Tombol Kembali ke Menu */
        .btn-back-menu {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 82.2%;
            padding: clamp(12px, 2.5%, 28px);
            background: #98C81C;
            border: 3px solid white;
            border-radius: 100px;
            color: white;
            font-size: clamp(18px, 4.2%, 50px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            text-decoration: none;
            display: inline-block;
        }
        .btn-back-menu:hover {
            background: #7aa814;
            transform: translateX(-50%) scale(1.02);
            box-shadow: 0 12px 40px rgba(152, 200, 28, 0.4);
        }
        .btn-back-menu:active { transform: translateX(-50%) scale(0.98); }

        /* Error display */
        .error-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.85);
            padding: 30px 40px;
            border-radius: 20px;
            border: 2px solid #e74c3c;
            max-width: 85%;
        }
        .error-display .error-icon { font-size: 50px; display: block; margin-bottom: 10px; }
        .error-display .error-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .error-display .error-desc { font-size: 16px; color: rgba(255,255,255,0.7); }
        .error-display .btn-retry {
            margin-top: 15px;
            padding: 10px 30px;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .error-display .btn-retry:hover { background: #7aa814; transform: scale(1.05); }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .detail-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .menu-image { height: 50%; }
            .menu-name { top: 52%; font-size: 26px; }
            .menu-price { top: 60%; font-size: 18px; }
            .menu-desc { top: 65%; font-size: 14px; max-height: 25%; }
            .btn-back-menu { bottom: 3%; padding: 12px; font-size: 18px; }
            .btn-back { padding: 4px 12px; font-size: 16px; top: 3%; }
            .logo-top { top: 3%; }
            .logo-top .brand-text { font-size: 14px; }
            .logo-top img { width: 30px; }
            .error-display { padding: 20px; }
            .error-display .error-icon { font-size: 36px; }
            .error-display .error-title { font-size: 18px; }
        }

        @media screen and (max-width: 480px) {
            .detail-container { border-radius: 10px; }
            .menu-image { height: 45%; }
            .menu-name { top: 49%; font-size: 20px; }
            .menu-price { top: 56%; font-size: 16px; }
            .menu-desc { top: 61%; font-size: 12px; max-height: 25%; }
            .btn-back-menu { bottom: 2%; padding: 10px; font-size: 15px; }
            .btn-back { padding: 3px 10px; font-size: 14px; }
            .logo-top { top: 3%; }
            .error-display { padding: 15px; }
            .error-display .error-icon { font-size: 28px; }
            .error-display .error-title { font-size: 16px; }
        }

        @media screen and (max-width: 360px) {
            .menu-image { height: 40%; }
            .menu-name { top: 46%; font-size: 17px; }
            .menu-price { top: 53%; font-size: 14px; }
            .menu-desc { top: 58%; font-size: 11px; max-height: 25%; }
            .btn-back-menu { padding: 8px; font-size: 13px; }
            .btn-back { font-size: 12px; padding: 2px 8px; }
            .logo-top .brand-text { font-size: 11px; }
            .logo-top img { width: 25px; }
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat detail menu...</div>
        </div>

        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <!-- Tombol Back -->
        <button class="btn-back" onclick="window.location.href='customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>

        <!-- Logo -->
        <div class="logo-top">
            <img src="https://placehold.co/70x70/98C81C/ffffff?text=🍽️" alt="Logo Jangkung" loading="lazy" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>

        <!-- Gambar Menu -->
        <div class="menu-image">
            <img src="" alt="Menu" id="menuImage" />
            <div class="image-overlay"></div>
        </div>

        <!-- Nama Menu -->
        <div class="menu-name" id="menuName">-</div>

        <!-- Harga Menu -->
        <div class="menu-price" id="menuPrice">-</div>

        <!-- Deskripsi -->
        <div class="menu-desc" id="menuDesc">Memuat deskripsi...</div>

        <!-- Tombol Kembali ke Menu -->
        <a class="btn-back-menu" href="#" id="btnBackMenu">📋 KEMBALI KE MENU</a>

        <!-- Error Display -->
        <div class="error-display" id="errorDisplay" style="display:none;">
            <span class="error-icon">⚠️</span>
            <div class="error-title">Menu Tidak Ditemukan</div>
            <div class="error-desc" id="errorDesc">Menu tidak tersedia. Silakan pilih menu lain.</div>
            <a href="customer_menu_list.html?meja=1" class="btn-retry">📋 Kembali ke Menu</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function formatRupiah(price) {
            return 'Rp ' + Number(price).toLocaleString('id-ID');
        }

        function showError(title, desc) {
            const errorDisplay = document.getElementById('errorDisplay');
            document.getElementById('errorDesc').textContent = desc;
            const btnRetry = errorDisplay.querySelector('.btn-retry');
            btnRetry.href = 'customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama());
            errorDisplay.style.display = 'block';
            document.getElementById('menuName').style.display = 'none';
            document.getElementById('menuPrice').style.display = 'none';
            document.getElementById('menuDesc').style.display = 'none';
            document.getElementById('menuImage').style.display = 'none';
            document.getElementById('btnBackMenu').style.display = 'none';
        }

        async function loadMenuDetail() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const params = new URLSearchParams(window.location.search);
                let menuId = params.get('id');

                if (!menuId) {
                    const { data, error } = await supabaseClient
                        .from('menu')
                        .select('id_menu')
                        .eq('status_ketersediaan', 'Tersedia')
                        .limit(1)
                        .maybeSingle();

                    if (error) throw error;
                    if (data) {
                        menuId = data.id_menu;
                        const newUrl = window.location.pathname + '?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama()) + '&id=' + menuId;
                        window.history.replaceState({}, '', newUrl);
                    }
                }

                if (!menuId) {
                    showError('Belum Ada Menu', 'Silakan tambahkan menu terlebih dahulu melalui dashboard karyawan.');
                    loading.classList.remove('active');
                    return;
                }

                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('nama_menu, detail, harga, gambar')
                    .eq('id_menu', parseInt(menuId))
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    showError('Menu Tidak Ditemukan', 'Menu dengan ID ' + menuId + ' tidak tersedia.');
                    loading.classList.remove('active');
                    return;
                }

                document.getElementById('menuName').textContent = data.nama_menu ? data.nama_menu.toUpperCase() : '-';
                document.getElementById('menuPrice').textContent = data.harga ? formatRupiah(data.harga) : '-';
                document.getElementById('menuDesc').textContent = data.detail || 'Tidak ada deskripsi untuk menu ini.';

                let imageUrl = 'https://placehold.co/1080x1080/2d2d2d/ffffff?text=' + encodeURIComponent(data.nama_menu || 'Menu');
                if (data.gambar) {
                    const url = getImageUrl(data.gambar);
                    if (url) imageUrl = url;
                }
                document.getElementById('menuImage').src = imageUrl;
                document.getElementById('menuImage').alt = data.nama_menu || 'Menu';

                // Set back button link
                document.getElementById('btnBackMenu').href = 'customer_menu_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama());

                document.getElementById('errorDisplay').style.display = 'none';
                document.getElementById('menuName').style.display = 'block';
                document.getElementById('menuPrice').style.display = 'block';
                document.getElementById('menuDesc').style.display = 'block';
                document.getElementById('menuImage').style.display = 'block';
                document.getElementById('btnBackMenu').style.display = 'inline-block';

            } catch (error) {
                console.error('Error loading menu detail:', error);
                showError('Gagal Memuat Menu', 'Terjadi kesalahan saat memuat detail menu. Silakan coba lagi.');
            } finally {
                loading.classList.remove('active');
            }
        }

        // Save to localStorage
        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', loadMenuDetail);
    </script>
</body>
</html>
