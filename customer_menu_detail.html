<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Pesan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .order-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }
        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }
        .deco-bg img:nth-child(2) {
            width: 92.2%;
            height: 51.8%;
            left: -53.2%;
            top: 61.2%;
            transform: rotate(-12deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }
        .deco-bg img:nth-child(3) {
            width: 77.1%;
            height: 43.4%;
            left: 71.8%;
            top: 10.6%;
            transform: rotate(21deg);
            transform-origin: top left;
            box-shadow: 7px 7px 7px rgba(0,0,0,0.2);
            filter: blur(3.50px);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* Header */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 15px 15px 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }

        .logo-small {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-small img {
            width: clamp(30px, 5%, 50px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .logo-small .brand-text {
            color: white;
            font-size: clamp(14px, 2%, 24px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .logo-small .brand-text span { color: #98C81C; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-total {
            background: #029BEE;
            border-radius: 50px;
            border: 2px solid white;
            padding: clamp(4px, 1%, 10px) clamp(10px, 2%, 20px);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(2, 155, 238, 0.3);
            white-space: nowrap;
        }
        .btn-total:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(2, 155, 238, 0.5); }
        .btn-total span {
            color: white;
            font-size: clamp(10px, 1.5%, 18px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .btn-selesai-header {
            background: #ED1B24;
            border-radius: 50px;
            border: 2px solid white;
            padding: clamp(4px, 1%, 10px) clamp(10px, 2%, 20px);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(237, 27, 36, 0.3);
            white-space: nowrap;
        }
        .btn-selesai-header:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(237, 27, 36, 0.5); }
        .btn-selesai-header span {
            color: white;
            font-size: clamp(10px, 1.5%, 18px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
        }

        .cart-count-badge {
            background: #98C81C;
            color: white;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: clamp(10px, 1.2%, 14px);
            font-weight: 600;
            border: 2px solid white;
        }

        /* Search Bar */
        .search-wrapper {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            z-index: 9;
            padding: 8px 15px;
            background: rgba(0,0,0,0.9);
        }
        .search-box {
            width: 100%;
            padding: 8px 16px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: #98C81C;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(152, 200, 28, 0.15);
        }
        .search-box .search-icon {
            color: rgba(255,255,255,0.6);
            font-size: clamp(16px, 1.8%, 22px);
            flex-shrink: 0;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        .search-box .clear-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: clamp(14px, 1.5%, 18px);
            cursor: pointer;
            display: none;
            padding: 0 5px;
            transition: all 0.3s;
        }
        .search-box .clear-btn:hover { color: white; transform: scale(1.2); }
        .search-box .clear-btn.show { display: block; }

        /* Category Tabs */
        .category-tabs {
            position: absolute;
            top: 118px;
            left: 0;
            right: 0;
            z-index: 8;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 15px 12px 15px;
            background: rgba(0,0,0,0.9);
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tabs .tab {
            padding: 6px 16px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            color: rgba(255,255,255,0.7);
            font-size: clamp(10px, 1.2%, 14px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .category-tabs .tab:hover { background: rgba(152, 200, 28, 0.2); border-color: #98C81C; color: white; }
        .category-tabs .tab.active { background: #98C81C; border-color: #98C81C; color: white; }

        /* Content */
        .content-area {
            position: absolute;
            top: 170px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px 15px 15px 15px;
            overflow-y: auto;
            z-index: 5;
        }
        .content-area::-webkit-scrollbar { width: 4px; }
        .content-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .content-area::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }

        /* Menu List */
        .menu-section-title {
            color: white;
            font-size: clamp(16px, 2%, 22px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin: 8px 0 6px 0;
            border-bottom: 2px solid rgba(255,255,255,0.08);
            padding-bottom: 4px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 8px 12px;
            border-radius: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 8px;
            min-height: 50px;
        }
        .menu-item:hover { background: rgba(255,255,255,0.06); }

        .menu-item .item-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .menu-item .item-info .item-name {
            color: white;
            font-size: clamp(13px, 1.6%, 20px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .menu-item .item-info .item-price {
            color: #98C81C;
            font-size: clamp(12px, 1.4%, 18px);
            font-weight: 600;
            white-space: nowrap;
            margin-left: 10px;
        }
        .menu-item .item-info .variant-badge {
            font-size: clamp(7px, 0.8%, 10px);
            color: #98C81C;
            background: rgba(152, 200, 28, 0.15);
            padding: 1px 8px;
            border-radius: 50px;
            display: inline-block;
            margin-left: 6px;
            white-space: nowrap;
        }

        .menu-item .item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .menu-item .item-actions .btn-minus {
            width: 28px;
            height: 28px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .menu-item .item-actions .btn-minus:hover { transform: scale(1.1); background: #c0392b; }
        .menu-item .item-actions .qty-input {
            width: 32px;
            padding: 2px 2px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 13px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .menu-item .item-actions .qty-input:focus { border-color: #98C81C; outline: none; background: rgba(255,255,255,0.2); }
        .menu-item .item-actions .qty-input::-webkit-inner-spin-button,
        .menu-item .item-actions .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .menu-item .item-actions .qty-input[type=number] { -moz-appearance: textfield; }
        .menu-item .item-actions .btn-plus {
            width: 28px;
            height: 28px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .menu-item .item-actions .btn-plus:hover { transform: scale(1.1); background: #7aa814; }
        .menu-item .item-actions .btn-detail {
            padding: 3px 12px;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(9px, 1%, 12px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            border: 2px solid white;
        }
        .menu-item .item-actions .btn-detail:hover { background: #7aa814; transform: scale(1.05); }
        .menu-item.disabled { opacity: 0.4; pointer-events: none; }

        /* Cart Section di bawah */
        .cart-section {
            margin-top: 12px;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding-top: 12px;
        }
        .cart-section .cart-title {
            color: white;
            font-size: clamp(16px, 2%, 22px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 6px;
            gap: 8px;
        }
        .cart-item .item-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .cart-item .item-info .item-name {
            color: white;
            font-size: clamp(12px, 1.3%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cart-item .item-info .item-price {
            color: #98C81C;
            font-size: clamp(11px, 1.2%, 14px);
            font-weight: 600;
            white-space: nowrap;
            margin-left: 8px;
        }
        .cart-item .item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .cart-item .item-actions .btn-minus {
            width: 24px;
            height: 24px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-item .item-actions .btn-minus:hover { transform: scale(1.1); background: #c0392b; }
        .cart-item .item-actions .qty-display {
            color: white;
            font-size: clamp(13px, 1.4%, 16px);
            font-weight: 600;
            min-width: 22px;
            text-align: center;
        }
        .cart-item .item-actions .btn-plus {
            width: 24px;
            height: 24px;
            background: #98C81C;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .cart-item .item-actions .btn-plus:hover { transform: scale(1.1); background: #7aa814; }

        .cart-total {
            padding: 10px 14px;
            background: rgba(152, 200, 28, 0.15);
            border-radius: 10px;
            border: 2px solid #98C81C;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .cart-total .total-label {
            color: white;
            font-size: clamp(14px, 1.8%, 20px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .cart-total .total-amount {
            color: #98C81C;
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
        }

        .btn-selesai-bawah {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #ED1B24;
            border: 3px solid white;
            border-radius: 100px;
            color: white;
            font-size: clamp(18px, 3%, 36px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 8px 30px rgba(237, 27, 36, 0.3);
        }
        .btn-selesai-bawah:hover { background: #c0392b; transform: scale(1.02); }
        .btn-selesai-bawah:active { transform: scale(0.98); }
        .btn-selesai-bawah:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .empty-cart {
            text-align: center;
            color: rgba(255,255,255,0.4);
            padding: 15px 0;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(12px, 1.6%, 20px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(50px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* Responsive */
        @media screen and (max-width: 767px) {
            .order-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .header-top { padding: 10px 12px 4px 12px; }
            .search-wrapper { top: 62px; padding: 6px 12px; }
            .category-tabs { top: 105px; padding: 6px 12px 8px 12px; gap: 4px; }
            .category-tabs .tab { padding: 4px 12px; font-size: 9px; }
            .content-area { top: 148px; padding: 6px 10px 10px 10px; }
            .menu-item { padding: 6px 10px; min-height: 40px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 24px; height: 24px; font-size: 14px; }
            .menu-item .item-actions .qty-input { width: 28px; padding: 2px; font-size: 11px; }
            .cart-item { padding: 6px 10px; }
        }

        @media screen and (max-width: 480px) {
            .order-container { border-radius: 10px; }
            .header-top { padding: 8px 10px 3px 10px; }
            .btn-back { font-size: 18px; }
            .logo-small .brand-text { font-size: 12px; }
            .logo-small img { width: 25px; }
            .btn-total span, .btn-selesai-header span { font-size: 9px; }
            .search-wrapper { top: 55px; padding: 4px 10px; }
            .search-box { padding: 6px 12px; }
            .search-box input { font-size: 11px; }
            .category-tabs { top: 92px; padding: 4px 10px 6px 10px; }
            .category-tabs .tab { padding: 3px 10px; font-size: 8px; }
            .content-area { top: 130px; padding: 4px 8px 8px 8px; }
            .menu-item { padding: 4px 8px; min-height: 35px; }
            .menu-item .item-info .item-name { font-size: 11px; }
            .menu-item .item-info .item-price { font-size: 10px; margin-left: 6px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 20px; height: 20px; font-size: 12px; }
            .menu-item .item-actions .qty-input { width: 24px; padding: 1px 2px; font-size: 10px; }
            .menu-item .item-actions .btn-detail { padding: 2px 8px; font-size: 8px; }
            .cart-item { padding: 4px 8px; }
            .cart-item .item-info .item-name { font-size: 10px; }
            .cart-item .item-info .item-price { font-size: 9px; }
            .cart-item .item-actions .btn-minus,
            .cart-item .item-actions .btn-plus { width: 18px; height: 18px; font-size: 10px; }
            .btn-selesai-bawah { padding: 8px; font-size: 15px; }
            .cart-total .total-label { font-size: 12px; }
            .cart-total .total-amount { font-size: 14px; }
        }

        @media screen and (max-width: 360px) {
            .category-tabs .tab { font-size: 7px; padding: 2px 8px; }
            .menu-item .item-info .item-name { font-size: 10px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 18px; height: 18px; font-size: 10px; }
            .menu-item .item-actions .qty-input { width: 20px; font-size: 9px; }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .order-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 15px; }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .order-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 10px; }
            .header-top { padding: 5px 10px 2px 10px; }
            .search-wrapper { top: 48px; padding: 4px 10px; }
            .category-tabs { top: 82px; padding: 4px 10px 4px 10px; }
            .content-area { top: 115px; padding: 4px 8px 8px 8px; }
            .menu-item { padding: 3px 8px; min-height: 30px; }
            .menu-item .item-info .item-name { font-size: 10px; }
            .menu-item .item-info .item-price { font-size: 9px; }
            .menu-item .item-actions .btn-minus,
            .menu-item .item-actions .btn-plus { width: 16px; height: 16px; font-size: 9px; }
            .menu-item .item-actions .qty-input { width: 20px; font-size: 9px; }
            .btn-selesai-bawah { padding: 4px; font-size: 12px; }
            .cart-total { padding: 4px 10px; }
            .cart-total .total-label { font-size: 10px; }
            .cart-total .total-amount { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="order-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat menu...</div>
        </div>

        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/995x995/2d2d2d/ffffff?text=" alt="" loading="lazy" />
            <img src="https://placehold.co/832x832/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <!-- Header -->
        <div class="header-top">
            <button class="btn-back" onclick="window.location.href='customer_order.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>
            <div class="logo-small">
                <img src="https://placehold.co/50x50/98C81C/ffffff?text=🍽️" alt="Logo" />
                <div class="brand-text">Jangkung<span>Order</span></div>
            </div>
            <div class="header-actions">
                <button class="btn-total" onclick="showTotal()">
                    <span>💰 Total</span>
                </button>
                <button class="btn-selesai-header" onclick="checkout()">
                    <span>Selesai</span>
                </button>
                <span class="cart-count-badge" id="headerCartCount">0</span>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="mau pesan apa hari ini?" oninput="searchMenu()">
                <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs" id="categoryTabs">
            <button class="tab active" data-category="all" onclick="filterCategory('all')">Semua</button>
            <button class="tab" data-category="Makanan" onclick="filterCategory('Makanan')">🍚 Makanan</button>
            <button class="tab" data-category="Tambahan" onclick="filterCategory('Tambahan')">🍲 Tambahan</button>
            <button class="tab" data-category="Minuman" onclick="filterCategory('Minuman')">🥤 Minuman</button>
            <button class="tab" data-category="Jangkung Kopi" onclick="filterCategory('Jangkung Kopi')">☕ Jangkung Kopi</button>
            <button class="tab" data-category="Kopi" onclick="filterCategory('Kopi')">☕ Kopi</button>
        </div>

        <!-- Content -->
        <div class="content-area" id="contentArea">
            <div id="menuList"></div>
            <div id="cartSection"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============ SUPABASE CONFIG ============
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============ GLOBAL ============
        let menuItems = [];
        let cart = JSON.parse(localStorage.getItem('customer_cart')) || [];
        let currentCategory = 'all';
        let searchQuery = '';
        const categoryOrder = ['Makanan', 'Tambahan', 'Minuman', 'Jangkung Kopi', 'Kopi'];

        // ============ FUNGSI ============
        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) { return imagePath; }
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        // ============ LOAD MENU ============
        async function loadMenu() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu, harga, status_ketersediaan, kategori, gambar, detail, varian')
                    .order('kategori', { ascending: true });
                if (error) throw error;

                if (data && data.length > 0) {
                    menuItems = data.map(item => {
                        let variants = [];
                        if (item.varian) {
                            try { variants = typeof item.varian === 'string' ? JSON.parse(item.varian) : item.varian; } catch (e) { variants = []; }
                        }
                        if (!variants || variants.length === 0) { variants = [{ name: 'Standar', price: 0 }]; }
                        return {
                            id: item.id_menu,
                            name: item.nama_menu,
                            price: item.harga,
                            category: item.kategori,
                            status: item.status_ketersediaan,
                            image_url: item.gambar || null,
                            description: item.detail || '',
                            variants: variants
                        };
                    });

                    // Urutkan: Iga Bakar pertama, lalu sisanya
                    menuItems.sort((a, b) => {
                        if (a.name === 'Iga Bakar') return -1;
                        if (b.name === 'Iga Bakar') return 1;
                        const indexA = categoryOrder.indexOf(a.category);
                        const indexB = categoryOrder.indexOf(b.category);
                        return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
                    });
                } else {
                    menuItems = getDefaultMenu();
                }
                renderAll();
            } catch (error) {
                console.error('Error loading menu:', error);
                menuItems = getDefaultMenu();
                renderAll();
                showToast('⚠️ Gagal memuat menu dari server, menggunakan data lokal');
            } finally { loading.classList.remove('active'); }
        }

        function getDefaultMenu() {
            return [
                { id: 1, name: 'Iga Bakar', price: 45000, category: 'Makanan', status: 'Tersedia', image_url: null, description: 'Iga bakar dengan bumbu spesial', variants: [{ name: 'Sapi', price: 0 }, { name: 'Kambing', price: 5000 }, { name: 'Sapi Spesial', price: 40000 }] },
                { id: 2, name: 'Iga Bakar Jumbo', price: 250000, category: 'Makanan', status: 'Tersedia', image_url: null, description: 'Iga bakar jumbo untuk keluarga', variants: [] },
                { id: 3, name: 'Sate Potong', price: 45000, category: 'Makanan', status: 'Tersedia', image_url: null, description: 'Sate potong daging pilihan', variants: [] },
                { id: 4, name: 'Nasi Goreng', price: 25000, category: 'Makanan', status: 'Tersedia', image_url: null, description: 'Nasi goreng spesial', variants: [] },
                { id: 5, name: 'Air Mineral', price: 7000, category: 'Tambahan', status: 'Tersedia', image_url: null, description: 'Air mineral 600ml', variants: [] },
                { id: 6, name: 'Jeruk', price: 15000, category: 'Tambahan', status: 'Tersedia', image_url: null, description: 'Jeruk peras segar', variants: [] },
                { id: 7, name: 'Es Teh', price: 5000, category: 'Minuman', status: 'Tersedia', image_url: null, description: 'Es teh manis segar', variants: [] },
                { id: 8, name: 'Kopi Tubruk', price: 20000, category: 'Jangkung Kopi', status: 'Tersedia', image_url: null, description: 'Kopi tubruk khas', variants: [] },
                { id: 9, name: 'Kopi Gula Aren', price: 35000, category: 'Kopi', status: 'Tersedia', image_url: null, description: 'Kopi dengan gula aren', variants: [] }
            ];
        }

        // ============ SEARCH ============
        function searchMenu() {
            const input = document.getElementById('searchInput');
            searchQuery = input.value.toLowerCase().trim();
            const clearBtn = document.getElementById('clearBtn');
            if (searchQuery.length > 0) { clearBtn.classList.add('show'); } else { clearBtn.classList.remove('show'); }
            renderMenuList();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.remove('show');
            searchQuery = '';
            renderMenuList();
        }

        // ============ FILTER ============
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tabs .tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            renderMenuList();
        }

        // ============ RENDER ALL ============
        function renderAll() {
            renderMenuList();
            renderCart();
            updateCartCount();
        }

        // ============ RENDER MENU LIST ============
        function renderMenuList() {
            const container = document.getElementById('menuList');
            container.innerHTML = '';

            let filtered = menuItems.filter(item => item.status === 'Tersedia');

            // Filter kategori
            if (currentCategory !== 'all') {
                filtered = filtered.filter(item => item.category === currentCategory);
            }

            // Filter search
            if (searchQuery) {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(searchQuery));
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center;color:rgba(255,255,255,0.4);padding:20px 0;font-size:14px;">${searchQuery ? '🔍 Tidak ada menu yang cocok' : 'Belum ada menu tersedia'}</div>`;
                return;
            }

            let currentCat = '';
            filtered.forEach(item => {
                const hasRealVariants = item.variants && item.variants.length > 0 && !(item.variants.length === 1 && item.variants[0].name === 'Standar');
                const cartItem = cart.find(c => c.id === item.id);
                const qty = cartItem ? cartItem.qty : 0;

                if (currentCat !== item.category) {
                    currentCat = item.category;
                    container.innerHTML += `<div class="menu-section-title">${currentCat}</div>`;
                }

                const div = document.createElement('div');
                div.className = 'menu-item';

                let actionsHtml = '';
                if (hasRealVariants) {
                    actionsHtml = `<button class="btn-detail" onclick="openVariantModal(${item.id})">Pilih</button>`;
                } else {
                    actionsHtml = `
                        <button class="btn-minus" onclick="updateCart(${item.id}, -1, '${item.name}', ${item.price}, 'Standar')">−</button>
                        <input type="number" class="qty-input" id="qty_${item.id}" value="${qty}" min="0" onchange="onCartChange(${item.id}, '${item.name}', ${item.price}, 'Standar', this.value)" onfocus="this.select()">
                        <button class="btn-plus" onclick="updateCart(${item.id}, 1, '${item.name}', ${item.price}, 'Standar')">+</button>
                    `;
                }

                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">Rp ${item.price.toLocaleString()}</span>
                        ${hasRealVariants ? '<span class="variant-badge">📌 Varian</span>' : ''}
                    </div>
                    <div class="item-actions">${actionsHtml}</div>
                `;
                container.appendChild(div);
            });
        }

        // ============ CART FUNCTIONS ============
        function updateCart(id, change, name, price, variant) {
            const input = document.getElementById(`qty_${id}`);
            if (input) {
                let currentQty = parseInt(input.value) || 0;
                let newQty = currentQty + change;
                if (newQty < 0) newQty = 0;
                input.value = newQty;

                const existing = cart.find(item => item.id === id && item.variant === variant);
                if (newQty <= 0) {
                    if (existing) { const index = cart.indexOf(existing); cart.splice(index, 1); }
                } else {
                    if (existing) { existing.qty = newQty; } else { cart.push({ id, name, price, qty: newQty, variant: variant }); }
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                renderCart();
                updateCartCount();
                if (change > 0 && newQty > 0) { showToast(`✅ ${name} x${newQty}`); }
            }
        }

        function onCartChange(id, name, price, variant, value) {
            const qty = parseInt(value) || 0;
            const existing = cart.find(item => item.id === id && item.variant === variant);
            if (qty <= 0) {
                if (existing) { const index = cart.indexOf(existing); cart.splice(index, 1); }
            } else {
                if (existing) { existing.qty = qty; } else { cart.push({ id, name, price, qty, variant: variant }); }
            }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function updateCartQty(index, change) {
            if (cart[index].qty + change <= 0) { cart.splice(index, 1); } else { cart[index].qty += change; }
            localStorage.setItem('customer_cart', JSON.stringify(cart));
            renderCart();
            renderMenuList();
            updateCartCount();
        }

        function updateCartCount() {
            const total = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('headerCartCount').textContent = total;
        }

        function showTotal() {
            if (cart.length === 0) { showToast('⚠️ Belum ada pesanan!'); return; }
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            showToast(`💰 Total: Rp ${total.toLocaleString()}`);
        }

        // ============ VARIANT MODAL ============
        function openVariantModal(id) {
            const item = menuItems.find(m => m.id === id);
            if (!item) return;
            const modal = document.createElement('div');
            modal.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;z-index:999;backdrop-filter:blur(5px);`;
            let variantsHtml = item.variants.map((v, i) => `
                <button class="variant-opt" data-price="${v.price}" data-name="${v.name}" 
                        style="padding:10px 18px;margin:4px;border-radius:50px;border:2px solid ${i === 0 ? '#98C81C' : 'rgba(255,255,255,0.3)'};
                               background:${i === 0 ? 'rgba(152,200,28,0.3)' : 'rgba(255,255,255,0.1)'};color:white;font-size:16px;cursor:pointer;
                               font-family:'Schoolbell',cursive;transition:all 0.3s;"
                        onmouseover="this.style.borderColor='#98C81C'" 
                        onmouseout="this.style.borderColor='${i === 0 ? '#98C81C' : 'rgba(255,255,255,0.3)'}'">
                    ${v.name} ${v.price > 0 ? '(+Rp ' + v.price.toLocaleString() + ')' : ''}
                </button>
            `).join('');
            modal.innerHTML = `
                <div style="background:rgba(20,20,20,0.95);padding:25px;border-radius:20px;max-width:380px;width:90%;border:2px solid #98C81C;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h2 style="color:white;font-family:'Poppins',sans-serif;font-size:22px;">${item.name}</h2>
                        <button onclick="this.closest('div[style]').parentElement.remove()" style="background:none;border:none;color:white;font-size:28px;cursor:pointer;">✕</button>
                    </div>
                    <div style="margin-bottom:12px;color:rgba(255,255,255,0.7);font-size:13px;">Pilih varian:</div>
                    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">${variantsHtml}</div>
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                        <span style="color:white;font-family:'Schoolbell',cursive;font-size:16px;">Jumlah:</span>
                        <button id="modalMinus" style="width:32px;height:32px;border-radius:50%;border:none;background:#e74c3c;color:white;font-size:18px;cursor:pointer;">−</button>
                        <span id="modalQty" style="color:white;font-size:22px;font-weight:600;min-width:35px;text-align:center;">1</span>
                        <button id="modalPlus" style="width:32px;height:32px;border-radius:50%;border:none;background:#98C81C;color:white;font-size:18px;cursor:pointer;">+</button>
                    </div>
                    <button id="modalAdd" style="width:100%;padding:12px;background:#98C81C;border:2px solid white;border-radius:100px;color:white;font-size:20px;font-family:'Schoolbell',cursive;cursor:pointer;">➕ TAMBAH</button>
                </div>
            `;
            document.body.appendChild(modal);
            let selectedVariant = item.variants[0];
            let qty = 1;
            modal.querySelectorAll('.variant-opt').forEach(btn => {
                btn.addEventListener('click', function() {
                    modal.querySelectorAll('.variant-opt').forEach(b => {
                        b.style.borderColor = 'rgba(255,255,255,0.3)';
                        b.style.background = 'rgba(255,255,255,0.1)';
                    });
                    this.style.borderColor = '#98C81C';
                    this.style.background = 'rgba(152,200,28,0.3)';
                    selectedVariant = { name: this.dataset.name, price: parseInt(this.dataset.price) };
                });
            });
            modal.querySelector('#modalMinus').addEventListener('click', () => { if (qty > 1) { qty--; modal.querySelector('#modalQty').textContent = qty; } });
            modal.querySelector('#modalPlus').addEventListener('click', () => { qty++; modal.querySelector('#modalQty').textContent = qty; });
            modal.querySelector('#modalAdd').addEventListener('click', function() {
                const finalPrice = item.price + selectedVariant.price;
                const variantName = selectedVariant.name;
                const existing = cart.find(c => c.id === item.id && c.variant === variantName);
                if (existing) { existing.qty += qty; } else {
                    cart.push({ id: item.id, name: item.name + (variantName !== 'Standar' ? ' (' + variantName + ')' : ''), price: finalPrice, qty: qty, variant: variantName });
                }
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                renderCart();
                renderMenuList();
                updateCartCount();
                modal.remove();
                showToast(`✅ ${item.name}${variantName !== 'Standar' ? ' (' + variantName + ')' : ''} x${qty} ditambahkan!`);
            });
            modal.addEventListener('click', function(e) { if (e.target === this) { this.remove(); } });
        }

        // ============ RENDER CART ============
        function renderCart() {
            const container = document.getElementById('cartSection');
            if (cart.length === 0) {
                container.innerHTML = `<div class="cart-section"><div class="cart-title">🛒 Keranjang</div><div class="empty-cart">Belum ada pesanan</div></div>`;
                return;
            }
            let html = `<div class="cart-section"><div class="cart-title">🛒 Keranjang (${cart.reduce((s, i) => s + i.qty, 0)} item)</div>`;
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-price">Rp ${(item.price * item.qty).toLocaleString()}</span>
                        </div>
                        <div class="item-actions">
                            <button class="btn-minus" onclick="updateCartQty(${index}, -1)">−</button>
                            <span class="qty-display">${item.qty}</span>
                            <button class="btn-plus" onclick="updateCartQty(${index}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
            html += `
                <div class="cart-total"><span class="total-label">💰 Total</span><span class="total-amount">Rp ${total.toLocaleString()}</span></div>
                <button class="btn-selesai-bawah" onclick="checkout()">✅ Selesai</button>
            </div>`;
            container.innerHTML = html;
        }

        // ============ CHECKOUT ============
        async function checkout() {
            if (cart.length === 0) { showToast('⚠️ Belum ada pesanan!'); return; }
            if (!confirm('Yakin ingin menyelesaikan pesanan dan mengirim ke kasir?')) return;
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                const meja = parseInt(getMeja());
                const nama = getNama();
                const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
                const { data: orderData, error: orderError } = await supabaseClient
                    .from('orders')
                    .insert({ meja: meja, customer_name: nama, total_amount: total, status: 'pending' })
                    .select('no_struk').single();
                if (orderError) throw orderError;
                const noStruk = orderData.no_struk;
                const details = cart.map(item => ({
                    no_struk: noStruk,
                    menu_id: item.id,
                    menu_name: item.name,
                    nama: nama,
                    quantity: item.qty,
                    price: item.price,
                    subtotal: item.price * item.qty,
                    varian: item.variant || null
                }));
                const { error: detailError } = await supabaseClient.from('order_details').insert(details);
                if (detailError) throw detailError;
                cart = [];
                localStorage.setItem('customer_cart', JSON.stringify(cart));
                showToast(`✅ Pesanan berhasil dikirim! No. Struk: ${noStruk}`);
                renderAll();
            } catch (error) {
                console.error('Error checkout:', error);
                showToast('⚠️ Gagal mengirim pesanan. Silakan coba lagi.');
            } finally { loading.classList.remove('active'); }
        }

        // ============ INIT ============
        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);

        window.addEventListener('DOMContentLoaded', function() {
            loadMenu();
        });
    </script>
</body>
</html>
