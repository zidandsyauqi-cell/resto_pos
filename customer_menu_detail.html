<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Detail Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }
        .detail-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }
        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }
        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        .btn-back {
            position: absolute;
            left: 4.3%;
            top: 7%;
            z-index: 10;
            background: none;
            border: none;
            color: white;
            font-size: clamp(30px, 4%, 50px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
        }
        .btn-back:hover { transform: scale(1.1); color: #98C81C; }
        .logo-top {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-top img {
            width: clamp(40px, 7.4%, 80px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }
        .logo-top .brand-text {
            color: white;
            font-size: clamp(16px, 2.96%, 32px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .logo-top .brand-text span { color: #98C81C; }
        .menu-image {
            position: absolute;
            width: 100%;
            height: 56.25%;
            top: 0;
            left: 0;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }
        .menu-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-image .image-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }
        .menu-name {
            position: absolute;
            left: 3.3%;
            top: 58%;
            z-index: 5;
            color: white;
            font-size: clamp(32px, 7.9%, 85px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            line-height: 1.2;
        }
        .menu-desc {
            position: absolute;
            left: 4.9%;
            top: 68%;
            width: 90.2%;
            z-index: 5;
            color: white;
            font-size: clamp(18px, 4.6%, 50px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: justify;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.5;
            max-height: 25%;
            overflow-y: auto;
            padding-right: 10px;
        }
        .menu-desc::-webkit-scrollbar { width: 3px; }
        .menu-desc::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .menu-desc::-webkit-scrollbar-thumb { background: #98C81C; border-radius: 10px; }
        .btn-ke-pesan {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 82.2%;
            padding: clamp(14px, 2.5%, 28px);
            background: #98C81C;
            border: 3px solid white;
            border-radius: 100px;
            color: white;
            font-size: clamp(24px, 4.6%, 55px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
        }
        .btn-ke-pesan:hover { background: #7aa814; transform: translateX(-50%) scale(1.02); box-shadow: 0 12px 40px rgba(152, 200, 28, 0.4); }
        .btn-ke-pesan:active { transform: translateX(-50%) scale(0.98); }
        @media screen and (max-width: 767px) {
            .detail-container { max-width: 100%; aspect-ratio: 1080/1920; border-radius: 12px; }
            .menu-name { top: 56%; font-size: 32px; }
            .menu-desc { top: 66%; font-size: 18px; max-height: 20%; }
            .btn-ke-pesan { bottom: 3%; padding: 12px; font-size: 20px; }
            .btn-back { padding: 4px 12px; font-size: 16px; top: 6%; }
            .logo-top .brand-text { font-size: 14px; }
            .logo-top img { width: 30px; }
        }
        @media screen and (max-width: 480px) {
            .detail-container { border-radius: 10px; }
            .menu-name { top: 55%; font-size: 26px; }
            .menu-desc { top: 65%; font-size: 15px; max-height: 18%; }
            .btn-ke-pesan { bottom: 2%; padding: 10px; font-size: 17px; }
            .btn-back { padding: 3px 10px; font-size: 14px; }
        }
        @media screen and (max-width: 360px) {
            .menu-name { top: 54%; font-size: 22px; }
            .menu-desc { top: 64%; font-size: 13px; max-height: 16%; }
            .btn-ke-pesan { padding: 8px; font-size: 15px; }
            .btn-back { font-size: 12px; padding: 2px 8px; }
        }
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .detail-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 15px; }
        }
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .detail-container { max-width: 90vh; aspect-ratio: 1080/1920; border-radius: 10px; }
            .menu-image { height: 45%; }
            .menu-name { top: 48%; font-size: 20px; }
            .menu-desc { top: 56%; font-size: 12px; max-height: 15%; }
            .btn-ke-pesan { bottom: 2%; padding: 6px; font-size: 13px; }
            .btn-back { font-size: 12px; padding: 2px 8px; }
            .logo-top .brand-text { font-size: 12px; }
            .logo-top img { width: 25px; }
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat detail menu...</div>
        </div>
        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>
        <div class="overlay"></div>
        <button class="btn-back" onclick="window.location.href='customer_order.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">←</button>
        <div class="logo-top">
            <img src="https://placehold.co/80x80/98C81C/ffffff?text=🍽️" alt="Logo Jangkung" loading="lazy" />
            <div class="brand-text">Jangkung<span>Order</span></div>
        </div>
        <div class="menu-image">
            <img src="" alt="Menu" id="menuImage" />
            <div class="image-overlay"></div>
        </div>
        <div class="menu-name" id="menuName">-</div>
        <div class="menu-desc" id="menuDesc">Memuat deskripsi...</div>
        <button class="btn-ke-pesan" onclick="window.location.href='customer_order_list.html?meja=' + getMeja() + '&nama=' + encodeURIComponent(getNama())">
            🛒 PESAN SEKARANG
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) { return meja; }
            const savedMeja = localStorage.getItem('meja_number');
            if (savedMeja) { return savedMeja; }
            return '1';
        }
        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) { return nama; }
            const savedNama = localStorage.getItem('customer_name');
            if (savedNama) { return savedNama; }
            return 'Customer';
        }
        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) { return imagePath; }
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }
        async function loadMenuDetail() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');
            try {
                const params = new URLSearchParams(window.location.search);
                const menuId = params.get('id');
                if (!menuId) {
                    document.getElementById('menuName').textContent = 'MENU TIDAK DITEMUKAN';
                    document.getElementById('menuDesc').textContent = 'Silakan pilih menu dari halaman pesan.';
                    loading.classList.remove('active');
                    return;
                }
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('nama_menu, detail, gambar')
                    .eq('id_menu', menuId)
                    .single();
                if (error) throw error;
                if (!data) {
                    document.getElementById('menuName').textContent = 'MENU TIDAK DITEMUKAN';
                    document.getElementById('menuDesc').textContent = 'Silakan pilih menu dari halaman pesan.';
                    loading.classList.remove('active');
                    return;
                }
                document.getElementById('menuName').textContent = data.nama_menu.toUpperCase();
                document.getElementById('menuDesc').textContent = data.detail || 'Tidak ada deskripsi untuk menu ini.';
                let imageUrl = 'https://placehold.co/1080x1080/2d2d2d/ffffff?text=' + data.nama_menu;
                if (data.gambar) {
                    const url = getImageUrl(data.gambar);
                    if (url) imageUrl = url;
                }
                document.getElementById('menuImage').src = imageUrl;
            } catch (error) {
                console.error('Error loading menu:', error);
                document.getElementById('menuName').textContent = 'ERROR';
                document.getElementById('menuDesc').textContent = 'Gagal memuat detail menu. Silakan coba lagi.';
            } finally {
                loading.classList.remove('active');
            }
        }
        const mejaNumber = getMeja();
        const namaCustomer = getNama();
        localStorage.setItem('meja_number', mejaNumber);
        localStorage.setItem('customer_name', namaCustomer);
        window.addEventListener('DOMContentLoaded', function() {
            loadMenuDetail();
        });
    </script>
</body>
</html>
