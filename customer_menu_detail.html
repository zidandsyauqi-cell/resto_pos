<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - Detail Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .detail-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 2;
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .loading-text {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 8px 12px;
            padding-top: env(safe-area-inset-top, 8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
            min-height: 48px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(22px, 3%, 36px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 4px 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }
        .logo-header img {
            width: clamp(28px, 4%, 50px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }
        .brand-text {
            color: white;
            font-size: clamp(14px, 2.2%, 28px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }
        .brand-text span {
            color: #98C81C;
        }

        /* ===== GAMBAR MENU ===== */
        .menu-image-wrapper {
            position: relative;
            width: 100%;
            height: 45%;
            flex-shrink: 0;
            overflow: hidden;
            background: #1a1a1a;
            z-index: 1;
        }
        .menu-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-image-wrapper .image-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.5) 100%);
        }

        /* ===== KONTEN ===== */
        .content-area {
            flex: 1;
            position: relative;
            z-index: 5;
            padding: 12px 16px 16px 16px;
            padding-bottom: env(safe-area-inset-bottom, 16px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }
        .content-area::-webkit-scrollbar {
            width: 3px;
        }
        .content-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .menu-name {
            color: white;
            font-size: clamp(24px, 6%, 60px);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .menu-price {
            color: #98C81C;
            font-size: clamp(18px, 4%, 40px);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 8px;
        }

        .menu-desc {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(14px, 3%, 30px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-align: justify;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            line-height: 1.6;
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
        }
        .menu-desc::-webkit-scrollbar {
            width: 3px;
        }
        .menu-desc::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .menu-desc::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        /* ===== TOMBOL ===== */
        .btn-back-menu {
            width: 100%;
            padding: clamp(12px, 2.5%, 24px);
            margin-top: 12px;
            background: #98C81C;
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 3.5%, 36px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 8px 30px rgba(152, 200, 28, 0.3);
            text-decoration: none;
            display: block;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back-menu:active {
            background: #7aa814;
            transform: scale(0.98);
            box-shadow: 0 4px 15px rgba(152, 200, 28, 0.2);
        }

        /* ===== ERROR ===== */
        .error-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 24px 30px;
            border-radius: 20px;
            border: 2px solid #e74c3c;
            max-width: 85%;
        }
        .error-display .error-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .error-display .error-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .error-display .error-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        .error-display .btn-retry {
            margin-top: 12px;
            padding: 8px 24px;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .error-display .btn-retry:active {
            background: #7aa814;
            transform: scale(0.95);
        }

        /* ===== RESPONSIVE ===== */

        /* HP Portrait */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .header-top {
                padding: 6px 10px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 40px;
            }
            .btn-back {
                font-size: 18px;
                min-width: 32px;
                min-height: 32px;
                padding: 2px 6px;
            }
            .logo-header img {
                width: 22px;
            }
            .brand-text {
                font-size: 13px;
            }
            .menu-image-wrapper {
                height: 38%;
            }
            .content-area {
                padding: 10px 12px 12px 12px;
                padding-bottom: env(safe-area-inset-bottom, 12px);
            }
            .menu-name {
                font-size: 22px;
            }
            .menu-price {
                font-size: 17px;
            }
            .menu-desc {
                font-size: 13px;
            }
            .btn-back-menu {
                font-size: 15px;
                padding: 10px;
                margin-top: 8px;
            }
        }

        /* HP Portrait Kecil */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .header-top {
                padding: 4px 8px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 34px;
            }
            .btn-back {
                font-size: 15px;
                min-width: 28px;
                min-height: 28px;
                padding: 2px 4px;
            }
            .logo-header img {
                width: 18px;
            }
            .brand-text {
                font-size: 11px;
            }
            .menu-image-wrapper {
                height: 32%;
            }
            .content-area {
                padding: 8px 10px 10px 10px;
                padding-bottom: env(safe-area-inset-bottom, 10px);
            }
            .menu-name {
                font-size: 18px;
            }
            .menu-price {
                font-size: 14px;
            }
            .menu-desc {
                font-size: 11px;
            }
            .btn-back-menu {
                font-size: 13px;
                padding: 8px;
                margin-top: 6px;
            }
            .error-display {
                padding: 16px 20px;
            }
            .error-display .error-icon {
                font-size: 30px;
            }
            .error-display .error-title {
                font-size: 16px;
            }
            .error-display .error-desc {
                font-size: 12px;
            }
        }

        /* ===== LANDSCAPE ===== */
        @media screen and (orientation: landscape) {
            .menu-image-wrapper {
                height: 55%;
            }
            .content-area {
                padding: 8px 16px 12px 16px;
                padding-bottom: env(safe-area-inset-bottom, 12px);
            }
            .menu-name {
                font-size: clamp(20px, 4%, 40px);
            }
            .menu-price {
                font-size: clamp(16px, 3%, 30px);
            }
            .menu-desc {
                font-size: clamp(12px, 2%, 20px);
            }
            .btn-back-menu {
                font-size: clamp(14px, 2.5%, 24px);
                padding: clamp(8px, 1.5%, 16px);
                margin-top: 6px;
            }
        }

        /* Landscape HP Kecil */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .menu-image-wrapper {
                height: 48%;
            }
            .header-top {
                padding: 4px 10px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 32px;
            }
            .btn-back {
                font-size: 16px;
                min-width: 28px;
                min-height: 28px;
                padding: 2px 4px;
            }
            .logo-header img {
                width: 20px;
            }
            .brand-text {
                font-size: 12px;
            }
            .content-area {
                padding: 6px 12px 8px 12px;
                padding-bottom: env(safe-area-inset-bottom, 8px);
            }
            .menu-name {
                font-size: 16px;
            }
            .menu-price {
                font-size: 13px;
            }
            .menu-desc {
                font-size: 10px;
                line-height: 1.4;
            }
            .btn-back-menu {
                font-size: 12px;
                padding: 6px;
                margin-top: 4px;
            }
        }

        /* ===== TABLET PORTRAIT ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
            .header-top {
                padding: 12px 20px;
                padding-top: env(safe-area-inset-top, 12px);
                min-height: 60px;
            }
            .btn-back {
                font-size: 28px;
                min-width: 48px;
                min-height: 48px;
            }
            .logo-header img {
                width: 40px;
            }
            .brand-text {
                font-size: 22px;
            }
            .menu-image-wrapper {
                height: 42%;
            }
            .content-area {
                padding: 16px 24px 20px 24px;
                padding-bottom: env(safe-area-inset-bottom, 20px);
            }
            .menu-name {
                font-size: 36px;
            }
            .menu-price {
                font-size: 28px;
            }
            .menu-desc {
                font-size: 20px;
            }
            .btn-back-menu {
                font-size: 24px;
                padding: 16px;
                margin-top: 12px;
            }
        }

        /* ===== TABLET LANDSCAPE ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .header-top {
                padding: 8px 16px;
                padding-top: env(safe-area-inset-top, 8px);
                min-height: 48px;
            }
            .btn-back {
                font-size: 24px;
                min-width: 40px;
                min-height: 40px;
            }
            .logo-header img {
                width: 32px;
            }
            .brand-text {
                font-size: 18px;
            }
            .menu-image-wrapper {
                height: 50%;
            }
            .content-area {
                padding: 12px 20px 16px 20px;
                padding-bottom: env(safe-area-inset-bottom, 16px);
            }
            .menu-name {
                font-size: 28px;
            }
            .menu-price {
                font-size: 22px;
            }
            .menu-desc {
                font-size: 16px;
            }
            .btn-back-menu {
                font-size: 18px;
                padding: 12px;
                margin-top: 8px;
            }
        }

        /* ===== DESKTOP ===== */
        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .detail-container {
                max-width: 500px;
                max-height: 900px;
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
                align-self: center;
            }
            .header-top {
                padding: 10px 16px;
                padding-top: env(safe-area-inset-top, 10px);
                min-height: 52px;
            }
            .btn-back {
                font-size: 26px;
                min-width: 44px;
                min-height: 44px;
            }
            .logo-header img {
                width: 36px;
            }
            .brand-text {
                font-size: 20px;
            }
            .menu-image-wrapper {
                height: 42%;
            }
            .content-area {
                padding: 14px 20px 18px 20px;
                padding-bottom: env(safe-area-inset-bottom, 18px);
            }
            .menu-name {
                font-size: 32px;
            }
            .menu-price {
                font-size: 24px;
            }
            .menu-desc {
                font-size: 18px;
            }
            .btn-back-menu {
                font-size: 20px;
                padding: 14px;
                margin-top: 10px;
            }
        }

        /* Fallback */
        @supports not (padding: env(safe-area-inset-top)) {
            .header-top {
                padding-top: 8px;
            }
            .content-area {
                padding-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat detail menu...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo Jangkung" loading="lazy" onerror="this.src='https://placehold.co/50x50/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
        </div>

        <!-- ===== GAMBAR ===== -->
        <div class="menu-image-wrapper">
            <img src="" alt="Menu" id="menuImage" />
            <div class="image-overlay"></div>
        </div>

        <!-- ===== KONTEN ===== -->
        <div class="content-area">
            <div class="menu-name" id="menuName">-</div>
            <div class="menu-price" id="menuPrice">-</div>
            <div class="menu-desc" id="menuDesc">Memuat deskripsi...</div>
            <a class="btn-back-menu" href="#" id="btnBackMenu">📋 KEMBALI KE MENU</a>
        </div>

        <!-- ===== ERROR ===== -->
        <div class="error-display" id="errorDisplay" style="display:none;">
            <span class="error-icon">⚠️</span>
            <div class="error-title">Menu Tidak Ditemukan</div>
            <div class="error-desc" id="errorDesc">Menu tidak tersedia. Silakan pilih menu lain.</div>
            <a href="#" class="btn-retry" id="errorRetryBtn">📋 Kembali ke Menu</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const STORAGE_BUCKET = 'menu-images';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allMenus = [];

        function getMeja() {
            const params = new URLSearchParams(window.location.search);
            const meja = params.get('meja');
            if (meja && !isNaN(meja) && meja > 0) return meja;
            const saved = localStorage.getItem('meja_number');
            if (saved) return saved;
            return '1';
        }

        function getNama() {
            const params = new URLSearchParams(window.location.search);
            const nama = params.get('nama');
            if (nama) return nama;
            const saved = localStorage.getItem('customer_name');
            if (saved) return saved;
            return 'Customer';
        }

        function goToDashboard() {
            const meja = getMeja();
            const nama = encodeURIComponent(getNama());
            window.location.href = 'customer_order.html?meja=' + meja + '&nama=' + nama;
        }

        function goBack() {
            const meja = getMeja();
            const nama = encodeURIComponent(getNama());
            window.location.href = 'customer_menu_list.html?meja=' + meja + '&nama=' + nama;
        }

        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://')) return imagePath;
            try {
                const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(imagePath);
                return data.publicUrl;
            } catch (error) { return null; }
        }

        function formatRupiah(price) {
            return 'Rp ' + Number(price).toLocaleString('id-ID');
        }

        function showError(title, desc) {
            const errorDisplay = document.getElementById('errorDisplay');
            document.getElementById('errorDesc').textContent = desc;
            document.getElementById('errorRetryBtn').href = 'customer_menu_list.html?meja=' + getMeja() + '&nama=' +
                encodeURIComponent(getNama());
            errorDisplay.style.display = 'block';
            document.getElementById('menuName').style.display = 'none';
            document.getElementById('menuPrice').style.display = 'none';
            document.getElementById('menuDesc').style.display = 'none';
            document.getElementById('menuImage').style.display = 'none';
            document.getElementById('btnBackMenu').style.display = 'none';
        }

        async function loadMenuDetail() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const params = new URLSearchParams(window.location.search);
                let menuId = params.get('id');

                if (!menuId) {
                    const { data, error } = await supabaseClient
                        .from('menu')
                        .select('id_menu')
                        .eq('status_ketersediaan', 'Tersedia')
                        .limit(1)
                        .maybeSingle();

                    if (error) throw error;
                    if (data) {
                        menuId = data.id_menu;
                        const newUrl = window.location.pathname + '?meja=' + getMeja() + '&nama=' + encodeURIComponent(
                            getNama()) + '&id=' + menuId;
                        window.history.replaceState({}, '', newUrl);
                    }
                }

                if (!menuId) {
                    showError('Belum Ada Menu', 'Silakan tambahkan menu terlebih dahulu melalui dashboard karyawan.');
                    loading.classList.remove('active');
                    return;
                }

                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('nama_menu, detail, harga, gambar')
                    .eq('id_menu', parseInt(menuId))
                    .maybeSingle();

                if (error) throw error;

                if (!data) {
                    showError('Menu Tidak Ditemukan', 'Menu dengan ID ' + menuId + ' tidak tersedia.');
                    loading.classList.remove('active');
                    return;
                }

                document.getElementById('menuName').textContent = data.nama_menu ? data.nama_menu.toUpperCase() : '-';
                document.getElementById('menuPrice').textContent = data.harga ? formatRupiah(data.harga) : '-';
                document.getElementById('menuDesc').textContent = data.detail || 'Tidak ada deskripsi untuk menu ini.';

                let imageUrl = 'https://placehold.co/500x500/1a1a1a/ffffff?text=' + encodeURIComponent(data.nama_menu ||
                    'Menu');
                if (data.gambar) {
                    const url = getImageUrl(data.gambar);
                    if (url) imageUrl = url;
                }
                document.getElementById('menuImage').src = imageUrl;
                document.getElementById('menuImage').alt = data.nama_menu || 'Menu';

                document.getElementById('btnBackMenu').href = 'customer_menu_list.html?meja=' + getMeja() + '&nama=' +
                    encodeURIComponent(getNama());

                document.getElementById('errorDisplay').style.display = 'none';
                document.getElementById('menuName').style.display = 'block';
                document.getElementById('menuPrice').style.display = 'block';
                document.getElementById('menuDesc').style.display = 'block';
                document.getElementById('menuImage').style.display = 'block';
                document.getElementById('btnBackMenu').style.display = 'block';

            } catch (error) {
                console.error('Error loading menu detail:', error);
                showError('Gagal Memuat Menu', 'Terjadi kesalahan saat memuat detail menu. Silakan coba lagi.');
            } finally {
                loading.classList.remove('active');
            }
        }

        const meja = getMeja();
        const nama = getNama();
        localStorage.setItem('meja_number', meja);
        localStorage.setItem('customer_name', nama);

        document.addEventListener('DOMContentLoaded', loadMenuDetail);
    </script>
</body>
</html>
