<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jangkung Order - Struk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .struk-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header-top {
            position: relative;
            z-index: 10;
            padding: 10px 16px;
            padding-top: env(safe-area-inset-top, 10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            min-height: 56px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 4px 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back:active {
            transform: scale(0.92);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .logo-header img {
            width: 36px;
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }
        .brand-text span {
            color: #98C81C;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout {
            background: #e74c3c;
            border: 2px solid white;
            border-radius: 50px;
            padding: 6px 16px;
            color: white;
            font-size: 14px;
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 36px;
            display: flex;
            align-items: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-logout:active {
            transform: scale(0.95);
        }

        /* ===== INFO NAMA & MEJA ===== */
        .info-wrapper {
            position: relative;
            z-index: 10;
            padding: 6px 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item .label {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(11px, 1.5%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .info-item .value-box {
            padding: 3px 12px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: clamp(10px, 1.5%, 16px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== CONTENT ===== */
        .struk-wrapper {
            flex: 1;
            position: relative;
            z-index: 5;
            padding: 6px 12px 12px 12px;
            padding-bottom: env(safe-area-inset-bottom, 12px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .struk-wrapper::-webkit-scrollbar {
            width: 3px;
        }
        .struk-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .struk-wrapper::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        /* ===== SELECT STRUK ===== */
        .struk-select-wrapper {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 3px;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .struk-select-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(9px, 1.1%, 13px);
            font-family: 'Schoolbell', cursive;
            display: block;
            text-align: center;
            padding: 2px 0 0 0;
            letter-spacing: 1px;
        }

        .struk-select {
            width: 100%;
            padding: 6px 12px;
            border-radius: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: clamp(11px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            outline: none;
            cursor: pointer;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            transition: all 0.3s;
        }
        .struk-select:focus {
            background: rgba(255, 255, 255, 0.15);
        }
        .struk-select option {
            background: #1a1a1a;
            color: white;
            padding: 10px;
        }

        .struk-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 14px 16px 12px 16px;
            min-height: 280px;
            margin-bottom: 12px;
        }

        .struk-title {
            color: white;
            font-size: clamp(16px, 2.5%, 28px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .struk-no {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(12px, 1.8%, 20px);
            font-family: 'Schoolbell', cursive;
            margin-bottom: 8px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 6px;
        }
        .struk-no span {
            color: white;
        }

        .struk-header-row {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.4);
            font-size: clamp(10px, 1.3%, 15px);
            font-family: 'Schoolbell', cursive;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 3px;
            margin-bottom: 3px;
        }

        .struk-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            color: white;
            font-size: clamp(11px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .struk-item .item-name {
            flex: 1;
            text-align: left;
            padding-right: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .struk-item .item-qty {
            margin: 0 6px;
            color: rgba(255, 255, 255, 0.4);
            min-width: 24px;
            text-align: center;
        }
        .struk-item .item-price {
            color: #98C81C;
            min-width: 70px;
            text-align: right;
        }

        .struk-divider {
            border: none;
            border-top: 1px dashed rgba(255, 255, 255, 0.15);
            margin: 6px 0;
        }

        .struk-total-row {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(13px, 1.8%, 20px);
            font-family: 'Schoolbell', cursive;
            padding: 2px 0;
        }
        .struk-total-row .total-amount {
            color: #98C81C;
        }

        .struk-ppn {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(11px, 1.5%, 17px);
            font-family: 'Schoolbell', cursive;
            padding: 2px 0;
        }
        .struk-ppn .ppn-amount {
            color: rgba(255, 255, 255, 0.5);
        }

        .struk-grand-total {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(16px, 2.5%, 28px);
            font-family: 'Schoolbell', cursive;
            font-weight: 700;
            padding-top: 4px;
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            margin-top: 4px;
        }
        .struk-grand-total .grand-total-amount {
            color: #98C81C;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-cetak {
            padding: 6px 14px;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 2px solid white;
            flex: 1;
            min-width: 70px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-cetak:active {
            background: #7aa814;
            transform: scale(0.95);
        }

        .btn-selesai-struk {
            padding: 6px 14px;
            background: #2ecc71;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 2px solid white;
            flex: 1;
            min-width: 70px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-selesai-struk:active {
            background: #27ae60;
            transform: scale(0.95);
        }

        .btn-hapus-struk {
            padding: 6px 14px;
            background: #e74c3c;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 2px solid white;
            flex: 1;
            min-width: 70px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-hapus-struk:active {
            background: #c0392b;
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 30px 15px;
            font-size: clamp(14px, 2.2%, 24px);
            font-family: 'Schoolbell', cursive;
        }
        .empty-state .sub {
            font-size: clamp(10px, 1.4%, 16px);
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-refresh {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(12px, 1.6%, 18px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-refresh:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: 16px;
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            display: block;
        }
        .toast.error {
            background: #e74c3c;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(50px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width: 767px) and (orientation: portrait) {
            .header-top {
                padding: 6px 12px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 48px;
            }
            .btn-back {
                font-size: 22px;
                min-width: 36px;
                min-height: 36px;
            }
            .logo-header img { width: 28px; }
            .brand-text { font-size: 16px; }
            .btn-logout {
                font-size: 11px;
                padding: 4px 10px;
                min-height: 30px;
            }
            .info-wrapper { padding: 4px 12px 6px 12px; }
            .info-item .label { font-size: 10px; }
            .info-item .value-box { font-size: 9px; padding: 2px 8px; max-width: 100px; border-width: 1.5px; }
            .struk-wrapper { padding: 4px 10px 10px 10px; }
            .struk-box { padding: 10px 12px 8px 12px; border-radius: 25px; min-height: 220px; }
            .struk-title { font-size: 14px; }
            .struk-no { font-size: 11px; }
            .struk-item { font-size: 10px; padding: 1px 0; }
            .struk-item .item-price { min-width: 55px; }
            .struk-total-row { font-size: 11px; }
            .struk-ppn { font-size: 10px; }
            .struk-grand-total { font-size: 14px; }
            .btn-cetak, .btn-selesai-struk, .btn-hapus-struk { font-size: 10px; padding: 4px 10px; min-width: 50px; border-width: 1.5px; }
            .struk-select { font-size: 10px; padding: 4px 8px; }
            .struk-select-label { font-size: 8px; }
        }

        @media screen and (max-width: 480px) and (orientation: portrait) {
            .header-top {
                padding: 4px 10px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 40px;
            }
            .btn-back {
                font-size: 18px;
                min-width: 30px;
                min-height: 30px;
            }
            .logo-header img { width: 22px; }
            .brand-text { font-size: 13px; }
            .btn-logout {
                font-size: 9px;
                padding: 3px 8px;
                min-height: 26px;
            }
            .info-wrapper { padding: 3px 8px 4px 8px; }
            .info-item .label { font-size: 8px; }
            .info-item .value-box { font-size: 8px; padding: 1px 6px; max-width: 70px; border-width: 1.5px; }
            .struk-wrapper { padding: 3px 6px 8px 6px; }
            .struk-box { padding: 8px 8px 6px 8px; border-radius: 18px; min-height: 180px; border-width: 1.5px; }
            .struk-title { font-size: 12px; }
            .struk-no { font-size: 9px; }
            .struk-item { font-size: 8px; padding: 1px 0; }
            .struk-item .item-price { min-width: 45px; }
            .struk-total-row { font-size: 9px; }
            .struk-ppn { font-size: 8px; }
            .struk-grand-total { font-size: 11px; }
            .btn-cetak, .btn-selesai-struk, .btn-hapus-struk { font-size: 8px; padding: 3px 6px; min-width: 35px; border-width: 1.5px; }
            .struk-select { font-size: 9px; padding: 3px 6px; }
        }

        @media screen and (orientation: landscape) {
            .header-top {
                padding: 6px 14px;
                padding-top: env(safe-area-inset-top, 6px);
                min-height: 44px;
            }
            .btn-back {
                font-size: 22px;
                min-width: 38px;
                min-height: 38px;
            }
            .logo-header img { width: 28px; }
            .brand-text { font-size: 16px; }
            .btn-logout {
                font-size: 12px;
                padding: 4px 12px;
                min-height: 32px;
            }
            .info-wrapper { padding: 4px 16px 6px 16px; }
            .info-item .label { font-size: 11px; }
            .info-item .value-box { font-size: 10px; padding: 2px 10px; max-width: 120px; border-width: 1.5px; }
            .struk-wrapper { padding: 4px 14px 10px 14px; }
            .struk-box { padding: 10px 14px 8px 14px; border-radius: 25px; min-height: 200px; }
            .struk-title { font-size: 15px; }
            .struk-no { font-size: 12px; }
            .struk-item { font-size: 11px; }
            .struk-item .item-price { min-width: 60px; }
            .struk-total-row { font-size: 12px; }
            .struk-ppn { font-size: 11px; }
            .struk-grand-total { font-size: 15px; }
            .btn-cetak, .btn-selesai-struk, .btn-hapus-struk { font-size: 10px; padding: 4px 10px; min-width: 60px; border-width: 1.5px; }
            .struk-select { font-size: 11px; padding: 4px 10px; }
            .struk-select-label { font-size: 8px; }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .header-top {
                padding: 4px 12px;
                padding-top: env(safe-area-inset-top, 4px);
                min-height: 36px;
            }
            .btn-back {
                font-size: 18px;
                min-width: 32px;
                min-height: 32px;
            }
            .logo-header img { width: 22px; }
            .brand-text { font-size: 13px; }
            .btn-logout {
                font-size: 10px;
                padding: 3px 8px;
                min-height: 28px;
            }
            .info-wrapper { padding: 3px 12px 4px 12px; }
            .info-item .label { font-size: 9px; }
            .info-item .value-box { font-size: 8px; padding: 1px 8px; max-width: 90px; border-width: 1.5px; }
            .struk-wrapper { padding: 3px 10px 6px 10px; }
            .struk-box { padding: 8px 10px 6px 10px; border-radius: 18px; min-height: 150px; }
            .struk-title { font-size: 12px; }
            .struk-no { font-size: 10px; }
            .struk-item { font-size: 9px; padding: 1px 0; }
            .struk-item .item-price { min-width: 45px; }
            .struk-total-row { font-size: 10px; }
            .struk-ppn { font-size: 9px; }
            .struk-grand-total { font-size: 12px; }
            .btn-cetak, .btn-selesai-struk, .btn-hapus-struk { font-size: 8px; padding: 3px 6px; min-width: 40px; border-width: 1.5px; }
            .struk-select { font-size: 9px; padding: 3px 8px; }
            .struk-select-label { font-size: 7px; }
        }

        @media screen and (min-width: 1025px) and (orientation: landscape) {
            .header-top {
                padding: 10px 20px;
                padding-top: env(safe-area-inset-top, 10px);
                min-height: 56px;
            }
            .btn-back {
                font-size: 28px;
                min-width: 48px;
                min-height: 48px;
            }
            .logo-header img { width: 40px; }
            .brand-text { font-size: 22px; }
            .btn-logout {
                font-size: 14px;
                padding: 6px 18px;
                min-height: 40px;
            }
            .info-wrapper { padding: 8px 24px 10px 24px; max-width: 900px; margin: 0 auto; width: 100%; }
            .info-item .label { font-size: 14px; }
            .info-item .value-box { font-size: 14px; padding: 5px 16px; max-width: 200px; }
            .struk-wrapper { padding: 8px 24px 15px 24px; max-width: 900px; margin: 0 auto; width: 100%; }
            .struk-box { padding: 16px 22px 12px 22px; border-radius: 35px; min-height: 300px; }
            .struk-title { font-size: 20px; }
            .struk-no { font-size: 16px; }
            .struk-item { font-size: 14px; padding: 3px 0; }
            .struk-item .item-price { min-width: 80px; }
            .struk-total-row { font-size: 16px; }
            .struk-ppn { font-size: 14px; }
            .struk-grand-total { font-size: 20px; }
            .btn-cetak, .btn-selesai-struk, .btn-hapus-struk { font-size: 13px; padding: 6px 16px; min-width: 80px; border-width: 2px; }
            .struk-select { font-size: 14px; padding: 6px 14px; }
        }

        @supports not (padding: env(safe-area-inset-top)) {
            .header-top { padding-top: 10px; }
            .struk-wrapper { padding-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div class="struk-container">
        <div class="bg-utama"></div>
        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data...</div>
        </div>

        <!-- ===== HEADER ===== -->
        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="goBack()">←</button>
                <div class="logo-header" onclick="goToDashboard()">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/50x50/98C81C/ffffff?text=🍽️'" />
                    <div class="brand-text">Jangkung<span>Order</span></div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-logout" onclick="logoutKaryawan()">🚪 Keluar</button>
            </div>
        </div>

        <!-- ===== INFO ===== -->
        <div class="info-wrapper">
            <div class="info-item">
                <span class="label">Nama:</span>
                <span class="value-box" id="namaDisplay">-</span>
            </div>
            <div class="info-item">
                <span class="label">Meja:</span>
                <span class="value-box" id="mejaDisplay">-</span>
            </div>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="struk-wrapper" id="strukWrapper">
            <div id="orderList">
                <div class="empty-state">
                    🔄 Memuat data...
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ordersData = [];
        let menuNames = {};
        let selectedOrder = null;
        let isRealtimeConnected = false;

        function goBack() {
            window.history.back();
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        function logoutKaryawan() {
            if (confirm('Yakin ingin keluar?')) {
                localStorage.removeItem('karyawan_logged_in');
                localStorage.removeItem('login_time');
                localStorage.removeItem('karyawan_nama');
                window.location.href = 'karyawan_login.html';
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function formatRupiah(price) {
            return 'Rp ' + Number(price).toLocaleString('id-ID');
        }

        async function loadMenuNames() {
            try {
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('id_menu, nama_menu');

                if (error) throw error;

                if (data) {
                    data.forEach(item => {
                        menuNames[item.id_menu] = item.nama_menu;
                    });
                }
                console.log('Menu names loaded:', Object.keys(menuNames).length);
                return true;
            } catch (error) {
                console.error('Error loading menu names:', error);
                return false;
            }
        }

        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                await loadMenuNames();

                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    const detailsWithMenu = (details || []).map(item => {
                        const menuName = menuNames[item.id_menu] || item.menu_name || 'Menu tidak ditemukan';
                        return {
                            ...item,
                            menu_name: menuName
                        };
                    });

                    const customerName = detailsWithMenu.length > 0 ? 
                        detailsWithMenu[0].nama || '-' : 
                        '-';

                    ordersWithDetails.push({
                        ...order,
                        orderdetails: detailsWithMenu,
                        customer_name: customerName
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders loaded:', ordersData.length);

                if (ordersData.length > 0) {
                    selectedOrder = ordersData[0];
                    renderOrder(selectedOrder);
                } else {
                    document.getElementById('orderList').innerHTML = `
                        <div class="struk-box">
                            <div class="empty-state">
                                🧾 Belum ada struk<br>
                                <span class="sub">Tunggu pesanan selesai</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('namaDisplay').textContent = '-';
                    document.getElementById('mejaDisplay').textContent = '-';
                }

                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('orderList').innerHTML = `
                    <div class="struk-box">
                        <div class="empty-state">
                            ⚠️ Gagal memuat data<br>
                            <span class="sub">${error.message}</span>
                            <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh</button>
                        </div>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        function setupRealtime() {
            if (isRealtimeConnected) return;

            const channel = supabaseClient
                .channel('table-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                    console.log('Realtime update orders:', payload);
                    loadOrdersSilent();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orderdetails' }, (payload) => {
                    console.log('Realtime update details:', payload);
                    loadOrdersSilent();
                })
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            window.realtimeChannel = channel;
        }

        async function loadOrdersSilent() {
            try {
                await loadMenuNames();

                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    const detailsWithMenu = (details || []).map(item => {
                        const menuName = menuNames[item.id_menu] || item.menu_name || 'Menu tidak ditemukan';
                        return {
                            ...item,
                            menu_name: menuName
                        };
                    });

                    const customerName = detailsWithMenu.length > 0 ? 
                        detailsWithMenu[0].nama || '-' : 
                        '-';

                    ordersWithDetails.push({
                        ...order,
                        orderdetails: detailsWithMenu,
                        customer_name: customerName
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders refreshed (silent):', ordersData.length);

                if (ordersData.length > 0) {
                    const currentNoStruk = selectedOrder ? selectedOrder.no_struk : null;
                    const stillExists = ordersData.find(o => o.no_struk === currentNoStruk);

                    if (stillExists) {
                        selectedOrder = stillExists;
                        renderOrder(selectedOrder);
                    } else {
                        selectedOrder = ordersData[0];
                        renderOrder(selectedOrder);
                    }
                } else {
                    document.getElementById('orderList').innerHTML = `
                        <div class="struk-box">
                            <div class="empty-state">
                                🧾 Semua pesanan sudah selesai<br>
                                <span class="sub">Tidak ada struk yang tersedia</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('namaDisplay').textContent = '-';
                    document.getElementById('mejaDisplay').textContent = '-';
                    selectedOrder = null;
                }

            } catch (error) {
                console.error('Error silent loading orders:', error);
            }
        }

        function renderOrder(order) {
            if (!order) return;

            document.getElementById('namaDisplay').textContent = order.customer_name || '-';
            document.getElementById('mejaDisplay').textContent = order.id_table || '1';

            const details = order.orderdetails || [];
            const subtotal = details.reduce((s, item) => s + (item.subtotal || 0), 0);
            const ppn = Math.round(subtotal * 0.1);
            const total = subtotal + ppn;

            const orderDate = new Date(order.tanggal_order + ' ' + order.waktu_order);
            const dateStr = orderDate.toLocaleString('id-ID', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            let html = `
                <div class="struk-box">
                    <div class="struk-select-wrapper">
                        <span class="struk-select-label">📋 Pilih Struk</span>
                        <select class="struk-select" id="strukSelect" onchange="onStrukChange(this.value)">
                            ${ordersData.map((o, i) => `
                                <option value="${i}" ${o.no_struk === order.no_struk ? 'selected' : ''}>
                                    ${o.no_struk} - ${o.customer_name || '-'}
                                </option>
                            `).join('')}
                        </select>
                    </div>

                    <div class="struk-title">📋 Detail Struk:</div>
                    <div class="struk-no">Nomor Struk: <span>${order.no_struk}</span> &bull; ${dateStr}</div>

                    <div class="struk-header-row">
                        <span>Pesanan</span>
                        <span>Jumlah</span>
                        <span>Harga</span>
                    </div>

                    ${details && details.length > 0 ? details.map(item => `
                        <div class="struk-item">
                            <span class="item-name">${item.menu_name}</span>
                            <span class="item-qty">${item.jumlah || 0}</span>
                            <span class="item-price">${formatRupiah(item.subtotal || 0)}</span>
                        </div>
                    `).join('') : `
                        <div class="struk-item">
                            <span class="item-name" style="color:rgba(255,255,255,0.3);">Tidak ada detail</span>
                            <span class="item-qty">-</span>
                            <span class="item-price">-</span>
                        </div>
                    `}

                    <hr class="struk-divider">

                    <div class="struk-total-row">
                        <span>Total</span>
                        <span class="total-amount">${formatRupiah(subtotal)}</span>
                    </div>
                    <div class="struk-ppn">
                        <span>PPN 10%</span>
                        <span class="ppn-amount">${formatRupiah(ppn)}</span>
                    </div>

                    <div class="struk-grand-total">
                        <span>Total</span>
                        <span class="grand-total-amount">${formatRupiah(total)}</span>
                    </div>

                    <div class="btn-group">
                        <button class="btn-cetak" onclick="cetakStruk('${order.no_struk}')">🖨️ Cetak</button>
                        <button class="btn-selesai-struk" onclick="selesaikanStruk('${order.no_struk}')">✅ Selesai</button>
                        <button class="btn-hapus-struk" onclick="hapusStruk('${order.no_struk}')">🗑️ Hapus</button>
                    </div>
                </div>
            `;

            document.getElementById('orderList').innerHTML = html;
        }

        function onStrukChange(index) {
            const idx = parseInt(index);
            if (!isNaN(idx) && ordersData[idx]) {
                selectedOrder = ordersData[idx];
                renderOrder(selectedOrder);
                document.getElementById('strukWrapper').scrollTop = 0;
            }
        }

        function cetakStruk(noStruk) {
            showToast(`🖨️ Mencetak struk ${noStruk}...`);
            // Bisa ditambahkan fungsi print
            window.print();
        }

        async function selesaikanStruk(noStruk) {
            if (!confirm(`Yakin ingin menyelesaikan pesanan ${noStruk}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('orders')
                    .update({ status_order: 'Selesai' })
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`✅ Pesanan ${noStruk} berhasil diselesaikan!`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error finishing order:', error);
                showToast('⚠️ Gagal menyelesaikan pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        async function hapusStruk(noStruk) {
            if (!confirm(`Yakin ingin menghapus pesanan ${noStruk}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error: detailError } = await supabaseClient
                    .from('orderdetails')
                    .delete()
                    .eq('no_struk', noStruk);

                if (detailError) throw detailError;

                const { error } = await supabaseClient
                    .from('orders')
                    .delete()
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`🗑️ Pesanan ${noStruk} berhasil dihapus`);
                await loadOrdersSilent();

            } catch (error) {
                console.error('Error deleting order:', error);
                showToast('⚠️ Gagal menghapus pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // ============================================
        // AUTO LOGOUT 15 MENIT
        // ============================================
        (function() {
            const LOGOUT_TIMER = 15 * 60 * 1000;
            let logoutTimer;

            function doLogout() {
                localStorage.removeItem('karyawan_logged_in');
                localStorage.removeItem('login_time');
                localStorage.removeItem('karyawan_nama');
                window.location.href = 'karyawan_login.html';
            }

            function resetLogoutTimer() {
                if (logoutTimer) clearTimeout(logoutTimer);
                logoutTimer = setTimeout(doLogout, LOGOUT_TIMER);
            }

            const events = ['click', 'keypress', 'scroll', 'touchstart', 'mousemove', 'keydown'];
            events.forEach(event => {
                document.addEventListener(event, resetLogoutTimer);
            });

            resetLogoutTimer();
            console.log('⏱️ Auto logout setelah 15 menit tidak ada aktivitas');
        })();

        // Cek login
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
