<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jangkung Order - Struk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Schoolbell&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            padding: 10px;
        }

        .struk-container {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 1080/1920;
            position: relative;
            background: white;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .bg-utama {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            background: url('bg.png') center center / cover no-repeat;
        }

        .deco-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .deco-bg img {
            position: absolute;
            opacity: 0.15;
        }

        .deco-bg img:nth-child(1) {
            width: 178%;
            height: 66.7%;
            left: -9.3%;
            top: 99.99%;
            transform: rotate(-90deg);
            transform-origin: top left;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 2;
        }

        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 20px 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: clamp(24px, 3.5%, 40px);
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-back:hover {
            transform: scale(1.1);
            color: #98C81C;
        }

        .logo-header img {
            width: clamp(40px, 7%, 70px);
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
        }

        .brand-text {
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .brand-text span {
            color: #98C81C;
        }

        .info-wrapper {
            position: absolute;
            top: 65px;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .info-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-item .label {
            color: white;
            font-size: clamp(18px, 3%, 35px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .info-item .value-box {
            padding: 10px 18px;
            border-radius: 50px;
            border: 3px solid white;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: clamp(16px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .struk-wrapper {
            position: absolute;
            top: 165px;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px 30px 20px 30px;
            overflow-y: auto;
            z-index: 5;
        }

        .struk-wrapper::-webkit-scrollbar {
            width: 4px;
        }

        .struk-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .struk-wrapper::-webkit-scrollbar-thumb {
            background: #98C81C;
            border-radius: 10px;
        }

        .struk-select-wrapper {
            margin-bottom: 15px;
        }

        .struk-select {
            width: 100%;
            padding: 12px 18px;
            border-radius: 50px;
            border: 3px solid white;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: clamp(14px, 2.2%, 26px);
            font-family: 'Schoolbell', cursive;
            outline: none;
            cursor: pointer;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
        }

        .struk-select option {
            background: #1a1a1a;
            color: white;
        }

        .struk-select:focus {
            border-color: #98C81C;
            background: rgba(255, 255, 255, 0.2);
        }

        .struk-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 3px solid white;
            padding: 25px 30px 20px 30px;
            min-height: 400px;
            margin-bottom: 15px;
        }

        .struk-title {
            color: white;
            font-size: clamp(24px, 4%, 45px);
            font-family: 'Schoolbell', cursive;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .struk-no {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(18px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            margin-bottom: 15px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .struk-no span {
            color: white;
        }

        .struk-header-row {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.5);
            font-size: clamp(14px, 1.8%, 22px);
            font-family: 'Schoolbell', cursive;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .struk-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            color: white;
            font-size: clamp(16px, 2.2%, 28px);
            font-family: 'Schoolbell', cursive;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .struk-item .item-name {
            flex: 1;
        }

        .struk-item .item-qty {
            margin: 0 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .struk-item .item-price {
            color: #98C81C;
        }

        .struk-divider {
            border: none;
            border-top: 2px dashed rgba(255, 255, 255, 0.2);
            margin: 10px 0;
        }

        .struk-total-row {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(18px, 2.5%, 32px);
            font-family: 'Schoolbell', cursive;
            padding: 4px 0;
        }

        .struk-total-row .total-amount {
            color: #98C81C;
        }

        .struk-ppn {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(16px, 2%, 26px);
            font-family: 'Schoolbell', cursive;
            padding: 2px 0;
        }

        .struk-ppn .ppn-amount {
            color: rgba(255, 255, 255, 0.7);
        }

        .struk-grand-total {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(24px, 3.5%, 42px);
            font-family: 'Schoolbell', cursive;
            font-weight: 700;
            padding-top: 8px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            margin-top: 8px;
        }

        .struk-grand-total .grand-total-amount {
            color: #98C81C;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-cetak {
            padding: 10px 25px;
            background: #98C81C;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(18px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 3px solid white;
            flex: 1;
            min-width: 120px;
        }

        .btn-cetak:hover {
            background: #7aa814;
            transform: scale(1.02);
        }

        .btn-selesai-struk {
            padding: 10px 25px;
            background: #2ecc71;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(18px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 3px solid white;
            flex: 1;
            min-width: 120px;
        }

        .btn-selesai-struk:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        .btn-hapus-struk {
            padding: 10px 25px;
            background: #e74c3c;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(18px, 2.5%, 30px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 3px solid white;
            flex: 1;
            min-width: 120px;
        }

        .btn-hapus-struk:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 60px 20px;
            font-size: clamp(20px, 3%, 35px);
            font-family: 'Schoolbell', cursive;
        }

        .empty-state .sub {
            font-size: clamp(14px, 1.8%, 22px);
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-refresh {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: clamp(16px, 2%, 24px);
            font-family: 'Schoolbell', cursive;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-refresh:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .loading-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #98C81C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #98C81C;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Schoolbell', cursive;
            font-size: clamp(12px, 1.6%, 20px);
            z-index: 200;
            display: none;
            animation: slideUp 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @media screen and (max-width: 767px) {
            .struk-container {
                max-width: 100%;
                border-radius: 12px;
            }
            .header-top {
                padding: 10px 14px 6px 14px;
            }
            .info-wrapper {
                top: 55px;
                padding: 0 14px;
                gap: 10px;
                flex-direction: column;
            }
            .info-item .label {
                font-size: 14px;
            }
            .info-item .value-box {
                font-size: 12px;
                padding: 6px 12px;
                border-width: 2px;
            }
            .struk-wrapper {
                top: 145px;
                padding: 8px 14px 15px 14px;
            }
            .struk-box {
                padding: 15px 16px 12px 16px;
                border-radius: 30px;
            }
            .struk-title {
                font-size: 18px;
            }
            .struk-no {
                font-size: 14px;
            }
            .struk-header-row {
                font-size: 11px;
            }
            .struk-item {
                font-size: 13px;
            }
            .struk-total-row {
                font-size: 14px;
            }
            .struk-ppn {
                font-size: 12px;
            }
            .struk-grand-total {
                font-size: 18px;
            }
            .btn-cetak,
            .btn-selesai-struk,
            .btn-hapus-struk {
                font-size: 14px;
                padding: 8px 12px;
                min-width: 80px;
            }
            .struk-select {
                font-size: 14px;
                padding: 8px 14px;
            }
        }

        @media screen and (max-width: 480px) {
            .struk-container {
                border-radius: 10px;
            }
            .header-top {
                padding: 6px 10px 4px 10px;
            }
            .btn-back {
                font-size: 18px;
            }
            .logo-header img {
                width: 25px;
            }
            .brand-text {
                font-size: 12px;
            }
            .info-wrapper {
                top: 48px;
                padding: 0 10px;
                gap: 6px;
                flex-direction: column;
            }
            .info-item .label {
                font-size: 12px;
            }
            .info-item .value-box {
                font-size: 11px;
                padding: 4px 10px;
            }
            .struk-wrapper {
                top: 130px;
                padding: 6px 10px 10px 10px;
            }
            .struk-box {
                padding: 12px 12px 10px 12px;
                border-radius: 20px;
                border-width: 2px;
            }
            .struk-title {
                font-size: 14px;
            }
            .struk-no {
                font-size: 11px;
            }
            .struk-header-row {
                font-size: 9px;
            }
            .struk-item {
                font-size: 10px;
                padding: 2px 0;
            }
            .struk-total-row {
                font-size: 11px;
            }
            .struk-ppn {
                font-size: 10px;
            }
            .struk-grand-total {
                font-size: 14px;
            }
            .btn-group {
                flex-direction: column;
                gap: 6px;
            }
            .btn-cetak,
            .btn-selesai-struk,
            .btn-hapus-struk {
                font-size: 12px;
                padding: 6px 10px;
                min-width: 60px;
            }
            .empty-state {
                font-size: 16px;
                padding: 30px 10px;
            }
            .struk-select {
                font-size: 12px;
                padding: 6px 10px;
            }
        }

        @media screen and (max-width: 360px) {
            .info-item .value-box {
                font-size: 9px;
            }
            .struk-item {
                font-size: 9px;
            }
            .struk-grand-total {
                font-size: 12px;
            }
        }

        @media screen and (min-width: 768px) and (max-width: 1024px) and (orientation: landscape) {
            .struk-container {
                max-width: 90vh;
                border-radius: 15px;
            }
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            .struk-container {
                max-width: 90vh;
                border-radius: 10px;
            }
            .header-top {
                padding: 5px 10px 3px 10px;
            }
            .btn-back {
                font-size: 16px;
            }
            .logo-header img {
                width: 22px;
            }
            .brand-text {
                font-size: 11px;
            }
            .info-wrapper {
                top: 40px;
                padding: 0 10px;
                gap: 6px;
                flex-direction: row;
            }
            .info-item .label {
                font-size: 10px;
            }
            .info-item .value-box {
                font-size: 10px;
                padding: 3px 8px;
                border-width: 2px;
            }
            .struk-wrapper {
                top: 105px;
                padding: 4px 10px 8px 10px;
            }
            .struk-box {
                padding: 10px 12px 8px 12px;
                border-radius: 20px;
                min-height: 200px;
            }
            .struk-title {
                font-size: 12px;
            }
            .struk-no {
                font-size: 10px;
            }
            .struk-header-row {
                font-size: 8px;
            }
            .struk-item {
                font-size: 9px;
                padding: 1px 0;
            }
            .struk-total-row {
                font-size: 10px;
            }
            .struk-ppn {
                font-size: 9px;
            }
            .struk-grand-total {
                font-size: 12px;
            }
            .btn-cetak,
            .btn-selesai-struk,
            .btn-hapus-struk {
                font-size: 10px;
                padding: 4px 8px;
                min-width: 50px;
            }
            .struk-select {
                font-size: 10px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="struk-container">
        <div class="bg-utama"></div>

        <div class="deco-bg">
            <img src="https://placehold.co/1922x1281/2d2d2d/ffffff?text=" alt="" loading="lazy" />
        </div>

        <div class="overlay"></div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Memuat data...</div>
        </div>

        <div class="header-top">
            <div class="header-left">
                <button class="btn-back" onclick="window.location.href='dashboard.html'">←</button>
                <div class="logo-header">
                    <img src="logo.png" alt="Logo" loading="lazy" onerror="this.src='https://placehold.co/55x55/98C81C/ffffff?text=🍽️'" />
                </div>
                <div class="brand-text">Jangkung<span>Order</span></div>
            </div>
        </div>

        <div class="info-wrapper">
            <div class="info-item">
                <div class="label">Nama:</div>
                <div class="value-box" id="namaDisplay">-</div>
            </div>
            <div class="info-item">
                <div class="label">Nomor Meja:</div>
                <div class="value-box" id="mejaDisplay">-</div>
            </div>
        </div>

        <div class="struk-wrapper" id="strukWrapper">
            <div id="orderList">
                <div class="empty-state">
                    🔄 Memuat data...
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        const SUPABASE_URL = 'https://vxgagtasyfpzvlfqcibk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Z2FndGFzeWZwenZsZnFjaWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTMzNzQsImV4cCI6MjA5ODk2OTM3NH0.pA9FySOQVR4BDPH_FbNA_1j5ytWBR2rPf6b441XWCXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ordersData = [];
        let selectedOrder = null;
        let isRealtimeConnected = false;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) {
                toast.classList.add('error');
            }
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function formatRupiah(price) {
            return 'Rp ' + Number(price).toLocaleString('id-ID');
        }

        // ===== LOAD ORDERS =====
        async function loadOrders() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                // Ambil semua pesanan yang sudah selesai
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                // Untuk setiap order, ambil detail
                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    ordersWithDetails.push({
                        ...order,
                        orderdetails: details || []
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders loaded:', ordersData.length);

                if (ordersData.length > 0) {
                    selectedOrder = ordersData[0];
                    renderOrder(selectedOrder);
                } else {
                    document.getElementById('orderList').innerHTML = `
                        <div class="struk-box">
                            <div class="empty-state">
                                🧾 Belum ada struk<br>
                                <span class="sub">Tunggu pesanan selesai</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('namaDisplay').textContent = '-';
                    document.getElementById('mejaDisplay').textContent = '-';
                }

                // Setup realtime setelah load pertama
                if (!isRealtimeConnected) {
                    setupRealtime();
                }

            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('orderList').innerHTML = `
                    <div class="struk-box">
                        <div class="empty-state">
                            ⚠️ Gagal memuat data<br>
                            <span class="sub">${error.message}</span>
                            <button class="btn-refresh" onclick="loadOrders()">🔄 Refresh</button>
                        </div>
                    </div>
                `;
            } finally {
                loading.classList.remove('active');
            }
        }

        // ===== SETUP REALTIME =====
        function setupRealtime() {
            if (isRealtimeConnected) return;
            
            const channel = supabaseClient
                .channel('table-db-changes')
                .on(
                    'postgres_changes',
                    {
                        event: '*',
                        schema: 'public',
                        table: 'orders'
                    },
                    (payload) => {
                        console.log('Realtime update:', payload);
                        // Refresh data saat ada perubahan
                        loadOrdersSilent();
                    }
                )
                .on(
                    'postgres_changes',
                    {
                        event: '*',
                        schema: 'public',
                        table: 'orderdetails'
                    },
                    (payload) => {
                        console.log('Realtime update details:', payload);
                        // Refresh data saat ada perubahan
                        loadOrdersSilent();
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        isRealtimeConnected = true;
                        console.log('✅ Realtime connected!');
                    }
                });

            // Simpan channel untuk cleanup jika diperlukan
            window.realtimeChannel = channel;
        }

        // ===== LOAD ORDERS SILENT (tanpa loading overlay) =====
        async function loadOrdersSilent() {
            try {
                // Ambil semua pesanan yang sudah selesai
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .eq('status_order', 'Selesai')
                    .order('id_order', { ascending: false });

                if (ordersError) throw ordersError;

                // Untuk setiap order, ambil detail
                const ordersWithDetails = [];
                for (const order of orders || []) {
                    const { data: details, error: detailsError } = await supabaseClient
                        .from('orderdetails')
                        .select('*')
                        .eq('no_struk', order.no_struk);

                    if (detailsError) {
                        console.warn('Error fetching details for', order.no_struk, detailsError);
                    }

                    ordersWithDetails.push({
                        ...order,
                        orderdetails: details || []
                    });
                }

                ordersData = ordersWithDetails || [];
                console.log('Orders refreshed (silent):', ordersData.length);

                if (ordersData.length > 0) {
                    // Jika data berubah, update tampilan
                    const currentNoStruk = selectedOrder ? selectedOrder.no_struk : null;
                    const stillExists = ordersData.find(o => o.no_struk === currentNoStruk);
                    
                    if (stillExists) {
                        // Jika order yang dipilih masih ada, update saja
                        selectedOrder = stillExists;
                        renderOrder(selectedOrder);
                    } else {
                        // Jika tidak ada, pilih yang pertama
                        selectedOrder = ordersData[0];
                        renderOrder(selectedOrder);
                    }
                } else {
                    document.getElementById('orderList').innerHTML = `
                        <div class="struk-box">
                            <div class="empty-state">
                                🧾 Semua pesanan sudah selesai<br>
                                <span class="sub">Tidak ada struk yang tersedia</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('namaDisplay').textContent = '-';
                    document.getElementById('mejaDisplay').textContent = '-';
                    selectedOrder = null;
                }

            } catch (error) {
                console.error('Error silent loading orders:', error);
            }
        }

        // ===== RENDER ORDER =====
        function renderOrder(order) {
            if (!order) return;

            const customerName = order.orderdetails && order.orderdetails.length > 0 ?
                order.orderdetails[0].nama || '-' :
                '-';

            document.getElementById('namaDisplay').textContent = customerName;
            document.getElementById('mejaDisplay').textContent = 'Meja ' + (order.id_table || '1');

            const details = order.orderdetails || [];
            const subtotal = details.reduce((s, item) => s + (item.subtotal || 0), 0);
            const ppn = Math.round(subtotal * 0.1);
            const total = subtotal + ppn;

            const orderDate = new Date(order.tanggal_order + ' ' + order.waktu_order);
            const dateStr = orderDate.toLocaleString('id-ID', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            let html = `
                <div class="struk-box">
                    <div class="struk-select-wrapper">
                        <select class="struk-select" id="strukSelect" onchange="onStrukChange(this.value)">
                            ${ordersData.map((o, i) => `
                                <option value="${i}" ${o.no_struk === order.no_struk ? 'selected' : ''}>
                                    ${o.no_struk} - ${o.orderdetails && o.orderdetails.length > 0 ? o.orderdetails[0].nama || '-' : '-'}
                                </option>
                            `).join('')}
                        </select>
                    </div>

                    <div class="struk-title">📋 Detail Struk:</div>
                    <div class="struk-no">Nomor Struk: <span>${order.no_struk}</span> &bull; ${dateStr}</div>

                    <div class="struk-header-row">
                        <span>Pesanan</span>
                        <span>Jumlah</span>
                        <span>Harga</span>
                    </div>

                    ${details && details.length > 0 ? details.map(item => `
                        <div class="struk-item">
                            <span class="item-name">${item.nama || 'Menu'}</span>
                            <span class="item-qty">${item.jumlah || 0}</span>
                            <span class="item-price">${formatRupiah(item.subtotal || 0)}</span>
                        </div>
                    `).join('') : `
                        <div class="struk-item">
                            <span class="item-name" style="color:rgba(255,255,255,0.3);">Tidak ada detail</span>
                            <span class="item-qty">-</span>
                            <span class="item-price">-</span>
                        </div>
                    `}

                    <hr class="struk-divider">

                    <div class="struk-total-row">
                        <span>Total</span>
                        <span class="total-amount">${formatRupiah(subtotal)}</span>
                    </div>
                    <div class="struk-ppn">
                        <span>PPN 10%</span>
                        <span class="ppn-amount">${formatRupiah(ppn)}</span>
                    </div>

                    <div class="struk-grand-total">
                        <span>Total</span>
                        <span class="grand-total-amount">${formatRupiah(total)}</span>
                    </div>

                    <div class="btn-group">
                        <button class="btn-cetak" onclick="cetakStruk('${order.no_struk}')">🖨️ Cetak</button>
                        <button class="btn-selesai-struk" onclick="selesaikanStruk('${order.no_struk}')">✅ Selesai</button>
                        <button class="btn-hapus-struk" onclick="hapusStruk('${order.no_struk}')">🗑️ Hapus</button>
                    </div>
                </div>
            `;

            document.getElementById('orderList').innerHTML = html;
        }

        // ===== ON STRUK CHANGE =====
        function onStrukChange(index) {
            const idx = parseInt(index);
            if (!isNaN(idx) && ordersData[idx]) {
                selectedOrder = ordersData[idx];
                renderOrder(selectedOrder);
                document.getElementById('strukWrapper').scrollTop = 0;
            }
        }

        // ===== CETAK STRUK =====
        function cetakStruk(noStruk) {
            showToast(`🖨️ Mencetak struk ${noStruk}...`);
        }

        // ===== SELESAIKAN STRUK =====
        async function selesaikanStruk(noStruk) {
            if (!confirm(`Yakin ingin menyelesaikan pesanan ${noStruk}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error } = await supabaseClient
                    .from('orders')
                    .update({ status_order: 'Selesai' })
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`✅ Pesanan ${noStruk} berhasil diselesaikan!`);
                // Realtime akan otomatis refresh

            } catch (error) {
                console.error('Error finishing order:', error);
                showToast('⚠️ Gagal menyelesaikan pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // ===== HAPUS STRUK =====
        async function hapusStruk(noStruk) {
            if (!confirm(`Yakin ingin menghapus pesanan ${noStruk}?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            try {
                const { error: detailError } = await supabaseClient
                    .from('orderdetails')
                    .delete()
                    .eq('no_struk', noStruk);

                if (detailError) throw detailError;

                const { error } = await supabaseClient
                    .from('orders')
                    .delete()
                    .eq('no_struk', noStruk);

                if (error) throw error;

                showToast(`🗑️ Pesanan ${noStruk} berhasil dihapus`);
                // Realtime akan otomatis refresh

            } catch (error) {
                console.error('Error deleting order:', error);
                showToast('⚠️ Gagal menghapus pesanan: ' + error.message, true);
            } finally {
                loading.classList.remove('active');
            }
        }

        // Cek login
        if (localStorage.getItem('karyawan_logged_in') !== 'true') {
            window.location.href = 'karyawan_login.html';
        }

        // Load data
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
